<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="5" fill="#02020a"/>
  <!-- outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#ff00ff" stroke-width="1.5" opacity="0.6"/>
  <!-- patch point jack (center circle) -->
  <circle cx="16" cy="16" r="6" fill="#0a0a18" stroke="#ff00ff" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="2.5" fill="#ff00ff"/>
  <!-- cable arc top-left to bottom-right (orange cable) -->
  <path d="M 7 9 Q 4 16 9 23" fill="none" stroke="#ff6600" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  <!-- cable arc top-right (cyan) -->
  <path d="M 25 9 Q 28 16 25 23" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  <!-- nm² text hint — two small squares top corners -->
  <rect x="4" y="4" width="3" height="3" rx="0.5" fill="#ff00ff" opacity="0.5"/>
  <rect x="25" y="4" width="3" height="3" rx="0.5" fill="#ff00ff" opacity="0.5"/>
</svg>
