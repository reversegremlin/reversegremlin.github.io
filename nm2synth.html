  },
  GROUP_LABELS: {
    voice:'VOICE', modulation:'MODULATION', sources:'SOURCES',
    character:'CHARACTER', space:'SPACE', live:'LIVE', analysis:'ANALYSIS',
  },
  // Groups open by default
  OPEN_DEFAULT: new Set(['voice']),

  // Macro button options — short-tap triggers, long-press on macro btn to reassign
  MACRO_OPTIONS: [
    {id:'wander', label:'◌ WANDER',  action(){const b=document.getElementById('affect-wander-btn');if(b)b.click();}},
    {id:'hold',   label:'⏸ HOLD',    action(){if(mods.seq){mods.seq.hold=!mods.seq.hold;document.getElementById('m-hold-btn')?.classList.toggle('on',mods.seq.hold);}}},
    {id:'panic',  label:'× PANIC',   action(){mods.adsr?.off();if(mods.looper?.tracks)mods.looper.tracks.forEach(t=>{t.recording=false;});setStatus('Panic');}},
    {id:'rec',    label:'⏺ REC',     action(){document.getElementById('rec-btn')?.click();}},
    {id:'rand',   label:'✦ RANDOM',  action(){document.getElementById('rand-btn')?.click();}},
    {id:'rev',    label:'⇆ REVERSE', action(){const b=document.querySelector('#mod-seq [data-dir="rev"]');if(b)b.click();else if(mods.seq)mods.seq.direction='rev';}},
    {id:'fwd',    label:'→ FORWARD', action(){const b=document.querySelector('#mod-seq [data-dir="fwd"]');if(b)b.click();else if(mods.seq)mods.seq.direction='fwd';}},
  ],

  init() {
    this.query = window.matchMedia('(max-width:640px)');
    this.buildShell();
    if(this.query.matches) this.activate();
    this.query.addEventListener('change', e => { if(e.matches) this.activate(); else this.deactivate(); });
  },

  // ── Build the full mobile DOM tree (once, on init) ─────────────────────────
  buildShell() {
    const sh = document.createElement('div');
    sh.id = 'm-shell';
    sh.style.display = 'none'; // hidden until activate()

    // ── Top bar ───────────────────────────────────────────────────────────────
    const topbar = document.createElement('div');
    topbar.id = 'm-topbar';
    const brand = document.createElement('span');
    brand.className = 'm-brand';
    brand.textContent = 'nm²';
    const pname = document.createElement('span');
    pname.id = 'm-patch-name';
    pname.textContent = this.patchName;
    pname.style.cursor = 'pointer';
    pname.addEventListener('click', () => this.openPresetSheet());
    const bpm = document.createElement('span');
    bpm.id = 'm-bpm';
    bpm.textContent = '120 BPM';
    const meterCv = document.createElement('canvas');
    meterCv.id = 'm-meter-canvas';
    meterCv.width = 36; meterCv.height = 16;
    const vizMobileBtn = document.createElement('button');
    vizMobileBtn.id = 'm-viz-btn';
    vizMobileBtn.textContent = '◉ VIZ';
    vizMobileBtn.title = 'Fullscreen Visualizer';
    vizMobileBtn.addEventListener('click', () => document.getElementById('viz-btn')?.click());
    const overflowBtn = document.createElement('button');
    overflowBtn.id = 'm-overflow-btn';
    overflowBtn.textContent = '⋯';
    overflowBtn.addEventListener('click', () => this.openOverflow());
    topbar.append(brand, pname, bpm, meterCv, vizMobileBtn, overflowBtn);

    // ── Workspace ─────────────────────────────────────────────────────────────
    const ws = document.createElement('div');
    ws.id = 'm-workspace';

    // Create all tab content containers
    const tabIds = ['play','sound','patch','perform','library'];
    tabIds.forEach(id => {
      const d = document.createElement('div');
      d.id = 'm-tab-' + id;
      d.className = 'm-tab-content' + (id === 'play' ? ' active' : '');
      ws.appendChild(d);
    });

    // ── Tab bar ───────────────────────────────────────────────────────────────
    const tabbar = document.createElement('div');
    tabbar.id = 'm-tabbar';
    const tabLabels = {play:'PLAY', sound:'SOUND', patch:'PATCH', perform:'PERFORM', library:'LIB'};
    tabIds.forEach(id => {
      const b = document.createElement('button');
      b.className = 'm-tab' + (id === 'play' ? ' on' : '');
      b.dataset.tab = id;
      b.textContent = tabLabels[id];
      b.addEventListener('click', () => this.switchTab(id));
      tabbar.appendChild(b);
    });

    // ── Performance strip ─────────────────────────────────────────────────────
    const perf = document.createElement('div');
    perf.id = 'm-perfstrip';

    const playBtn = document.createElement('button');
    playBtn.id = 'm-play-btn'; playBtn.className = 'btn'; playBtn.textContent = '▶';
    playBtn.addEventListener('click', () => {
      this._haptic('light');
      const pb = document.getElementById('seq-play-btn');
      if(pb) pb.click();
      setTimeout(() => this.syncPerfState(), 80);
    });

    const stopBtn = document.createElement('button');
    stopBtn.id = 'm-stop-btn'; stopBtn.className = 'btn'; stopBtn.textContent = '■';
    stopBtn.addEventListener('click', () => {
      this._haptic('light');
      if(mods.seq?.playing) {
        const pb = document.getElementById('seq-play-btn');
        if(pb) pb.click();
      }
      mods.adsr?.off();
      setTimeout(() => this.syncPerfState(), 80);
    });

    const holdBtn = document.createElement('button');
    holdBtn.id = 'm-hold-btn'; holdBtn.className = 'btn'; holdBtn.textContent = 'HOLD';
    holdBtn.addEventListener('click', () => {
      const hb = document.getElementById('hold-btn');
      if(hb) hb.click();
      else {
        // toggle hold via mods directly if button not present
        if(mods.seq) { mods.seq.hold = !mods.seq.hold; holdBtn.classList.toggle('on', mods.seq.hold); }
      }
    });

    perf.append(playBtn, stopBtn, holdBtn);

    // Scene A-D buttons
    const sceneLetters = ['A','B','C','D'];
    sceneLetters.forEach((ltr, i) => {
      const sb = document.createElement('button');
      sb.className = 'btn m-scene-btn';
      sb.dataset.sceneIdx = i;
      sb.textContent = ltr;
      // Tap: recall scene
      sb.addEventListener('click', () => {
        document.getElementById('scene-' + i)?.click();
        this.syncSceneBtns();
      });
      // Long-press: save scene
      let pt;
      sb.addEventListener('pointerdown', () => {
        pt = setTimeout(() => {
          if(typeof getConfig === 'function' && typeof scenes !== 'undefined') {
            scenes[i] = getConfig();
            saveScenesToStorage();
            updateSceneButtons();
            this._haptic('heavy');
            setStatus('Scene ' + ltr + ' saved');
            this.syncSceneBtns();
          }
        }, 650);
      });
      sb.addEventListener('pointerup',    () => clearTimeout(pt));
      sb.addEventListener('pointerleave', () => clearTimeout(pt));
      perf.appendChild(sb);
    });

    // Macro button — tap to trigger, long-press to assign
    const macroBtn = document.createElement('button');
    macroBtn.id = 'm-macro-btn'; macroBtn.className = 'btn';
    const defaultMacro = this.MACRO_OPTIONS.find(o => o.id === this._macroId);
    macroBtn.textContent = defaultMacro ? defaultMacro.label : '◌';
    if(defaultMacro) macroBtn.classList.add('active');
    macroBtn.addEventListener('click', () => this._macroTrigger());
    let mpt;
    macroBtn.addEventListener('pointerdown', () => { mpt = setTimeout(() => this.openMacroSheet(), 650); });
    macroBtn.addEventListener('pointerup',    () => clearTimeout(mpt));
    macroBtn.addEventListener('pointerleave', () => clearTimeout(mpt));
    perf.appendChild(macroBtn);

    sh.append(topbar, ws, tabbar, perf);

    // ── Overflow menu ─────────────────────────────────────────────────────────
    const ovMenu = document.createElement('div');
    ovMenu.id = 'm-overflow-menu';
    const ovBack = document.createElement('div');
    ovBack.id = 'm-overflow-backdrop';
    ovBack.addEventListener('click', () => this.closeOverflow());
    const ovPanel = document.createElement('div');
    ovPanel.id = 'm-overflow-panel';

    const ovItems = [
      {label:'⏺ REC',     src:'rec-btn'},
      {label:'⬡ SHARE',   src:'share-btn'},
      {label:'✦ RANDOM',  src:'rand-btn'},
      {label:'⎷ MIDI',    src:'midi-btn'},
      // GRAPH: rack is hidden on mobile — delegate to graph-btn which shows a clear error
      {label:'◈ GRAPH',   src:'graph-btn'},
      {label:'⊹ FLOW',    src:'flow-btn'},
      // MODULE: picker works but new panel must be synced into Sound tab groups
      {label:'⊕ MODULE',  action() {
        this.closeOverflow();
        document.getElementById('add-mod-btn')?.click();
        // After picker closes, move any new rack panels into Sound groups
        const checkSync = setInterval(() => {
          const picker = document.getElementById('mod-picker');
          if(!picker || picker.style.display !== 'block') {
            clearInterval(checkSync);
            setTimeout(() => this._syncNewRackModules(), 100);
          }
        }, 250);
        setTimeout(() => clearInterval(checkSync), 30000);
      }},

  activate() {
    this.active = true;
    const rack = document.getElementById('rack');

    // Save rack children order (including .rack-group dividers) and sync before depopulating
    this.savedRackChildren = [...rack.children];
    if(typeof syncRackOrder === 'function') syncRackOrder();

    // Ensure module pool exists
    if(!document.getElementById('m-module-pool')) {
      const pool = document.createElement('div');
      pool.id = 'm-module-pool';
      document.body.appendChild(pool);
    }
    const pool = document.getElementById('m-module-pool');

    // Reparent affect panel to Play hero
    const affectPanel = document.getElementById('mod-affect');
    const hero = document.getElementById('m-play-hero');
    if(affectPanel && hero && !hero.contains(affectPanel)) hero.appendChild(affectPanel);

    // Reparent all other module panels to the hidden pool
    document.querySelectorAll('#rack .module').forEach(panel => {
      if(panel.id !== 'mod-affect') pool.appendChild(panel);
    });

    // Build tab content (idempotent after first call)
    this.buildPlayTab();
    this.buildSoundTab();
    this.buildPatchTab();
    this.buildLibraryTab();
    this.buildPerformTab();
    this.buildEditorSheet();
    this.buildPresetSheet();

    this.shell.style.display = 'flex';
    this.syncPerfState();
    this.syncSceneBtns();
    this.syncBPM();
    this.switchTab('play');
    this.startActivityPoll();
    this.startMeter();
  },

  deactivate() {
    this.active = false;
    this.stopActivityPoll();
    this.stopMeter();
    this.stopPerformStepHighlight();

    // Close editor without animation (instant)
    const editorSheet = document.getElementById('m-editor-sheet');
    if(editorSheet) editorSheet.classList.remove('open');

    const rack = document.getElementById('rack');
    const pool = document.getElementById('m-module-pool');

    // Restore savedRackChildren order (rack-group dividers + module panels)
    // First, reclaim any module panels from the editor body or pool back to pool
    document.querySelectorAll('#m-editor-body .module').forEach(p => pool?.appendChild(p));

    // Restore from pool and original order
    this.savedRackChildren.forEach(child => {
      if(child.classList?.contains('module')) {
        // Find in pool by id, restore
        const inPool = pool?.querySelector('#' + child.id);
        if(inPool) rack.appendChild(inPool);
        // mod-affect lives in the play hero
        const inHero = document.getElementById('m-play-hero')?.querySelector('#' + child.id);
        if(inHero) rack.appendChild(inHero);
      } else {
        rack.appendChild(child);
      }
    });

    this.shell.style.display = 'none';
    requestAnimationFrame(() => { cables.forEach(c => moveCable(c)); });
  },

    tab.appendChild(quickHdr);

    // Quick-sound cards (configurable)
    const quickRow = document.createElement('div');

    // Activity strip

  buildSoundTab() {
    const tab = document.getElementById('m-tab-sound');
    if(tab.dataset.built) return;
    tab.dataset.built = '1';

    // Spine SVG overlay — drawn over the tab content
    const spine = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    spine.id = 'm-sound-spine';
    tab.appendChild(spine);

    Object.entries(this.GROUPS).forEach(([key, types]) => {
      const group = document.createElement('div');
      group.className = 'm-snd-group';
      group.dataset.group = key;

      const hdr = document.createElement('button');
      hdr.className = 'm-snd-hdr' + (this.OPEN_DEFAULT.has(key) ? ' open' : '');
      hdr.innerHTML = this.GROUP_LABELS[key] + '<span class="m-snd-hdr-arrow">▾</span>';
      hdr.addEventListener('click', () => this.toggleGroup(key));

      const body = document.createElement('div');
      body.className = 'm-snd-body' + (this.OPEN_DEFAULT.has(key) ? ' open' : '');
      body.id = 'm-snd-body-' + key;

      // Create a module card for each type in this group
      types.forEach(type => {
        const def = this.CARD_DEFS[type];
        const allInstances = [1, ...((typeof moduleInstances !== 'undefined' && moduleInstances[type]) || [1]).filter(i => i > 1)];
        allInstances.forEach(instanceId => {
          const panelId = instanceId === 1 ? 'mod-' + type : 'mod-' + type + '-' + instanceId;
          if(!document.getElementById(panelId) && !document.getElementById('m-module-pool')?.querySelector('#' + panelId)) return;
          const card = document.createElement('div');
          card.className = 'm-card';
          card.dataset.moduleType = type;
          card.dataset.instanceId = instanceId;

          const hdrRow = document.createElement('div');
          hdrRow.className = 'm-card-header';
          const nameEl = document.createElement('span');
          nameEl.className = 'm-card-name';
          nameEl.textContent = (def?.label || type.toUpperCase()) + (instanceId > 1 ? ' ' + instanceId : '');
          const statusDot = document.createElement('div');
          statusDot.className = 'm-card-status';
          statusDot.id = 'm-card-status-' + type + (instanceId > 1 ? '-' + instanceId : '');
          const editBtn = document.createElement('button');
          editBtn.className = 'm-card-edit';
          editBtn.textContent = 'EDIT ›';
          editBtn.addEventListener('click', () => this.openEditor(type, instanceId));
          hdrRow.append(nameEl, statusDot, editBtn);
          card.appendChild(hdrRow);

          // Quick control value buttons
          if(def?.knobs?.length) {
            const ctrls = document.createElement('div');
            ctrls.className = 'm-card-ctrls';
            def.knobs.forEach(({l, k}) => {
              const knobKey = instanceId === 1 ? k : k.replace(/^([a-z]+)-/, `$1-${instanceId}-`);
              const ctrl = document.createElement('div');
              ctrl.className = 'm-ctrl';
              const lbl = document.createElement('div');
              lbl.className = 'm-ctrl-lbl';
              lbl.textContent = l;
              const btn = document.createElement('button');
              btn.className = 'm-ctrl-btn';
              btn.dataset.knob = knobKey;
              btn.textContent = '—';
              btn.addEventListener('click', () => {
                const kref = knobRefs[knobKey];
                if(kref && typeof ensureKnobTouchEditor === 'function') {
                  ensureKnobTouchEditor().open(kref);
                }
              });
              ctrl.append(lbl, btn);
              ctrls.appendChild(ctrl);
            });
            card.appendChild(ctrls);
          } else {
            const empty = document.createElement('div');
            empty.className = 'm-card-empty';
            empty.textContent = 'Tap EDIT to open';
            card.appendChild(empty);
          }

          // PP indicator row — dim dots for each patch point; glow when connected
          const {outs, ins} = this._getModulePPs(type, instanceId);
          if(outs.length || ins.length) {
            const ppRow = document.createElement('div');
            ppRow.className = 'm-card-pp-row';
            const insEl = document.createElement('div');
            insEl.className = 'm-card-pp-side';
            if(ins.length) {
              const lbl = document.createElement('span');
              lbl.className = 'm-card-pp-lbl';
              lbl.textContent = 'IN';
              insEl.appendChild(lbl);
              ins.forEach(pp => {
                const chip = document.createElement('span');
                chip.className = 'm-pp-chip';
                const dot = document.createElement('div');
                dot.className = 'm-pp-dot ' + pp.cls;
                dot.dataset.ppId = pp.id;
                dot.title = pp.label || pp.id;
                const txt = document.createElement('span');
                txt.className = 'm-pp-mini';
                txt.textContent = pp.label || pp.id;
                const open = e => { e.stopPropagation(); this.openEditor(type, instanceId); };
                chip.addEventListener('click', open);
                dot.addEventListener('click', open);
                chip.append(dot, txt);
                insEl.appendChild(chip);
              });
            }
            const outsEl = document.createElement('div');
            outsEl.className = 'm-card-pp-side';
            if(outs.length) {
              outs.forEach(pp => {
                const chip = document.createElement('span');
                chip.className = 'm-pp-chip';
                const dot = document.createElement('div');
                dot.className = 'm-pp-dot ' + pp.cls;
                dot.dataset.ppId = pp.id;
                dot.title = pp.label || pp.id;
                const txt = document.createElement('span');
                txt.className = 'm-pp-mini';
                txt.textContent = pp.label || pp.id;
                const open = e => { e.stopPropagation(); this.openEditor(type, instanceId); };
                chip.addEventListener('click', open);
                dot.addEventListener('click', open);
                chip.append(dot, txt);
                outsEl.appendChild(chip);
              });
              const lbl = document.createElement('span');
              lbl.className = 'm-card-pp-lbl';
              lbl.textContent = 'OUT';
              outsEl.appendChild(lbl);
            }
            ppRow.append(insEl, outsEl);
            card.appendChild(ppRow);
          }

          body.appendChild(card);
        });
      });

      group.append(hdr, body);
      tab.appendChild(group);
    });
  },

  buildEditorSheet() {
    if(document.getElementById('m-editor-sheet')) return;

    const sheet = document.createElement('div');
    sheet.id = 'm-editor-sheet';

    const backdrop = document.createElement('div');
    backdrop.id = 'm-editor-backdrop';
    backdrop.addEventListener('click', () => this.closeEditor());

    const panel = document.createElement('div');
    panel.id = 'm-editor-panel';

    const hdr = document.createElement('div');
    hdr.id = 'm-editor-header';
    const handle = document.createElement('div');
    handle.id = 'm-editor-handle';
    const title = document.createElement('span');
    title.id = 'm-editor-title';
    title.textContent = 'MODULE';
    const closeBtn = document.createElement('button');
    closeBtn.id = 'm-editor-close';
    closeBtn.textContent = '✕ CLOSE';
    closeBtn.addEventListener('click', () => this.closeEditor());
    hdr.append(handle, title, closeBtn);

  openEditor(type, instanceId = 1) {
    const sheet = document.getElementById('m-editor-sheet');
    const body  = document.getElementById('m-editor-body');
    const title = document.getElementById('m-editor-title');
    if(!sheet || !body) return;

    // Close any currently-open editor first
    if(sheet.classList.contains('open')) this.closeEditor(true);

    const panelId = instanceId === 1 ? 'mod-' + type : 'mod-' + type + '-' + instanceId;
    const pool = document.getElementById('m-module-pool');
    const modulePanel = pool?.querySelector('#' + panelId) || document.getElementById(panelId);
    if(!modulePanel) return;

    const def = this.CARD_DEFS[type];
    title.textContent = (def?.label || type.toUpperCase()) + (instanceId > 1 ? ' ' + instanceId : '');
    body.appendChild(modulePanel);
    sheet.classList.add('open');
    // Scroll editor to top
    document.getElementById('m-editor-panel').scrollTop = 0;
    this._editorType = type;
    this._editorInstanceId = instanceId;
  },

  closeEditor(instant = false) {
    const sheet = document.getElementById('m-editor-sheet');
    const body  = document.getElementById('m-editor-body');
    const pool  = document.getElementById('m-module-pool');
    if(!sheet) return;

    // Return module panel to pool
    if(body && pool) {
      body.querySelectorAll('.module').forEach(p => pool.appendChild(p));
    }

    if(instant) {
      sheet.classList.remove('open');
    } else {
      const panel = document.getElementById('m-editor-panel');
      panel.style.transform = 'translateY(100%)';
      setTimeout(() => {
        sheet.classList.remove('open');
        panel.style.transform = '';
      }, 290);
    }
    this._editorType = null;
    this._editorInstanceId = null;
  },

  _selectDesktopPreset(name = '') {

      panel.style.transform = 'translateY(100%)';

  refreshPresetSheet() {
    const list = document.getElementById('m-preset-panel-list');
    if(!list) return;
    list.innerHTML = '';
    let presets = [];
    try { presets = JSON.parse(localStorage.getItem('nm2synth_presets') || '[]'); } catch(e) {}
    if(presets.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'color:var(--text-dim);font-size:11px;padding:12px 0;text-align:center;';
      empty.textContent = 'No saved presets yet.';
      list.appendChild(empty); return;
    }
    presets.forEach((p, idx) => {
      const row = document.createElement('div');
      row.className = 'm-preset-row';
      const name = document.createElement('span');
      name.textContent = p.name || 'Untitled';
      const del = document.createElement('span');
      del.className = 'm-preset-del';
      del.textContent = '✕';
      del.addEventListener('click', e => {
        e.stopPropagation();
        this._deletePresetFromMobile(p.name || '');
      });
      row.append(name, del);
      row.addEventListener('click', () => {
        this._loadPresetFromMobile(p.name || '');
        this.closePresetSheet();
      });
      list.appendChild(row);
    });
  },

  buildPatchTab() {

    addBtn.addEventListener('click', () => this.openSrcSheet());
    header.append(title, countSpan, addBtn);

    // Signal type filter tabs
    const filterRow = document.createElement('div');
    filterRow.id = 'm-patch-filter';
    [{k:'all',l:'ALL'},{k:'audio',l:'AUDIO'},{k:'cv',l:'CV'},{k:'gate',l:'GATE'}].forEach(({k, l}) => {
      const btn = document.createElement('button');

      this._haptic('light'); this.refreshPerformBPM();
    });
    // Hold to repeat
    let bpmHoldTimer, bpmHoldInterval;

    const stopBpmHold = () => { clearTimeout(bpmHoldTimer); clearInterval(bpmHoldInterval); };

    // ── Transport ────────────────────────────────────────────────────────────

    pStopBtn.addEventListener('click', () => {

    // ── Step count ───────────────────────────────────────────────────────────
    const stepsLbl = document.createElement('div');

      b.className = 'btn'; b.textContent = n + ' STEPS'; b.dataset.stepCountMobile = n;
      b.addEventListener('click', () => {
        // Trigger the original seq step-count button inside #mod-seq
        document.querySelectorAll(`#mod-seq [data-stepcount="${n}"]`).forEach(el => el.click());
        document.querySelectorAll('[data-step-count-mobile]').forEach(el =>

    tab.appendChild(dirLbl);

    [['FWD','fwd'],['REV','rev'],['P-P','pp'],['RND','rnd']].forEach(([lbl, dir]) => {

  // ── Tab switching ──────────────────────────────────────────────────────────
  switchTab(name) {
    document.querySelectorAll('.m-tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.m-tab').forEach(el => el.classList.toggle('on', el.dataset.tab === name));
    const tabEl = document.getElementById('m-tab-' + name);
    if(tabEl) tabEl.classList.add('active');
    this.currentTab = name;
    if(name === 'patch') this.refreshPatchTab();
    if(name === 'sound') { this.refreshCardPPs(); requestAnimationFrame(() => this._refreshSpine()); }
    if(name === 'library') { this.refreshPresetList(); this.syncLibraryScenes(); }
    if(name === 'play') this.refreshQuickCards();
    if(name === 'perform') { this.refreshPerformStepGrid(); this.refreshPerformBPM(); this.startPerformStepHighlight(); }
    else this.stopPerformStepHighlight();
    // Scroll workspace to top on tab switch
    const ws = document.getElementById('m-workspace');
    if(ws) ws.scrollTop = 0;
  },

    const isOpen = hdr.classList.contains('open');

  openOverflow() {
    document.getElementById('m-overflow-menu')?.classList.add('open');
  },
  closeOverflow() {

  // ── Patch tab: live connection list ───────────────────────────────────────
  // Format a patch point ID into a readable label: 'vcf-cutoff' → 'VCF CUT'
  _ppLabel(id) {
    return id.replace(/-/g, ' ').toUpperCase().replace(/\b(\w{1,3})\w+\b/g, (m, p) => {
      // Keep short words as-is, truncate long ones to 6 chars
      return m.length > 6 ? m.slice(0, 6) : m;
    });
  },

  // Signal class of a cable: uses source patch point cls
  _cableSigClass(cable) {
    return ppMap[cable.fromId]?.cls || 'ao';
  },

  refreshPatchTab() {
    const map = document.getElementById('m-flow-map');
    const countEl = document.getElementById('m-patch-count');
    if(!map) return;
    map.innerHTML = '';

    const filter = this._patchFilter || 'all';
    const filterMap = { audio: ['ao','ai'], cv: ['co','ci'], gate: ['co','gi'] };
    const allowed = filterMap[filter] || null;

    const visible = (cables || []).filter(cable => {
      if(!allowed) return true;
      const cls = ppMap[cable.fromId]?.cls || '';
      return allowed.includes(cls);
    });

    if(countEl) countEl.textContent = cables ? '(' + cables.length + ')' : '';

    if(visible.length === 0) {
      const empty = document.createElement('div');
      empty.id = 'm-patch-empty';
      empty.textContent = cables?.length ? 'No ' + filter + ' connections.' : 'No connections. Tap + ADD to patch.';
      map.appendChild(empty);
      return;
    }

    visible.forEach(cable => {
      const fromPP = ppMap[cable.fromId];
      const toPP   = ppMap[cable.toId];
      if(!fromPP || !toPP) return;

      const sigCls  = fromPP.cls || 'ao';
      const color   = PP_COLOR[sigCls] || '#cc00ff';
      const srcMod  = fromPP.el.closest('.module');
      const dstMod  = toPP.el.closest('.module');
      const srcName = srcMod?.querySelector('.module-label')?.textContent?.trim()
                   || srcMod?.id?.replace('mod-','')?.toUpperCase() || '?';
      const dstName = dstMod?.querySelector('.module-label')?.textContent?.trim()
                   || dstMod?.id?.replace('mod-','')?.toUpperCase() || '?';
      const srcSub  = (fromPP.label || cable.fromId.split('-').slice(1).join(' ')).toUpperCase();
      const dstSub  = (toPP.label   || cable.toId.split('-').slice(1).join(' ')).toUpperCase();

      // Resolve type + instanceId for editor navigation
      const srcType = srcMod?.dataset?.moduleType || srcMod?.id?.replace(/^mod-/,'').replace(/-\d+$/,'') || '';
      const dstType = dstMod?.dataset?.moduleType || dstMod?.id?.replace(/^mod-/,'').replace(/-\d+$/,'') || '';
      const srcInst = parseInt(srcMod?.dataset?.instanceId || '1');
      const dstInst = parseInt(dstMod?.dataset?.instanceId || '1');

      const row = document.createElement('div');
      row.className = 'm-flow-row';

      // Source tile
      const srcTile = document.createElement('button');
      srcTile.className = 'm-flow-tile';
      srcTile.innerHTML = `<div class="m-flow-tile-name">${srcName}</div><div class="m-flow-tile-sub">${srcSub}</div>`;
      if(srcType) srcTile.addEventListener('click', () => this.openEditor(srcType, srcInst));

      // Middle connector
      const mid = document.createElement('div');
      mid.className = 'm-flow-mid';
      const line = document.createElement('div');
      line.className = 'm-flow-line';
      line.style.background = color;
      const dot = document.createElement('div');
      dot.className = 'm-flow-dot';
      dot.style.background = color;
      dot.style.boxShadow = `0 0 5px ${color}`;
      mid.append(line, dot);

      // Dest tile
      const dstTile = document.createElement('button');
      dstTile.className = 'm-flow-tile';
      dstTile.innerHTML = `<div class="m-flow-tile-name">${dstName}</div><div class="m-flow-tile-sub">${dstSub}</div>`;
      if(dstType) dstTile.addEventListener('click', () => this.openEditor(dstType, dstInst));

      // Delete button
      const del = document.createElement('button');
      del.className = 'm-flow-del';
      del.textContent = '✕';
      del.setAttribute('aria-label', 'Remove connection');
      del.addEventListener('click', () => { delCable(cable); this.refreshPatchTab(); this.refreshCardPPs(); requestAnimationFrame(() => this._refreshSpine()); });

      row.append(srcTile, mid, dstTile, del);
      map.appendChild(row);
    });
  },

  // ── Source picker sheet ────────────────────────────────────────────────────
  _srcFilter: 'all', // 'all' | 'audio' | 'cv'

  buildSrcSheet() {
    if(document.getElementById('m-src-sheet')) return;

    const sheet = document.createElement('div');
    sheet.id = 'm-src-sheet';

    const backdrop = document.createElement('div');
    backdrop.id = 'm-src-backdrop';
    backdrop.addEventListener('click', () => this.closeSrcSheet());

    const panel = document.createElement('div');
    panel.id = 'm-src-panel';

    const hdr = document.createElement('div');
    hdr.id = 'm-src-header';
    const title = document.createElement('span');
    title.id = 'm-src-title';
    title.textContent = 'PATCH FROM…';
    const closeBtn = document.createElement('button');
    closeBtn.id = 'm-src-close';
    closeBtn.textContent = '✕';
    closeBtn.addEventListener('click', () => this.closeSrcSheet());
    hdr.append(title, closeBtn);

    const filterRow = document.createElement('div');
    filterRow.id = 'm-src-filter';
    [{k:'all',l:'ALL'},{k:'audio',l:'AUDIO'},{k:'cv',l:'CV'}].forEach(({k, l}) => {
      const btn = document.createElement('button');
      btn.className = 'm-sf-btn' + (k === 'all' ? ' on' : '');
      btn.dataset.srcFilter = k;
      btn.textContent = l;
      btn.addEventListener('click', () => {
        this._srcFilter = k;
        document.querySelectorAll('.m-sf-btn').forEach(b => b.classList.toggle('on', b.dataset.srcFilter === k));
        this._applySrcFilter();
      });
      filterRow.appendChild(btn);
    });

    const list = document.createElement('div');
    list.id = 'm-src-list';

    panel.append(hdr, filterRow, list);
    sheet.append(backdrop, panel);
    document.body.appendChild(sheet);
  },

  openSrcSheet() {
    const sheet = document.getElementById('m-src-sheet');
    const list  = document.getElementById('m-src-list');
    if(!sheet || !list) return;

    list.innerHTML = '';
    this._srcFilter = 'all';
    document.querySelectorAll('.m-sf-btn').forEach(b => b.classList.toggle('on', b.dataset.srcFilter === 'all'));

    // Collect all output patch points from ppMap, sorted by display name
    const outputs = Object.values(ppMap)
      .filter(pp => pp.role === 'out')
      .sort((a, b) => a.id.localeCompare(b.id));

    outputs.forEach(pp => {
      const isLinked = (cables || []).some(c => c.fromId === pp.id);
      const row = document.createElement('div');
      row.className = 'm-src-row';
      row.dataset.cls = pp.cls;

      const dot = document.createElement('div');
      dot.className = 'm-src-dot ' + (pp.cls || 'ao');

      const name = document.createElement('span');
      name.className = 'm-src-name';
      name.textContent = this._ppLabel(pp.id);

      const linked = document.createElement('span');
      linked.className = 'm-src-linked';
      linked.textContent = isLinked ? '● connected' : '';

      row.append(dot, name, linked);
      row.addEventListener('click', () => {
        this.closeSrcSheet();
        // Begin patch from this source, then open dest sheet
        if(typeof cancelPatch === 'function') cancelPatch();
        if(typeof beginPatch === 'function') beginPatch(pp.id);
        setTimeout(() => {
          if(typeof ensurePatchDestSheet === 'function') {
            ensurePatchDestSheet().show(pp.id);
          }
        }, 120);
      });
      list.appendChild(row);
    });

    this._applySrcFilter();
    sheet.classList.add('open');
    document.getElementById('m-src-panel').scrollTop = 0;
  },

  closeSrcSheet() {
    const sheet = document.getElementById('m-src-sheet');
    const panel = document.getElementById('m-src-panel');
    if(!sheet) return;
    if(panel) {
      panel.style.transform = 'translateY(100%)';
      setTimeout(() => { sheet.classList.remove('open'); panel.style.transform = ''; }, 270);
    } else {
      sheet.classList.remove('open');
    }
  },

  _applySrcFilter() {
    const f = this._srcFilter;
    document.querySelectorAll('.m-src-row').forEach(row => {
      const cls = row.dataset.cls;
      let show = true;
      if(f === 'audio') show = cls === 'ao';
      else if(f === 'cv')    show = cls === 'co';
      row.classList.toggle('hidden', !show);
    });
  },

  // ── Library helpers ────────────────────────────────────────────────────────
  refreshPresetList() {
    const list = document.getElementById('m-preset-list');
    if(!list) return;
    list.innerHTML = '';
    let presets = [];
    try { presets = JSON.parse(localStorage.getItem('nm2synth_presets') || '[]'); } catch(e) {}
    if(presets.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'color:var(--text-dim);font-size:11px;padding:12px 0;text-align:center;';
      empty.textContent = 'No saved presets yet.';
      list.appendChild(empty);
      return;
    }
    presets.forEach((p, idx) => {
      const row = document.createElement('div');
      row.className = 'm-preset-row';
      const name = document.createElement('span');
      name.textContent = p.name || 'Untitled';
      const del = document.createElement('span');
      del.className = 'm-preset-del';
      del.textContent = '✕';
      del.addEventListener('click', e => {
        e.stopPropagation();
        this._deletePresetFromMobile(p.name || '');
      });
      row.append(name, del);
      row.addEventListener('click', () => {
        this._loadPresetFromMobile(p.name || '');
      });
      list.appendChild(row);
    });
  },

  syncLibraryScenes() {
    if(typeof scenes === 'undefined') return;
    scenes.forEach((s, i) => {
      const card = document.getElementById('m-scene-card-' + i);
      if(card) card.classList.toggle('filled', s !== null);
    });
  },

  syncPerfState() {
    const playing = mods.seq?.playing || false;
    document.getElementById('m-play-btn')?.classList.toggle('on', playing);
    document.getElementById('m-stop-btn')?.classList.toggle('on', !playing);
  },

  syncSceneBtns() {
    if(typeof scenes === 'undefined') return;
    document.querySelectorAll('.m-scene-btn').forEach(btn => {
      const i = parseInt(btn.dataset.sceneIdx);
      btn.classList.toggle('filled', scenes[i] !== null);

  syncBPM() {
    const el = document.getElementById('m-bpm');
    if(el && mods.seq) el.textContent = Math.round(mods.seq.bpm || 120) + ' BPM';
  },

  // ── Activity strip polling ─────────────────────────────────────────────────
  startActivityPoll() {
    this._activityInterval = setInterval(() => this.updateActivity(), 500);
    this.updateActivity();
  },
  stopActivityPoll() {
    clearInterval(this._activityInterval);
  },
  updateActivity() {
    const seqEl  = document.getElementById('m-act-seq');
    const loopEl = document.getElementById('m-act-loop');
    const patchEl = document.getElementById('m-act-patch');
    const seqDot  = document.getElementById('m-act-dot-seq');
    const loopDot = document.getElementById('m-act-dot-loop');

    if(seqEl && mods.seq) {
      const playing = mods.seq.playing;
      seqEl.textContent = 'SEQ ' + (playing ? '▸ ' + (mods.seq.stepCount||8) + ' steps' : 'stopped');
      if(seqDot) seqDot.classList.toggle('live', playing);
    }
    if(loopEl) {
      const loopActive = typeof mods.looper !== 'undefined' && Array.isArray(mods.looper?.tracks)
        ? mods.looper.tracks.some(t => t.playing || t.recording)
        : false;
      loopEl.textContent = 'LOOP ' + (loopActive ? 'playing' : 'idle');
      if(loopDot) loopDot.classList.toggle('live', loopActive);
    }
    if(patchEl) {
      patchEl.textContent = (cables?.length || 0) + ' routes';
    }
    // Keep Patch tab count badge current
    const countEl = document.getElementById('m-patch-count');
    if(countEl && cables) countEl.textContent = '(' + cables.length + ')';
    this.refreshQuickCards();
    this.refreshCards();
    this.syncBPM();
    this.syncPerfState();
    this.syncSceneBtns();
    if(this.currentTab === 'perform') this.refreshPerformBPM();
  },

  refreshQuickCards() {
    document.querySelectorAll('.m-quick-card-val-num').forEach(el => {
      const k = el.dataset.knob;
      if(k && knobRefs[k]) {
        const valBtn = document.querySelector(`[data-knob-id="${k}"]`)?.closest('.knob-wrap')?.querySelector('.knob-val');
        el.textContent = valBtn ? valBtn.textContent : (typeof knobRefs[k].getVal() === 'number' ? knobRefs[k].getVal().toFixed(2) : '—');
      }
    });
  },

  // Update all card quick-control value buttons from knobRefs
  refreshCards() {
    document.querySelectorAll('.m-ctrl-btn[data-knob]').forEach(btn => {
      const k = btn.dataset.knob;
      if(!k) return;
      const valBtn = document.querySelector(`[data-knob-id="${k}"]`)?.closest('.knob-wrap')?.querySelector('.knob-val');
      if(valBtn) { btn.textContent = valBtn.textContent; return; }
      if(knobRefs[k]) {
        const v = knobRefs[k].getVal();
        btn.textContent = typeof v === 'number' ? (v >= 100 ? Math.round(v).toString() : v.toFixed(2)) : '—';
      }
    });
    this.refreshCardPPs();
    requestAnimationFrame(() => this._refreshSpine());
  },

  // Update glow state on all card PP dots to reflect live cables
  refreshCardPPs() {
    const livePPs = new Set();
    (cables || []).forEach(c => { livePPs.add(c.fromId); livePPs.add(c.toId); });
    document.querySelectorAll('.m-pp-dot[data-pp-id]').forEach(dot => {
      dot.classList.toggle('live', livePPs.has(dot.dataset.ppId));
    });
  },

  // ── Spine SVG: draws bezier threads between connected card PP dots ──────────
  _getModulePPs(type, instanceId) {
    const panelId = instanceId === 1 ? 'mod-' + type : 'mod-' + type + '-' + instanceId;
    const outs = [], ins = [];
    if(!ppMap) return {outs, ins};
    Object.values(ppMap).forEach(pp => {
      if(pp.el.closest('.module')?.id === panelId) {
        if(pp.role === 'out') outs.push(pp);
        else ins.push(pp);
      }
    });
    return {outs, ins};
  },

  _getDotCoords(ppId, tabRect) {
    const dot = document.querySelector(`.m-pp-dot[data-pp-id="${ppId}"]`);
    if(dot) {
      const body = dot.closest('.m-snd-body');
      if(body && body.classList.contains('open')) {
        const r = dot.getBoundingClientRect();
        if(r.width > 0) {
          return { x: r.left - tabRect.left + r.width/2, y: r.top - tabRect.top + r.height/2 };
        }
      }
      // Collapsed — terminate at group header
      const grp = dot.closest('.m-snd-group');
      if(grp) {
        const hdr = grp.querySelector('.m-snd-hdr');
        if(hdr) {
          const r = hdr.getBoundingClientRect();
          const role = ppMap[ppId]?.role;
          return {
            x: role === 'out' ? r.right - tabRect.left - 8 : r.left - tabRect.left + 8,
            y: r.top - tabRect.top + r.height / 2,
            collapsed: true,
          };
        }
      }
    }
    return null;
  },

  _refreshSpine() {
    const svg = document.getElementById('m-sound-spine');
    const tab = document.getElementById('m-tab-sound');
    if(!svg || !tab || !cables) return;
    while(svg.lastChild) svg.removeChild(svg.lastChild);

    const tabRect = tab.getBoundingClientRect();
    const W = tabRect.width;
    const spineX = W - 6; // right-side channel

    (cables || []).forEach(cable => {
      const fromPP = ppMap[cable.fromId];
      const toPP   = ppMap[cable.toId];
      if(!fromPP || !toPP) return;

      const src = this._getDotCoords(cable.fromId, tabRect);
      const dst = this._getDotCoords(cable.toId,   tabRect);
      if(!src || !dst) return;

      const color = PP_COLOR[fromPP.cls] || '#cc00ff';
      const path  = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      // C-curve: src → spine right edge → dst
      const cx = Math.min(spineX, W - 4);
      const d  = `M${src.x},${src.y} C${cx},${src.y} ${cx},${dst.y} ${dst.x},${dst.y}`;
      path.setAttribute('d', d);
      path.setAttribute('stroke', color);
      path.setAttribute('stroke-width', src.collapsed || dst.collapsed ? '1' : '1.5');
      path.setAttribute('fill', 'none');
      path.setAttribute('opacity', '0.55');
      path.setAttribute('stroke-dasharray', src.collapsed || dst.collapsed ? '3,3' : 'none');
      svg.appendChild(path);

      // Small circle endpoint at dest
      const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circ.setAttribute('cx', dst.x); circ.setAttribute('cy', dst.y); circ.setAttribute('r', '3');
      circ.setAttribute('fill', color); circ.setAttribute('opacity', '0.7');
      svg.appendChild(circ);
    });
  },

  // ── Tiny VU meter in top bar ───────────────────────────────────────────────
  startMeter() {
    const cv = document.getElementById('m-meter-canvas');
    if(!cv) return;
    const c = cv.getContext('2d');
    const W = cv.width, H = cv.height;
    const buf = new Uint8Array(analyserNode.fftSize);
    const drawMeter = () => {
      if(!this.active) return;
      this._meterRAF = requestAnimationFrame(drawMeter);
      analyserNode.getByteTimeDomainData(buf);
      // Compute RMS
      let sum = 0;
      for(let i=0; i<buf.length; i++) { const s=(buf[i]-128)/128; sum+=s*s; }
      const rms = Math.sqrt(sum/buf.length);
      const level = Math.min(1, rms * 6);
      c.clearRect(0, 0, W, H);
      const barW = (W-2)/2;
      // Two bars (L+R mirrored from mono analyser)
      [0, barW+2].forEach(x => {
        const fillH = Math.round(level * H);
        const hue = level > 0.75 ? 0 : level > 0.5 ? 40 : 140;
        c.fillStyle = `hsl(${hue},100%,55%)`;
        c.fillRect(x, H-fillH, barW, fillH);
      });
    };
    drawMeter();
  },
  stopMeter() {
    cancelAnimationFrame(this._meterRAF);
  },

  // ── Haptic feedback ────────────────────────────────────────────────────────
  _haptic(type) {
    if(!navigator.vibrate) return;
    if(type === 'light')  navigator.vibrate(8);
    else if(type === 'medium') navigator.vibrate(20);
    else if(type === 'heavy')  navigator.vibrate([30, 10, 30]);
  },

  // ── Perform tab helpers ────────────────────────────────────────────────────
  refreshPerformBPM() {
    const el = document.getElementById('m-perf-bpm-val');
    if(el && mods.seq) el.textContent = Math.round(mods.seq.bpm);
    this.syncBPM();
  },

  _syncPfTransport() {
    if(!mods.seq) return;
    const playing = mods.seq.playing;
    document.getElementById('m-pf-play')?.classList.toggle('on', playing);
    document.getElementById('m-pf-stop')?.classList.toggle('on', !playing);
  },

  refreshPerformStepGrid() {
    if(!mods.seq) return;
    const count = mods.seq.stepCount || 8;
    // Show/hide steps 8-15
    for(let i = 0; i < 16; i++) {
      const btn = document.getElementById('m-step-btn-' + i);
      if(!btn) return;
      btn.style.display = (i >= 8 && count < 16) ? 'none' : '';
      const step = mods.seq.steps[i];
      if(step) {
        btn.classList.toggle('on', step.on);
        const pitchEl = btn.querySelector('.m-step-pitch');
        if(pitchEl) pitchEl.textContent = step.pitch ? (step.pitch > 0 ? '+' + step.pitch : step.pitch) : '';
      }
    }
    // Sync count buttons
    document.querySelectorAll('[data-step-count-mobile]').forEach(el =>
      el.classList.toggle('on', Number(el.dataset.stepCountMobile) === count));
    // Sync direction buttons
    const dir = mods.seq.direction || 'fwd';
    document.querySelectorAll('[data-dir-mobile]').forEach(el =>
      el.classList.toggle('on', el.dataset.dirMobile === dir));
    // Sync transport
    this._syncPfTransport();
  },

  startPerformStepHighlight() {
    if(this._performRAF) return;
    let lastStep = -1;
    const tick = () => {
      if(!this.active || this.currentTab !== 'perform') { this._performRAF = null; return; }
      this._performRAF = requestAnimationFrame(tick);
      if(!mods.seq) return;
      const cur = mods.seq.playing ? mods.seq.step : -1;
      if(cur !== lastStep) {
        if(lastStep >= 0) document.getElementById('m-step-btn-' + lastStep)?.classList.remove('cur');
        if(cur >= 0)      document.getElementById('m-step-btn-' + cur)?.classList.add('cur');
        lastStep = cur;
      }
    };
    this._performRAF = requestAnimationFrame(tick);
  },

  stopPerformStepHighlight() {
    cancelAnimationFrame(this._performRAF);
    this._performRAF = null;
    document.querySelectorAll('.m-step-btn.cur').forEach(el => el.classList.remove('cur'));
  },

  // ── Macro button ──────────────────────────────────────────────────────────
  _macroTrigger() {
    const opt = this.MACRO_OPTIONS.find(o => o.id === this._macroId);
    if(opt) { opt.action(); this._haptic('medium'); }
  },

  syncMacroBtn() {
    const btn = document.getElementById('m-macro-btn');
    if(!btn) return;
    const opt = this.MACRO_OPTIONS.find(o => o.id === this._macroId);
    if(opt) { btn.textContent = opt.label; btn.classList.add('active'); }
  },

  buildMacroSheet() {
    if(document.getElementById('m-macro-sheet')) return;
    const sheet = document.createElement('div'); sheet.id = 'm-macro-sheet';
    const backdrop = document.createElement('div'); backdrop.id = 'm-macro-backdrop';
    backdrop.addEventListener('click', () => this.closeMacroSheet());
    const panel = document.createElement('div'); panel.id = 'm-macro-panel';
    const hdr = document.createElement('div'); hdr.id = 'm-macro-hdr';
    const title = document.createElement('span'); title.id = 'm-macro-title'; title.textContent = 'ASSIGN MACRO';
    const closeBtn = document.createElement('button'); closeBtn.id = 'm-macro-close'; closeBtn.className = 'btn';
    closeBtn.textContent = '✕'; closeBtn.addEventListener('click', () => this.closeMacroSheet());
    hdr.append(title, closeBtn); panel.appendChild(hdr);
    this.MACRO_OPTIONS.forEach(opt => {
      const row = document.createElement('div');
      row.className = 'm-macro-opt' + (opt.id === this._macroId ? ' sel' : '');
      row.dataset.macroId = opt.id;
      const check = document.createElement('span'); check.className = 'm-macro-check';
      check.textContent = opt.id === this._macroId ? '✓' : '';
      const lbl = document.createElement('span'); lbl.className = 'm-macro-lbl'; lbl.textContent = opt.label;
      row.append(check, lbl);
      row.addEventListener('click', () => {
        this._macroId = opt.id;
        document.querySelectorAll('.m-macro-opt').forEach(el => {
          const sel = el.dataset.macroId === opt.id;
          el.classList.toggle('sel', sel);
          el.querySelector('.m-macro-check').textContent = sel ? '✓' : '';
        });
        this.syncMacroBtn();
        this._haptic('light');
        setTimeout(() => this.closeMacroSheet(), 200);
      });
      panel.appendChild(row);
    });
    sheet.append(backdrop, panel);
    document.body.appendChild(sheet);
  },

  openMacroSheet() {
    this.buildMacroSheet();
    const sheet = document.getElementById('m-macro-sheet');
    if(sheet) sheet.classList.add('open');
  },

  closeMacroSheet() {
    const sheet = document.getElementById('m-macro-sheet');
    const panel = document.getElementById('m-macro-panel');
    if(!sheet) return;
    if(panel) { panel.style.transform = 'translateY(100%)'; setTimeout(() => { sheet.classList.remove('open'); panel.style.transform = ''; }, 270); }
    else sheet.classList.remove('open');
  },

  // ── Customizable quick cards ───────────────────────────────────────────────
  _loadQuickCardConfig() {
    if(this._quickCardConfig) return;
    try {
      const saved = JSON.parse(localStorage.getItem('nm2-mobile-quick-cards') || 'null');
      if(Array.isArray(saved) && saved.length === 4 && saved.every(t => this.CARD_DEFS[t])) {
        this._quickCardConfig = saved; return;
      }
    } catch(e) {}
    this._quickCardConfig = ['vcf', 'reverb', 'adsr', 'vco'];
  },

  _rebuildQuickCards(container) {
    container.innerHTML = '';
    this._loadQuickCardConfig();
    this._quickCardConfig.forEach(type => {
      const def = this.CARD_DEFS[type];
      if(!def) return;
      const card = document.createElement('div');
      card.className = 'm-quick-card'; card.dataset.cardType = type;
      const nameEl = document.createElement('div');
      nameEl.className = 'm-quick-card-name'; nameEl.textContent = def.label;
      card.appendChild(nameEl);
      const valsEl = document.createElement('div');
      valsEl.className = 'm-quick-card-vals';
      def.knobs.slice(0, 2).forEach(({l, k}) => {
        const row = document.createElement('div'); row.className = 'm-quick-card-val-row';
        const lbl = document.createElement('span'); lbl.className = 'm-quick-card-val-lbl'; lbl.textContent = l;
        const num = document.createElement('span'); num.className = 'm-quick-card-val-num';
        num.dataset.knob = k; num.textContent = '—';
        row.append(lbl, num); valsEl.appendChild(row);
      });
      if(def.knobs.length === 0) {
        const empty = document.createElement('span');
        empty.className = 'm-quick-card-val-lbl'; empty.textContent = 'TAP TO EDIT';
        valsEl.appendChild(empty);
      }
      card.appendChild(valsEl);
      // Tap: open this module's editor sheet (fastest path to editing)
      card.addEventListener('click', () => {
        this.openEditor(type, 1);
      });
      container.appendChild(card);
    });
    this.refreshQuickCards();
  },

  buildQuickCfgSheet() {
    if(document.getElementById('m-quick-cfg-sheet')) return;
    const sheet = document.createElement('div'); sheet.id = 'm-quick-cfg-sheet';
    const backdrop = document.createElement('div'); backdrop.id = 'm-quick-cfg-backdrop';
    backdrop.addEventListener('click', () => this.closeQuickCfgSheet());
    const panel = document.createElement('div'); panel.id = 'm-quick-cfg-panel';
    const hdr = document.createElement('div'); hdr.id = 'm-quick-cfg-hdr';
    const title = document.createElement('span'); title.id = 'm-quick-cfg-title'; title.textContent = 'QUICK CARDS';
    const closeBtn = document.createElement('button'); closeBtn.id = 'm-quick-cfg-close'; closeBtn.className = 'btn';
    closeBtn.textContent = '✕'; closeBtn.addEventListener('click', () => this.closeQuickCfgSheet());
    hdr.append(title, closeBtn); panel.appendChild(hdr);
    const hint = document.createElement('p');
    hint.style.cssText = 'font-size:10px;color:var(--text-dim);letter-spacing:.5px;margin-bottom:12px;line-height:1.6;';
    hint.textContent = 'Pick a module for each card. Tap any card on the Play screen to open that module\'s editor.';
    panel.appendChild(hint);
    const groupOrder = Object.keys(this.GROUPS);
    for(let i = 0; i < 4; i++) {
      const row = document.createElement('div'); row.className = 'm-cfg-row';
      const num = document.createElement('span'); num.className = 'm-cfg-slot-num'; num.textContent = i + 1;
      const sel = document.createElement('select'); sel.className = 'm-cfg-select'; sel.dataset.slotIndex = i;
      groupOrder.forEach(grp => {
        const og = document.createElement('optgroup'); og.label = this.GROUP_LABELS[grp];
        this.GROUPS[grp].forEach(type => {
          if(!this.CARD_DEFS[type]) return;
          const opt = document.createElement('option'); opt.value = type;
          opt.textContent = this.CARD_DEFS[type].label;
          og.appendChild(opt);
        });
        sel.appendChild(og);
      });
      sel.addEventListener('change', () => {
        this._quickCardConfig[i] = sel.value;
        localStorage.setItem('nm2-mobile-quick-cards', JSON.stringify(this._quickCardConfig));
        const container = document.getElementById('m-quick-row');
        if(container) this._rebuildQuickCards(container);
      });
      row.append(num, sel); panel.appendChild(row);
    }
    sheet.append(backdrop, panel);
    document.body.appendChild(sheet);
  },

  openQuickCfgSheet() {
    this._loadQuickCardConfig();
    this.buildQuickCfgSheet();
    // Sync selects to current config
    document.querySelectorAll('.m-cfg-select').forEach((sel, i) => {
      if(this._quickCardConfig[i]) sel.value = this._quickCardConfig[i];
    });
    document.getElementById('m-quick-cfg-sheet')?.classList.add('open');
    document.getElementById('m-quick-cfg-panel')?.scrollTo(0, 0);
  },

  closeQuickCfgSheet() {
    const sheet = document.getElementById('m-quick-cfg-sheet');
    const panel = document.getElementById('m-quick-cfg-panel');
    if(!sheet) return;
    if(panel) { panel.style.transform = 'translateY(100%)'; setTimeout(() => { sheet.classList.remove('open'); panel.style.transform = ''; }, 270); }
    else sheet.classList.remove('open');
  },

  // ── Module picker sync (mobile) ────────────────────────────────────────────
  // Called after the module picker closes to move any newly-added panels
  // from #rack into the Sound tab groups and update savedRackChildren.
  _syncNewRackModules() {
    const pool = document.getElementById('m-module-pool');
    const soundTab = document.getElementById('m-tab-sound');
    const newPanels = [...document.querySelectorAll('#rack .module')]
      .filter(p => p.id !== 'mod-affect');
    if(!newPanels.length) return;

    newPanels.forEach(panel => {
      // Register in savedRackChildren so deactivate() restores it
      if(!this.savedRackChildren.includes(panel)) this.savedRackChildren.push(panel);
      // Move to pool
      pool?.appendChild(panel);
    });

    // Rebuild Sound tab to pick up new modules
    if(soundTab) {
      soundTab.dataset.built = '';
      soundTab.innerHTML = '';
      this.buildSoundTab();
    }

    // Figure out which groups were affected and open them
    newPanels.forEach(panel => {
      const type = panel.dataset.moduleType;
      for(const [key, types] of Object.entries(this.GROUPS)) {
        if(types.includes(type)) { this.openGroup(key); break; }
      }
    });

    const names = newPanels.map(p => {
      const def = this.CARD_DEFS[p.dataset.moduleType];
      return def?.label || p.dataset.moduleType?.toUpperCase() || 'module';
    }).join(', ');
    setStatus('Added: ' + names + ' — see Sound tab');
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════
async function init() {
  ctx = new AudioContext();
  masterOut = ctx.createGain(); masterOut.gain.value=0.35;
  analyserNode = ctx.createAnalyser(); analyserNode.fftSize=2048;
  // Signal chain: masterOut → limiter → analyserNode → destination
  mods.limiter = makeLimiter();
  masterOut.connect(mods.limiter.inlet);
  mods.limiter.outlet.connect(analyserNode);
  analyserNode.connect(ctx.destination);

  // AudioWorklet is required — all DSP modules depend on it.
  // It is available on localhost, HTTPS, and file:// in most modern browsers.
  // If missing (very old browser, or non-secure HTTP), abort with a clear message.
  if (!ctx.audioWorklet) {
    ctx.close();
    document.getElementById('start').style.display = '';
    document.getElementById('start').textContent = '⚠ AudioWorklet unavailable';
    document.getElementById('start').style.cursor = 'default';
    showToast('AudioWorklet is not available. Open via localhost (python3 -m http.server 3000) or HTTPS, or update your browser.', 'warn');
    console.error('nm²: AudioContext.audioWorklet is undefined. AudioWorklet requires a secure context (localhost or HTTPS). Current URL:', location.href);
    return;
  }
  await Promise.all([loadPolyBlepOscWorklet(), loadVcfTptWorklet(), loadLadderFilterWorklet(), loadSyncWorklet(), loadMicr0c0smWorklet(), loadPinkNoiseWorklet(), loadSlewWorklet(), loadBitCrusherWorklet(), loadLogicWorklet(), loadSpectralWorklet()]);

  // ── Voice path: engine bridge (Vite build) or inline factories (file://) ──
  // window._nm2bridge is set by the engine-monolith-adapter module injected at
  // build time.  In file:// mode the placeholder script is empty, _nm2bridge is
  // undefined, and we fall back to the inline makeVCO/makeVCF/etc. factories.
  if (typeof window._nm2bridge === 'function') {
    const em = await window._nm2bridge(ctx);
    mods.vco = em.vco; mods.vcf = em.vcf; mods.ladder = em.ladder;
    mods.adsr = em.adsr; mods.vca = em.vca;
  } else {
    makeVCO(); makeVCF(); makeLadder(); makeADSR(); makeVCA();
  }
  makeVCO2(); makeLFO(); makeNoise(); makeMixer();
  makeDelay(); makeReverb(); makeClkDiv(); makeSeq();
  makeSandH(); makeLFO2(); makeAttenuverter(); makeSlew(); makeChaos();
  makeChorus(); makePanner(); makeTape(); makePhaser(); makeWavefolder();
  makeChord(); makeQuantizer(); makeMicr0c0sm();
  makeArp(); makeSidechain(); makeSampler(); makePadSampler(); makeStutter(); makeMicInput(); makeMicLooper();
  makeCrusher(); makeEuclid();
  makeLogic(); makeFormant(); makeResonator(); makeMorph(); makeSpectral();
  makeAffect();
  makeXYPad(); makeRingMod(); makeFMOp(); makeFlanger();
  makeTuring(); makePolyClock(); makeDrunk(); makeTheremin();
  wireDefault();

  // Build UI
  const rack=document.getElementById('rack');
  // ── VOICE ── the primary signal chain: clock → source → shape → amplify
  rack.appendChild(mkRackGroup('VOICE'));
  rack.appendChild(buildSeqPanel());
  rack.appendChild(buildVCOPanel());
  rack.appendChild(buildVCFPanel());
  rack.appendChild(buildADSRPanel());
  rack.appendChild(buildVCAPanel());

  // ── MODULATION ── things that move the voice
  rack.appendChild(mkRackGroup('MODULATION'));
  rack.appendChild(buildLFOPanel());
  rack.appendChild(buildLFO2Panel());
  rack.appendChild(buildSandHPanel());
  rack.appendChild(buildAttenuverterPanel());
  rack.appendChild(buildSlewPanel());
  rack.appendChild(buildChaosPanel());
  rack.appendChild(buildClkDivPanel());
  rack.appendChild(buildEuclidPanel());
  rack.appendChild(buildLogicPanel());
  rack.appendChild(buildMorphPanel());
  rack.appendChild(buildSidechainPanel());
  rack.appendChild(buildTuringPanel());
  rack.appendChild(buildPolyClockPanel());
  rack.appendChild(buildDrunkPanel());
  rack.appendChild(buildXYPadPanel());
  rack.appendChild(buildThereminPanel());

  // ── SOURCES ── alternate and additive sound generators
  rack.appendChild(mkRackGroup('SOURCES'));
  rack.appendChild(buildVCO2Panel());
  rack.appendChild(buildNoisePanel());
  rack.appendChild(buildMixerPanel());
  rack.appendChild(buildLadderPanel());
  rack.appendChild(buildChordPanel());
  rack.appendChild(buildArpPanel());

  buildPPRegistry();

  DUPLICATABLE_TYPES.forEach(type => { moduleInstances[type] = [1]; instanceCounters[type] = 1; });
  syncRackOrder();
  buildLoopStation();

  // Start visualizations
  startScope();

  startLFOPreview('lfo2-cv', ()=>mods.lfo2);

  loadScenes();

  limKnobs.appendChild(mkKnob({id:'lim-ceil',  label:'CEIL', min:0.3,max:1, val:0.65,          sz:'sm',tip:TIPS['lim-ceil'],  onChange:v=>mods.limiter.setCeil(v)}));

  setStatus('nm² modsynth v1.0.1 — POWERED ON');

  // First-launch: ask if they want the tutorial (don't auto-open it)
  // Skip on mobile (mobile overlay tutorial handles onboarding instead)
  // Skip if loading a shared patch (recipient should land on the patch, not the tutorial)
  if (!localStorage.getItem('nm2-tut-seen') && !window.location.hash.startsWith('#patch=') && !window.matchMedia('(max-width:640px)').matches) {
    const _tutAsk = document.createElement('div');
    _tutAsk.className = 'patch-toast tut-ask toast-info visible';
    _tutAsk.innerHTML = 'New to nm²? &nbsp;<button class="tut-ask-yes">Take the tutorial</button><button class="tut-ask-no">Skip</button>';
    document.body.appendChild(_tutAsk);
    const _tutAskTimer = setTimeout(() => { _tutAsk.remove(); localStorage.setItem('nm2-tut-seen','1'); }, 9000);
    _tutAsk.querySelector('.tut-ask-yes').addEventListener('click', () => {
      clearTimeout(_tutAskTimer); _tutAsk.remove();
      localStorage.setItem('nm2-tut-seen','1');
      tutShowPicker();
      document.getElementById('tut-panel').classList.add('open');
    });
    _tutAsk.querySelector('.tut-ask-no').addEventListener('click', () => {
      clearTimeout(_tutAskTimer); _tutAsk.remove();
      localStorage.setItem('nm2-tut-seen','1');
    });
  }

  // Load patch from URL hash, or auto-open with Harmonic Garden
  const hashMatch = window.location.hash.match(/^#patch=(.+)$/);
  if (hashMatch) {
    try {
      applyConfig(decodePatch(hashMatch[1]));
      setStatus('Patch loaded from share link ✓');
    } catch {
      drawDefaultCables(); // fallback if hash decode fails
      setStatus('Could not load patch from link — invalid or corrupted.');
    }
  } else if (!navigator.webdriver) {
    // Auto-load opening preset — applyConfig draws default cables internally
    // Skip in Playwright (navigator.webdriver === true) so tests see bare default state
    applyConfig(FACTORY_PRESETS[0].cfg);
  } else {
    drawDefaultCables();
  }
}
