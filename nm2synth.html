<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════════
let ctx, masterOut, analyserNode;
let recMediaRecorder = null, recStreamDest = null, isRec = false;
const undoStack = [];
const MAX_UNDO = 40;
let ignoreUndo = false;
function pushUndo(cmd) {
  if (ignoreUndo) return;
  undoStack.push(cmd);
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}
const mods = {};
const ppMap = {};   // id → patch point descriptor
const cables = [];  // {fromId, toId, color, el}
const audioConns = new Set(); // "fromId→toId"
let pendingPP = null;
const knobRefs = {};       // id → knob wrap (for visual sync on load/randomize)
function sk(id, v) { if (knobRefs[id]) knobRefs[id].setVal(v); } // global knob sync helper
const PRESET_KEY = 'nm2synth_presets';
// ── Multi-instance support ──────────────────────────────────────────────────
let rackOrder = [];                   // ['vco-1','vcf-1',...] — current DOM order
const moduleInstances = {};           // { 'vco': [1,2,...], 'lfo': [1], ... }
const instanceCounters = {};          // highest instanceId allocated per type
function ppKey(type, instanceId, suffix) {
  return instanceId === 1 ? `${type}-${suffix}` : `${type}-${instanceId}-${suffix}`;
}
function modsKey(type, instanceId) {
  return instanceId === 1 ? type : `${type}_inst${instanceId}`;
}
function ppTypePrefix(type) {
  return type === 'mixer' ? 'mix' : type === 'wavefolder' ? 'fold' : type;
}
function panelId(type, instanceId) {
  return instanceId === 1 ? `mod-${type}` : `mod-${type}-${instanceId}`;
}
function syncRackOrder() {
  const rack = document.getElementById('rack');
  if (rack) rackOrder = [...rack.children].filter(el=>el.dataset.moduleType).map(el=>`${el.dataset.moduleType}-${el.dataset.instanceId}`);
}
let midiIn = null;
let editMode = false;

const CABLE_PAL = ['#ff00ff','#00ffff','#ffff00','#ff6600','#00ff88','#ff4488','#88aaff']; // legacy fallback
// Patch-point type → colour (mirrors CSS .pp.ao / .ai / etc.)
const PP_COLOR = { ao:'#cc00ff', co:'#00aaff', ai:'#00ff66', ci:'#ffee00', gi:'#ffee00' };
const TIPS = {
  // ── Modules (hover on label) ──────────────────────────────────────────────
  'mod-vco':  'VCO — Voltage Controlled Oscillator. This is your sound source — it generates a continuous waveform. Everything else shapes it. No VCO = no sound. Think of it as the vocal cords of your synth.',
  'mod-lfo':  'LFO — Low Frequency Oscillator. Like a VCO but too slow to hear as pitch (0.01–20 Hz). Its output is used to wiggle other parameters over time — filter cutoff, pitch, volume — creating movement and life in otherwise static sounds.',
  'mod-vcf':  'VCF — Voltage Controlled Filter. The most expressive module in subtractive synthesis. It carves frequency content out of the oscillator. Sweeping the cutoff while music plays is the signature move of expressive modular performers.',
  'mod-adsr': 'ADSR — Envelope Generator. Shapes how a sound evolves over time: Attack (rise), Decay (fall to sustain), Sustain (held level), Release (fade after note ends). It\'s what turns a constant drone into a musical note with a beginning and an end.',
  'mod-vca':  'VCA — Voltage Controlled Amplifier. Controls volume, but it\'s deeper than that — the envelope (ADSR) drives it, so every note has a sculpted shape. Without VCA the envelope has no effect on the audio.',
  'mod-seq':  'SEQUENCER — Plays a repeating pattern of up to 8 pitches. Each step can be toggled on/off and given a pitch offset. The sequencer triggers the ADSR for each active step, creating rhythmic, evolving patterns automatically.',
  'mod-scope':'SCOPE — Oscilloscope. Shows the output waveform in real time. A flat line means no signal. A smooth curve is a sine wave. A jagged shape is a filtered saw. It\'s your visual ear — watch how it changes as you tweak the filter.',

  // ── Patch points ──────────────────────────────────────────────────────────
  'vco-out':  'VCO Audio Out — the raw oscillator waveform exits here. Connect it to VCF IN to filter it, or directly to VCA IN to bypass the filter. This is the starting point of every subtractive synthesis patch.',
  'vco-sub':  'Sub-oscillator Out — always a square wave, one octave below the main VCO. Perfectly tracks pitch changes, MIDI, and sequencer CV. Patch into MIX B-IN alongside the main VCO for instant bass thickness, or into VCF IN to blend with the fundamental. Classic technique: VCO OUT → VCF, SUB OUT → MIX → VCF for a fat doubled subtractive bass.',
  'vco-cv':   'VCO Pitch CV In — accepts a control voltage that shifts the frequency. Connect the sequencer here to play melodic patterns. Connect an LFO for vibrato (pitch wobble). Each semitone of CV shifts pitch by one note on the musical scale.',
  'lfo-out':  'LFO CV Out — a slow oscillating signal (not heard directly). Patching this to VCF cutoff creates an automatic filter sweep. Patching to VCO pitch creates vibrato. The depth knob scales how strong the effect is.',
  'vcf-in':   'VCF Audio In — the sound enters the filter here. Connect from VCO Out. Nothing is filtered until signal arrives. You can also feed any audio here — try patching VCA Out back here for feedback effects (careful with volume!).',
  'vcf-cv':   'VCF Cutoff CV In — a modulation input that shifts the cutoff frequency. LFO here = rhythmic filter sweep (classic electronic music sound). ADSR here = the filter blooms open with each note, then closes — very expressive.',
  'vcf-out':  'VCF Audio Out — the filtered sound exits here. Connect to VCA IN. The filter has done its work — harmonics above (LP) or below (HP) the cutoff have been shaped. This is where the character of the sound lives.',
  'adsr-out': 'ADSR Envelope Out — a 0→1→sustain→0 CV signal matching your A/D/S/R curve. Connect to VCA ENV IN to animate volume. Connect to VCF CV IN to make the filter follow the envelope — the filter blooms on attack and closes on release. Try both!',
  'vca-in':   'VCA Audio In — filtered audio enters here. The VCA acts like a gate: the envelope (via ENV IN) controls whether signal passes through and at what volume. Without a signal here, nothing comes out no matter how the envelope is set.',
  'vca-env':  'VCA Envelope CV In — THIS is the most important patch in a basic synth. Connect ADSR Out here to bring notes to life. The envelope\'s 0→1 signal becomes the amplifier\'s gain — shaping silence into attack, sustain, and release.',
  'vca-out':  'VCA Audio Out — the finished, envelope-shaped sound. This is already wired to the speakers. You can also patch it into effects (e.g. Reverb IN, Delay IN) or other modules for further processing — chains can be as long as you want.',

  // ── VCO knobs ─────────────────────────────────────────────────────────────
  'coarse':   'Coarse Tune — shifts pitch in semitones (half-steps on a piano). 12 = one octave up, -12 = one octave down. Use to transpose the entire melody, or set two VCOs to +7 semitones apart for a perfect fifth — a staple of ambient drone music.',
  'fine':     'Fine Tune — adjusts pitch in cents (100 cents = 1 semitone). Tiny offsets between two VCOs create a warm chorus/beating effect as the waveforms phase against each other. Turn it very slowly and listen — this is one of synthesis\'s most beautiful sounds.',

  // ── VCO waveforms ─────────────────────────────────────────────────────────
  'wave-sine':     'Sine Wave — the purest tone. Only the fundamental frequency, zero harmonics. Sounds like a flute or a pure tone. Smooth and warm. Great as LFO shape for gentle, rounded modulation. Hard to hear at high frequencies but essential in the sub range.',
  'wave-triangle': 'Triangle Wave — like a softened sine with a few odd harmonics (3rd, 5th...). Slightly nasal or flute-like. Smoother than square but brighter than sine. Excellent for soft leads and pads. As an LFO it gives smoother, more gradual modulation than square.',
  'wave-sawtooth': 'Sawtooth Wave — the richest, buzziest waveform. Contains ALL harmonics (1st, 2nd, 3rd...) making it sound bright and harsh until filtered. This is the workhorse of synthesis — filter it heavily for warm basses, open it up for leads. Most filter demos use this.',
  'wave-square':   'Square Wave — contains only odd harmonics (1st, 3rd, 5th...), giving a hollow, woody, nasal quality. At 50% width it\'s a perfect square. Sounds like a clarinet or cello in some registers. Great for bass and chiptune-style leads.',

  // ── Octaves ───────────────────────────────────────────────────────────────
  'oct-2': 'Octave 2 — sub-bass (~55–110 Hz). More felt than heard. Use for deep rumble layers, sub-bass, or add to a higher octave melody for body. Careful with the filter — very low cutoff here produces near silence.',
  'oct-3': 'Octave 3 — bass range (~110–220 Hz). Punchy and present. A great home for bass lines in the sequencer. Combine with a higher octave VCO (if you add a second oscillator later) for a fat, layered sound.',
  'oct-4': 'Octave 4 — midrange (~220–440 Hz). The default. A4 = 440 Hz is the standard tuning reference. Most patches start here. Melodic, versatile, works with all filter settings.',
  'oct-5': 'Octave 5 — upper midrange (~440–880 Hz). Brighter, more cutting. Good for leads that need to sit above a bassline. The filter cutoff has more room to sweep here before things get thin.',
  'oct-6': 'Octave 6 — high register (~880–1760 Hz). Bell-like, airy. Great for shimmering textures. Pair with a very slow LFO on the filter for an evolving atmospheric layer — this is where expressive ambient textures live.',

  // ── Filter ────────────────────────────────────────────────────────────────
  'cutoff':     'Filter Cutoff — the most expressive knob in synthesis. In LP mode: frequencies below pass, above are cut. Turn left = dark/muffled, right = bright/open. Sweeping this slowly while the sequencer runs is the fundamental live performance technique in electronic music.',
  'resonance':  'Resonance (Q) — amplifies the frequencies right at the cutoff point, adding a peak. Low (0–3): subtle warmth. Medium (5–12): classic synth character. High (15–25): self-oscillation — the filter starts singing on its own even without VCO input! Try cutoff + max resonance for an eerie sine-wave screech.',
  'ftype-lp':   'Low-Pass — passes everything below the cutoff, rolls off highs. The default and most-used filter type. Turn the cutoff left to darken the sound, right to brighten it. The classic "filter sweep" is opening and closing a LP filter over a sawtooth wave.',
  'ftype-hp':   'High-Pass — cuts everything below the cutoff, passes highs. Makes sound thinner and more airy. Use on a low sawtooth to strip the mud and get a cutting lead. Great for creating contrast — run two instances of a sound through LP and HP simultaneously.',
  'ftype-bp':   'Band-Pass — only passes a narrow frequency band around the cutoff, cuts everything else. Creates vowel-like, telephone, or radio sounds. Automate the cutoff with an LFO for a talking/wah-wah effect (formant filtering). Very experimental and expressive.',

  // ── ADSR ─────────────────────────────────────────────────────────────────
  'attack':  'Attack — time from silence to full volume after a gate starts. <10ms = percussive snap. 50–200ms = plucked string feel. 1–4s = slow ambient swell. Long attacks (1–3s) let sounds breathe gently into existence rather than starting abruptly — a defining quality of slow ambient synthesis.',
  'decay':   'Decay — after the attack peak, how quickly the level falls to the Sustain value. Short decay + low sustain = plucky, percussive. Long decay = gradual, sustained fade from the initial hit. Try short attack + long decay + zero sustain for a piano-like envelope shape.',
  'sustain': 'Sustain — the volume level held while the gate is open (sequencer step active). This is a LEVEL, not a time. 0 = fully percussive (envelope hits and immediately falls). 0.5 = half-volume hold. 1.0 = full volume maintained. Turn to 0 for drum-like sounds.',
  'release': 'Release — how long the sound takes to fade out after the gate closes (step ends). Very short (10ms): abrupt cut. 0.3–1s: natural note end. 3–6s: long reverb-like tail where notes blur into each other. Long releases let phrases overlap and blend atmospherically.',

  // ── VCA ───────────────────────────────────────────────────────────────────
  'vca-gain': 'VCA Gain — scales the overall output volume. The envelope multiplies against this value. At gain=0.8 and envelope peak=1.0, you get 0.8 amplitude. Reduce if clipping/distorting, increase for more presence. Try setting very low and connecting ADSR with high sustain for a different feel.',

  // ── Sequencer ─────────────────────────────────────────────────────────────
  'bpm':       'Tempo (BPM) — beats per minute. Each step fires on an 8th-note grid: 120 BPM = 250ms per step = 2 seconds per 8-step loop. At 60 BPM each step is 500ms — slow enough that a long ADSR release overlaps the next note, creating pads and drones. At 180 BPM steps are 167ms — short enough for fast arpeggios. Try dragging BPM while playing to feel the tempo shift live.',
  'seq-play':  'Play / Stop — press to start the sequencer from step 1. The sequencer is the heartbeat of the patch: it advances one step per 8th note, fires the ADSR on active steps, and sends pitch CV to the VCO. Press again to stop — the current note release plays out naturally. Tip: the sequencer does nothing audible on its own. You need VCO → VCF → VCA → out patched (the default), plus ADSR → VCA gate, before steps trigger sound.',
  'seq-step':  'Step on/off — click to activate or silence this step. Lit (magenta border) = active, triggers a note. Dark = rest, silence. The pattern loops continuously. Rests are not dead time — they let notes from previous steps ring out through the ADSR release. Try: turn on only steps 1, 3, 5, 7 for a sparse off-beat feel; or cluster several on/off pairs for rhythmic pushes and pulls. Ctrl+Z undoes the last toggle.',
  'seq-pitch': 'Step pitch — how many semitones above or below the VCO base frequency this step plays. 0 = root note (whatever VCO is tuned to). +7 = perfect fifth above. +12 = octave up. -12 = octave down. +3/+4 = minor/major third. The pitch only applies when the step fires. Start simple: a root-note drone (all 0s) with varied on/off steps often sounds more musical than a complex melody. Use the Scale Quantizer to constrain all pitches to a key.',

  // ── VCO2 ──────────────────────────────────────────────────────────────────
  'mod-vco2':      'VCO 2 — a second independent oscillator. The magic happens when two VCOs run together: detune VCO2 by a few cents and they beat against each other, creating a warm chorus effect. This is one of the most fundamental sounds in analog synthesis.',
  'vco2-out':      'VCO2 Audio Out — patch into Mixer channel B to blend with VCO1. Or patch directly to VCF for a raw two-oscillator sound. Try different waveforms on each VCO for interesting harmonic combinations.',
  'vco2-cv':       'VCO2 Pitch CV In — you can route the same sequencer here as VCO1 (they will play the same melody) or a second sequencer/LFO for independent pitch movement. Patching the same CV but adding +7 COARSE offset = perfect fifth harmony.',
  'vco2-coarse':   'VCO2 Coarse Tune — set to +7 for a perfect fifth above VCO1, +12 for an octave, -12 for an octave below. Even small differences in coarse tuning between two VCOs create rich intervals. Try +7 (fifth) or +3 (minor third).',
  'vco2-detune':   'Detune — shifts VCO2 pitch in cents relative to its coarse/octave setting. The most important knob for "fatness." Tiny values (3–12 cents) create a warm chorus effect as the waveforms phase against each other. More = thicker but more out-of-tune. Running two VCOs 5–10 cents apart is a classic technique for warm, thick detuned pads.',

  // ── Noise ─────────────────────────────────────────────────────────────────
  'mod-noise':     'NOISE — random audio signal with no pitch. White noise has equal energy at all frequencies (like static). Pink noise rolls off the highs (-3dB/octave) and sounds warmer, closer to natural sounds like rain or wind. Essential for percussion and atmospheric textures.',
  'noise-out':     'Noise Audio Out — patch into Mixer channel C to blend with oscillators, or directly into VCF for pure noise-based textures. At high filter resonance, noise through a VCF creates metallic, tuned percussion — hi-hat and snare sounds come from this.',
  'noise-white':   'White Noise — flat frequency spectrum, equal energy at all frequencies. Sounds harsh and hissy. Great for snare drums (patch through VCF with short ADSR), hi-hats, and adding "air" to a sound by mixing a tiny amount with the oscillators.',
  'noise-pink':    'Pink Noise — -3dB per octave roll-off, meaning lower frequencies have more energy. Sounds warmer, more natural — like rain, wind, or a distant crowd. Use for ambient textures, pads blended with oscillators, and soft percussion layers.',
  'noise-level':   'Noise Level — how much noise signal exits this module. Start low (0.1–0.3) when blending with oscillators to add texture without overwhelming the pitch. Higher settings (0.7–1.0) for pure noise-based sounds like wind or surf.',

  // ── Mixer ─────────────────────────────────────────────────────────────────
  'mod-mixer':     'MIXER — combines up to 3 audio signals into one output. This is how you blend VCO1 + VCO2 + Noise into a single signal before sending to the filter. In a real Eurorack setup, mixers are everywhere — they let you layer sounds and balance levels between sources.',
  'mix-out':       'Mixer Audio Out — the combined signal of channels A, B, and C. Patch this to VCF IN as the starting point of your signal chain when using multiple sound sources. The filter then shapes the blended sound as a whole.',
  'mix-a-in':      'Mixer Channel A Input — typically your main VCO1. The A knob controls how loud this source is in the mix. You can connect any audio signal here — even feedback from later in the chain for wild effects.',
  'mix-b-in':      'Mixer Channel B Input — typically VCO2. Blend this alongside VCO1 by dialing the B knob. With both VCOs slightly detuned and at equal level, you get the classic "two-oscillator analog synth" sound.',
  'mix-c-in':      'Mixer Channel C Input — typically the Noise module. Keep this low (0.1–0.3) to add breathiness and texture to an oscillator patch, or turn it up for noise-forward sounds like wind or percussion.',
  'mix-a':         'Channel A level — how much signal from input A passes to the output. 0 = silent, 1 = full volume. Use to balance VCO1 against VCO2 and Noise.',
  'mix-b':         'Channel B level — how much signal from input B passes through. Lower than A for a subtler VCO2 blend, or equal for two-oscillator unison.',
  'mix-c':         'Channel C level — typically Noise. Start around 0.1–0.2 for texture. For percussion patches (noise → VCF → ADSR → VCA), push this up to 0.7+.',

  // ── Hard Sync ─────────────────────────────────────────────────────────────
  'vco2-sync':    'HARD SYNC — forces VCO2 to restart its phase every time VCO1 completes a cycle. When VCO2 is tuned higher than VCO1, this creates rich harmonic distortion. The signature sound: hold SYNC on and slowly sweep VCO2\'s COARSE knob upward — you\'ll hear classic "sync sweep" timbres used in 80s leads and Moog solos.',

  // ── Delay ─────────────────────────────────────────────────────────────────
  'mod-delay':    'DELAY — echo effect. The signal is repeated after a set time, then fed back for multiple repeats. Short delays (10–80ms) thicken the sound without audible echo. Medium (100–400ms) = slapback or rhythmic echo. Long (500ms+) = classic echo. Use delay to layer evolving phrases over themselves.',
  'vcf-drive':    'VCF Drive — pre-filter saturation (1×–8×). Adds tanh harmonic saturation before the filter stage. At 1× (default) output is unity. At 2–4× fattens the tone with soft saturation. At 6–8× produces aggressive filter drive — pair with high resonance for screaming acid lines.',
  'vcf-res-cv':   'VCF Resonance CV — patch an LFO, envelope, or S&H here to modulate resonance over time. CV sums with the manual RES knob. Patch a slow LFO here for time-varying resonance sweeps, or an ADSR for resonance peaks on each note attack.',
  'vcf-kb-track': 'KB TRACK — keyboard tracking. When ON, VCF cutoff follows the sequencer and MIDI pitch at 1V/oct (1 octave = 2× cutoff freq). Classic technique for acoustic realism: high notes naturally have brighter timbre, so the filter opens as pitch rises.',
  // ── Transistor Ladder VCF ──────────────────────────────────────────────────
  'mod-ladder':    'LADDER — Moog transistor ladder filter emulation. Two cascaded 12dB/oct lowpass stages (24dB/oct total rolloff). Darker, warmer character than the state-variable VCF — the classic Minimoog "wool" sound. At RESO 0.95+, it self-oscillates into a sine wave at the cutoff frequency: a tunable sine oscillator. Patch ladder-ai ← VCO and ladder-ao → VCA IN for the signature Moog bass sound.',
  'ladder-ai':     'Ladder Audio In — audio input to the transistor ladder filter. Patch from VCO Out, Mixer Out, or anywhere in the signal chain. The pre-filter DRIVE control adds harmonic saturation before the filter stages.',
  'ladder-ao':     'Ladder Audio Out — filtered audio output. 24dB/oct rolloff with ladder topology character. Patch to VCA IN or into a send effect like Reverb IN.',
  'ladder-cv':     'Ladder Cutoff CV — modulation input for cutoff frequency. CV sums with the CUTOFF knob. Patch LFO → here for filter sweeps, ADSR → here for filter envelope. Same 1V/oct response as the main VCF.',
  'ladder-res-cv': 'Ladder Resonance CV — patch an LFO or envelope here to modulate resonance over time. At high RESO, this can push the filter into and out of self-oscillation rhythmically.',
  'ladder-drive':  'Ladder Drive — pre-filter saturation (1×–8×). Warms the sound before the filter stages. The transistor ladder naturally saturates at higher signal levels — DRIVE replicates this. Light drive (1–2×): warm. Heavy drive (6–8×): growling, overdriven Moog bass.',
  'ladder-cutoff': 'Cutoff — the ladder filter\'s corner frequency. Below cutoff: harmonics pass. Above: they roll off at 24dB/oct (steeper than VCF\'s 12dB). Use as low as 60–120 Hz for heavy bass resonances, or sweep it open during a filter solo.',
  'ladder-reso':   'Resonance — filter feedback amount. At low values: gentle emphasis at cutoff. At 0.7–0.9: strong, singing resonance peaks. At 0.95+: self-oscillation begins — the filter rings as a pure sine at the cutoff frequency. Maximum resonance = use the filter as a VCO.',
  'ladder-kb-track':'KB TRACK — keyboard tracking on the ladder filter. When ON, cutoff follows sequencer and MIDI pitch at 1V/oct. Essential for melodic bass patches so the filter opens with higher notes.',
  'slew-ci':      'Slew CV In — the incoming CV signal to be slewed (smoothed). Patch a sequencer CV, LFO, or S&H output here. Abrupt voltage changes are turned into smooth glides by the RISE and FALL controls.',
  'slew-co':      'Slew CV Out — the smoothed CV signal output. Patch to VCO CV↓ for pitch portamento (glide), VCF CV↓ for smooth filter sweeps, or VCA ENV↓ for soft envelope shapes. The original Moog portamento sound.',
  'slew-rise':    'Rise — how long it takes the CV to slide UP to a new higher target value (1ms–5s). Long rise time = slow glide up to pitch. Short rise time = snappy attack. Most musical range: 30–200ms.',
  'slew-fall':    'Fall — how long it takes the CV to slide DOWN from a higher value (1ms–5s). Long fall time = slow pitch decay / filter close. Short fall time = crisp response. Independent from RISE, so you can have fast attack + slow decay.',
  'delay-drive':  'Delay Drive — pre-delay saturation (0–4×). At 0 the delay echoes are pristine digital. Higher values add tape-like warmth and harmonic saturation to the repeats. With high feedback: lo-fi tape delay trails. Classic technique: drive 2–3 + long time + 0.6 feedback = degrading echo loops.',
  'delay-in':     'Delay Audio In — connect from VCA Out or anywhere in the chain. Delay works best after the VCA so the echo also fades naturally with the envelope.',
  'delay-out':    'Delay Audio Out — already wired to the speakers (send effect). You can also patch this into another effect to chain them. The delayed signal has both dry and wet components controlled by the MIX knob.',
  'delay-time':   'Delay Time — how long before the echo repeats (0.01–2 seconds). Musical tip: at 120 BPM, a quarter note = 0.5s, 8th note = 0.25s, dotted 8th = 0.375s. Use BPM SYNC button to auto-calculate.',
  'delay-fb':     'Feedback — how much of the delay output feeds back into itself, creating multiple repeats. 0 = one single echo. 0.5 = several decaying repeats. 0.85+ = long trails. Never go to 1.0 — it creates infinite feedback and will clip loudly.',
  'delay-mix':    'Dry/Wet Mix — 0 = fully dry (no delay heard), 1 = fully wet (only delay heard). Most musical range is 0.2–0.5. Keep it subtle to add depth without overwhelming the original sound.',

  // ── Reverb ─────────────────────────────────────────────────────────────────
  'mod-reverb':   'REVERB — simulates the natural reverberation of a physical space. Small size = tight room. Large size = hall or cathedral. The signature ambient sound relies heavily on long reverb — patches that would sound thin or sparse become vast and immersive with reverb.',
  'reverb-in':    'Reverb Audio In — connect from VCA Out (or after Delay for delay-into-reverb, a classic ambient technique). Putting reverb last in the chain makes it sound most natural.',
  'reverb-out':   'Reverb Audio Out — already wired to the speakers (send effect). You can also patch this into another effect to chain them. Contains both dry and wet signal controlled by the MIX knob.',
  'reverb-size':  'Reverb Size — length of the reverb impulse response (0.3–8 seconds). Small values (0.3–1s) = room or studio space. Large values (3–8s) = cathedral, cave, infinite space. Longer sizes are more CPU-intensive.',
  'reverb-decay': 'Reverb Decay — how quickly the reverb tail fades. 0.1 = sharp, percussive room. 0.5 = natural room decay. 0.9 = long, dense, lush hall. High decay + large size = the classic ambient wash.',
  'reverb-mix':   'Reverb Dry/Wet — 0 = no reverb. 0.3–0.5 = natural space. 0.7–1.0 = drenched in reverb (very ambient). Try 0.8+ with a slow attack and long release for a pure atmospheric ambient sound.',

  // ── Clock Divider ─────────────────────────────────────────────────────────
  'mod-clkdiv':   'CLOCK DIVIDER — takes the sequencer clock and outputs slower rhythmic gate pulses. ÷2 fires every 2 steps, ÷4 every 4 steps, ÷8 once per full loop. Connect the outputs to VCF CV or LFO Depth for rhythmic modulation that stays locked to the tempo. A generative music essential.',
  'clk-div2':     'Clock ÷2 — fires a gate pulse every 2 sequencer steps (half the tempo). Connect to VCF CV for a filter pulse every other beat. The gate is a 0→1 CV signal — great for rhythmic filter sweeps.',
  'clk-div4':     'Clock ÷4 — fires every 4 steps (quarter of the sequencer tempo). Slower, more spacious rhythmic modulation. Connect to LFO Depth for a depth pulse every full bar.',
  'clk-div8':     'Clock ÷8 — fires once per full 8-step loop. The slowest division. Great for very gradual, long-arc modulation — connect to VCF cutoff for a slow filter rise that completes once per phrase.',

  // ── Sample & Hold ─────────────────────────────────────────────────────────
  'mod-sandh':   'SAMPLE & HOLD (S&H) — grabs and freezes the input CV at the moment of each trigger. With an LFO feeding in and the ÷4 clock triggering, you get random stepped CV that changes every 4 steps. This is one of the most powerful generative techniques in modular — rhythmically locked randomness. The core of the Buchla tradition and a fundamental technique in generative modular synthesis.',
  'sandh-in':    'S&H CV Input — patch an LFO or any oscillating signal here. The faster the LFO rate relative to the trigger, the more random the sampled values. LFO at 3–10 Hz gives excellent unpredictability when sampled at ÷4.',
  'sandh-out':   'S&H CV Output — the held value, constant between triggers. Patch to VCF CV for random filter steps, VCO CV for random pitch, or LFO Depth for random modulation intensity. One cable from this output can drive an entire generative composition.',
  'sandh-trig':  'Trigger source — which clock fires the sample. STEP = every step. ÷2 = every other step. ÷4 = once per bar. ÷8 = every two bars. Classic patch: LFO → S&H IN, ÷4 → trigger, S&H OUT → VCF CV.',

  // ── LFO 2 ─────────────────────────────────────────────────────────────────
  'mod-lfo2':    'LFO 2 — a second independent LFO. Two LFOs at different rates create complex, non-repeating modulation. Classic: LFO1 → VCF cutoff (slow sweep), LFO2 → VCA amplitude (tremolo at a different rate). The combination breathes and shifts in ways a single LFO never can — this is the secret of evolving ambient textures.',
  'lfo2-out':    'LFO2 CV Out — same as LFO1 but fully independent. Try patching LFO2 to a different destination than LFO1. Two modulations running at different rates = endless evolving movement.',

  // ── Attenuverter ──────────────────────────────────────────────────────────
  'mod-att':     'ATTENUVERTER — scales and optionally inverts a CV signal. ATT knob goes from -2× (inverted+amplified) through 0 (silence) to +2× (amplified). Use to precisely dial how much LFO reaches a destination, or flip its direction so rising modulation closes the filter instead of opening it. Essential glue module.',
  'mod-slew':    'SLEW LIMITER — smooths abrupt CV changes into gradual glides. RISE controls how long it takes to ramp up; FALL controls ramp-down. Patch sequencer CV OUT → SLEW IN → VCO CV↓ for classic portamento glide between notes. Patch a random S&H → SLEW → VCF for smoothed stepped filter sweeps. Independent RISE/FALL lets you define asymmetric glide shapes.',
  'att-in':      'Attenuverter CV Input — connect any CV source: LFO, S&H output, clock divider. The signal is scaled by ATT then shifted by OFFSET before exiting.',
  'att-out':     'Attenuverter CV Output — scaled and offset signal. Patch to VCF CV, VCA ENV, or any CV destination. Placing an attenuverter between LFO and filter gives exact modulation depth control without touching the LFO itself.',
  'att-knob':    'ATT — attenuation/inversion, -2 to +2. At 0: silence. At +1: signal unchanged. At -1: inverted (flipped upside down). Try -1 on VCF CV to hear the filter close when it normally opens — inverted movement opens up entirely new sounds.',
  'att-offset':  'OFFSET — adds a constant DC shift to the output. With ATT at 0, this becomes a simple constant voltage source. Use to bias modulation into a specific frequency range instead of sweeping around zero.',

  // ── micr0c0sm ─────────────────────────────────────────────────────────────
  'mod-micr0c0sm': 'micr0c0sm — Granular effects processor. Captures incoming audio into a 4-second circular buffer and mangles it with overlapping Hann-windowed grains. Six modes: GRAN = cloud; GLTCH = stutter loops; SHIM = fifth+octave shimmer; REVRS = reverse grains; CRYST = harmonic crystal chord; SMEAR = temporal blur. HOLD freezes the buffer for infinite sustain.',
  'micr0c0sm-in':  'micr0c0sm Audio In — patch from VCA OUT or any source. Works like reverb: just patch in and the granular texture automatically mixes into master. The module records a rolling 4-second loop of whatever arrives here. HOLD freezes this captured moment for infinite granular sustain.',
  'micr0c0sm-out': 'micr0c0sm Audio Out — already auto-wired to master like reverb/delay. Optionally patch this to Reverb IN for a granular→reverb texture (one of the most beautiful combinations in electronic music).',
  'micr0c0sm-mode-granular': 'GRAN — Granular mode. Overlapping Hann-windowed grains continuously read scattered positions from the circular buffer, creating a lush, blurry cloud of sound.',
  'micr0c0sm-mode-glitch':   'GLTCH — Glitch mode. Automatically cycles through short frozen slices of the buffer, creating a stutter/cascade loop effect.',
  'micr0c0sm-mode-shimmer':  'SHIM — Shimmer mode. Each grain event spawns two simultaneous grains — one at a perfect fifth (×1.498) and one an octave up (×2). Creates a rich crystalline shimmer. Pair with long reverb.',
  'micr0c0sm-mode-reverse':  'REVRS — Reverse granular. Grains play backwards through the buffer, creating lush reverse-reverb textures and that classic "sucked back in time" ambient effect. Scatter controls how far back grains originate.',
  'micr0c0sm-mode-crystal':  'CRYST — Crystal chord. Each grain event simultaneously spawns three grains: root, perfect fifth (×1.498), and octave (×2) — each from independent scatter positions. Dense, glassy harmonic halo.',
  'micr0c0sm-mode-smear':    'SMEAR — Temporal smear. Forces extra-large grains at 35% pitch speed, creating a thick time-stretched blur cloud. PITCH controls the stretch ratio — low = extreme slow motion. Pair with HOLD for infinite smear drones.',
  'micr0c0sm-hold': 'HOLD — Freezes the recording buffer. New audio stops writing in; grains loop forever over whatever was captured at the moment of freeze. Hold a chord, freeze it, and watch it sustain infinitely. Press again to unfreeze.',
  'micr0c0sm-file': 'FILE — Full-file granular mode. Uses the loaded SAMPLER buffer directly as the grain source instead of the 4-second rolling capture. Grain positions scatter around the SAMPLER POSITION knob — scrub POSITION live to scan through the entire file. Works with all modes. Load a long recording in SAMPLER first.',
  'mc-blend':  'Wet — granular send level into master. Works like reverb: just patch something into micr0c0sm IN and turn this up. 0 = silent, 1 = full granular texture on top of your dry signal. Try HOLD at full wet for a pure frozen granular drone.',
  'mc-size':   'Grain Size — length of each grain (0.02–0.5 s). Very short = buzzy, grainy texture. Long = smooth cloud. In SMEAR mode the engine forces 4× your size setting for the blur to work. Most timbral parameter in granular synthesis.',
  'mc-scat':   'Scatter — how far back in the buffer grains are read. Low = grains from near the present (coherent). High = grains scattered up to 2 seconds into the past (temporal blur).',
  'mc-pitch':  'Pitch — playback speed of each grain. 1.0 = original pitch. 2.0 = octave up. 0.5 = octave down. In SMEAR mode this controls the time-stretch ratio (low = extreme slow motion). In CRYST/SHIM the root grain uses this pitch; harmonics are fixed above it.',
  'mc-dnsty':  'Density — grains spawned per second. Low (2–6) = sparse distinct blips. Medium (10–20) = full grain cloud. High (30–40) = dense continuous wash. Higher density smooths the texture but is more CPU intensive.',
  'mc-pos':    'Position — scrubs where in the buffer grains are read from. Center = just behind the live write head. Sweep it slowly to scan backwards through captured audio. In FILE mode, scans through the loaded sample file. In DRUNK mode, sets the starting wander position.',
  'mc-sprd':   'Stereo Spread — scatters each grain independently across the stereo field. 0 = mono. Full = grains fly randomly across the full width. Most beautiful in CLOUD and CRYST modes — harmonic layers separate and the texture opens up spatially. One of the most transformative controls.',
  'mc-dtune':  'Detune — adds random pitch variation to each individual grain. Low values (0–0.1) create organic chorus-like detuning that makes the texture sound alive. High values (0.3–0.5) create a wide pitch cloud spanning nearly an octave. In CLOUD mode, detuning on top of the harmonic ratios sounds like a full string section.',
  'micr0c0sm-mode-cloud': 'CLOUD — Harmonic cloud. Each grain event simultaneously spawns 5 grains at just-intonation intervals: root, major third (×1.25), fifth (×1.5), minor seventh (×1.667), and octave (×2). Creates a rich overtone haze. Add DETUNE for organic microtuning on each harmonic — the magic combination for ambient pads.',
  'micr0c0sm-mode-drunk': 'DRUNK — Stochastic wander. The grain read position random-walks through the buffer each event, step size controlled by SCAT. Creates an ever-evolving, non-repeating texture that slowly drifts through captured audio. Pair with HOLD for infinite generative drift over a frozen moment. Works with FILE mode too.',

  // ── Chord module ──────────────────────────────────────────────────────────
  'mod-chord':    'CHORD — plays a 3-voice chord that tracks the sequencer pitch and MIDI notes automatically. Each step that fires on the sequencer also triggers the chord at the same pitch. Patch CHORD OUT into the Mixer or VCF alongside VCO1 to blend chord voices with your lead oscillator. This is the foundation of lush ambient pads and harmonic drones.',
  'chord-out':    'Chord Audio Out — the three chord voices mixed into one signal. Patch into Mixer channel B or C, or directly into VCF IN. The chord responds to the same ADSR/VCA envelope as VCO1 when routed through the same signal chain.',
  'chord-type':   'Chord Type — the interval structure of the three voices above the root note. MAJ (bright, resolved), MIN (darker, emotional), SUS2/SUS4 (ambiguous, floating — unresolved and beautiful), MAJ7 (dreamy, jazz-inflected), MIN7 (melancholic), AUG (tense, shimmering). Minor and min7 work well for dark, emotional pads. Sus chords are favored for their unresolved, floating quality.',
  'chord-spread': 'Spread — slightly detunes the three chord voices against each other (0–30 cents). At 0 the voices are perfectly in tune and sound electronic. At 5–10 cents they beat against each other, adding a warm, analog chorus quality. At 20–30 cents the chord thickens into a wide detuned cluster. This single knob makes the chord sound hardware-like.',
  'chord-level':  'Chord Level — how loud the chord output is. Balance this against VCO1 in the Mixer. A common setting: VCO1 at a higher level for the lead melody, chord at a softer level for harmonic support underneath.',

  // ── Scale Quantizer ───────────────────────────────────────────────────────
  'mod-quant':    'QUANTIZER — the key to turning random modulation into musical melody. Two modes: LOCK snaps all sequencer step pitches to the selected scale (so off-scale notes are corrected automatically). RAND replaces each step\'s pitch with a random note from the scale — instant generative melody, always in key. This is how evolving generative systems are built: the scale quantizer acts as a musical filter on randomness.',
  'quant-scale':  'Scale — the set of notes the quantizer snaps to. MAJOR: bright, resolved. MINOR: darker, emotional. DORIAN: minor with a raised 6th — common in electronic music (jazz-inflected, cinematic). PHRYGIAN: very dark, Spanish/dramatic quality. LYDIAN: dreamy, raised 4th creates a floating feeling. PENTA: 5-note pentatonic — always safe, never clashes. CHROM: all 12 notes (quantizer passes through).',
  'quant-root':   'Root Note — the tonal center of the scale. In A minor, root = A. In C major, root = C. Changing the root transposes the entire scale. For ambient music, A minor (Aeolian) and D dorian are very common starting points. The root note becomes the "home" that everything gravitates toward.',
  'quant-lock':   'LOCK mode — snaps all sequencer step pitch values to the nearest note in the selected scale. Turn this on to instantly "fix" a sequence that has off-scale notes. Use it to explore different scales with the same pattern — same rhythm, completely different harmonic character.',
  'quant-rand':   'RAND mode — on each sequencer step, picks a random note from the scale instead of using the step\'s stored pitch. Every loop is different. Combined with a slow tempo and long ADSR, this generates an endless stream of in-key melodic fragments. This is generative composition: you set the rules (scale + tempo), the system generates the music.',

  // ── Chorus ────────────────────────────────────────────────────────────────
  'mod-chorus':   'CHORUS — stereo ensemble effect. Takes a mono signal and creates two slightly detuned, time-varying copies, panned left and right. The result is a wide, lush stereo image that sounds like multiple instruments playing together. This is the single most impactful effect for making synthesizer pads sound large and warm. Lush pads and ensemble textures both rely on chorus-style processing.',
  'chorus-in':    'Chorus Audio In — patch from VCA OUT, Tape OUT, or anywhere in the chain. The chorus works at any point in the signal path, but sounds best after filtering and enveloping.',
  'chorus-out':   'Chorus Audio Out — stereo signal (left voice panned left, right voice panned right). Already wired to the speakers (send effect). You can also chain into Reverb IN to expand the stereo image even further.',
  'chorus-rate':  'Chorus Rate — speed of the LFO that modulates the two delay lines (0.1–8 Hz). Slow (0.2–1 Hz) = gentle, organic movement. Fast (3–8 Hz) = vibrato-like shimmer. The left and right LFOs run at slightly different rates for a natural, asymmetric quality. Typical ambient setting: 0.5–1.5 Hz.',
  'chorus-depth': 'Chorus Depth — how much the LFO moves the delay time (subtle → deep). Low depth = clean, airy stereo width. High depth = pronounced pitch wobble, more obvious "chorus" effect. Keep low (0.2–0.4) for transparent width, push high (0.7+) for vintage chorus character.',
  'chorus-width': 'Stereo Width — how far left and right the two delayed voices are panned (0 = both center, 1 = hard L/R). Full width (1.0) creates the widest stereo image. Pull back if the mix collapses in mono. 0.7–0.9 is a good default.',
  'chorus-mix':   'Chorus Dry/Wet — 0 = dry only (no effect), 1 = wet chorus dominant. 0.4–0.6 blends the stereo chorus with the original signal for the most natural result. High mix values (0.8+) fully immerse the sound in the ensemble texture.',

  // ── Auto-Panner ───────────────────────────────────────────────────────────
  'mod-panner':   'AUTO-PANNER — slowly sweeps the signal between left and right channels using an LFO. At very slow rates (0.05–0.2 Hz) it creates a subtle, barely-perceptible spatial movement that adds depth without distraction. At moderate rates (0.5–2 Hz) it becomes a rhythmic, swaying motion. Use after chorus for layered spatial effects.',
  'panner-in':    'Panner Audio In — patch any audio signal here. Works well after the VCA or as a last step before reverb.',
  'panner-out':   'Panner Audio Out — sweeping stereo signal. Already wired to the speakers (send effect). You can also chain into Reverb IN — the reverb will smear the panning movement into a spacious blur.',
  'pan-rate':     'Pan Rate — LFO speed for the stereo sweep (0.02–4 Hz). At 0.05 Hz the movement takes 20 seconds for a full cycle — barely audible as panning, just felt as spatial depth. At 1 Hz it becomes a clear rhythmic pan effect.',
  'pan-depth':    'Pan Depth — how far left/right the sweep travels (0 = no panning, 1 = full hard L/R sweep). At 0.3–0.5 the sweep is subtle and musical. Full depth (1.0) is dramatic and obvious.',

  // ── Tape Saturation ───────────────────────────────────────────────────────
  'mod-tape':     'TAPE SATURATION — soft waveshaper (tanh curve) plus subtle wow/flutter modulation. Transforms clean digital oscillators into something that sounds like it was recorded to tape. The saturation adds even harmonics that make the sound warmer and more complex. The wow adds micro-pitch variation that sounds organic. This is the difference between "sounds like a synth" and "sounds like a record."',
  'tape-in':      'Tape Audio In — patch from VCA OUT or any audio source. Works anywhere in the chain, but most useful early — the saturated signal then gets shaped by the filter or chorus downstream.',
  'tape-out':     'Tape Audio Out — the warm, harmonically-enriched signal. Chain into Chorus → Reverb for the complete character stack.',
  'tape-drive':   'Drive — saturation amount. Low (1–2): subtle warmth, barely perceptible but the mix sits better. Medium (3–5): clear harmonic enrichment, sounds "analog." High (6–8): obvious distortion, gritty and aggressive. For ambient pads, 2–4 is the sweet spot. For leads that need to cut through, 5–7.',
  'tape-wow':     'Wow — wow/flutter depth. Simulates the pitch instability of a tape machine (the motor speed varies slightly). At low values (0.1–0.3) it sounds like natural tape warmth — notes have a slight living quality. At high values (0.7+) it becomes an obvious pitch wobble effect. Subtle is best for ambient work.',
  'tape-mix':     'Tape Dry/Wet — 0 = bypass, 1 = fully through the saturator. Most useful range is 0.4–0.8. The dry signal mixed with the saturated version gives a blend that sounds richer without being muddy.',

  // ── Phaser ────────────────────────────────────────────────────────────────
  'mod-phaser':   'PHASER — four all-pass filters in series, swept by a slow LFO. The filters create phase-shifted copies of the signal at different frequencies; when summed with the original, they cancel at certain frequencies (notches) that sweep up and down. The result is a slow, swooshing, resonant movement — the sound\'s harmonic content breathes in and out. Slow phaser on a pad is one of the defining sounds of 70s–80s ambient synthesis and continues through contemporary ambient and modular synthesis.',
  'phaser-in':    'Phaser Audio In — patch from VCA, Chorus, or Tape. A phaser after chorus creates layered spatial modulation. A phaser before reverb lets the sweeping texture bloom into the reverb tail.',
  'phaser-out':   'Phaser Audio Out — the phase-swept signal. Connect to Reverb IN for the most musical result — the reverb smears the notch sweeps into a continuous shimmer.',
  'phaser-rate':  'Phaser Rate — how fast the all-pass filter bank sweeps (0.02–6 Hz). Slow (0.05–0.3 Hz) = a 5–20 second cycle, barely perceptible as modulation but felt as organic aliveness. Medium (0.5–2 Hz) = classic phaser sound. Fast (3+ Hz) = Leslie cabinet-style vibrato.',
  'phaser-depth': 'Phaser Depth — how wide the LFO sweeps the filter frequencies. Low depth = subtle, narrow sweep (gentle coloring). High depth = dramatic sweep across a wide frequency range (obvious phaser). 0.4–0.7 is the most musical range for ambient work.',
  'phaser-mix':   'Phaser Dry/Wet — 0 = bypass, 1 = all phase-shifted. The phaser effect is inherently about the combination of dry and wet signal, so keeping mix at 0.5–0.8 is usually ideal. Full wet loses the cancellation effect.',

  // ── Wavefolder ────────────────────────────────────────────────────────────
  'mod-wavefolder': 'WAVEFOLDER — folds the waveform back on itself when amplitude exceeds the threshold. A sine wave through a wavefolder at FOLD 2 becomes rich with odd harmonics; at FOLD 4–6 it produces metallic, bell-like complexity. This is the classic Eurorack harmonic folding sound: simple oscillators turned into complex timbres without a filter. Patch VCO OUT → WVFLDR IN, then into VCF. Sweep FOLD while it\'s running — you\'ll hear the waveform multiply and fold back on itself.',
  'fold-fold':    'Fold Amount — how many times the waveform folds back on itself. At 1 the wavefolder is essentially bypassed (passthrough). At 2 one fold occurs at the peak — a sine becomes a doubled sine with strong odd harmonics. At 4–6 multiple folds produce dense metallic harmonics. At maximum the sound becomes chaotic and complex. Sweep this live while the sequencer runs for evolving timbre animation.',
  'fold-symm':    'Symmetry — shifts the folding threshold asymmetrically, generating even harmonics in addition to the odd harmonics of the symmetric fold. At 0 (center) the folding is perfectly symmetric and produces only odd harmonics (bright, hollow quality). Positive or negative values break the symmetry — the waveform folds at different points on positive and negative halves, adding even harmonics (warmer, richer). Subtle values (0.1–0.3) add warmth; extreme values create aggressive distortion.',
  'fold-in':      'Wavefolder Audio In — patch VCO, VCO2, or Chord output. The wavefolder works on the oscillator waveform directly, so patching before the VCF lets the filter then shape the folded harmonics. Classic Eurorack chain: VCO → WVFLDR → VCF → VCA. Sweeping VCF cutoff over a heavily folded signal produces dramatic timbral evolution.',
  'fold-out':     'Wavefolder Audio Out — the harmonically-enriched signal. Connect to VCF IN, Mixer, or anywhere in your chain. The output amplitude stays roughly the same as the input (the folds do not add gain), but the waveform is now much richer. Add a little Tape saturation after the wavefolder for extra warmth.',

  // ── Arpeggiator ───────────────────────────────────────────────────────────
  'mod-arp':    'ARPEGGIO — steps through chord intervals rhythmically, triggering VCO pitch and the ADSR on each note. The classic tool for turning a chord shape into a moving melodic line. Try arpeggio over a slow pad, or run fast arpeggios through a heavy reverb tail until individual notes blur into texture. Direction and rate controls let you shape the pattern\'s feel.',
  'arp-chord':  'Chord Type — the set of intervals the arpeggiator steps through. MAJ (1-3-5), MIN (1-b3-5), SUS2 (1-2-5), SUS4 (1-4-5), MAJ7 (1-3-5-7), MIN7 (1-b3-5-b7), AUG (1-3-#5). The arpeggio\'s character depends entirely on this choice. Minor and sus4 work especially well in ambient contexts.',
  'arp-dir':    'Direction — order in which the arpeggiator steps through notes. UP: low to high. DN: high to low. U/D: ping-pong, ascends then descends. RND: random order each step. U/D through a maj7 chord creates an elegant, flowing line. RND at fast rate creates an unpredictable shimmer texture.',
  'arp-rate':   'Rate — how fast the arpeggio steps relative to the sequencer BPM. ÷2 = half-speed (half notes). ÷1 = quarter notes. ×2 = 8th notes. ×4 = 16th notes. With reverb SIZE at 5+, ×4 at 70 BPM creates a shimmering texture where individual notes dissolve into a cloud.',
  'arp-oct':    'Octave Spread — how many octaves the arpeggio spans. 1 = just the chord intervals. 2 = chord intervals plus one octave up. 3 = two octave range. Wider spread creates a more dramatic, piano-like phrase. Narrow spread stays intimate and melodic.',
  'arp-root':   'Root — transposes the entire arpeggio by semitones (-12 to +12). Use this to change the key while keeping the same shape. 0 = default pitch, +7 = up a fifth, -5 = down a fourth. Combined with the scale quantizer, you can freely transpose without worrying about hitting wrong notes.',
  'arp-play':   'ARP Start/Stop — starts and stops the arpeggiator. The arpeggiator drives VCO pitch and triggers the ADSR independently of the sequencer. You can run both simultaneously for polyrhythmic texture, or stop the sequencer and use only the arpeggiator for pure arpeggio melody.',

  // ── Sampler ───────────────────────────────────────────────────────────────
  'mod-sampler':  'SAMPLER — loads any audio file (WAV, MP3, OGG) as a patchable audio source. Drag a file onto the waveform display or click LOAD. The sample can loop, play once, or run reversed. Patch SAMPLER OUT into Microcosm for granular processing, VCF for filtering, or directly into the Loop Station. The signature ambient move: a 4-second field recording (rain, voice, cello) through Microcosm SHIM + Reverb = instant ambient texture.',
  'sampler-out':  'Sampler Audio Out — the loaded sample playing back. Patch into anything: Microcosm IN for granular cloud, VCF IN for filtered playback, Chorus IN for width, or Reverb IN for a washed-out pad. The sample loops continuously when LOOP is on — use SPEED to pitch it into key.',
  'sampler-speed':'Speed / Pitch — playback rate (0.25×–4×). Slowing down lowers pitch; speeding up raises it. At 0.5× the sample plays an octave lower and twice as long. Use PITCH for fine-tuning in semitones. Classic ambient technique: slow a voice recording to 0.25× and run through granular.',
  'sampler-pitch':'Pitch — fine-tunes playback pitch in semitones (±12). Use to tune the sample to match your sequencer key. Combined with SPEED you can place the sample anywhere in pitch space without worrying about timing.',
  'sampler-pos':  'Position — playback start point within the loaded file (0 = beginning, 1 = end). Drag to scrub through a long recording and lock onto a section. The highlighted region on the waveform shows your current window. With SIZE at 0.05 on a 5-minute file you get a 15-second loop window anywhere in the file.',
  'sampler-size': 'Window Size — loop length as a fraction of the total file (0.01 = 1%, 1.0 = whole file). Narrow window + Microcosm GLTCH = targeted glitch of one specific moment. Wide window = normal loop. Updates live while playing — drag to resize the loop in real time.',
  'lim-thresh':   'Limiter Drive — pre-limiter gain. Higher values push more signal into the soft clipper, giving a louder and more saturated output. At 1.0 the limiter is nearly transparent. At 6+ it hard-limits everything that comes through.',
  'lim-ceil':     'Limiter Ceiling — output level after the soft clipper (0.3–1.0). Lower this if your final output is still clipping. Acts as a master volume with limiting. 0.85 is a safe default for loud patches.',
  'mod-padsampler':'PAD SAMPLER — 8 sample pads, each loaded independently. Keyboard: Q W E R (pads 1-4) · A S D F (pads 5-8). MIDI notes 48-55. Drag a file onto any pad or click to load. Each pad fires one-shot on trigger. Patch PAD OUT into effects, Loop Station input, or anywhere. Classic SP-404 / MPC workflow: load a kick, snare, hat, and melodic chop into four pads, then play them live.',
  'padsampler-out':'Pad Sampler Audio Out — mix of all 8 pads. Patch into Reverb, Delay, VCF, or Loop Station to process your pad hits through the rack.',
  'mod-micinput': 'MIC INPUT — captures live microphone audio as a patchable source. Click ARM to request microphone access, then patch MIC OUT into any module: VCF for filtered voice, Microcosm for granular vocal clouds, Loop Station input for live looping. The VU meter shows input level. Classic technique: voice through Microcosm SHIM + Reverb = instant ambient vocal texture.',
  'mic-out':      'Mic Audio Out — live microphone signal. Patch into VCF IN, MICROCOSM IN, or Loop Station audio input. Same as any audio out patch point — the whole effects chain is available to your mic.',
  'mic-level':    'Mic Level — input gain before the patch point (0.1×–4×). Boost quiet sources or tame loud ones. The VU meter shows post-gain level.',
  'mod-miclooper': 'MIC LOOP — records your microphone directly into a looping buffer. ARM the mic, hit REC, sing or play, hit REC again to commit. The loop plays back instantly and can be routed through any effect via the OUT patch point. Independent of the Loop Station — this captures mic audio only, not the full master mix.',
  'mod-stutter':  'STUTTER — rhythmic slice-and-repeat effect. When ACTIVE, captures a short audio slice (SLICE length) and loops it, creating the classic DJ stutter / glitch effect. REPEAT controls how long the stutter sustains before the live signal bleeds back through. Independent of Microcosm — stutter is predictable and rhythmic; Microcosm GLTCH is organic. Patch anything into STUTTER IN; STUTTER OUT goes to your effects chain or Loop Station.',
  'stutter-ai':   'Stutter Audio In — patch any audio source: VCA OUT, Sampler OUT, Pad Sampler OUT, or Loop output. The stutter captures and loops whatever signal enters here.',
  'stutter-ao':   'Stutter Audio Out — processed signal (sliced + looped + MIX blend). Patch to Reverb IN, Delay IN, or Loop Station input to layer the stutter into your performance.',

  // ── Sidechain / Envelope Follower ─────────────────────────────────────────
  'mod-sidechain':'SIDECHAIN — envelope follower: converts audio amplitude into a CV signal. Patch any audio source into IN; the ENV output gives a CV that rises and falls with the input level. Classic use: clock signal (from CLK÷4) into a VCA → patch VCA out here; the pulse shape drives the sidechain. Sidechain ENV out → VCA ENV creates the pumping "breathing" compression feel that defines contemporary electronic pads. Also excellent for rhythmic filter modulation.',
  'sc-in':      'Sidechain Audio In — patch any audio source whose amplitude you want to track. Common sources: VCA output (full mix), a noise burst through ADSR, or CLK÷4 through a short envelope. The follower responds to the RMS amplitude of whatever you plug in.',
  'sc-out':     'Envelope CV Out — follows the amplitude of the input with smoothing set by the Attack and Release knobs. Patch to VCA ENV for pumping sidechain compression, VCF CV for dynamic filter modulation (louder = brighter), or Attenuverter IN for scaled rhythmic CV.',
  'sc-attack':  'Envelope Attack — how fast the CV output rises when the input gets louder (0.001–1s). Fast attack (0.001–0.01s) = snappy, immediate response — the CV tracks the leading edge of each hit. Slow attack (0.1–1s) = the follower lags behind the input, creating a swelling CV that rises after the transient.',
  'sc-release': 'Envelope Release — how fast the CV output falls when the input gets quieter (0.01–2s). Short release (0.01–0.05s) = tight, rhythmic CV that drops quickly between hits. Long release (0.5–2s) = the CV holds up between events, giving a smoother modulation that doesn\'t click off.',
  'sc-amount':  'Amount — scales the output CV level (0–5x). The raw RMS level is typically 0–0.3; amount multiplies this into a useful CV range. Turn up until the sidechain effect is as strong as you want. High amount = aggressive pumping; low amount = gentle breathing.',

  // ── Bitcrusher ────────────────────────────────────────────────────────────
  'mod-crush': 'BITCRUSHER — reduces bit depth and sample rate for digital grit and lo-fi textures. BITS = bit depth (16=clean, 4=crunchy, 1=square-wave destruction). RATE = sample-rate decimation (1=clean, 32=telephone-quality aliasing). Mix at 50% for parallel grit on top of the clean signal.',
  'crush-ai':  'Bitcrusher Audio In — patch from VCO, VCA, or any audio source. The signal is quantized and downsampled before reaching the output.',
  'crush-ao':  'Bitcrusher Audio Out — the crushed signal. Patch into VCF IN to tame the harshness, or straight to Reverb IN for lo-fi washy textures. Very low BITS values produce square-wave-like distortion regardless of input shape.',

  // ── Euclidean Rhythm Generator ─────────────────────────────────────────────
  'mod-euclid': 'EUCLID — Euclidean rhythm generator. Distributes HITS as evenly as possible across STEPS using the Bjorklund algorithm — the same math that underlies most polyrhythms in world music. The output is a gate signal. Patch to ADSR GATE or VCA ENV to drive rhythmic patterns that no human would program.',
  'euclid-go':  'Euclidean Gate Out — fires a short gate pulse each time an active step is reached. Patch to ADSR GATE IN for rhythmic note triggering, or into VCA ENV for amplitude sculpting. Try patching two EUCLID modules with different HITS/STEPS into separate drum voices for rich polyrhythm.',

  // ── Lissajous Scope ────────────────────────────────────────────────────────
  'mod-lissajous': 'LISSAJOUS — X-Y oscilloscope. Plots two audio signals against each other: X input on the horizontal axis, Y input on the vertical. When X and Y are frequency-related, beautiful closed curves appear (Lissajous figures). Patch VCO → X and VCO2 → Y, then tune VCO2 to a harmonic interval and watch the figures form. Phosphor-glow rendering.',
  'lissaj-xi': 'Lissajous X Input — horizontal axis signal. Patch any audio source here. The amplitude drives left-right position on the display.',
  'lissaj-yi': 'Lissajous Y Input — vertical axis signal. Patch a second audio source here. Try harmonically related oscillators for stable figures, or unrelated signals for chaotic motion.',

  // ── Phase 14: THE BODY ────────────────────────────────────────────────────
  'mod-logic':    'LOGIC — boolean gate combinator. AND fires only when both A and B are high simultaneously; OR fires when either is high; XOR fires when exactly one is high (the spaces between rhythms); NOT inverts A. OUT emits the result; INV emits the complement. Patch two Euclidean patterns into A and B — AND gives you the overlap hits, XOR gives you the gaps. One cable gives you the rhythm, the other its mirror.',
  'logic-a':      'Gate A — first gate input. Patch from EUCLID, SEQ GATE, or CLK÷n. The THRESH knob sets the signal level that counts as "high".',
  'logic-b':      'Gate B — second gate input. Used by AND, OR, and XOR modes. In NOT mode this input is ignored.',
  'logic-out':    'Logic Out — primary boolean result. Feeds like any gate signal: patch to ADSR GATE IN, EUCLID trigger, VCA ENV, or another LOGIC module to chain operations.',
  'logic-inv':    'Logic Inv — always the complement of OUT. If OUT is high, INV is low — and vice versa. Free counterpoint from a single module: OUT triggers a hi-hat, INV triggers a kick on every beat that the hi-hat skips.',

  'mod-formant':  'FORMANT — vowel filter. Two parallel bandpass filters tuned to human vocal formants F1 and F2. The VOWEL knob sweeps A→E→I→O→U, each with characteristically different resonant peaks. The result: a drone that speaks. Patch a pad through FORMANT with a slow LFO on VOWEL CV and the synth murmurs and shifts like a voice. Classic ambient technique: high reverb + slow vowel sweep = haunted choir.',
  'formant-ai':   'Formant Audio In — patch any audio source: VCO, VCA out, pad, or sample. The denser and harmonically richer the source, the more pronounced the vowel coloring.',
  'formant-ao':   'Formant Audio Out — the vowel-filtered signal. Patch to reverb, delay, or the loop station input to capture a take.',
  'formant-cv':   'Vowel CV In — incoming CV (0–1) maps to vowel position 0–4 (A→U). Bipolar LFOs should usually pass through ATTENUVERTER first so you can add OFFSET around 0.5 and keep the sweep in range. Then patch to FORMANT CV for slow vowel cycling or stepped vowel sequencing.',

  'mod-res':      'RESONATOR — Karplus-Strong physical modeling voice. A tuned delay line with controlled feedback decays exactly like a plucked string, struck bar, or bowed body. Works two ways: PLUCK/MALLET buttons fire a noise burst to excite the string standalone; or patch audio IN for resonator mode — the comb filter resonates at FREQ, adding pitched overtones to any input. BRIGHT controls damping (dark = muffled cello; bright = metallic kalimba). TRACK locks pitch to the sequencer.',
  'res-ai':       'Resonator Audio In — resonator mode input. Patch noise, a pad, or voice here; the string resonates at FREQ on top of whatever enters. With DECAY near 0.999, even a single noise burst sustains for many seconds.',
  'res-ao':       'Resonator Audio Out — the resonated signal. Patch to reverb for bell-like tails, or directly into the loop station to capture a plucked phrase.',
  'res-ci':       'Pitch CV In — 1V/oct pitch input. Patch SEQ CV OUT here (with TRACK on) for sequenced string notes that follow the melodic line.',

  'mod-spectral': 'SPECTRAL — FFT freeze / smear / blur processor. Three modes that work in the frequency domain, producing sounds impossible with any other module. FREEZE: hit the FREEZE button to crystallize the spectrum indefinitely — every partial sustained forever, a pure infinite chord. SMEAR: blur consecutive spectral frames over time, like an extreme reverb that retains the harmonic character of the input. BLUR: average adjacent frequency bins into smooth tonal clouds. PITCH shifts the frozen spectrum up or down without changing tempo.',
  'spectral-ai':  'Spectral Audio In — patch any audio source. Rich, harmonically complex signals (VCO, pad, sample) produce the most interesting frozen spectra. Voice through FREEZE = an endless ethereal chord from a single sung note.',
  'spectral-ao':  'Spectral Audio Out — the processed signal. Patch to reverb and delay for maximum depth. In FREEZE mode the output sustains indefinitely after the input stops.',

  'mod-morph':    'MORPH — multi-waypoint macro knob. Assign any set of knobs to MORPH via LEARN mode, save up to 8 waypoints (W1–W8), then sweep through the entire textural arc of your performance with a single knob. At the midpoint between W3 and W4, every tracked parameter is exactly halfway between those two snapshots. Patch LFO or CHAOS into MORPH CV for fully autonomous texture evolution — no hands required.',
  'morph-ci':     'Morph CV In — incoming CV (0–1) drives the MORPH position knob. Patch a slow LFO for gentle autonomous drifting through your waypoints, or CHAOS for unpredictable textural wandering. The fastest path to a living, self-evolving patch.',

  // ── AFFECT ────────────────────────────────────────────────────────────────
  'mod-affect': 'AFFECT — emotion-driven parameter mapping. A 2D pad (Valence × Arousal) controls 15 synth parameters simultaneously via bilinear interpolation across four emotional poles: MELANCHOLY (dark, slow), CALM (bright, slow), TENSE (dark, fast), EUPHORIC (bright, fast). Type a mood into the text box to move the puck. WANDER engages Brownian drift for autonomous emotional evolution.',

  // ── Sequencer additions ───────────────────────────────────────────────────
  'seq-prob':   'Probability — the chance this step will fire each time the sequencer reaches it. 100% = always fires. 50% = fires half the time, randomly. 0% = never fires (same as turning the step off). Floor 0% means the step is effectively muted by probability; ceiling 100% means no randomness at all, the step triggers every pass. You can type whole percentages directly: 70 means 70%. Best technique: set most steps to 100%, then drop a few key steps to 60–80%. The pattern becomes generative — it sounds different every loop but stays musical because the rhythm skeleton is preserved. This is the core of generative sequencer technique in ambient music.',
  'seq-dir':    'Direction — how the sequencer moves through its steps each tick. FWD (→): left to right, loops back to step 1. REV (←): right to left, loops back to the last step — your melody plays backwards. P-P: ping-pong, bounces between step 1 and the last step; with 8 steps this gives a 14-step (not 16) pattern before repeating because the endpoints don\'t double. RND: jumps to a completely random step each tick — non-repeating, generative. Try switching direction while playing to hear the phrase mutate live. Ctrl+Z undoes a direction change.',
  // ── Chaos oscillator ──────────────────────────────────────────────────────
  'mod-chaos':   'CHAOS — modulation-only oscillator combining organic beating with brownian drift. CHAOS=0: pure sine LFO. CHAOS=0.5: two detuned oscillators beating against each other. CHAOS=1: filtered noise brownian walk — a CV signal that wanders slowly and unpredictably. Patch to VCF CV for Strega-style organic filter drift, or VCO CV for microtonal pitch wandering.',
  'chaos-out':   'Chaos CV Out — the organic modulation signal. Range scales with AMOUNT. Patch to VCF CV↓, VCO CV↓, Reverb Mix, or anywhere a CV destination accepts modulation. Unlike an LFO, CHAOS never repeats the same pattern — it is always slightly different.',
  'chaos-rate':  'Rate — base oscillation frequency (0.01–20 Hz). At 0.1 Hz: very slow glacier-drift. At 1 Hz: medium cyclic movement. At 10 Hz+: rapid flutter. The brownian walk speed also scales with RATE — higher RATE = faster wandering.',
  'chaos-chaos': 'Chaos — morphs from ordered to disordered. 0: pure sine LFO (periodic, predictable). 0.3: beating (two oscillators slightly detuned, creates phasing pattern). 0.7: complex beating (fast detuning ratio). 1: brownian drift dominates (filtered pink noise — smooth but never repeating). Best range: 0.3–0.7 for living, breathing modulation.',
  'chaos-amount':'Amount — modulation depth in Hz (0–1000). At 100: gentle, musical pitch drift or filter movement. At 500+: dramatic sweeps. Scale it to match the destination: VCF cutoff needs larger amounts (200–600) than VCO pitch (10–50 for subtle microtonal drift).',
  'seq-steps':  'Step count — 8 or 16 steps per loop. At 120 BPM, 8 steps = 2-second loop; 16 steps = 4-second loop. When you switch from 8 to 16, your existing 8-step pattern is automatically copied into slots 9–16, so the loop doubles in length without any silence. You can then edit the second half to create variation — a classic technique for building evolving sequences. Switching back to 8 hides the second half but preserves it. Ctrl+Z undoes a step count change.',
  'seq-vel':    'Per-step velocity — sets how hard this step hits (0–1). The velocity value is emitted on SEQ VEL OUT as a CV pulse when the step fires. Patch SEQ VEL OUT → VCA ENV or VCF CV for per-note dynamics: soft steps whisper, loud steps punch through. Toggle VEL/PIT button to switch between pitch and velocity views.',
  'seq-vel-out':'SEQ Velocity Out — emits a CV pulse (0–1) on each fired step, matching that step\'s velocity knob. Patch to VCA ENV IN for expressive per-note dynamics, or VCF CV for per-note brightness variation. A velocity of 0 on a step = step is effectively silenced dynamically.',
  'seq-g1':     'Step 1 Gate Out — fires a 10ms gate pulse (0→1→0) every time step 1 is active and the sequencer reaches it. Patch to ADSR gate IN, Sample trigger, or any gate-sensitive input. Gate fires even if the step\'s probability check fails — it only tracks whether the step is ON.',
  'seq-g2':     'Step 2 Gate Out — fires a 10ms gate pulse when step 2 is active.',
  'seq-g3':     'Step 3 Gate Out — fires a 10ms gate pulse when step 3 is active.',
  'seq-g4':     'Step 4 Gate Out — fires a 10ms gate pulse when step 4 is active. Patch to a second ADSR for polyrhythmic envelope control — step 4 can trigger a different envelope than step 1.',
  'seq-g5':     'Step 5 Gate Out — fires a 10ms gate pulse when step 5 is active.',
  'seq-g6':     'Step 6 Gate Out — fires a 10ms gate pulse when step 6 is active.',
  'seq-g7':     'Step 7 Gate Out — fires a 10ms gate pulse when step 7 is active.',
  'seq-g8':     'Step 8 Gate Out — fires a 10ms gate pulse when step 8 is active. Patch steps 1 and 5 to two different sampler triggers for a kick/snare pattern locked to your sequence.',
  'mod-xypad':    'XY PAD — a 2D performance pad outputting two simultaneous CV signals. Drag anywhere on the canvas to set position. X OUT tracks horizontal position, Y OUT tracks vertical position. Patch to VCF cutoff + LFO rate, or two VCO CVs, for expressive two-dimensional live control.',
  'xypad-xo':     'X CV Out — horizontal position as CV (-1 to +1). Rightward = positive. Patch to VCF cutoff, VCO detune, reverb mix, or any CV input.',
  'xypad-yo':     'Y CV Out — vertical position as CV (-1 to +1). Upward = positive. Use together with X OUT to map a two-axis gesture into your patch.',
  'mod-ringmod':  'RING MODULATOR — multiplies two audio signals (true bipolar multiplication: Carrier × Modulator). At musical frequency ratios: bell and metallic tones. At slightly detuned pitches: throbbing intermodulation. Patch VCO into CARRIER, a second VCO or LFO into MOD IN.',
  'ringmod-ai':   'Ring Mod Carrier In — the signal being ring-modulated. Patch VCO, chord, or any audio source.',
  'ringmod-bi':   'Ring Mod Modulator In — drives the carrier amplitude at audio rate. Patch a second VCO for metallic tones, or a slow LFO for tremolo.',
  'ringmod-ao':   'Ring Mod Out — carrier × modulator. Patch to VCF IN, mixer, or effects.',
  'mod-fmop':     'FM OPERATOR — a 2-operator FM synthesizer: carrier oscillator + modulator oscillator. RATIO sets the modulator-to-carrier frequency ratio. INDEX sets modulation depth in Hz. At ratio 1:1 = electric piano; 2:1 = bells; 1:7 = gong-like. CV IN tracks pitch from sequencer.',
  'fmop-cv':      'FM Carrier CV In — pitch CV for the carrier oscillator. Patch from SEQ, ARP, TURING, or DRUNK for melodic FM lines.',
  'fmop-ao':      'FM Audio Out — the carrier oscillator output, frequency-modulated by the internal modulator. Patch to VCF, mixer, or effects.',
  'mod-flanger':  'FLANGER — short delay (0–15ms) + feedback + LFO modulation. Creates the jet-plane sweeping comb-filter effect. FBACK controls resonance: high values give metallic howl. Unlike chorus (thick doubling), flanging is phase-cancellation-heavy and dramatic. Send model: patch audio into IN to activate.',
  'flanger-ai':   'Flanger Audio In — patch any audio source to process through the flanger.',
  'flanger-ao':   'Flanger Audio Out — flanged signal output. Patch to mixer or final output.',
  'mod-turing':   'TURING MACHINE — a probabilistic 16-bit shift register generating evolving melody. On each clock tick bits shift; CHANCE controls mutation probability (0 = frozen loop, 1 = pure random, ~0.15 = slowly evolving). The register window maps to a pentatonic scale. Patch CV OUT to VCO for generative melody.',
  'turing-cv':    'Turing CV Out — pitch CV from the current register state. Patch to VCO CV IN or QUANT CV IN.',
  'turing-go':    'Turing Gate Out — fires a gate on each clock tick. Patch to ADSR GATE IN.',
  'mod-pclock':   'POLYRHYTHM CLOCK — three independent gate outputs at prime-ratio tempos (3:4:5). They start together and slowly drift apart, realigning after LCM(3,4,5)=60 beats. Patch outputs to multiple ADSRs, Euclid triggers, or Turing clock inputs for evolving polyrhythmic texture.',
  'pclock-g3':    'Clock Gate ÷3 — fires every 3 tempo beats. Patch to ADSR GATE for triplet rhythm.',
  'pclock-g4':    'Clock Gate ÷4 — fires every 4 tempo beats.',

  'mod-drunk':    'DRUNK WALK — random melody generator that steps up or down by a random interval each tick. STEP limits maximum jump size (semitones). Scale quantization keeps it musical. Slow rate + small step = meditative wander. Fast rate + large step = unpredictable angular lines. Patch CV OUT to VCO CV.',
  'drunk-cv':     'Drunk Walk CV Out — pitch CV that wanders step by step. Patch to VCO CV IN.',
  'drunk-go':     'Drunk Walk Gate Out — fires on each step. Patch to ADSR GATE IN for triggered notes.',
  'mod-theremin': 'THEREMIN STRIP — vertical touch strip for expressive real-time CV control. Drag vertically for pitch, horizontally for volume. Pair with granular processing and reverb for ethereal performance. Patch PITCH CV to VCO, VOL CV to VCA envelope.',
  'theremin-cv':  'Theremin Pitch CV — vertical position as CV. Patch to VCO CV IN for pitch control.',
  'theremin-vel': 'Theremin Volume CV — horizontal position as CV. Patch to VCA ENV for amplitude control.',
  'mod-tesla':    'TESLA COIL — reactive SVG animation branching and flickering in sync with output amplitude. Pure aesthetic — not a musical module. The arc complexity and brightness scale with signal level.',
