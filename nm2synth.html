let _toastTimer = null;
let _toastEl    = null;

function showToast(msg, level) {
  level = level || 'info';
  if (_toastEl) { clearTimeout(_toastTimer); _toastEl.remove(); _toastEl = null; }
  const t = document.createElement('div');
  t.className = 'patch-toast toast-' + level;
  t.textContent = msg;
  document.body.appendChild(t);
  _toastEl = t;
  requestAnimationFrame(() => t.classList.add('visible'));
  _toastTimer = setTimeout(() => {
    t.classList.remove('visible');
    setTimeout(() => { if (_toastEl === t) { t.remove(); _toastEl = null; } }, 250);
  }, 4500);
}

// Effects whose wet outlet is always wired to masterOut in wireDefault() —
// user does not need to patch OUT; patching IN is enough to hear the effect.
const SEND_INPUTS = {
  'reverb-in':  'REVERB',
  'delay-in':   'DELAY',
  'chorus-in':  'CHORUS',
  'tape-in':    'TAPE SAT',
  'phaser-in':  'PHASER',
  'stutter-ai': 'STUTTER',
  'panner-in':  'PANNER',
};

// Inline processors: their output is NOT wired to masterOut, so patching their
// IN without also patching their OUT means the processed signal goes nowhere.
const INLINE_SILENT = {
  'fold-in':      { out: 'fold-out',      name: 'WVFLDR' },
  'mix-a-in':     { out: 'mix-out',       name: 'MIXER' },
  'mix-b-in':     { out: 'mix-out',       name: 'MIXER' },
  'mix-c-in':     { out: 'mix-out',       name: 'MIXER' },
};

function teachPatch(fromId, toId) {
  const fromCls = ppMap[fromId] && ppMap[fromId].cls;
  const toCls   = ppMap[toId]   && ppMap[toId].cls;

  // Type mismatch: CV out → audio in
  if (fromCls === 'co' && toCls === 'ai') {
    showToast(
      'CV \u2192 Audio In: a control signal is going into an audio input. ' +
      'This works as audio-rate modulation, but for smoother frequency or filter control ' +
      'use a CV\u2193 or ENV\u2193 input \u2014 those are designed for it.',
      'tip'
    );
    return;
  }
  // Type mismatch: audio out → CV in
  if (fromCls === 'ao' && toCls === 'ci') {
    showToast(
      'Audio \u2192 CV In: audio-rate signal modulating a CV input creates ring-mod / AM effects. ' +
      'Valid and fun, but unusual \u2014 LFO or ADSR are typical CV sources.',
      'tip'
    );
    return;
  }

  // Send-effect input: reassure user the OUT is already handled
  if (SEND_INPUTS[toId]) {
    showToast(
      SEND_INPUTS[toId] + ' IN connected \u2014 wet signal reaches the speakers automatically. ' +
      'No need to patch OUT unless you want to chain effects.',
      'info'
    );
    return;
  }

  // Inline processor: warn if its output has no cable yet
  const inline = INLINE_SILENT[toId];
  if (inline && !cables.some(function(c){ return c.fromId === inline.out; })) {
    showToast(
      inline.name + ' IN connected \u2014 patch ' + inline.name + ' OUT to continue the signal chain. ' +
      'Without an output cable the processed audio goes nowhere.',
      'warn'
    );
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// PATCH POINT ELEMENT
// ═══════════════════════════════════════════════════════════════════════════════
function mkPP(id, cls, label, role) {
  const row = document.createElement('div');
  row.className = 'pp-row';
  const dot = document.createElement('div');
  dot.className = `pp ${cls}`;
  dot.dataset.id = id;
  const lbl = document.createElement('span');
  lbl.textContent = label;
  if(role==='out'){row.appendChild(dot);row.appendChild(lbl);}
  else{row.appendChild(lbl);row.appendChild(dot);}
  ppMap[id] = { id, el:dot, role, cls, label };
  const tip = TIPS[id];
  if(tip){ dot.addEventListener('mouseenter',e=>showTip(tip,e)); dot.addEventListener('mousemove',moveTip); dot.addEventListener('mouseleave',hideTip); }
  dot.addEventListener('click', e => {
    e.stopPropagation();
    if (e.altKey && ppMap[id]?.role === 'out') { probePoint(id); return; }
    patchClick(id);
  });
  return row;
}

// Highlight all input patch points while dragging; compatible types get stronger glow
function highlightAvailable(fromId) {
  const srcCls = ppMap[fromId]?.cls;
  const compat = srcCls === 'ao' ? ['ai'] : srcCls === 'co' ? ['ci','gi'] : [];
  for (const pp of Object.values(ppMap)) {
    if (pp.role !== 'in') continue;
    pp.el.classList.add('pp-available');
    if (compat.includes(pp.cls)) pp.el.classList.add('pp-compatible');
  }
}
function clearAvailable() {
  for (const pp of Object.values(ppMap)) {
    pp.el.classList.remove('pp-available','pp-compatible');
  }
}

function updatePatchTouchBanner() {
  const ui = ensurePatchTouchBanner();
  if (pendingPP) ui.show(pendingPP);
  else ui.hide();
}

function cancelPatch() {
  if (!pendingPP) return;
  ppMap[pendingPP]?.el.classList.remove('pending');
  pendingPP = null;
  setStatus('');
  stopGhost();
  updatePatchTouchBanner();
}

function beginPatch(fromId) {
  pendingPP = fromId;
  ppMap[fromId]?.el.classList.add('pending');
  setStatus(isTouchPatchMode() ? 'Tap a destination jack to connect.' : 'Drag to input or click PICK DESTINATION');
  if (!isTouchPatchMode()) startGhost(fromId);
  else highlightAvailable(fromId);
  updatePatchTouchBanner();
}

function switchPatchSource(fromId) {
  stopGhost();
  if (pendingPP) ppMap[pendingPP]?.el.classList.remove('pending');
  beginPatch(fromId);
}

function completePatch(toId) {
  const fromId = pendingPP;
  if (!fromId) return;
  teachPatch(fromId,toId);
  addCable(fromId,toId);
  ppMap[fromId]?.el.classList.remove('pending');
  pendingPP = null;
  setStatus('');
  stopGhost();
  updatePatchTouchBanner();
  // Refresh mobile visuals when active
  if(nm2Mobile?.active) {
    if(nm2Mobile.currentTab === 'patch') nm2Mobile.refreshPatchTab();
    nm2Mobile.refreshCardPPs();
    requestAnimationFrame(() => nm2Mobile._refreshSpine());
  }
}

function patchClick(id) {
  const pp = ppMap[id];
  if(pendingPP===null) {
    if(pp.role==='out'){ beginPatch(id); }
    else {
      const c = cables.find(c=>c.toId===id);
      if(c) delCable(c);
      else ensurePatchDestSheet().show(id, {reversed: true});
    }
  } else {
    if(pendingPP===id){ cancelPatch(); return; }
    if(pp.role==='in'){ completePatch(id); }
    else { switchPatchSource(id); }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// SIGNAL PROBE  (Phase 5 — targeted inspect view)
// Alt+click any output jack opens a floating mini-scope for that signal.
// Safe: AnalyserNode only observes; it does not alter the signal path.
// Multiple probes can be open simultaneously.
// ─────────────────────────────────────────────────────────────────────────────
function probePoint(id) {
  const pp = ppMap[id];
  if (!pp || pp.role !== 'out') return;
  const node = pp.getNode?.();
  if (!node) return;

  const analyser = ctx.createAnalyser();
  analyser.fftSize = 256;
  try { node.connect(analyser); } catch (_) { return; }
  setStatus(`Probing ${FLOW_NAMES[id] || id} — close with ✕`);

  const buf = new Float32Array(analyser.frequencyBinCount); // 128 samples
  const color = PP_COLOR[pp.cls] || '#cc00ff';
  const W = 180, H = 60;

  // Build overlay
  const ov = document.createElement('div'); ov.className = 'nm-probe';
  const hdr = document.createElement('div'); hdr.className = 'nm-probe-hdr';
  const lbl = document.createElement('span');
  lbl.style.color = color; lbl.textContent = '⬤ ' + (FLOW_NAMES[id] || id);
  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn'; closeBtn.textContent = '✕';
  closeBtn.style.cssText = 'padding:0 4px;font-size:8px;line-height:1.4;';
  hdr.appendChild(lbl); hdr.appendChild(closeBtn);

  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  cv.style.cssText = `width:${W}px;height:${H}px;`;
  ov.appendChild(hdr); ov.appendChild(cv);

  // Position near the patch point, clamped to viewport
  const pr = pp.el.getBoundingClientRect();
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = pr.right + 8, top = pr.top - 20;
  if (left + W + 4 > vw) left = pr.left - W - 8;
  top = Math.max(4, Math.min(vh - H - 28, top));
  ov.style.left = left + 'px'; ov.style.top = top + 'px';
  document.body.appendChild(ov);

  // Draw: two-pass bloom (same convention as main scope — no shadowBlur)
  const c = cv.getContext('2d');
  function _probeDraw() {
    analyser.getFloatTimeDomainData(buf);
    c.fillStyle = '#04040e'; c.fillRect(0, 0, W, H);
    // center reference line
    c.strokeStyle = '#ffffff08'; c.lineWidth = 0.5;
    c.beginPath(); c.moveTo(0, H / 2); c.lineTo(W, H / 2); c.stroke();
    // bloom pass
    c.globalAlpha = 0.15; c.strokeStyle = color; c.lineWidth = 4;
    c.beginPath();
    for (let i = 0; i < buf.length; i += 2) {
      const x = i * (W / buf.length), y = (0.5 - buf[i] * 0.45) * H;
      i === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
    }
    c.stroke();
    // bright pass
    c.globalAlpha = 1; c.strokeStyle = color; c.lineWidth = 1.5;
    c.beginPath();
    for (let i = 0; i < buf.length; i++) {
      const x = i * (W / buf.length), y = (0.5 - buf[i] * 0.45) * H;
      i === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
    }
    c.stroke();
  }
  registerDraw(_probeDraw);

  // Drag by header (exempt the close button so its click fires normally)
  let ox = 0, oy = 0;
  hdr.addEventListener('pointerdown', e => {
    if (e.target === closeBtn) return;
    ox = e.clientX - ov.offsetLeft; oy = e.clientY - ov.offsetTop;
    hdr.setPointerCapture(e.pointerId); e.preventDefault();
  });
  hdr.addEventListener('pointermove', e => {
    if (!hdr.hasPointerCapture(e.pointerId)) return;
    ov.style.left = (e.clientX - ox) + 'px';
    ov.style.top  = (e.clientY - oy) + 'px';
  });

  // Cleanup
  function closeProbe() {
    unregisterDraw(_probeDraw);
    try { node.disconnect(analyser); } catch (_) {}
    ov.remove();
  }
  closeBtn.addEventListener('click', closeProbe);
}

function addCable(fromId, toId, color) {
  // Audio inputs (ai) allow multiple connections — sources sum, matching real modular behaviour.
  // CV/gate inputs (ci, gi) allow only one connection at a time (new cable replaces old).
  // Never add an exact duplicate regardless of type.
  const dstCls = ppMap[toId]?.cls;
  const isDup  = cables.some(c=>c.fromId===fromId && c.toId===toId);
  if (isDup) return; // silently ignore exact duplicates
  const existing = (dstCls === 'ai') ? null : cables.find(c=>c.toId===toId);
  const replacedFrom  = existing?.fromId  ?? null;
  const replacedColor = existing?.color   ?? null;
  if (existing) { const prev = ignoreUndo; ignoreUndo = true; delCable(existing); ignoreUndo = prev; }
  // Derive colors from patch-point types — color param kept for undo compat but ignored
  const srcColor = PP_COLOR[ppMap[fromId]?.cls] || '#ff00ff';
  const dstColor = PP_COLOR[ppMap[toId]?.cls]   || '#ff00ff';
  color = srcColor; // store src color for legacy undo
  // Create per-cable linearGradient in SVG defs
  const gradId = 'cg_' + (fromId + '_' + toId).replace(/[^a-zA-Z0-9_-]/g,'_');
  const defs = document.querySelector('#cables defs');
  const gradEl = document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
  gradEl.id = gradId; gradEl.setAttribute('gradientUnits','userSpaceOnUse');
  const s1 = document.createElementNS('http://www.w3.org/2000/svg','stop');
  s1.setAttribute('offset','0%');   s1.setAttribute('stop-color', srcColor);
  const s2 = document.createElementNS('http://www.w3.org/2000/svg','stop');
  s2.setAttribute('offset','100%'); s2.setAttribute('stop-color', dstColor);
  gradEl.appendChild(s1); gradEl.appendChild(s2);
  defs.appendChild(gradEl);
  const el = document.createElementNS('http://www.w3.org/2000/svg','path');
  el.setAttribute('stroke',`url(#${gradId})`); el.setAttribute('stroke-width','3');
  el.setAttribute('fill','none'); el.setAttribute('filter','url(#cglow)');
  el.setAttribute('stroke-dasharray','6 12');
  el.style.animation='cable-flow 1s linear infinite';
  el.style.opacity='.9'; el.style.cursor='pointer';
  el.addEventListener('click',()=>{ const c=cables.find(c=>c.el===el); if(c)delCable(c); });
  document.getElementById('cables').appendChild(el);
  const cable = {fromId,toId,color,el,gradEl,gradId};
  cables.push(cable);
  logEvent('cable_add', { from: fromId, to: toId });
  ppMap[fromId].el.classList.add('linked');
  ppMap[toId].el.classList.add('linked');
  moveCable(cable);
  connectAudio(fromId,toId);
  buildFlowDiagram();
  pushUndo({ label: `cable ${fromId} → ${toId}`, undo: () => {
    const prev = ignoreUndo; ignoreUndo = true;
    const c = cables.find(c=>c.fromId===fromId && c.toId===toId); if(c) delCable(c);
    if (replacedFrom) addCable(replacedFrom, toId, replacedColor);
    ignoreUndo = prev;
  }});
}

function delCable(cable) {
  const { fromId, toId, color } = cable;
  logEvent('cable_remove', { from: fromId, to: toId });
  pushUndo({ label: `remove cable`, undo: () => {
    const prev = ignoreUndo; ignoreUndo = true; addCable(fromId, toId, color); ignoreUndo = prev;
  }});
  cables.splice(cables.indexOf(cable),1);
  cable.el.remove();
  cable.gradEl?.remove();
  ppMap[cable.fromId].el.classList.remove('linked');
  ppMap[cable.toId].el.classList.remove('linked');
  disconnectAudio(cable.fromId, cable.toId);
  buildFlowDiagram();
  if(nm2Mobile?.active) {
    nm2Mobile.refreshCardPPs();
    requestAnimationFrame(() => nm2Mobile._refreshSpine());
  }
}

function moveCable(cable) {
  if(nm2Mobile?.active) return;
  const r1=ppMap[cable.fromId].el.getBoundingClientRect();
  const r2=ppMap[cable.toId].el.getBoundingClientRect();
  const x1=r1.left+r1.width/2, y1=r1.top+r1.height/2;
  const x2=r2.left+r2.width/2, y2=r2.top+r2.height/2;
  const sag=Math.max(35,Math.hypot(x2-x1,y2-y1)*0.32);
  cable.el.setAttribute('d',`M${x1} ${y1} C${x1} ${y1+sag},${x2} ${y2+sag},${x2} ${y2}`);
  if (cable.gradEl) {
    cable.gradEl.setAttribute('x1',x1); cable.gradEl.setAttribute('y1',y1);
    cable.gradEl.setAttribute('x2',x2); cable.gradEl.setAttribute('y2',y2);
  }
}

function updateCables(){ if(nm2Mobile?.active) return; cables.forEach(moveCable); }

// ─── Unified animation loop ──────────────────────────────────────────────────
// All per-frame canvas draws register here. One RAF replaces ~17 independent loops.
// _masterFrameTs: the RAF timestamp (like performance.now()) for timing-based draws.
// _masterFrameCount: integer counter for frame-rate throttling (e.g. % 4 for ~15fps).
const _drawFns = new Set();
let _masterFrameCount = 0;
let _masterFrameTs = 0;
function registerDraw(fn) { _drawFns.add(fn); }
function unregisterDraw(fn) { _drawFns.delete(fn); }
(function _masterRAF(ts) {
  requestAnimationFrame(_masterRAF);
  _masterFrameCount++;
  _masterFrameTs = ts || 0;
  for (const fn of _drawFns) fn();
})(0);

// Cable updates: dirty-flag driven from unified loop (was: setInterval every 120ms)
let _cablesDirty = true; // start dirty so cables position correctly on first frame
function markCablesDirty() { _cablesDirty = true; }
window.addEventListener('resize', markCablesDirty);
window.addEventListener('scroll', markCablesDirty);
registerDraw(function _updateCablesIfDirty() {
  if (_cablesDirty) { updateCables(); _cablesDirty = false; }
});

// ─── Ghost cable physics ──────────────────────────────────────────────────────
// Shown while a source is pending and the user is hunting for a destination.
// The cable tip follows the mouse with spring + gravity so it dangles naturally.
const ghostMouse = {x:0, y:0};
const ghostTip   = {x:0, y:0, vx:0, vy:0};
let ghostEl      = null;
let ghostGradEl  = null; // SVG linearGradient for the ghost cable
let ghostRaf     = null;
let ghostSnap    = null; // ppMap id currently snapped to, or null

window.addEventListener('mousemove', e => { ghostMouse.x = e.clientX; ghostMouse.y = e.clientY; });

// Clicking blank space drops the cable
document.addEventListener('click', e => {
  if (!pendingPP) return;
  if (e.target.closest('#patch-touch-banner') || e.target.closest('#patch-dest-sheet')) return;
  if (!e.target.closest('.pp')) {
    cancelPatch();
  }
}, true);

function startGhost(fromId) {
  if (isTouchPatchMode()) {
    highlightAvailable(fromId);
    return;
  }
  stopGhost();
  const r  = ppMap[fromId].el.getBoundingClientRect();
  const sx = r.left + r.width/2, sy = r.top + r.height/2;
  ghostTip.x = sx; ghostTip.y = sy; ghostTip.vx = 0; ghostTip.vy = 0;

  const srcColor = PP_COLOR[ppMap[fromId].cls] || '#cccccc';
  // Ghost gradient: src color → src color initially; tip color updates to dst on snap
  const defs = document.querySelector('#cables defs');
  ghostGradEl = document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
  ghostGradEl.id = 'ghost-grad'; ghostGradEl.setAttribute('gradientUnits','userSpaceOnUse');
  const gs1 = document.createElementNS('http://www.w3.org/2000/svg','stop');
  gs1.setAttribute('offset','0%');   gs1.setAttribute('stop-color', srcColor);
  const gs2 = document.createElementNS('http://www.w3.org/2000/svg','stop');
  gs2.setAttribute('offset','100%'); gs2.setAttribute('stop-color', srcColor);
  ghostGradEl.appendChild(gs1); ghostGradEl.appendChild(gs2);
  defs.appendChild(ghostGradEl);

  ghostEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  ghostEl.setAttribute('stroke', 'url(#ghost-grad)');
  ghostEl.setAttribute('stroke-width', '2.5');
  ghostEl.setAttribute('fill', 'none');
  ghostEl.setAttribute('stroke-opacity', '0.6');
  ghostEl.setAttribute('stroke-dasharray', '6 12');
  ghostEl.setAttribute('filter', 'url(#cglow)');
  ghostEl.setAttribute('pointer-events', 'none');
  document.getElementById('cables').appendChild(ghostEl);
  ghostRaf = requestAnimationFrame(ghostLoop);
  highlightAvailable(fromId);
}

function stopGhost() {
  if (ghostEl)     { ghostEl.remove(); ghostEl = null; }
  if (ghostGradEl) { ghostGradEl.remove(); ghostGradEl = null; }
  if (ghostRaf)    { cancelAnimationFrame(ghostRaf); ghostRaf = null; }
  if (ghostSnap)   { ppMap[ghostSnap]?.el.classList.remove('ghost-snap'); ghostSnap = null; }
  clearAvailable();
}

function ghostLoop() {
  if (!ghostEl || !pendingPP) { stopGhost(); return; }

  const srcR = ppMap[pendingPP].el.getBoundingClientRect();
  const sx = srcR.left + srcR.width/2, sy = srcR.top + srcR.height/2;

  // Find nearest input patch point within snap radius (60px), prefer type-compatible
  let snapX = ghostMouse.x, snapY = ghostMouse.y, newSnap = null, snapDist = Infinity;
  const srcCls = ppMap[pendingPP]?.cls;
  const compatCls = srcCls === 'ao' ? ['ai'] : srcCls === 'co' ? ['ci','gi'] : [];
  for (const [id, pp] of Object.entries(ppMap)) {
    if (pp.role !== 'in') continue;
    const pr = pp.el.getBoundingClientRect();
    const cx = pr.left + pr.width/2, cy = pr.top + pr.height/2;
    const d = Math.hypot(ghostMouse.x - cx, ghostMouse.y - cy);
    // Compatible inputs get a 15px bonus to win tie-breaks with nearby incompatible ones
    const effective = d - (compatCls.includes(pp.cls) ? 15 : 0);
    if (d < 60 && effective < snapDist) { snapX = cx; snapY = cy; newSnap = id; snapDist = effective; }
  }

  // Update snap highlight
  if (newSnap !== ghostSnap) {
    if (ghostSnap) ppMap[ghostSnap]?.el.classList.remove('ghost-snap');
    if (newSnap)   ppMap[newSnap]?.el.classList.add('ghost-snap');
    ghostSnap = newSnap;
  }

  // Spring physics — tip chases target with weight and damping
  const spring = 0.14, damp = 0.72, grav = 0.28;
  ghostTip.vx += (snapX - ghostTip.x) * spring;
  ghostTip.vy += (snapY - ghostTip.y) * spring;
  ghostTip.vy += grav;
  ghostTip.vx *= damp;
  ghostTip.vy *= damp;
  ghostTip.x  += ghostTip.vx;
  ghostTip.y  += ghostTip.vy;

  // Extra magnetic pull when snapping to a patch point
  if (newSnap) {
    ghostTip.x += (snapX - ghostTip.x) * 0.35;
    ghostTip.y += (snapY - ghostTip.y) * 0.35;
    ghostTip.vx *= 0.55; ghostTip.vy *= 0.55;
  }

  // Draw catenary bezier — same formula as moveCable()
  const sag = Math.max(30, Math.hypot(ghostTip.x - sx, ghostTip.y - sy) * 0.32);
  ghostEl.setAttribute('d', `M${sx} ${sy} C${sx} ${sy+sag},${ghostTip.x} ${ghostTip.y+sag},${ghostTip.x} ${ghostTip.y}`);

  // Update ghost gradient: x1/y1=source, x2/y2=tip; tip color = dst color when snapped
  if (ghostGradEl) {
    ghostGradEl.setAttribute('x1', sx);  ghostGradEl.setAttribute('y1', sy);
    ghostGradEl.setAttribute('x2', ghostTip.x); ghostGradEl.setAttribute('y2', ghostTip.y);
    const srcColor = PP_COLOR[ppMap[pendingPP]?.cls] || '#cccccc';
    const tipColor = newSnap ? (PP_COLOR[ppMap[newSnap]?.cls] || srcColor) : srcColor;
    ghostGradEl.lastElementChild.setAttribute('stop-color', tipColor);
  }

  ghostRaf = requestAnimationFrame(ghostLoop);
}

function connectAudio(fId, tId) {
  const key=`${fId}→${tId}`;
  if(audioConns.has(key)) return;
  const fp=ppMap[fId], tp=ppMap[tId];
  if(!fp?.getNode||!tp?.getNode) return;
  try {
    const src=fp.getNode(), dst=tp.getNode();
    if(tp.isParam) src.connect(dst); else src.connect(dst);
    audioConns.add(key);
  } catch(e){ console.warn('connect fail',e); }
}

function disconnectAudio(fId, tId) {
  const key=`${fId}→${tId}`;
  if(!audioConns.has(key)) return;
  const fp=ppMap[fId], tp=ppMap[tId];
  if(!fp?.getNode||!tp?.getNode) return;
  try { fp.getNode().disconnect(tp.getNode()); } catch(e){}
  audioConns.delete(key);
}

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE UI BUILDERS
// ═══════════════════════════════════════════════════════════════════════════════
// panel(type, label, content)             — legacy 3-arg form, instanceId=1
// panel(type, instanceId, label, content) — new 4-arg form for duplicates
function mkRackGroup(label) {
  const d = document.createElement('div');

function panel(type, instanceIdOrLabel, labelOrContent, content_) {
  let instanceId, label, content;
  if (typeof instanceIdOrLabel === 'number') {
    instanceId = instanceIdOrLabel; label = labelOrContent; content = content_;
  } else {
    instanceId = 1; label = instanceIdOrLabel; content = labelOrContent;
  }
  const p = document.createElement('div');
  p.className = 'module';
  p.id = instanceId === 1 ? `mod-${type}` : `mod-${type}-${instanceId}`;
  p.dataset.moduleType = type;
  p.dataset.instanceId = String(instanceId);
  ['tl','tr','bl','br'].forEach(pos=>{const s=document.createElement('div');s.className=`screw ${pos}`;p.appendChild(s);});
  const rb = document.createElement('span');
  rb.className = 'module-remove-btn';
  rb.innerHTML = '&times;';
  rb.title = 'Remove module';
  rb.addEventListener('pointerdown', e => e.stopPropagation());
  rb.addEventListener('click', e => {
    e.stopPropagation();
    if (confirm(`Remove ${label}${instanceId > 1 ? ` #${instanceId}` : ''}?`)) removeModule(type, instanceId);
  });
  p.appendChild(rb);
  const lbl = document.createElement('div');
  lbl.className = 'module-label';
  const handle = document.createElement('span');
  handle.className = 'module-drag-handle';
  handle.textContent = '⠿ ';
  lbl.appendChild(handle);
  lbl.appendChild(document.createTextNode(instanceId === 1 ? label : `${label} #${instanceId}`));
  const stagePin = document.createElement('span');
  stagePin.className = 'nm-stage-pin';
  stagePin.textContent = '⊡';
  stagePin.title = 'Toggle in Stage mode';
  stagePin.addEventListener('click', e => { e.stopPropagation(); if (typeof _nmToggleStagePin === 'function') _nmToggleStagePin(p.id); });
  lbl.appendChild(stagePin);
  const tip = TIPS[`mod-${type}`];
  let collapsed = false;
  const getHint = () => collapsed ? 'DBL-CLICK TO EXPAND' : 'DBL-CLICK TO COLLAPSE  ·  EDIT MODE TO DRAG';
  lbl.addEventListener('mouseenter', e => showTip(tip || '', e, getHint()));
  lbl.addEventListener('mousemove', moveTip);
  lbl.addEventListener('mouseleave', hideTip);
  // Double-click: collapse/expand module body
  lbl.addEventListener('dblclick', e => {
    e.stopPropagation();
    collapsed = !collapsed;
    content.style.display = collapsed ? 'none' : '';
    lbl.style.opacity = collapsed ? '0.5' : '';
    if (typeof updateCables === 'function') updateCables();
  });
  // Drag-to-reorder within rack (only active in editMode)
  // Uses ghost+placeholder pattern: original stays as ghost, floating clone follows cursor,
  // placeholder shows the exact drop position in the flex layout.
  lbl.addEventListener('pointerdown', e => {
    if (e.button !== 0 || !editMode) return;
    e.preventDefault();
    const rack = p.parentElement; if (!rack) return;
    const rect = p.getBoundingClientRect();
    const offsetX = e.clientX - rect.left;
    const offsetY = e.clientY - rect.top;

    // Floating clone that follows cursor
    const cloneEl = p.cloneNode(true);
    cloneEl.removeAttribute('id');
    cloneEl.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
    Object.assign(cloneEl.style, {
      position: 'fixed', left: rect.left+'px', top: rect.top+'px',
      width: rect.width+'px', margin: '0',
      pointerEvents: 'none', zIndex: '2000',
      opacity: '0.93',
      boxShadow: '0 24px 60px rgba(0,0,0,0.95), 0 0 32px #ffaa0077',
      borderColor: '#ffaa00',
      transform: 'scale(1.04) rotate(0.7deg)',
      transition: 'none',
    });
    document.body.appendChild(cloneEl);

    // Placeholder: shows where module will land
    const ph = document.createElement('div');
    ph.className = 'module-drop-ph';
    Object.assign(ph.style, {
      minWidth: rect.width+'px', height: rect.height+'px',
      flexShrink: '0', boxSizing: 'border-box',
    });
    rack.insertBefore(ph, p.nextSibling);

    // Ghost the original
    p.style.opacity = '0.12';
    p.style.pointerEvents = 'none';

    // Find best insertion point: closest module center, then insert before/after it
    function calcInsert(cx, cy) {
      const items = [...rack.children].filter(el => el !== p && el !== ph && el.dataset.moduleType);
      if (!items.length) return null;
      let closest = null, closestDist = Infinity;
      for (const sib of items) {
        const r = sib.getBoundingClientRect();
        const dist = Math.hypot(cx - (r.left + r.width/2), cy - (r.top + r.height/2));
        if (dist < closestDist) { closestDist = dist; closest = sib; }
      }
      if (!closest) return null;
      const r = closest.getBoundingClientRect();
      return cx < r.left + r.width * 0.5 ? closest : closest.nextElementSibling;
    }

    const onMove = ev => {
      cloneEl.style.left = (ev.clientX - offsetX) + 'px';
      cloneEl.style.top  = (ev.clientY - offsetY) + 'px';
      const target = calcInsert(ev.clientX, ev.clientY);
      // target === null means append to end
      if (target !== null) {
        if (ph.nextSibling !== target) rack.insertBefore(ph, target);
      } else {
        if (rack.lastElementChild !== ph) rack.appendChild(ph);
      }
    };

    const onUp = () => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      rack.insertBefore(p, ph);
      ph.remove();
      cloneEl.remove();
      p.style.opacity = '';
      p.style.pointerEvents = '';
      syncRackOrder();
      if (typeof updateCables === 'function') updateCables();
    };

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });
  p.appendChild(lbl); p.appendChild(content);
  return p;
}

function waveSelector(waves, current, onChange, tipKey, id) {
  const row = document.createElement('div'); row.className='wbtns';
  waves.forEach(([icon,type])=>{
    const b=document.createElement('button');
    b.className=`wbtn${current===type?' on':''}`;
    b.dataset.bval=type;
    b.textContent=icon;
    b.addEventListener('click',()=>{
      row.querySelectorAll('.wbtn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); onChange(type);
      logEvent('mode', { param: id || tipKey || 'wave', v: type });
    });
    const tip = tipKey ? TIPS[tipKey+type] : null;
    if(tip){ b.addEventListener('mouseenter',e=>showTip(tip,e)); b.addEventListener('mousemove',moveTip); b.addEventListener('mouseleave',hideTip); }
    row.appendChild(b);
  });
  if(id) knobRefs[id]={setVal:v=>row.querySelectorAll('[data-bval]').forEach(b=>b.classList.toggle('on',b.dataset.bval===String(v)))};
  return row;
}

// Register any row of [data-bval] buttons so sk() can flip the active state
function regBtnRow(id, ...rows) {
  knobRefs[id]={setVal:v=>rows.forEach(row=>row.querySelectorAll('[data-bval]').forEach(b=>b.classList.toggle('on',b.dataset.bval===String(v))))};
}

function buildSamplerPanel() {
  const d = document.createElement('div'); d.style.minWidth = '110px';

  // Waveform canvas — click or drag to load
  const wave = document.createElement('canvas');
  wave.className = 'sampler-wave'; wave.width = 94; wave.height = 44;
  wave.title = 'Click or drag a WAV/MP3/OGG file here';
  const wctx = wave.getContext('2d');

  const fname = document.createElement('div');
  fname.className = 'sampler-fname'; fname.textContent = 'drag file or click LOAD';

  function drawWave() {
    wctx.clearRect(0,0,94,44);
    if (!mods.sampler.buffer) {
      wctx.strokeStyle = 'rgba(255,0,255,.16)'; wctx.lineWidth = 1;
      wctx.beginPath(); wctx.moveTo(0,22); wctx.lineTo(94,22); wctx.stroke();
      return;
    }
    const data = mods.sampler.buffer.getChannelData(0);
    const step = Math.ceil(data.length / 94);
    wctx.strokeStyle = mods.sampler.playing ? '#00ffff' : '#ff00ff';
    wctx.lineWidth = 1;
    wctx.shadowBlur = 4; wctx.shadowColor = wctx.strokeStyle;
    wctx.beginPath();
    for (let x = 0; x < 94; x++) {
      const i = x * step;
      let max = 0;
      for (let j = 0; j < step && i+j < data.length; j++) max = Math.max(max, Math.abs(data[i+j]));
      const h = max * 20;
      wctx.moveTo(x, 22 - h); wctx.lineTo(x, 22 + h);
    }
    wctx.stroke();
    // Draw position/size window overlay
    const posX  = Math.floor(mods.sampler.posVal * 94);
    const sizeW = Math.max(2, Math.floor(mods.sampler.sizeVal * 94));
    const winW  = Math.min(sizeW, 94 - posX);
    wctx.fillStyle = '#00ffff14';
    wctx.fillRect(posX, 0, winW, 44);
    wctx.strokeStyle = '#00ffff55';
    wctx.lineWidth = 1;
    wctx.shadowBlur = 0;
    wctx.strokeRect(posX + 0.5, 0.5, winW - 1, 43);
    fname.textContent = mods.sampler.fileName || 'no file';
  }
  mods.sampler._onLoad = drawWave;
  mods.sampler._onPlayStateChange = () => {
    playBtn.textContent = mods.sampler.playing ? '■' : '▶';
    playBtn.classList.toggle('on', mods.sampler.playing);
  };
  drawWave();

  // File input (hidden)
  const fileInput = document.createElement('input');
  fileInput.type = 'file'; fileInput.accept = 'audio/*'; fileInput.style.display = 'none';
  fileInput.addEventListener('change', e => { if(e.target.files[0]) mods.sampler.load(e.target.files[0]).then(drawWave); });

  // Drag-drop onto canvas
  wave.addEventListener('dragover', e => { e.preventDefault(); wave.style.borderColor='#ff00ff'; });
  wave.addEventListener('dragleave', () => { wave.style.borderColor=''; });
  wave.addEventListener('drop', e => {
    e.preventDefault(); wave.style.borderColor='';
    const f = e.dataTransfer.files[0];
    if (f) mods.sampler.load(f).then(drawWave);
  });

  // LOAD button
  const loadBtn = document.createElement('button');
  loadBtn.className = 'btn'; loadBtn.style.cssText = 'width:100%;margin-bottom:2px;';
  loadBtn.textContent = '▲ LOAD'; loadBtn.addEventListener('click', () => fileInput.click());

  // Play / Stop
  const playBtn = document.createElement('button');
  playBtn.className = 'btn'; playBtn.style.cssText = 'flex:1;';
  playBtn.textContent = '▶';
  playBtn.addEventListener('click', () => {
    if (mods.sampler.playing) { mods.sampler.stop(); playBtn.textContent='▶'; playBtn.classList.remove('on'); }
    else { mods.sampler.play(); playBtn.textContent='■'; playBtn.classList.add('on'); }
    drawWave();
  });

  // LOOP toggle
  const loopBtn = document.createElement('button');
  loopBtn.className = 'btn on'; loopBtn.style.cssText = 'flex:1;';
  loopBtn.textContent = 'LOOP';
  loopBtn.addEventListener('click', () => {
    mods.sampler.looping = !mods.sampler.looping;
    loopBtn.classList.toggle('on', mods.sampler.looping);
    if (mods.sampler.playing) { mods.sampler.play(); }
  });

  // REV toggle
  const revBtn = document.createElement('button');
  revBtn.className = 'btn'; revBtn.style.cssText = 'flex:1;';
  revBtn.textContent = 'REV';
  revBtn.addEventListener('click', () => {
    mods.sampler.reversed = !mods.sampler.reversed;
    revBtn.classList.toggle('on', mods.sampler.reversed);
    if (mods.sampler.playing) mods.sampler.play();
  });

  const row1 = document.createElement('div'); row1.style.cssText = 'display:flex;gap:2px;margin:2px 0;';
  row1.appendChild(playBtn); row1.appendChild(loopBtn); row1.appendChild(revBtn);

  d.appendChild(wave); d.appendChild(fname); d.appendChild(fileInput); d.appendChild(loadBtn); d.appendChild(row1);
  d.appendChild(document.createElement('hr'));
  d.appendChild(mkKnob({id:'smp-speed',label:'SPEED',min:0.25,max:4,val:1,log:true,tip:TIPS['sampler-speed'],onChange:v=>mods.sampler.setSpeed(v)}));
  d.appendChild(mkKnob({id:'smp-pitch',label:'PITCH',min:-12,max:12,val:0,tip:TIPS['sampler-pitch'],onChange:v=>mods.sampler.setPitch(v)}));
  d.appendChild(mkKnob({id:'smp-pos', label:'POS',  min:0,   max:1,  val:0, tip:TIPS['sampler-pos'], onChange:v=>mods.sampler.setPosition(v)}));
  d.appendChild(mkKnob({id:'smp-size',label:'SIZE', min:0.01,max:1,  val:1, tip:TIPS['sampler-size'],onChange:v=>mods.sampler.setSize(v)}));
  d.appendChild(document.createElement('hr'));
  d.appendChild(mkPP('sampler-out','ao','OUT','out'));
  return panel('sampler','SAMPLER',d);
}

function buildSeqPanel() {
  const d=document.createElement('div'); d.style.minWidth='240px';
  const grid=document.createElement('div'); grid.className='seq-grid'; grid.id='seq-grid';
  let velView = false; // false = show pitch knobs, true = show velocity knobs
  mods.seq.steps.forEach((step,i)=>{
    const cell=document.createElement('div'); cell.className='seq-step'; cell.id=`ss${i}`;
    if(i>=8) cell.className += ' seq-extra';
    const tog=document.createElement('button'); tog.className=`step-tog${step.on?' on':''}`; tog.id=`step-tog-${i}`;
    tog.addEventListener('click',()=>{
      const wasOn=step.on;
      pushUndo({label:`step ${i+1} ${wasOn?'off':'on'}`,undo:()=>{step.on=wasOn;tog.classList.toggle('on',wasOn);}});
      step.on=!step.on;tog.classList.toggle('on',step.on);
    });
    tog.addEventListener('mouseenter',e=>showTip(TIPS['seq-step'],e)); tog.addEventListener('mousemove',moveTip); tog.addEventListener('mouseleave',hideTip);
    const kp=mkKnob({id:`seq-pitch-${i}`,label:i+1,min:-12,max:12,val:step.pitch,sz:'sm',tip:TIPS['seq-pitch'],onChange:v=>{step.pitch=Math.round(v);}});
    const kv=mkKnob({id:`seq-vel-${i}`,label:`v${i+1}`,min:0,max:1,val:step.vel??0.7,sz:'sm',tip:TIPS['seq-vel'],onChange:v=>{step.vel=v;}});
    kv.style.display='none';
    const kprob=mkKnob({id:`seq-prob-${i}`,label:'P%',min:0,max:1,val:1,sz:'sm',tip:TIPS['seq-prob'],onChange:v=>{step.prob=v;}});
    cell.appendChild(tog); cell.appendChild(kp); cell.appendChild(kv); cell.appendChild(kprob); grid.appendChild(cell);
  });
  d.appendChild(grid);
  // 16-step toggle
  const modeRow=document.createElement('div'); modeRow.className='transport'; modeRow.style.marginTop='4px';
  const stepLbl=document.createElement('span'); stepLbl.style.cssText='font-size:7px;color:var(--text-faint);letter-spacing:1px;margin-right:2px;'; stepLbl.textContent='STEPS:';
  stepLbl.addEventListener('mouseenter',e=>showTip(TIPS['seq-steps'],e)); stepLbl.addEventListener('mousemove',moveTip); stepLbl.addEventListener('mouseleave',hideTip);
  modeRow.appendChild(stepLbl);
  const syncStepCountButtons = count => {
    document.querySelectorAll('[data-stepcount]').forEach(x=>x.classList.toggle('on',Number(x.dataset.stepcount)===count));
  };
  [['8',8],['16',16]].forEach(([lbl,n])=>{
    const b=document.createElement('button'); b.className=`btn${n===8?' on':''}`; b.textContent=lbl; b.style.padding='2px 6px'; b.dataset.stepcount=n;
    b.addEventListener('mouseenter',e=>showTip(TIPS['seq-steps'],e)); b.addEventListener('mousemove',moveTip); b.addEventListener('mouseleave',hideTip);
    b.addEventListener('click',()=>{
      const prev=mods.seq.stepCount; if(prev===n) return;
      // When expanding 8→16: copy steps 0-7 into 8-15 if they are all off (default blank state)
      const snapshotSteps = mods.seq.steps.map(s=>({...s})); // snapshot for undo
      const setKnob = (id,v) => { const r=knobRefs[id]; if(r) r.setVal(v); };
      if(n===16 && mods.seq.steps.slice(8).every(s=>!s.on)){
        mods.seq.steps.slice(0,8).forEach((s,i)=>{
          mods.seq.steps[i+8].on=s.on; mods.seq.steps[i+8].pitch=s.pitch;
          const tog=document.getElementById(`step-tog-${i+8}`); if(tog) tog.classList.toggle('on',s.on);
          setKnob(`seq-pitch-${i+8}`,s.pitch);
        });
      }
      pushUndo({label:`steps ${n}`,undo:()=>{
        mods.seq.stepCount=prev; mods.seq.step=Math.min(mods.seq.step,prev-1);
        // restore step state snapshot
        snapshotSteps.forEach((s,i)=>{
          mods.seq.steps[i].on=s.on; mods.seq.steps[i].pitch=s.pitch;
          const tog=document.getElementById(`step-tog-${i}`); if(tog) tog.classList.toggle('on',s.on);
          setKnob(`seq-pitch-${i}`,s.pitch);
        });
        grid.querySelectorAll('.seq-extra').forEach(el=>el.classList.toggle('show',prev===16));
        syncStepCountButtons(prev);
      }});
      mods.seq.stepCount=n; mods.seq.step=Math.min(mods.seq.step,n-1);
      grid.querySelectorAll('.seq-extra').forEach(el=>el.classList.toggle('show',n===16));
      syncStepCountButtons(n);
    });
    modeRow.appendChild(b);
  });
  d.appendChild(modeRow);
  // Direction row
  const dirRow=document.createElement('div'); dirRow.className='transport'; dirRow.style.marginTop='4px';
  const dirLbl=document.createElement('span'); dirLbl.style.cssText='font-size:7px;color:var(--text-faint);letter-spacing:1px;margin-right:2px;'; dirLbl.textContent='DIR:';
  dirLbl.addEventListener('mouseenter',e=>showTip(TIPS['seq-dir'],e)); dirLbl.addEventListener('mousemove',moveTip); dirLbl.addEventListener('mouseleave',hideTip);
  dirRow.appendChild(dirLbl);
  [['FWD','fwd'],['REV','rev'],['P-P','pp'],['RND','rnd']].forEach(([lbl,dir])=>{
    const b=document.createElement('button'); b.className=`btn${dir==='fwd'?' on':''}`; b.textContent=lbl; b.dataset.dir=dir;
    b.style.padding='2px 5px';
    b.addEventListener('mouseenter',e=>showTip(TIPS['seq-dir'],e)); b.addEventListener('mousemove',moveTip); b.addEventListener('mouseleave',hideTip);
    b.addEventListener('click',()=>{
      const prev=mods.seq.direction; if(prev===dir) return;
      pushUndo({label:`dir ${dir}`,undo:()=>{ mods.seq.direction=prev; mods.seq.pingDir=1; dirRow.querySelectorAll('[data-dir]').forEach(x=>x.classList.toggle('on',x.dataset.dir===prev)); }});
      mods.seq.direction=dir; mods.seq.pingDir=1; dirRow.querySelectorAll('[data-dir]').forEach(x=>x.classList.remove('on')); b.classList.add('on');
    });
    dirRow.appendChild(b);
  });
  d.appendChild(dirRow);
  // VEL/PIT view toggle
  const velRow=document.createElement('div'); velRow.className='transport'; velRow.style.marginTop='4px';
  const velLbl=document.createElement('span'); velLbl.style.cssText='font-size:7px;color:var(--text-faint);letter-spacing:1px;margin-right:2px;'; velLbl.textContent='VIEW:';
  velRow.appendChild(velLbl);
  const pitBtn=document.createElement('button'); pitBtn.className='btn on'; pitBtn.textContent='PIT'; pitBtn.style.padding='2px 5px';
  const velBtn=document.createElement('button'); velBtn.className='btn'; velBtn.textContent='VEL'; velBtn.style.padding='2px 5px';
  velBtn.addEventListener('mouseenter',e=>showTip(TIPS['seq-vel'],e)); velBtn.addEventListener('mousemove',moveTip); velBtn.addEventListener('mouseleave',hideTip);
  const toggleVelView = show => {
    velView = show;
    pitBtn.classList.toggle('on', !show); velBtn.classList.toggle('on', show);
    grid.querySelectorAll('[id^="seq-pitch-"]').forEach(el=>el.style.display=show?'none':'');
    grid.querySelectorAll('[id^="seq-vel-"]').forEach(el=>el.style.display=show?'':'none');
  };
  pitBtn.addEventListener('click', ()=>toggleVelView(false));
  velBtn.addEventListener('click', ()=>toggleVelView(true));
  velRow.appendChild(pitBtn); velRow.appendChild(velBtn);
  d.appendChild(velRow);
  const tr=document.createElement('div'); tr.className='transport';
  const playBtn=document.createElement('button'); playBtn.className='btn'; playBtn.id='seq-play-btn'; playBtn.textContent='▶ PLAY';
  playBtn.addEventListener('mouseenter',e=>showTip(TIPS['seq-play'],e)); playBtn.addEventListener('mousemove',moveTip); playBtn.addEventListener('mouseleave',hideTip);
  playBtn.addEventListener('click',()=>{
    mods.seq.playing=!mods.seq.playing;
    if(mods.seq.playing){mods.seq.start();playBtn.textContent='■ STOP';playBtn.classList.add('on');}
    else{mods.seq.stop();playBtn.textContent='▶ PLAY';playBtn.classList.remove('on');}
  });
  const bpmK=mkKnob({id:'seq-bpm',label:'BPM',min:0,max:240,val:72,tip:TIPS.bpm,onChange:v=>mods.seq.setBPM(v)});
  tr.appendChild(playBtn); tr.appendChild(bpmK);
  d.appendChild(tr);
  d.appendChild(document.createElement('hr'));
  d.appendChild(mkPP('seq-vel-out','co','VEL','out'));
  const gateRow=document.createElement('div'); gateRow.style.cssText='display:flex;flex-wrap:wrap;gap:2px;margin-top:2px;';
  for(let i=0;i<8;i++){
    gateRow.appendChild(mkPP(`seq-g${i+1}`,'co',`G${i+1}`,'out'));
  }
  d.appendChild(gateRow);
  return panel('seq','SEQUENCER',d);
}

function buildLoopStation() {
  const el = document.getElementById('loopstation');
  if (!el) return;

  const header = document.createElement('div'); header.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:6px;';
  const title = document.createElement('div'); title.className = 'ls-title'; title.style.margin='0'; title.textContent = '⟳ LOOP STATION';
  const midiPadsBtn = document.createElement('button'); midiPadsBtn.className = 'ls-btn'; midiPadsBtn.textContent = 'MIDI PADS';
  midiPadsBtn.title = 'MIDI Pad mode: notes 36-39 = REC/STOP tracks 1-4 · notes 40-43 = PLAY/STOP tracks 1-4';
  const midiHint = document.createElement('span'); midiHint.style.cssText='font-size:7px;color:var(--text-dim);letter-spacing:.4px;font-family:var(--font-ui);';
  midiHint.textContent = 'pads 36-39 REC · 40-43 PLAY';
  header.appendChild(title); header.appendChild(midiPadsBtn); header.appendChild(midiHint);
  const tracksEl = document.createElement('div'); tracksEl.className = 'ls-tracks';
  el.appendChild(header); el.appendChild(tracksEl);

  const N = 4;
  const loops = Array.from({length: N}, (_, i) => ({
    i, buffer: null, playing: false, recording: false, dubbing: false,
    src: null, dubDest: null, rec: null, recChunks: [],
    gainNode: ctx.createGain(), el: null, waveEl: null, playBtn: null, recBtn: null, dubBtn: null
  }));

  // All loop gainNodes → masterOut
  loops.forEach(lp => lp.gainNode.connect(masterOut));

  // Expose for MIDI control
  mods.looper = { tracks: loops, midiMode: false };
  midiPadsBtn.addEventListener('click', () => {
    mods.looper.midiMode = !mods.looper.midiMode;
    midiPadsBtn.classList.toggle('on', mods.looper.midiMode);
    midiHint.style.color = mods.looper.midiMode ? '#ff00ff88' : '#333';
  });

  function drawLoopWave(lp) {
    const cv = lp.waveEl; if (!cv) return;
    const wc = cv.getContext('2d');
    wc.clearRect(0, 0, cv.width, cv.height);
    if (!lp.buffer) {
      wc.strokeStyle = '#ffffff11'; wc.lineWidth = 1;
      wc.beginPath(); wc.moveTo(0, 18); wc.lineTo(cv.width, 18); wc.stroke();
      return;
    }
    const data = lp.buffer.getChannelData(0);
    const step = Math.max(1, Math.ceil(data.length / cv.width));
    wc.strokeStyle = lp.playing ? '#00ffff' : '#ff00ff88';
    wc.lineWidth = 1;
    wc.shadowBlur = 3; wc.shadowColor = wc.strokeStyle;
    wc.beginPath();
    for (let x = 0; x < cv.width; x++) {
      let max = 0;
      for (let j = 0; j < step; j++) { const v = data[Math.min(x*step+j, data.length-1)]; max = Math.max(max, Math.abs(v)); }
      const h = max * 14;
      wc.moveTo(x, 18-h); wc.lineTo(x, 18+h);
    }
    wc.stroke();
  }

  function startLoop(lp) {
    if (lp.src) { try { lp.src.stop(); } catch(e){} }
    lp.src = ctx.createBufferSource();
    lp.src.buffer = lp.buffer;
    lp.src.loop = true;
    lp.src.connect(lp.gainNode);
    lp.src.start();
    lp.playing = true;
    lp.el.classList.add('has-loop');
    lp.playBtn.textContent = '■'; lp.playBtn.classList.add('on');
    drawLoopWave(lp);
  }

  function stopLoop(lp) {
    if (lp.src) { try { lp.src.stop(); } catch(e){} lp.src = null; }
    lp.playing = false;
    lp.playBtn.textContent = '▶'; lp.playBtn.classList.remove('on');
    drawLoopWave(lp);
  }

  async function finishRecording(lp) {
    return new Promise(resolve => {
      lp.rec.onstop = async () => {
        const blob = new Blob(lp.recChunks, {type:'audio/webm'});
        lp.recChunks = [];
        try {
          const ab = await blob.arrayBuffer();
          if (lp.dubbing && lp.buffer) {
            // Mix new recording onto existing buffer
            const newBuf = await ctx.decodeAudioData(ab);
            const len = Math.max(lp.buffer.length, newBuf.length);
            const mixed = ctx.createBuffer(1, len, ctx.sampleRate);
            const out = mixed.getChannelData(0);
            const a = lp.buffer.getChannelData(0);
            const b = newBuf.getChannelData(0);
            for (let i = 0; i < len; i++) out[i] = (i < a.length ? a[i] : 0) + (i < b.length ? b[i]*0.8 : 0);
            lp.buffer = mixed;
          } else {
            lp.buffer = await ctx.decodeAudioData(ab);
          }
        } catch(e) { console.warn('Loop decode failed', e); }
        resolve();
      };
      lp.rec.stop();
    });
  }

  loops.forEach(lp => {
    const track = document.createElement('div'); track.className = 'ls-track'; lp.el = track;

    const num = document.createElement('div'); num.className = 'ls-track-num'; num.textContent = lp.i+1;

    const wave = document.createElement('canvas'); wave.className = 'ls-wave'; wave.height = 36;
    lp.waveEl = wave;
    // Set width after DOM insertion; use ResizeObserver workaround
    requestAnimationFrame(() => { wave.width = wave.clientWidth || 120; drawLoopWave(lp); });

    const btns = document.createElement('div'); btns.className = 'ls-btns';
    const row1 = document.createElement('div'); row1.className = 'ls-btns-row';
    const row2 = document.createElement('div'); row2.className = 'ls-btns-row';

    const recBtn = document.createElement('button'); recBtn.className = 'ls-btn rec'; recBtn.textContent = '● REC'; recBtn.title=`MIDI pad ${36+lp.i}`; lp.recBtn = recBtn;
    const playBtn = document.createElement('button'); playBtn.className = 'ls-btn play'; playBtn.textContent = '▶'; playBtn.title=`MIDI pad ${40+lp.i}`; lp.playBtn = playBtn;
    const dubBtn = document.createElement('button'); dubBtn.className = 'ls-btn dub'; dubBtn.textContent = 'DUB'; lp.dubBtn = dubBtn;
    const clrBtn = document.createElement('button'); clrBtn.className = 'ls-btn'; clrBtn.textContent = 'CLR';

    // Level knob (small)
    const lvlWrap = mkKnob({label:'LVL',min:0,max:1.5,val:0.85,sz:'sm',
      onChange: v => lp.gainNode.gain.setTargetAtTime(v, ctx.currentTime, 0.02)});

    const revBtn = document.createElement('button'); revBtn.className = 'ls-btn'; revBtn.textContent = 'REV';
    revBtn.title = 'Reverse loop buffer in place';
    revBtn.addEventListener('click', () => {
      if (!lp.buffer) return;
      const rev = ctx.createBuffer(lp.buffer.numberOfChannels, lp.buffer.length, lp.buffer.sampleRate);
      for (let c = 0; c < lp.buffer.numberOfChannels; c++) {
        rev.copyToChannel(Float32Array.from(lp.buffer.getChannelData(c)).reverse(), c);
      }
      lp.buffer = rev;
      if (lp.playing) startLoop(lp);
      drawLoopWave(lp);
    });

    const expBtn = document.createElement('button'); expBtn.className = 'ls-btn'; expBtn.textContent = 'WAV';
    expBtn.title = 'Export loop as WAV file';
    expBtn.addEventListener('click', async () => {
      if (!lp.buffer) return;
      const wav = audioBufferToWav(lp.buffer);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([wav], {type:'audio/wav'}));
      a.download = `loop-${lp.i+1}-${Date.now()}.wav`; a.click();
    });

    row1.appendChild(recBtn); row1.appendChild(playBtn);
    row2.appendChild(dubBtn); row2.appendChild(clrBtn); row2.appendChild(revBtn); row2.appendChild(expBtn);
    btns.appendChild(row1); btns.appendChild(row2);
    track.appendChild(num); track.appendChild(wave); track.appendChild(btns); track.appendChild(lvlWrap);
    tracksEl.appendChild(track);

    // REC: arm → recording → finish → auto-play
    recBtn.addEventListener('click', async () => {
      if (lp.recording) {
        // Stop recording
        lp.recording = false;
        track.classList.remove('recording', 'armed');
        recBtn.textContent = '● REC'; recBtn.classList.remove('on');
        await finishRecording(lp);
        lp.dubbing = false; lp.dubBtn.classList.remove('on');
        startLoop(lp);
      } else {
        // Start recording
        lp.recording = true; lp.recChunks = [];
        track.classList.add('recording');
        recBtn.textContent = '■ STOP'; recBtn.classList.add('on');

        const dest = ctx.createMediaStreamDestination();
        masterOut.connect(dest);
        lp.rec = new MediaRecorder(dest.stream, {mimeType: 'audio/webm;codecs=opus'});
        lp.rec.ondataavailable = e => { if(e.data.size > 0) lp.recChunks.push(e.data); };
        lp.rec.start(100);
        if (lp.playing) stopLoop(lp); // stop old loop while recording new
      }
    });

    playBtn.addEventListener('click', () => {
      if (!lp.buffer) return;
      lp.playing ? stopLoop(lp) : startLoop(lp);
    });

    dubBtn.addEventListener('click', () => {
      if (!lp.buffer) return;
      lp.dubbing = !lp.dubbing;
      dubBtn.classList.toggle('on', lp.dubbing);
    });

    clrBtn.addEventListener('click', () => {
      stopLoop(lp);
      lp.buffer = null;
      track.classList.remove('has-loop');
      drawLoopWave(lp);
    });

    drawLoopWave(lp);
  });
}

function startScope() {
  const cv=document.getElementById('scope-cv');
  if(!cv) return;
  const c=cv.getContext('2d');
  const W=cv.width, H=cv.height;
  const buf=new Float32Array(analyserNode.frequencyBinCount);
  // Pre-render static grid once to an offscreen canvas — blitted each frame instead of
  // redrawing 12 separate stroke calls per frame.
  const gridCv=document.createElement('canvas'); gridCv.width=W; gridCv.height=H;
  const gc=gridCv.getContext('2d');
  gc.strokeStyle='rgba(255,0,255,.07)'; gc.lineWidth=.5;
  for(let x=0;x<W;x+=W/8){gc.beginPath();gc.moveTo(x,0);gc.lineTo(x,H);gc.stroke();}
  for(let y=0;y<H;y+=H/4){gc.beginPath();gc.moveTo(0,y);gc.lineTo(W,y);gc.stroke();}
  registerDraw(function _scopeDraw() {
    analyserNode.getFloatTimeDomainData(buf);
    c.fillStyle='#04040e'; c.fillRect(0,0,W,H);
    c.drawImage(gridCv,0,0);
    // waveform — two-pass bloom without shadowBlur (shadowBlur disables GPU compositing)
    c.strokeStyle='#ff00ff'; c.lineWidth=1.5;
    c.beginPath();
    for(let i=0;i<buf.length;i++){
      const x=i*(W/buf.length), y=(1-buf[i])*H/2;
      i===0?c.moveTo(x,y):c.lineTo(x,y);
    }
    c.stroke();
    c.globalAlpha=0.18; c.lineWidth=4;
    c.beginPath();
    for(let i=0;i<buf.length;i+=2){
      const x=i*(W/buf.length), y=(1-buf[i])*H/2;
      i===0?c.moveTo(x,y):c.lineTo(x,y);
    }
    c.stroke(); c.globalAlpha=1;
  });
}

function startLFOPreview(canvasId, getMod) {
  const cv=document.getElementById(canvasId);
  if(!cv) return;
  const c=cv.getContext('2d');
  let ph=0;
  registerDraw(function _lfoDraw() {
    const W=cv.width,H=cv.height;
    c.fillStyle='#04040e'; c.fillRect(0,0,W,H);
    c.strokeStyle='#00ffff'; c.lineWidth=1.2;
    c.beginPath();
    const m=getMod();
    for(let x=0;x<W;x++){
      const t=(x/W)*4*Math.PI+ph;
      let y;
      switch(m?.type){
        case 'triangle': y=Math.asin(Math.sin(t))*2/Math.PI; break;
        case 'square':   y=Math.sin(t)>=0?1:-1; break;
        default:         y=Math.sin(t);
      }
      const py=(1-y)*H/2;
      x===0?c.moveTo(x,py):c.lineTo(x,py);
    }
    c.stroke();
    ph+=0.04;
  });
}

function drawEnv() {
  const cv=document.getElementById('adsr-cv');
  if(!cv) return;
  const c=cv.getContext('2d');
  const W=cv.width,H=cv.height;
  const {A,D,S,R}=mods.adsr;
  c.fillStyle='#04040e'; c.fillRect(0,0,W,H);
  const hold=.2, total=A+D+hold+R;
  const tx=v=>4+(v/total)*(W-8);
  c.strokeStyle='#ffff00'; c.lineWidth=1.3;
  c.beginPath();
  c.moveTo(4,H-4);
  c.lineTo(tx(A),4);
  c.lineTo(tx(A+D), 4+(1-S)*(H-8));
  c.lineTo(tx(A+D+hold), 4+(1-S)*(H-8));
  c.lineTo(tx(A+D+hold+R),H-4);
  c.stroke();
}

function startVCFPreview() {
  const cv=document.getElementById('vcf-cv');
  if(!cv) return;
  const c=cv.getContext('2d'), W=cv.width, H=cv.height;
  // Pre-allocate frequency response arrays — was allocating new Float32Array(W) every frame
  const freqs=new Float32Array(W);
  for(let i=0;i<W;i++) freqs[i]=20*Math.pow(1000,i/W);
  const mag=new Float32Array(W), ph=new Float32Array(W);
  registerDraw(function _vcfDraw() {
    if(!mods.vcf) return;
    c.fillStyle='#04040e'; c.fillRect(0,0,W,H);
    mods.vcf.displayFilt.getFrequencyResponse(freqs,mag,ph);
    c.strokeStyle='#00ff88'; c.lineWidth=1.3;
    c.beginPath();
    for(let i=0;i<W;i++){
      const db=20*Math.log10(Math.max(mag[i],1e-6));
      const y=H/2-(db/40)*H;
      i===0?c.moveTo(i,Math.min(H,Math.max(0,y))):c.lineTo(i,Math.min(H,Math.max(0,y)));
    }
    c.stroke();
  });
}

// RECORDING — captures raw PCM and encodes as 32-bit float stereo WAV
// ═══════════════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════════════
// SESSION LOGGER
// Records patch events alongside WAV recording.
// Format: nm2-session-log v1  — JSON (replayable) + Markdown (human notes)
// ═══════════════════════════════════════════════════════════════════════════════
let _sessionLog      = null;  // null = off; [] = recording
let _sessionStart    = 0;
let _sessionSuppress = false; // silence log during batch ops (preset load)

function logEvent(op, data) {
  if (!_sessionLog || _sessionSuppress) return;
  _sessionLog.push({ t: Date.now() - _sessionStart, op, ...data });
}

function _fmtT(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

function _exportSessionLog() {
  if (!_sessionLog || !_sessionLog.length) return;
  const events  = _sessionLog;
  const durMs   = events[events.length - 1]?.t ?? 0;
  const recDate = new Date(_sessionStart);
  const stem    = `nm2-session-${recDate.toISOString().slice(0,19).replace(/[T:]/g,'-')}`;

  // ── JSON (machine-replayable) ──────────────────────────────────────────────
  const payload = { format:'nm2-session-log', version:1,
    recorded: recDate.toISOString(), duration_ms: durMs, events };
  const jBlob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
  const ja = document.createElement('a');
  ja.href = URL.createObjectURL(jBlob); ja.download = stem + '.json'; ja.click();
  URL.revokeObjectURL(ja.href);

  // ── Markdown (human-readable study notes) ─────────────────────────────────
  const ICON = { cable_add:'+ cable', cable_remove:'- cable',
                 knob:'~ knob', mode:'* mode', preset_load:'★ preset' };
  const lines = events.map(e => {
    let d = '';
    if (e.op === 'cable_add'   ) d = `${e.from} → ${e.to}`;
    if (e.op === 'cable_remove') d = `${e.from} → ${e.to}`;
    if (e.op === 'knob'        ) d = `${e.label}  ${e.from != null ? Number(e.from).toFixed(2)+' → ':''
                                      }${Number(e.v).toFixed(2)}`;
    if (e.op === 'mode'        ) d = `${e.param}  →  ${e.v}`;
    if (e.op === 'preset_load' ) d = e.name || '';
    return `${_fmtT(e.t).padEnd(6)} ${(ICON[e.op] || e.op).padEnd(15)} ${d}`;
  }).join('\n');
  const md = `# nm² Session Log\n**Recorded:** ${recDate.toLocaleString()
    }  |  **Duration:** ${_fmtT(durMs)}\n\n\`\`\`\n${lines}\n\`\`\`\n`;
  const mBlob = new Blob([md], { type:'text/markdown' });
  const ma = document.createElement('a');
  ma.href = URL.createObjectURL(mBlob); ma.download = stem + '.md'; ma.click();
  URL.revokeObjectURL(ma.href);
}

function startRec() {
  // MediaRecorder tap on masterOut — runs entirely off the main thread.
  // Prefer audio/wav (Chrome 130+, lossless) then audio/webm (universal).
  recStreamDest = ctx.createMediaStreamDestination();
  masterOut.connect(recStreamDest);
  const wavOk  = typeof MediaRecorder !== 'undefined' && MediaRecorder.isTypeSupported('audio/wav');
  const webmOk = typeof MediaRecorder !== 'undefined' && MediaRecorder.isTypeSupported('audio/webm;codecs=opus');
  const mime   = wavOk ? 'audio/wav' : webmOk ? 'audio/webm;codecs=opus' : '';
  const chunks = [];
  recMediaRecorder = new MediaRecorder(recStreamDest.stream, mime ? { mimeType: mime } : {});
  recMediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
  recMediaRecorder.onstop = () => {
    masterOut.disconnect(recStreamDest);
    recStreamDest = null;
    const actualMime = recMediaRecorder ? recMediaRecorder.mimeType : mime;
    const ext  = actualMime.includes('wav') ? 'wav' : 'webm';
    const blob = new Blob(chunks, { type: actualMime || 'audio/webm' });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = `nm2-modsynth-${Date.now()}.${ext}`;
    a.click();
    URL.revokeObjectURL(a.href);
    _exportSessionLog(); _sessionLog = null;
    setStatus(`Recording saved as ${ext.toUpperCase()} + session log ✓`);
  };
  recMediaRecorder.start(250); // 250ms timeslices
  isRec = true;
  _sessionLog = []; _sessionStart = Date.now();
  setStatus('⏺ RECORDING...');
}
function stopRec() {
  if (!recMediaRecorder || !isRec) return;
  isRec = false;
  recMediaRecorder.stop(); // flushes final chunk, triggers onstop for download
  recMediaRecorder = null;
}

const tipEl=document.getElementById('tip');
function showTip(t,e,hint){
  if(hint){
    tipEl.innerHTML='<span class="tip-hint">'+hint+'</span>';
    tipEl.appendChild(document.createTextNode(t));
  } else {
    tipEl.textContent=t;
  }
  tipEl.style.display='block';moveTip(e);
}
function moveTip(e){tipEl.style.left=(e.clientX+14)+'px';tipEl.style.top=(e.clientY-36)+'px';}
function hideTip(){tipEl.style.display='none';}

function setStatus(msg){
  document.getElementById('status').textContent=msg||'nm² modsynth v1.0.1';
  if(nm2Mobile?.active){
    const el=document.getElementById('m-patch-name');
    if(el&&msg){el.textContent=msg;clearTimeout(nm2Mobile._statusTimer);nm2Mobile._statusTimer=setTimeout(()=>{el.textContent=nm2Mobile.patchName;},3000);}

}

// WEB MIDI
// ═══════════════════════════════════════════════════════════════════════════════
function initMIDI() {
  if (!navigator.requestMIDIAccess) { setStatus('Web MIDI not supported — try Chrome or Edge.'); return; }
  navigator.requestMIDIAccess({sysex:false}).then(access => {
    function connect() {
      const inputs = Array.from(access.inputs.values());
      if (midiIn) midiIn.onmidimessage = null;
      const ind = document.getElementById('midi-ind');
      if (inputs.length) {
        midiIn = inputs[0];
        midiIn.onmidimessage = handleMIDI;
        ind.textContent = midiIn.name.substring(0,18);
        ind.classList.add('on');
        setStatus('MIDI: ' + midiIn.name);
      } else {
        midiIn = null;
        ind.textContent = 'NO MIDI';
        ind.classList.remove('on');
      }
    }
    connect();
    access.onstatechange = connect;
  }).catch(() => setStatus('MIDI access denied — check browser permissions.'));
}

let midiClockEnabled = false, midiPulseCount = 0;

function handleMIDI(ev) {
  if (!ctx) return;
  const [st, d1, d2] = ev.data;
  // System realtime — handle before channel-stripping
  if (st === 0xF8) { // timing clock
    if (midiClockEnabled && mods.seq?.playing) {
      midiPulseCount++;
      if (midiPulseCount >= 12) { midiPulseCount = 0; mods.seq.fireTick(); }
    }
    return;
  }
  if (st === 0xFA || st === 0xFB) { // start / continue
    if (midiClockEnabled && mods.seq && !mods.seq.playing) {
      mods.seq.playing = true; midiPulseCount = 0;
      document.querySelector('#seq [data-play]')?.classList.add('on');
    }
    return;
  }
  if (st === 0xFC) { // stop
    if (midiClockEnabled && mods.seq) { mods.seq.playing = false; mods.adsr?.off(); }
    return;
  }
  const type = st & 0xF0;
  if (type === 0x90 && d2 > 0) {
    // Pad sampler — always active on notes 48-55
    if (d1 >= 48 && d1 <= 55) { mods.padsampler?.trigger(d1 - 48); return; }
    // MIDI looper pad control (notes 36-43 when MIDI PADS mode is active)
    if (mods.looper?.midiMode) {
      if (d1 >= 36 && d1 <= 39) { mods.looper.tracks[d1 - 36]?.recBtn.click(); return; }
      if (d1 >= 40 && d1 <= 43) { mods.looper.tracks[d1 - 40]?.playBtn.click(); return; }
    }
    let pitch = d1 - 69;
    if (mods.quant?.active) pitch = mods.quant.quantizeSemi(pitch);
    mods.vco?.setPitchCV(pitch);
    mods.vco2?.setPitchCV(pitch);
    mods.vcf?.trackNote(pitch);
    mods.ladder?.trackNote(pitch);
    mods.res?.trackNote(pitch);
    mods.chord?.trigger(pitch);
    mods.adsr?.on(d2 / 127);
  } else if (type === 0x80 || (type === 0x90 && d2 === 0)) {
    mods.adsr?.off();
  } else if (type === 0xB0) {
    const v = d2 / 127;
    const sk = (id, val) => { if(knobRefs[id]) knobRefs[id].setVal(val); };
    if (d1===1||d1===74) { const c=20*Math.pow(1000,v); mods.vcf?.setCutoff(c); sk('vcf-cutoff',c); }
    if (d1===71)         { const r=0.1+v*24.9; mods.vcf?.setRes(r); sk('vcf-res',r); }
    if (d1===73)         { if(mods.adsr){ mods.adsr.A=0.001+v*3.999; drawEnv(); sk('adsr-A',mods.adsr.A); } }
    if (d1===72)         { if(mods.adsr){ mods.adsr.R=0.01+v*5.99;  drawEnv(); sk('adsr-R',mods.adsr.R); } }
    if (d1===7)          { if(masterOut) masterOut.gain.setTargetAtTime(0.1+v*1.4, ctx.currentTime, 0.01); }
    if (d1===64)         { v>=0.5 ? mods.adsr?.on() : mods.adsr?.off(); }
  }
}

function getPresets() { try { return JSON.parse(localStorage.getItem(PRESET_KEY))||[]; } catch { return []; } }
function savePresets(arr) { localStorage.setItem(PRESET_KEY, JSON.stringify(arr)); }
function cloneData(v) { return v == null ? v : JSON.parse(JSON.stringify(v)); }
function getSceneSnapshot() { return scenes.map(s => s ? cloneData(s) : null); }
function applySceneSet(sceneSet, persist=true) {
  [0,1,2,3].forEach(i => { scenes[i] = sceneSet?.[i] ? cloneData(sceneSet[i]) : null; });
  if (persist) saveScenesToStorage();
  updateSceneButtons();
}

let currentTrackScript = '';
let currentTrackSteps = [];
let trackRunId = 0;
let trackPlaying = false;

function parseTrackScript(script) {
  const src = (script || '').trim();
  if (!src) return [];
  return src.split(/>|,|\n/).map(s => s.trim()).filter(Boolean).map(tok => {
    const m = tok.match(/^([ABCD])\s*(\d+)?$/i);
    if (!m) throw new Error(`Invalid track step "${tok}"`);
    return { sceneIdx: 'ABCD'.indexOf(m[1].toUpperCase()), bars: Math.max(1, Number(m[2] || 8)) };
  });
}
function setTrackScript(script, silent=false) {
  currentTrackScript = (script || '').trim();
  currentTrackSteps = currentTrackScript ? parseTrackScript(currentTrackScript) : [];
  const btn = document.getElementById('track-edit-btn');
  if (btn) btn.classList.toggle('on', !!currentTrackSteps.length);
  if (!silent) setStatus(currentTrackSteps.length ? `Track ready: ${currentTrackScript}` : 'Track cleared');
}
function barsToMs(bars) { return bars * 4 * (60000 / (mods.seq?.bpm || 120)); }
function stopTrackPlayback(msg='Track stopped') {
  trackRunId++;
  trackPlaying = false;
  const btn = document.getElementById('track-play-btn');
  if (btn) { btn.textContent = '▶ PLAY TRACK'; btn.classList.remove('on'); }
  if (morphing) stopMorph();
  setStatus(msg);
}
function playCurrentTrack() {
  if (!ctx) { setStatus('Power on first.'); return; }
  if (!currentTrackSteps.length) { setStatus('No track script set. Click TRACK first.'); return; }
  const first = currentTrackSteps[0];
  if (first.sceneIdx < 0 || !scenes[first.sceneIdx]) { setStatus(`Scene ${'ABCD'[first.sceneIdx] || '?'} is empty.`); return; }
  stopTrackPlayback('Track queued');
  trackPlaying = true;
  const runId = ++trackRunId;
  const btn = document.getElementById('track-play-btn');
  if (btn) { btn.textContent = '■ STOP TRACK'; btn.classList.add('on'); }
  applyConfig(scenes[first.sceneIdx]);
  if (!mods.seq.playing) {
    mods.seq.playing = true;
    mods.seq.start();
    const pb = document.getElementById('seq-play-btn');
    if (pb) { pb.textContent = '■ STOP'; pb.classList.add('on'); }
  }
  setStatus(`Track start: ${'ABCD'[first.sceneIdx]} for ${first.bars} bar${first.bars===1?'':'s'}`);
  const scheduleNext = (idx) => {
    if (trackRunId !== runId || !trackPlaying) return;
    if (idx >= currentTrackSteps.length) { stopTrackPlayback(`Track finished: ${currentTrackScript}`); return; }
    const step = currentTrackSteps[idx];
    if (!scenes[step.sceneIdx]) { stopTrackPlayback(`Track stopped: Scene ${'ABCD'[step.sceneIdx]} is empty.`); return; }
    if (idx === 0) {
      setTimeout(() => {
        if (trackRunId !== runId || !trackPlaying) return;
        if (currentTrackSteps.length === 1) { stopTrackPlayback(`Track finished: ${currentTrackScript}`); return; }
        scheduleNext(1);
      }, barsToMs(step.bars));
      return;
    }
    morphBarsN = step.bars;
    document.querySelectorAll('.morph-bar-btn').forEach(b => b.classList.toggle('on', Number(b.dataset.bars) === step.bars));
    startMorph(step.sceneIdx);
    setStatus(`Track morph: ${'ABCD'[step.sceneIdx]} over ${step.bars} bar${step.bars===1?'':'s'}`);
    setTimeout(() => {
      if (trackRunId !== runId || !trackPlaying) return;
      if (idx === currentTrackSteps.length - 1) {
        setTimeout(() => {
          if (trackRunId !== runId || !trackPlaying) return;
          stopTrackPlayback(`Track finished: ${currentTrackScript}`);
        }, barsToMs(step.bars));
      } else {
        scheduleNext(idx + 1);
      }
    }, barsToMs(step.bars));
  };
  scheduleNext(0);
}

function refreshPresetDropdown() {
  const sel = document.getElementById('preset-sel');
  if(!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">— select preset —</option>';
  getPresets().forEach(p => {
    const o = document.createElement('option');
    o.value = p.name; o.textContent = p.name;
    sel.appendChild(o);
  });
  if(cur) sel.value = cur;
}

function savePreset() {
  const name = prompt('Preset name:', 'My Patch');
  if(!name || !name.trim()) return;
  const n = name.trim();
  const arr = getPresets();
  const idx = arr.findIndex(p => p.name === n);
  const notes = document.getElementById('notes-area')?.value || '';
  const entry = { name:n, config:getConfig(), notes, scenes:getSceneSnapshot(), trackScript:currentTrackScript };
  if(idx>=0) arr[idx]=entry; else arr.push(entry);
  savePresets(arr);
  refreshPresetDropdown();
  document.getElementById('preset-sel').value = n;
  setStatus(`Preset "${n}" saved ✓`);
}

function loadPreset() {
  const name = document.getElementById('preset-sel').value;
  if(!name) { setStatus('Select a preset first.'); return; }
  const p = getPresets().find(p=>p.name===name);
  if(p) {
    applyPatchHints([]);
    _sessionSuppress=true;
    applyConfig(p.config);
    if (p.scenes) applySceneSet(p.scenes);
    if (p.trackScript !== undefined) setTrackScript(p.trackScript, true);
    const el=document.getElementById('notes-area'); if(el) el.value=p.notes||'';
    setStatus(`Preset "${name}" loaded ✓`);
    setTimeout(()=>{ _sessionSuppress=false; logEvent('preset_load',{name}); },150);
  }
}

function deletePreset() {
  const name = document.getElementById('preset-sel').value;
  if(!name) { setStatus('Select a preset to delete.'); return; }
  if(!confirm(`Delete preset "${name}"?`)) return;
  savePresets(getPresets().filter(p=>p.name!==name));
  refreshPresetDropdown();
  setStatus(`Preset "${name}" deleted`);
}

function exportPresets() {
  let arr = getPresets();
  if(!arr.length) {
    if(!ctx) { setStatus('Power on first, then save a preset to export.'); return; }
    const name = prompt('No presets saved yet.\n\nSave current patch before exporting:', 'My Patch');
    if(!name?.trim()) { setStatus('Export cancelled.'); return; }
    const n = name.trim();
    const notes = document.getElementById('notes-area')?.value || '';
    const entry = { name:n, config:getConfig(), notes, scenes:getSceneSnapshot(), trackScript:currentTrackScript };
    arr.push(entry);
    savePresets(arr);
    refreshPresetDropdown();
    setStatus(`"${n}" saved ✓`);
  }
  const blob = new Blob([JSON.stringify(arr,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `nm2-modsynth-presets-${Date.now()}.json`;
  a.click();
  setStatus(`${arr.length} preset(s) exported ✓`);
}

function applyPatchHints(hints) {
  document.querySelectorAll('.hint-pulse').forEach(el => el.classList.remove('hint-pulse'));
  if (!hints?.length) return;
  hints.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('hint-pulse');
    el.addEventListener('click', () => el.classList.remove('hint-pulse'), { once: true });
  });
}
