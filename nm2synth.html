<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nm² modsynth — Modular Synthesizer</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<script>
  (() => {
    const saved = localStorage.getItem('nm2-theme');
    if (saved === 'light' || saved === 'dark') {
      document.documentElement.dataset.theme = saved;
    } else {
      document.documentElement.dataset.theme = 'light';
    }
  })();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{overflow-y:scroll;}
body{
  background:
    radial-gradient(circle at top left, var(--bg-glow-a), transparent 34%),
    radial-gradient(circle at top right, var(--bg-glow-b), transparent 30%),
    linear-gradient(180deg,var(--bg-page) 0%,var(--bg-page-2) 100%);
  font-family:var(--font-ui);
  color:var(--text-main);
  min-height:100vh;
  overflow-x:auto;
  padding-bottom:100px;
  transition:background .3s ease,color .2s ease;
}

/* ── Font-size scale (override with body.a11y-large) ── */
:root{
  color-scheme:dark;
  --font-ui:"Space Grotesk","Segoe UI",system-ui,sans-serif;
  --font-mono:"JetBrains Mono","SFMono-Regular","Cascadia Mono","Consolas",monospace;
  --fs-xs:10px;  /* knob labels, patch rows, micro labels */
  --fs-sm:11px;  /* loop btns, oct btns, toolbar labels  */
  --fs-md:12px;  /* main btns, module labels, wave btns  */
  --fs-lg:14px;  /* toolbar btns, picker title           */
  --ls-mod:3px;  /* module-label letter-spacing          */
  --bg-page:#060610;
  --bg-page-2:#090916;
  --bg-glow-a:rgba(224,102,255,.16);
  --bg-glow-b:rgba(0,255,255,.11);
  --bg-start:#060610;
  --bg-rack:#0a0a18;
  --bg-panel:#0d0d22;
  --bg-panel-2:#080815;
  --bg-panel-3:#0a0a1e;
  --bg-panel-4:#04040e;
  --bg-panel-5:#07071a;
  --bg-panel-6:#050510;
  --bg-panel-7:#0f0f22;
  --bg-panel-hover:#11142b;
  --bg-button-active:rgba(255,0,255,.13);
  --bg-button-active-alt:rgba(0,255,255,.13);
  --bg-toolbar:#04040e;
  --bg-overlay:rgba(2,2,10,.8);
  --bg-input:#0a0a1b;
  --bg-flow:#040410;
  --bg-track:#080818;
  --bg-wave:#020208;
  --bg-pad:#0a0a1c;
  --bg-pad-active:rgba(255,0,255,.16);
  --border-strong:#444;
  --border-main:#333;
  --border-soft:rgba(255,0,255,.13);
  --border-cyan-soft:rgba(0,255,255,.2);
  --border-bright:rgba(255,0,255,.4);
  --text-main:#f4f2ff;
  --text-strong:#ffffff;
  --text-soft:#d1caef;
  --text-muted:#a49fbc;
  --text-dim:#716b89;
  --text-faint:#4e4964;
  --accent:#ff00ff;
  --accent-soft:#e066ff;
  --accent-cyan:#00ffff;
  --accent-warm:#ffaa00;
  --accent-success:#00ff66;
  --accent-danger:#ff4444;
  --accent-danger-2:#ff6666;
  --accent-blue:#00aaff;
  --accent-yellow:#ffee00;
  --shadow-accent:rgba(255,0,255,.27);
  --shadow-cyan:rgba(0,255,255,.24);
  --shadow-panel:rgba(0,0,0,.6);
  --shadow-inset:rgba(0,0,0,.4);
}
html[data-theme="light"]{
  color-scheme:light;
  --bg-page:#f7fbff;
  --bg-page-2:#edf4ff;
  --bg-glow-a:rgba(255,35,186,.16);
  --bg-glow-b:rgba(0,175,255,.14);
  --bg-start:#f8fcff;
  --bg-rack:rgba(255,255,255,.84);
  --bg-panel:#ffffff;
  --bg-panel-2:#f2f6ff;
  --bg-panel-3:#fbfdff;
  --bg-panel-4:#ffffff;
  --bg-panel-5:#eef5ff;
  --bg-panel-6:#f7faff;
  --bg-panel-7:#f3f7ff;
  --bg-panel-hover:#eaf2ff;
  --bg-button-active:rgba(255,31,191,.1);
  --bg-button-active-alt:rgba(0,174,255,.1);
  --bg-toolbar:rgba(255,255,255,.92);
  --bg-overlay:rgba(233,241,255,.78);
  --bg-input:#f4f8ff;
  --bg-flow:#ffffff;
  --bg-track:#ffffff;
  --bg-wave:#eef5ff;
  --bg-pad:#f7faff;
  --bg-pad-active:rgba(255,31,191,.12);
  --border-strong:#8e97ba;
  --border-main:#b8c3ea;
  --border-soft:rgba(255,31,191,.18);
  --border-cyan-soft:rgba(0,174,255,.24);
  --border-bright:rgba(255,31,191,.42);
  --text-main:#131522;
  --text-strong:#070811;
  --text-soft:#2a2f49;
  --text-muted:#4a5275;
  --text-dim:#687096;
  --text-faint:#7d85aa;
  --accent:#ff1fbf;
  --accent-soft:#ff4fd0;
  --accent-cyan:#008dff;
  --accent-warm:#ff9f1a;
  --accent-success:#00b85c;
  --accent-danger:#ff305f;
  --accent-danger-2:#ff4c73;
  --accent-blue:#0098ff;
  --accent-yellow:#c9a300;
  --shadow-accent:rgba(255,31,191,.22);
  --shadow-cyan:rgba(0,141,255,.2);
  --shadow-panel:rgba(62,88,149,.16);
  --shadow-inset:rgba(255,255,255,.5);
}
body.a11y-large{
  --fs-xs:12px; --fs-sm:14px; --fs-md:16px; --fs-lg:18px; --ls-mod:2px;
}
/* Catch inline hardcoded font sizes globally and map to the scale */
[style*="font-size:5px"],[style*="font-size: 5px"]{font-size:8px !important;}
[style*="font-size:6px"],[style*="font-size: 6px"]{font-size:9px !important;}
[style*="font-size:7px"],[style*="font-size: 7px"]{font-size:var(--fs-xs) !important;}
[style*="font-size:8px"],[style*="font-size: 8px"]{font-size:var(--fs-xs) !important;}
[style*="font-size:9px"],[style*="font-size: 9px"]{font-size:var(--fs-sm) !important;}

/* ── Start Screen ── */
#start{position:fixed;inset:0;background:linear-gradient(180deg,var(--bg-start),var(--bg-page-2));display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;cursor:pointer;gap:24px;}
#start p{color:var(--accent-cyan);letter-spacing:6px;font-size:14px;text-shadow:0 0 10px color-mix(in srgb,var(--accent-cyan) 35%, transparent);animation:blink-slow 2s infinite;}
#logo-svg{filter:drop-shadow(0 0 24px color-mix(in srgb,var(--accent-soft) 30%, transparent)); animation: jitter 0.2s infinite;}
#logo-svg .logo-frame{fill:color-mix(in srgb,var(--bg-panel) 86%, white 14%);stroke:color-mix(in srgb,var(--accent-soft) 36%, var(--border-main));stroke-width:1.4;}
#logo-svg .logo-frame-inner{fill:none;stroke:color-mix(in srgb,var(--accent-cyan) 16%, var(--border-main));stroke-width:1;}
#logo-svg .logo-grid{stroke:color-mix(in srgb,var(--accent-cyan) 18%, transparent);stroke-width:.8;}
#logo-svg .logo-wave-a{stroke:color-mix(in srgb,var(--accent-soft) 44%, transparent);stroke-width:1.5;fill:none;}
#logo-svg .logo-wave-b{stroke:color-mix(in srgb,var(--accent-cyan) 28%, transparent);stroke-width:1;fill:none;}
#logo-svg .logo-rail{stroke:color-mix(in srgb,var(--accent-soft) 72%, transparent);stroke-width:2;fill:none;stroke-linecap:round;}
#logo-svg .logo-wordmark-shadow{fill:color-mix(in srgb,var(--bg-page) 65%, black 35%);}
#logo-svg .logo-wordmark-main{fill:var(--text-strong);stroke:color-mix(in srgb,var(--accent-soft) 60%, transparent);stroke-width:1.2;paint-order:stroke fill;filter:url(#lf-pink);}
#logo-svg .logo-wordmark-glow{fill:none;stroke:color-mix(in srgb,var(--accent-soft) 68%, white 32%);stroke-width:2;opacity:.9;filter:url(#lf-pink);}
#logo-svg .logo-sub{fill:var(--accent-cyan);font-family:var(--font-mono);letter-spacing:18px;filter:url(#lf-cyan);}
#logo-svg .logo-meta{fill:color-mix(in srgb,var(--accent-warm) 72%, var(--text-main));font-family:var(--font-mono);letter-spacing:4px;opacity:.82;filter:url(#lf-gold);}
#logo-svg .logo-dot{fill:var(--accent);}
#logo-svg .logo-dot.alt{fill:var(--accent-cyan);}
@keyframes jitter{
  0%,100%{transform:translate(0,0);}
  25%{transform:translate(-0.3px, 0.3px);}
  50%{transform:translate(0.3px, -0.3px);}
  75%{transform:translate(-0.3px, -0.3px);}
}
@keyframes flicker{0%,96%,98%,100%{opacity:1;}97%{opacity:.55;}99%{opacity:.8;}}
@keyframes tube-flicker{0%,94%,96%,100%{opacity:1;}95%{opacity:.3;}98%{opacity:.9;}}
@keyframes blink-slow{0%,49%{opacity:1;}50%,100%{opacity:.3;}}

/* ── Layout ── */
#rack-wrap{padding:16px 16px 0;}
#rack-title{text-align:center;font-size:20px;letter-spacing:12px;color:var(--accent-soft);text-shadow:0 0 20px color-mix(in srgb,var(--accent-soft) 30%, transparent);padding:8px 0 12px;}
#rack{display:flex;flex-wrap:wrap;gap:16px;padding:18px;background:var(--bg-rack);border:1px solid var(--border-soft);border-radius:6px;box-shadow:0 0 40px color-mix(in srgb,var(--accent) 8%, transparent),inset 0 0 60px var(--shadow-inset);}

/* ── Rack group dividers ── */
.rack-group{flex:1 0 100%;display:flex;align-items:center;gap:10px;padding:6px 2px 0;pointer-events:none;user-select:none;margin-bottom:-4px;}
.rack-group::before,.rack-group::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--border-soft),transparent);}
.rack-group span{font-size:var(--fs-xs);letter-spacing:3px;color:color-mix(in srgb,var(--accent-soft) 45%, transparent);font-family:var(--font-mono);white-space:nowrap;}

/* ── Module panel ── */
.module{background:linear-gradient(160deg,var(--bg-panel),var(--bg-panel-2));border:1px solid var(--border-main);border-radius:4px;padding:16px 14px 14px;position:relative;min-width:140px;box-shadow:0 0 12px var(--shadow-panel);}
.module:hover{border-color:var(--border-bright);}
.module-label{text-align:center;font-size:var(--fs-md);font-weight:bold;letter-spacing:var(--ls-mod);color:var(--accent-soft);text-shadow:0 0 8px color-mix(in srgb,var(--accent-soft) 28%, transparent);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border-soft);}
.module.bypassed{opacity:.45;filter:grayscale(.6);}
.module.bypassed .module-label{color:var(--text-dim);}
/* ── Stage mode ── */
#nm-stage-hdr{display:none;position:fixed;top:0;left:0;right:0;height:30px;z-index:10001;background:var(--bg-toolbar);border-bottom:1px solid var(--border-bright);align-items:center;gap:6px;padding:0 10px;backdrop-filter:blur(14px);}
#nm-stage-hdr .btn{font-size:var(--fs-xs);padding:2px 8px;letter-spacing:1px;}
#nm-stage-title{font-size:var(--fs-xs);letter-spacing:4px;color:var(--accent-soft);flex:1;}
body.nm-stage #nm-stage-hdr{display:flex;}
body.nm-stage #rack-wrap{position:fixed;top:30px;left:0;right:0;bottom:0;z-index:10000;overflow:hidden;padding:8px;background:var(--bg-page);display:flex;align-items:center;justify-content:center;}
body.nm-stage #rack-title{display:none;}
body.nm-stage #nm-view-bar{display:none!important;}
body.nm-stage #toolbar,body.nm-stage #loopstation,body.nm-stage #site-footer{display:none!important;}
body.nm-stage{overflow:hidden;}
body.nm-stage .module-remove-btn{display:none!important;}
body.nm-stage #cables{z-index:10001;}
body.nm-stage .rack-group{display:none!important;}
/* ── Per-module stage pin ── */
.nm-stage-pin{float:right;font-size:9px;line-height:inherit;cursor:pointer;color:var(--text-dim);opacity:0;transition:color .2s,opacity .2s,text-shadow .2s;user-select:none;padding:0 2px;letter-spacing:0;}
.module:hover .nm-stage-pin{opacity:1;}
.nm-stage-pin.nm-sp-on{opacity:1;color:var(--accent);text-shadow:0 0 7px var(--accent),0 0 18px color-mix(in srgb,var(--accent) 35%,transparent);}
body.nm-stage .nm-stage-pin{display:none!important;}
/* ── Stage picker overlay ── */
#nm-stage-picker{position:fixed;inset:0;z-index:20000;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
#nm-spc-box{background:var(--bg-toolbar);border:1px solid var(--border-bright);border-radius:8px;width:min(440px,92vw);max-height:82vh;display:flex;flex-direction:column;padding:16px;gap:10px;box-shadow:0 24px 80px rgba(0,0,0,0.9);}
#nm-spc-hdr{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
#nm-spc-title{font-size:var(--fs-sm);letter-spacing:4px;color:var(--accent-soft);}
#nm-spc-sub{font-size:var(--fs-xs);color:var(--text-dim);letter-spacing:1px;}
#nm-spc-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
#nm-spc-launch{background:color-mix(in srgb,var(--accent) 22%,transparent);border-color:var(--accent);color:var(--accent);font-weight:700;letter-spacing:2px;}
#nm-spc-launch:hover{background:var(--accent);color:#000;}
#nm-spc-list{list-style:none;margin:0;padding:2px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:3px;min-height:0;}
#nm-spc-list li{display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--bg-mod);border:1px solid var(--border-soft);border-radius:4px;user-select:none;}
#nm-spc-list li.spc-checked{border-color:color-mix(in srgb,var(--accent) 38%,transparent);}
#nm-spc-list li.spc-dragging{opacity:0.25;}
#nm-spc-list li.spc-over-top{border-top:2px solid var(--accent);}
#nm-spc-list li.spc-over-bot{border-bottom:2px solid var(--accent);}
.nm-spc-drag{cursor:grab;color:var(--text-dim);font-size:13px;padding:0 2px;line-height:1;}
.nm-spc-chk{width:13px;height:13px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;}
.nm-spc-name{font-size:var(--fs-xs);letter-spacing:2px;flex:1;}
/* ── View bar (stage + zoom) ── */
#nm-view-bar{display:flex;align-items:center;gap:7px;padding:0 18px 10px;flex-wrap:wrap;}
#nm-view-bar .btn{font-size:var(--fs-xs);padding:2px 8px;letter-spacing:1px;}
#nm-zoom-slider{-webkit-appearance:none;appearance:none;height:3px;width:80px;background:var(--border-soft);border-radius:2px;outline:none;cursor:pointer;accent-color:var(--accent);flex-shrink:0;}
#nm-zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent);cursor:pointer;}
#nm-zoom-val{font-size:var(--fs-xs);letter-spacing:2px;color:var(--text-muted);min-width:34px;font-family:var(--font-mono);}
.nm-vbar-sep{color:var(--border-soft);padding:0 2px;user-select:none;}
/* ── Edit mode ── */
/* keep edit mode high-visibility in both themes */
#edit-mode-btn.on{background:color-mix(in srgb,var(--accent-warm) 16%, transparent);border-color:var(--accent-warm);color:var(--accent-warm);box-shadow:0 0 8px color-mix(in srgb,var(--accent-warm) 28%, transparent);}
#edit-mode-btn.on:hover{border-color:#ffcc44;color:#ffcc44;}
body.edit-mode #rack{border-color:color-mix(in srgb,var(--accent-warm) 34%, transparent);box-shadow:0 0 40px color-mix(in srgb,var(--accent-warm) 16%, transparent),inset 0 0 60px var(--shadow-inset);}
body.edit-mode .module{border-color:color-mix(in srgb,var(--accent-warm) 28%, transparent);}
body.edit-mode .module:hover{border-color:color-mix(in srgb,var(--accent-warm) 72%, transparent);box-shadow:0 0 14px color-mix(in srgb,var(--accent-warm) 22%, transparent);}
body.edit-mode .module-label{cursor:grab;background:linear-gradient(to bottom,color-mix(in srgb,var(--accent-warm) 10%, transparent),transparent);border-bottom-color:color-mix(in srgb,var(--accent-warm) 28%, transparent);}
body.edit-mode .module-label:active{cursor:grabbing;}
.module-drag-handle{display:none;font-size:var(--fs-sm);color:color-mix(in srgb,var(--accent-warm) 55%, transparent);margin-right:3px;pointer-events:none;line-height:1;vertical-align:middle;}
body.edit-mode .module-drag-handle{display:inline;}
.module-remove-btn{display:none;position:absolute;top:6px;right:6px;width:18px;height:18px;background:var(--bg-panel-7);border:1px solid var(--border-strong);border-radius:50%;color:var(--text-faint);font-size:14px;line-height:16px;text-align:center;cursor:pointer;z-index:20;transition:all .2s ease;user-select:none;font-family:var(--font-mono);}
.module-remove-btn:hover{background:#ff4444;color:white;border-color:#ff8888;box-shadow:0 0 10px rgba(255,68,68,0.4);}
body.edit-mode .module-remove-btn{display:block;}
/* drop placeholder */
@keyframes phGlow{0%,100%{border-color:color-mix(in srgb,var(--accent-warm) 34%, transparent);background:color-mix(in srgb,var(--accent-warm) 6%, transparent);}50%{border-color:color-mix(in srgb,var(--accent-warm) 66%, transparent);background:color-mix(in srgb,var(--accent-warm) 13%, transparent);}}
.module-drop-ph{background:color-mix(in srgb,var(--accent-warm) 6%, transparent);border:2px dashed color-mix(in srgb,var(--accent-warm) 46%, transparent);border-radius:4px;animation:phGlow 1s ease-in-out infinite;position:relative;display:flex;align-items:center;justify-content:center;}
.module-drop-ph::after{content:'DROP HERE';font-size:var(--fs-xs);letter-spacing:2px;color:color-mix(in srgb,var(--accent-warm) 46%, transparent);font-family:var(--font-mono);pointer-events:none;}
/* ── Module picker ── */
#mod-picker{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg-panel-4);border:1px solid var(--border-bright);border-radius:4px;padding:16px;z-index:900;min-width:280px;box-shadow:0 8px 32px color-mix(in srgb,var(--text-strong) 18%, transparent);}
#mod-picker h3{color:var(--accent-soft);font-size:var(--fs-lg);letter-spacing:4px;margin:0 0 10px;text-align:center;}
#mod-picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
#mod-picker .mpick-btn{background:var(--bg-panel-3);border:1px solid var(--border-main);color:var(--text-soft);font-family:var(--font-ui);font-size:var(--fs-md);letter-spacing:.6px;padding:7px 4px;cursor:pointer;border-radius:2px;text-align:center;}
#mod-picker .mpick-btn:hover{border-color:color-mix(in srgb,var(--accent) 55%, transparent);color:var(--accent-soft);background:var(--bg-panel);}
#mod-picker-close{float:right;margin-top:-28px;}
/* ── Context menu ── */
#ctx-menu{display:none;position:fixed;background:var(--bg-panel-4);border:1px solid var(--border-bright);border-radius:3px;z-index:950;min-width:120px;box-shadow:0 4px 16px color-mix(in srgb,var(--text-strong) 18%, transparent);padding:3px 0;}
#ctx-menu button{display:block;width:100%;background:none;border:none;color:var(--text-soft);font-family:var(--font-ui);font-size:var(--fs-md);letter-spacing:.6px;padding:6px 14px;text-align:left;cursor:pointer;}
#ctx-menu button:hover{background:var(--bg-button-active);color:var(--accent-soft);}
#ctx-menu hr{border:none;border-top:1px solid var(--border-soft);margin:2px 0;}
.screw{position:absolute;width:7px;height:7px;background:var(--bg-panel-7);border:1px solid var(--border-strong);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.screw::after{content:'+';font-size:5px;color:var(--text-faint);}
.screw.tl{top:3px;left:3px;} .screw.tr{top:3px;right:3px;} .screw.bl{bottom:3px;left:3px;} .screw.br{bottom:3px;right:3px;}

/* ── Knob ── */
.knob-wrap{display:flex;flex-direction:column;align-items:center;margin:8px 4px;}
.knob{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 38% 32%,color-mix(in srgb,var(--bg-panel-hover) 78%, white 22%),var(--bg-rack));border:2px solid var(--border-main);cursor:ns-resize;position:relative;box-shadow:0 3px 8px color-mix(in srgb,var(--shadow-panel) 130%, transparent),0 0 0 1px color-mix(in srgb,var(--text-strong) 8%, transparent),inset 0 1px 0 color-mix(in srgb,var(--text-strong) 8%, transparent);user-select:none;transition:border-color .2s,transform .12s,box-shadow .12s;touch-action:none;}
.knob:hover{border-color:color-mix(in srgb,var(--accent) 55%, transparent);}
.knob.touch-active{border-color:var(--accent-cyan);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent-cyan) 22%, transparent),0 4px 14px color-mix(in srgb,var(--shadow-panel) 140%, transparent),0 0 14px color-mix(in srgb,var(--accent-cyan) 25%, transparent);transform:scale(1.05);}
.knob.lg{width:60px;height:60px;}
.knob.sm{width:34px;height:34px;}
.knob-dot{position:absolute;width:3px;height:38%;background:var(--accent);left:calc(50% - 1.5px);top:8%;transform-origin:50% 100%;border-radius:2px;box-shadow:0 0 6px var(--accent);pointer-events:none;}
.knob.lg .knob-dot{height:38%;}
.knob.sm .knob-dot{width:2px;background:var(--accent-cyan);box-shadow:0 0 4px var(--accent-cyan);}
.knob-lbl{font-size:var(--fs-xs);color:var(--text-muted);letter-spacing:1px;margin-top:4px;text-align:center;}
.knob-val{appearance:none;font-family:inherit;font-size:var(--fs-xs);color:color-mix(in srgb,var(--accent-cyan) 88%, white 12%);text-shadow:0 0 6px color-mix(in srgb,var(--accent-cyan) 35%, transparent);letter-spacing:0;margin-top:4px;text-align:center;min-width:54px;min-height:22px;padding:4px 8px;border-radius:999px;border:1px solid color-mix(in srgb,var(--border-cyan-soft) 90%, transparent);background:color-mix(in srgb,var(--bg-flow) 68%, transparent);box-shadow:inset 0 1px 0 color-mix(in srgb,var(--text-strong) 8%, transparent);cursor:text;transition:transform .12s,border-color .2s,box-shadow .2s,background .2s,color .2s;}
.knob-val:hover,.knob-val:focus-visible{border-color:color-mix(in srgb,var(--accent-cyan) 55%, transparent);background:color-mix(in srgb,var(--bg-flow) 82%, transparent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent-cyan) 16%, transparent),inset 0 1px 0 color-mix(in srgb,var(--text-strong) 10%, transparent);outline:none;}
.knob-val.live{transform:translateY(-1px);border-color:color-mix(in srgb,var(--accent-cyan) 65%, transparent);color:var(--accent-cyan);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent-cyan) 16%, transparent),0 0 12px color-mix(in srgb,var(--accent-cyan) 16%, transparent),inset 0 1px 0 color-mix(in srgb,var(--text-strong) 10%, transparent);}
.knob-input{display:none;width:68px;margin-top:4px;padding:4px 8px;border-radius:999px;border:1px solid color-mix(in srgb,var(--accent-cyan) 55%, transparent);background:color-mix(in srgb,var(--bg-flow) 88%, transparent);color:var(--accent-cyan);font-family:inherit;font-size:var(--fs-xs);text-align:center;box-shadow:0 0 0 2px color-mix(in srgb,var(--accent-cyan) 16%, transparent);outline:none;}
.knob-wrap.editing .knob-val{display:none;}
.knob-wrap.editing .knob-input{display:block;}

#knob-touch-editor{position:fixed;inset:0;background:var(--bg-overlay);z-index:880;display:none;align-items:flex-end;justify-content:center;padding:18px;backdrop-filter:blur(5px);}
#knob-touch-editor.open{display:flex;}
.kte-sheet{width:min(440px,100%);background:linear-gradient(180deg,var(--bg-panel),var(--bg-panel-6));border:1px solid var(--border-cyan-soft);border-radius:14px 14px 8px 8px;box-shadow:0 10px 32px color-mix(in srgb,var(--shadow-panel) 120%, transparent),0 0 28px color-mix(in srgb,var(--accent-cyan) 8%, transparent);padding:16px 16px 18px;}
.kte-grab{width:56px;height:4px;background:color-mix(in srgb,var(--text-strong) 14%, transparent);border-radius:999px;margin:0 auto 12px;}
.kte-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:14px;}
.kte-title{color:var(--accent-cyan);font-size:var(--fs-lg);letter-spacing:2px;}
.kte-value{color:var(--accent);font-size:18px;text-shadow:0 0 8px color-mix(in srgb,var(--accent) 33%, transparent);min-width:72px;text-align:right;}
.kte-hint{color:var(--text-dim);font-size:var(--fs-xs);letter-spacing:1px;margin-bottom:12px;text-align:center;line-height:1.5;}
.kte-input-row{display:grid;grid-template-columns:72px 1fr 72px;gap:10px;align-items:end;margin-bottom:12px;}
.kte-number-wrap{display:flex;flex-direction:column;gap:6px;}
.kte-input-label{font-size:var(--fs-xs);letter-spacing:1px;color:var(--text-dim);text-align:center;}
.kte-input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid color-mix(in srgb,var(--accent-cyan) 45%, transparent);background:color-mix(in srgb,var(--bg-flow) 82%, transparent);color:var(--accent-cyan);font-size:18px;text-align:center;box-shadow:inset 0 1px 0 color-mix(in srgb,var(--text-strong) 8%, transparent);}
.kte-bounds{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:0 2px 10px;}
.kte-bound{font-size:var(--fs-xs);color:var(--text-dim);letter-spacing:1px;min-width:70px;}
.kte-bound.max{text-align:right;}
.kte-slider{flex:1;width:100%;accent-color:var(--accent-cyan);margin:0;}
.kte-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.kte-actions .btn{padding:10px 12px;}
.kte-close{width:100%;}

#patch-touch-banner{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);display:none;align-items:center;gap:10px;background:color-mix(in srgb,var(--bg-flow) 94%, transparent);border:1px solid var(--border-cyan-soft);border-radius:999px;padding:10px 14px;z-index:820;box-shadow:0 8px 24px color-mix(in srgb,var(--shadow-panel) 90%, transparent),0 0 18px color-mix(in srgb,var(--accent-cyan) 8%, transparent);}
#patch-touch-banner.open{display:flex;}
.ptb-text{color:var(--accent-cyan);font-size:var(--fs-sm);letter-spacing:1px;white-space:nowrap;}
.ptb-actions{display:flex;gap:8px;}
.ptb-actions .btn{padding:6px 10px;font-size:var(--fs-sm);}

@media (pointer: coarse) {
  .knob-wrap{margin:6px 2px;}
  .knob{position:relative;}
  .knob::before{content:'';position:absolute;inset:-10px;}
  .knob-val{min-width:58px;padding:5px 8px;}
  .pp-row{gap:12px;}
  .pp{position:relative;transform:none;}
  .pp::before{content:'';position:absolute;inset:-12px;}
  .pp.pp-available:not(.pp-compatible){opacity:.45;filter:saturate(.65);}
  #patch-touch-banner{bottom:96px;max-width:calc(100vw - 24px);}
  .ptb-text{max-width:52vw;overflow:hidden;text-overflow:ellipsis;}
  .kte-input-row{grid-template-columns:64px 1fr 64px;}
  .kte-input{font-size:20px;padding:14px;}
  .kte-actions .btn,.kte-input-row .btn,.kte-close{min-height:48px;}
}

#patch-dest-sheet{position:fixed;inset:0;background:color-mix(in srgb,var(--bg-page) 72%, transparent);display:none;z-index:830;}
#patch-dest-sheet.open{display:block;}
.pds-panel{width:min(380px,calc(100vw - 24px));background:var(--bg-panel-6);border:1px solid var(--border-cyan-soft);border-radius:10px;box-shadow:0 16px 32px color-mix(in srgb,var(--shadow-panel) 100%, transparent),0 0 40px color-mix(in srgb,var(--accent-cyan) 4%, transparent);padding:12px;display:flex;flex-direction:column;gap:10px;}
.pds-head{display:flex;justify-content:space-between;align-items:center;}
.pds-title{color:var(--accent-cyan);font-size:14px;letter-spacing:2px;}
.pds-filter{width:100%;background:var(--bg-input);border:1px solid color-mix(in srgb,var(--accent-cyan) 14%, transparent);color:var(--text-main);padding:8px 10px;font-size:12px;letter-spacing:.3px;border-radius:6px;font-family:var(--font-ui);outline:none;}
.pds-filter:focus{border-color:color-mix(in srgb,var(--accent-cyan) 42%, transparent);}
.pds-filter::placeholder{color:var(--text-faint);}
.pds-list{max-height:320px;overflow:auto;display:flex;flex-direction:column;gap:4px;}
.pds-row{border:none;background:var(--bg-input);color:var(--text-main);padding:8px 12px;text-align:left;font-size:12px;letter-spacing:.3px;border-radius:6px;cursor:pointer;font-family:var(--font-ui);transition:background .1s;display:flex;align-items:center;gap:8px;}
.pds-row.compatible{background:color-mix(in srgb,var(--accent-cyan) 10%, var(--bg-input));color:color-mix(in srgb,var(--accent-cyan) 82%, var(--text-strong));}
.pds-row:hover{background:var(--bg-panel-hover);}
.pds-row.hidden{display:none;}
.pds-row-name{flex:1;}
.pds-signal{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;animation:pds-sig 1.1s ease-in-out infinite alternate;}
@keyframes pds-sig{from{opacity:.5;box-shadow:0 0 3px currentColor;}to{opacity:1;box-shadow:0 0 8px currentColor,0 0 14px currentColor;}}
@keyframes pds-in{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
@media (pointer: fine) {
  .pds-panel{position:fixed;}
  #patch-dest-sheet.open .pds-panel{animation:pds-in 100ms ease-out both;}
}
@media (pointer: coarse) {
  #patch-dest-sheet.open{display:flex;align-items:flex-end;padding:0 12px 12px;}
  .pds-panel{border-radius:16px 16px 6px 6px;width:min(420px,100%);}
}

/* ═══════════════════════════════════════════════════════════════════
   MOBILE SHELL  (max-width: 640px)
   ═══════════════════════════════════════════════════════════════════ */
@media (max-width:640px){
  /* Hide desktop-only elements */
  #rack-wrap,#toolbar,#loopstation,#site-footer,#cables{display:none!important;}
  body{padding-bottom:0;overflow-x:hidden;}

  /* Shell layout: full viewport, no scroll at body level */
  #m-shell{display:flex;flex-direction:column;height:100dvh;overflow:hidden;background:var(--bg-page);}

  /* Top bar */
  #m-topbar{display:flex;align-items:center;gap:8px;height:38px;padding:0 12px;background:var(--bg-toolbar);border-bottom:1px solid var(--border-soft);flex-shrink:0;z-index:10;}
  .m-brand{font-family:var(--font-mono);font-weight:700;font-size:15px;color:var(--accent-soft);letter-spacing:2px;flex-shrink:0;}
  #m-patch-name{flex:1;font-size:11px;color:var(--text-soft);letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;text-align:center;}
  #m-bpm{font-family:var(--font-mono);font-size:10px;color:var(--accent-cyan);letter-spacing:1px;flex-shrink:0;}
  #m-meter-canvas{flex-shrink:0;opacity:.8;}
  #m-overflow-btn{background:none;border:1px solid var(--border-main);color:var(--text-muted);padding:3px 9px;border-radius:3px;font-size:16px;cursor:pointer;line-height:1;flex-shrink:0;}
  #m-viz-btn{background:none;border:1px solid var(--border-main);color:var(--text-muted);padding:3px 10px;border-radius:3px;font-size:15px;cursor:pointer;line-height:1;flex-shrink:0;letter-spacing:.5px;}
  #m-viz-btn.on{color:var(--accent-cyan);border-color:var(--accent-cyan);}

  /* Scrollable workspace */
  #m-workspace{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}

  /* Tab contents */
  .m-tab-content{display:none;padding:12px;}
  .m-tab-content.active{display:block;}

  /* Tab bar */
  #m-tabbar{display:flex;flex-shrink:0;background:var(--bg-toolbar);border-top:1px solid var(--border-soft);}
  .m-tab{flex:1;background:none;border:none;border-top:2px solid transparent;color:var(--text-dim);font-family:var(--font-ui);font-size:10px;letter-spacing:.8px;padding:10px 2px 8px;cursor:pointer;transition:color .15s,border-color .15s;}
  .m-tab.on{color:var(--accent-cyan);border-top-color:var(--accent-cyan);}
  .m-tab:active{background:color-mix(in srgb,var(--accent-cyan) 8%,transparent);}

  /* Performance strip */
  #m-perfstrip{display:flex;align-items:center;gap:5px;padding:8px 10px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));background:var(--bg-panel-4);border-top:1px solid var(--border-bright);flex-shrink:0;}
  #m-perfstrip .btn{min-height:42px;font-size:14px;padding:0 12px;}
  #m-play-btn{min-width:52px;}
  #m-stop-btn{min-width:46px;}
  #m-hold-btn{min-width:52px;}
  .m-scene-btn{min-width:36px;min-height:42px;font-size:13px;letter-spacing:1px;}
  .m-scene-btn.filled{border-color:var(--accent)!important;color:var(--accent)!important;}
  .m-scene-btn.active-scene{background:color-mix(in srgb,var(--accent) 22%,transparent)!important;}

  /* Overflow menu */
  #m-overflow-menu{position:fixed;inset:0;z-index:860;display:none;align-items:flex-end;}
  #m-overflow-menu.open{display:flex;}
  #m-overflow-backdrop{position:absolute;inset:0;background:color-mix(in srgb,var(--bg-page) 60%,transparent);}
  #m-overflow-panel{position:relative;width:100%;background:var(--bg-panel-6);border-radius:16px 16px 0 0;border-top:1px solid var(--border-bright);padding:16px 12px;padding-bottom:calc(16px + env(safe-area-inset-bottom,0px));display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  #m-overflow-panel .btn{padding:10px 6px;font-size:11px;text-align:center;min-height:44px;}

  /* ── Play tab ── */
  #m-play-hero{margin-bottom:12px;}
  #m-play-hero .module{width:100%;box-sizing:border-box;min-width:unset!important;}
  #m-play-hero canvas{width:100%!important;height:auto!important;aspect-ratio:1;}
  #m-quick-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  #m-quick-row::-webkit-scrollbar{display:none;}
  .m-quick-card{flex-shrink:0;width:120px;background:var(--bg-panel-3);border:1px solid var(--border-main);border-radius:6px;padding:10px;cursor:pointer;transition:border-color .15s;}
  .m-quick-card:active{border-color:var(--accent-cyan);}
  .m-quick-card-name{font-size:10px;letter-spacing:1.5px;color:var(--accent-soft);margin-bottom:6px;}
  .m-quick-card-vals{font-size:11px;color:var(--text-soft);line-height:1.6;}
  .m-quick-card-val-row{display:flex;justify-content:space-between;}
  .m-quick-card-val-lbl{color:var(--text-dim);font-size:10px;}
  .m-quick-card-val-num{color:var(--text-main);font-family:var(--font-mono);font-size:10px;}
  #m-activity{background:var(--bg-panel);border:1px solid var(--border-soft);border-radius:4px;padding:8px 12px;font-size:10px;color:var(--text-dim);letter-spacing:.8px;display:flex;gap:12px;flex-wrap:wrap;}
  .m-act-item{display:flex;align-items:center;gap:4px;}
  .m-act-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-cyan);opacity:.5;}
  .m-act-dot.live{opacity:1;box-shadow:0 0 4px var(--accent-cyan);}

  /* ── Sound tab ── */
  .m-snd-group{margin-bottom:8px;}
  .m-snd-hdr{width:100%;background:var(--bg-panel-3);border:1px solid var(--border-main);color:var(--text-soft);font-family:var(--font-ui);font-size:11px;letter-spacing:2px;padding:10px 14px;text-align:left;cursor:pointer;border-radius:4px;display:flex;justify-content:space-between;align-items:center;}
  .m-snd-hdr.open{border-color:color-mix(in srgb,var(--accent-cyan) 35%,transparent);color:var(--accent-cyan);}
  .m-snd-hdr-arrow{font-size:10px;transition:transform .2s;}
  .m-snd-hdr.open .m-snd-hdr-arrow{transform:rotate(180deg);}
  .m-snd-body{display:none;flex-direction:column;gap:10px;padding:10px 0 4px;}
  .m-snd-body.open{display:flex;}
  /* Full-width modules inside Sound tab */
  .m-snd-body .module{min-width:unset!important;width:100%;box-sizing:border-box;}
  .m-snd-body .module .screw{display:none;}

  /* ── Patch tab ── */
  #m-patch-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  #m-patch-header h3{font-size:11px;letter-spacing:2px;color:var(--accent-cyan);margin:0;}
  #m-conn-list{display:flex;flex-direction:column;gap:6px;}
  .m-conn-row{background:var(--bg-panel-3);border:1px solid var(--border-soft);border-radius:4px;padding:10px 12px;display:flex;align-items:center;gap:8px;font-size:11px;}
  .m-conn-src{color:var(--accent);flex-shrink:0;}
  .m-conn-arrow{color:var(--text-dim);}
  .m-conn-dst{color:var(--text-main);flex:1;}
  .m-conn-del{background:none;border:1px solid var(--border-main);color:var(--text-dim);width:28px;height:28px;border-radius:3px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .m-conn-del:active{border-color:var(--accent);color:var(--accent);}
  #m-patch-empty{color:var(--text-dim);font-size:11px;letter-spacing:.5px;padding:20px 0;text-align:center;}

  /* ── Library tab ── */
  .m-lib-section{margin-bottom:20px;}
  .m-lib-title{font-size:10px;letter-spacing:2px;color:var(--text-dim);margin:0 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border-soft);}
  .m-lib-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
  .m-lib-actions .btn{font-size:11px;padding:8px 14px;min-height:40px;}
  #m-preset-list{display:flex;flex-direction:column;gap:4px;}
  .m-preset-row{background:var(--bg-panel-3);border:1px solid var(--border-soft);border-radius:4px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:12px;color:var(--text-main);letter-spacing:.4px;}
  .m-preset-row:active{border-color:var(--accent-cyan);}
  .m-preset-row.active{border-color:var(--accent);color:var(--accent);}
  .m-preset-del{background:none;border:none;color:var(--text-dim);font-size:14px;padding:0 4px;cursor:pointer;}
  #m-scene-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .m-scene-card{background:var(--bg-panel-3);border:1px solid var(--border-soft);border-radius:6px;padding:14px;text-align:center;cursor:pointer;min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  .m-scene-card:active{border-color:var(--accent-cyan);}
  .m-scene-card.filled{border-color:color-mix(in srgb,var(--accent) 50%,transparent);}
  .m-scene-card-letter{font-size:22px;font-weight:700;font-family:var(--font-mono);color:var(--text-muted);}
  .m-scene-card.filled .m-scene-card-letter{color:var(--accent-soft);}
  .m-scene-card-label{font-size:9px;letter-spacing:1.5px;color:var(--text-dim);}
  #m-notes-area{width:100%;box-sizing:border-box;min-height:100px;background:var(--bg-input);border:1px solid var(--border-soft);color:var(--text-main);padding:10px;font-family:var(--font-ui);font-size:12px;border-radius:4px;resize:vertical;}

  /* Module pool — hidden storage when mobile is active */
  #m-module-pool{display:none;}

  /* ── Module cards (Phase 2) ── */
  .m-card{background:var(--bg-panel-3);border:1px solid var(--border-soft);border-radius:6px;padding:10px 12px;margin-bottom:8px;}
  .m-card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .m-card-name{flex:1;font-size:11px;letter-spacing:2px;color:var(--accent-soft);}
  .m-card-status{width:7px;height:7px;border-radius:50%;background:var(--border-main);flex-shrink:0;transition:background .3s,box-shadow .3s;}
  .m-card-status.live{background:var(--accent-cyan);box-shadow:0 0 5px var(--accent-cyan);}
  .m-card-edit{background:none;border:1px solid var(--border-main);color:var(--text-dim);font-family:var(--font-ui);font-size:10px;letter-spacing:1px;padding:5px 10px;border-radius:3px;cursor:pointer;flex-shrink:0;}
  .m-card-edit:active{border-color:var(--accent-cyan);color:var(--accent-cyan);}
  .m-card-ctrls{display:flex;gap:8px;flex-wrap:wrap;}
  .m-ctrl{display:flex;flex-direction:column;gap:3px;}
  .m-ctrl-lbl{font-size:9px;letter-spacing:1px;color:var(--text-dim);text-align:center;}
  .m-ctrl-btn{background:var(--bg-input);border:1px solid var(--border-soft);color:var(--text-main);font-size:11px;font-family:var(--font-mono);padding:6px 10px;border-radius:3px;cursor:pointer;text-align:center;min-height:34px;min-width:54px;letter-spacing:.3px;}
  .m-ctrl-btn:active{border-color:var(--accent-cyan);background:color-mix(in srgb,var(--accent-cyan) 10%,var(--bg-input));}
  .m-card-empty{font-size:10px;color:var(--text-dim);letter-spacing:.5px;padding:2px 0;}

  /* ── Card patch-point indicators (Layer 1) ── */
  .m-card-pp-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:6px;border-top:1px solid var(--border-soft);min-height:16px;}
  .m-card-pp-side{display:flex;gap:4px;align-items:center;}
  .m-card-pp-lbl{font-size:8px;letter-spacing:.5px;color:var(--text-dim);margin:0 2px;}
  .m-pp-chip{display:inline-flex;align-items:center;gap:4px;padding:1px 4px;border:1px solid var(--border-soft);border-radius:999px;background:var(--bg-input);}
  .m-pp-mini{font-size:7px;letter-spacing:.4px;color:var(--text-dim);white-space:nowrap;}
  .m-pp-dot{width:8px;height:8px;border-radius:50%;opacity:.2;flex-shrink:0;transition:opacity .25s,box-shadow .25s;cursor:pointer;}
  .m-pp-dot.live{opacity:1;}
  .m-pp-dot.ao{background:#cc00ff;}.m-pp-dot.live.ao{box-shadow:0 0 6px #cc00ff;}
  .m-pp-dot.co{background:#00aaff;}.m-pp-dot.live.co{box-shadow:0 0 6px #00aaff;}
  .m-pp-dot.ai{background:#00ff66;}.m-pp-dot.live.ai{box-shadow:0 0 6px #00ff66;}
  .m-pp-dot.ci,.m-pp-dot.gi{background:#ffee00;}.m-pp-dot.live.ci,.m-pp-dot.live.gi{box-shadow:0 0 6px #ffee00;}

  /* ── Connection spine SVG (Layer 2) ── */
  #m-tab-sound{position:relative;}
  #m-sound-spine{position:absolute;top:0;left:0;width:100%;height:1px;overflow:visible;pointer-events:none;z-index:2;}

  /* ── Patch tab flow map (Layer 3) ── */
  #m-flow-map{display:flex;flex-direction:column;gap:5px;}
  .m-flow-row{display:flex;align-items:stretch;background:var(--bg-panel-3);border:1px solid var(--border-soft);border-radius:6px;overflow:hidden;}
  .m-flow-tile{flex:1;background:none;border:none;padding:9px 10px;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:3px;min-height:44px;}
  .m-flow-tile:active{background:color-mix(in srgb,var(--accent-cyan) 8%,transparent);}
  .m-flow-tile-name{font-size:10px;letter-spacing:1.5px;color:var(--accent-soft);}
  .m-flow-tile-sub{font-size:9px;letter-spacing:.3px;color:var(--text-dim);line-height:1.3;}
  .m-flow-mid{flex:0 0 38px;display:flex;align-items:center;justify-content:center;position:relative;border-left:1px solid var(--border-soft);border-right:1px solid var(--border-soft);}
  .m-flow-line{position:absolute;top:50%;left:0;right:0;height:1.5px;transform:translateY(-50%);opacity:.65;}
  .m-flow-dot{width:8px;height:8px;border-radius:50%;position:relative;z-index:1;flex-shrink:0;}
  .m-flow-del{flex:0 0 36px;background:none;border:none;border-left:1px solid var(--border-soft);color:var(--text-dim);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
  .m-flow-del:active{background:color-mix(in srgb,var(--accent) 10%,transparent);color:var(--accent);}

  /* ── Full-editor bottom sheet ── */
  #m-editor-sheet{position:fixed;inset:0;z-index:840;display:none;align-items:flex-end;}
  #m-editor-sheet.open{display:flex;}
  #m-editor-backdrop{position:absolute;inset:0;background:color-mix(in srgb,var(--bg-page) 55%,transparent);}
  #m-editor-panel{position:relative;width:100%;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg-panel-6);border-radius:16px 16px 0 0;border-top:1px solid var(--border-bright);padding:0 0 calc(16px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);}
  #m-editor-sheet.open #m-editor-panel{transform:translateY(0);}
  #m-editor-header{display:flex;align-items:center;padding:10px 16px 10px;border-bottom:1px solid var(--border-soft);position:sticky;top:0;background:var(--bg-panel-6);z-index:1;gap:10px;}
  #m-editor-handle{width:36px;height:4px;border-radius:2px;background:var(--border-main);flex-shrink:0;margin-right:4px;}
  #m-editor-title{flex:1;font-size:12px;letter-spacing:2px;color:var(--accent-soft);}
  #m-editor-close{background:none;border:1px solid var(--border-main);color:var(--text-dim);padding:5px 12px;border-radius:3px;cursor:pointer;font-size:13px;min-height:34px;}
  #m-editor-close:active{border-color:var(--accent);color:var(--accent);}
  #m-editor-body{padding:8px 8px 12px;}
  #m-editor-body .module{min-width:unset!important;width:100%;box-sizing:border-box;border:none!important;background:transparent!important;box-shadow:none!important;padding:8px 0!important;}
  #m-editor-body .module .screw{display:none;}
  #m-editor-body .module .module-label{display:none;}

  /* ── Patch tab Phase 3 ── */
  #m-patch-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;}
  #m-patch-title{font-size:11px;letter-spacing:2px;color:var(--accent-cyan);margin:0;}
  #m-patch-add{font-size:12px;padding:7px 14px;min-height:36px;}
  #m-patch-filter{display:flex;gap:4px;margin-bottom:12px;}
  .m-pf-btn{flex:1;background:none;border:1px solid var(--border-soft);color:var(--text-dim);font-family:var(--font-ui);font-size:10px;letter-spacing:1px;padding:6px 4px;border-radius:3px;cursor:pointer;}
  .m-pf-btn.on{background:color-mix(in srgb,var(--accent-cyan) 12%,transparent);border-color:var(--accent-cyan);color:var(--accent-cyan);}
  .m-conn-sig{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .m-conn-sig.ao{background:#cc00ff;box-shadow:0 0 4px #cc00ff;}
  .m-conn-sig.co{background:#00aaff;box-shadow:0 0 4px #00aaff;}
  .m-conn-sig.ai{background:#00ff66;box-shadow:0 0 4px #00ff66;}
  .m-conn-sig.ci,.m-conn-sig.gi{background:#ffee00;box-shadow:0 0 4px #ffee00;}
  .m-conn-row{background:var(--bg-panel-3);border:1px solid var(--border-soft);border-radius:4px;padding:10px 12px;display:flex;align-items:center;gap:7px;font-size:11px;margin-bottom:5px;}
  .m-conn-labels{flex:1;display:flex;align-items:center;gap:6px;min-width:0;}
  .m-conn-src{color:var(--accent);font-size:10px;letter-spacing:.4px;flex-shrink:0;max-width:38%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .m-conn-arrow{color:var(--text-dim);flex-shrink:0;font-size:10px;}
  .m-conn-dst{color:var(--text-main);font-size:10px;letter-spacing:.4px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .m-conn-del{background:none;border:1px solid var(--border-main);color:var(--text-dim);width:28px;height:28px;border-radius:3px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .m-conn-del:active{border-color:var(--accent);color:var(--accent);}
  #m-patch-empty{color:var(--text-dim);font-size:11px;letter-spacing:.5px;padding:20px 0;text-align:center;}
  #m-patch-count{font-size:10px;color:var(--text-dim);letter-spacing:.5px;margin-left:auto;}

  /* ── Patch overlay elements raised above mobile shell sheets ── */
  #patch-touch-banner{z-index:850!important;}
  #patch-dest-sheet{z-index:870!important;}

  /* ── Source picker sheet ── */
  #m-src-sheet{position:fixed;inset:0;z-index:845;display:none;align-items:flex-end;}
  #m-src-sheet.open{display:flex;}
  #m-src-backdrop{position:absolute;inset:0;background:color-mix(in srgb,var(--bg-page) 55%,transparent);}
  #m-src-panel{position:relative;width:100%;max-height:78vh;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg-panel-6);border-radius:16px 16px 0 0;border-top:1px solid var(--border-bright);padding:14px 12px calc(14px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);}
  #m-src-sheet.open #m-src-panel{transform:translateY(0);}
  #m-src-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  #m-src-title{flex:1;font-size:12px;letter-spacing:2px;color:var(--accent-soft);}
  #m-src-close{background:none;border:1px solid var(--border-main);color:var(--text-dim);padding:5px 12px;border-radius:3px;cursor:pointer;font-size:13px;min-height:34px;}
  #m-src-filter{display:flex;gap:4px;margin-bottom:10px;}
  .m-sf-btn{flex:1;background:none;border:1px solid var(--border-soft);color:var(--text-dim);font-family:var(--font-ui);font-size:10px;letter-spacing:1px;padding:6px 4px;border-radius:3px;cursor:pointer;}
  .m-sf-btn.on{border-color:var(--accent-soft);color:var(--accent-soft);background:color-mix(in srgb,var(--accent-soft) 10%,transparent);}
  #m-src-list{display:flex;flex-direction:column;gap:4px;}
  .m-src-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-input);border:1px solid var(--border-soft);border-radius:4px;cursor:pointer;}
  .m-src-row:active{border-color:var(--accent-soft);background:color-mix(in srgb,var(--accent-soft) 8%,transparent);}
  .m-src-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .m-src-dot.ao{background:#cc00ff;box-shadow:0 0 5px #cc00ff;}
  .m-src-dot.co{background:#00aaff;box-shadow:0 0 5px #00aaff;}
  .m-src-name{flex:1;font-size:11px;letter-spacing:.5px;color:var(--text-main);}
  .m-src-linked{font-size:9px;color:var(--text-dim);letter-spacing:.3px;}
  .m-src-row.hidden{display:none;}

  /* ── Preset browser sheet ── */
  #m-preset-sheet{position:fixed;inset:0;z-index:840;display:none;align-items:flex-end;}
  #m-preset-sheet.open{display:flex;}
  #m-preset-backdrop{position:absolute;inset:0;background:color-mix(in srgb,var(--bg-page) 55%,transparent);}
  #m-preset-panel{position:relative;width:100%;max-height:72vh;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg-panel-6);border-radius:16px 16px 0 0;border-top:1px solid var(--border-bright);padding:14px 12px calc(14px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);}
  #m-preset-sheet.open #m-preset-panel{transform:translateY(0);}
  #m-preset-panel-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  #m-preset-panel-title{flex:1;font-size:12px;letter-spacing:2px;color:var(--accent-cyan);}
  #m-preset-panel-close{background:none;border:1px solid var(--border-main);color:var(--text-dim);padding:5px 12px;border-radius:3px;cursor:pointer;font-size:13px;min-height:34px;}
  #m-preset-panel-list{display:flex;flex-direction:column;gap:4px;}

  /* ── Perform tab (Phase 4) ── */
  #m-perf-bpm-wrap{display:flex;align-items:center;justify-content:center;gap:24px;padding:18px 0 14px;}
  .m-perf-adj{background:var(--bg-input);border:1px solid var(--border-main);color:var(--text-main);font-size:26px;width:54px;height:54px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;}
  .m-perf-adj:active{border-color:var(--accent-cyan);background:color-mix(in srgb,var(--accent-cyan) 15%,transparent);}
  #m-perf-bpm-center{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
  #m-perf-bpm-val{font-family:var(--font-mono);font-size:36px;color:var(--text-main);letter-spacing:2px;line-height:1;}
  #m-perf-bpm-unit{font-size:9px;letter-spacing:2px;color:var(--text-dim);margin-top:3px;}
  #m-perf-transport{display:flex;gap:8px;margin-bottom:16px;}
  #m-perf-transport .btn{flex:1;min-height:48px;font-size:15px;}
  .m-perf-sec-lbl{font-size:9px;letter-spacing:2px;color:var(--text-dim);margin-bottom:8px;}
  #m-step-count-row{display:flex;gap:6px;margin-bottom:12px;}
  #m-step-count-row .btn{flex:1;min-height:42px;font-size:12px;letter-spacing:.8px;}
  #m-perf-dir-row{display:flex;gap:6px;margin-bottom:16px;}
  #m-perf-dir-row .btn{flex:1;min-height:40px;font-size:11px;letter-spacing:.8px;padding:8px 4px;}
  #m-step-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-bottom:16px;}
  .m-step-btn{background:var(--bg-panel-3);border:1px solid var(--border-main);border-radius:4px;min-height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:background .08s,border-color .08s;-webkit-user-select:none;user-select:none;}
  .m-step-btn.on{background:color-mix(in srgb,var(--accent) 22%,var(--bg-panel-3));border-color:var(--accent);}
  .m-step-btn.cur{outline:2px solid var(--accent-cyan);outline-offset:-1px;}
  .m-step-btn.on.cur{outline-color:var(--accent);}
  .m-step-num{font-size:8px;color:var(--text-faint);letter-spacing:.3px;}
  .m-step-pitch{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);min-height:10px;}
  .m-step-btn.on .m-step-pitch{color:var(--accent-soft);}

  /* ── Macro button in perf strip ── */
  #m-macro-btn{min-height:42px;font-size:10px;letter-spacing:.5px;flex:1;max-width:90px;border-color:color-mix(in srgb,var(--accent-cyan) 25%,transparent);color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #m-macro-btn.active{border-color:var(--accent-cyan);color:var(--accent-cyan);background:color-mix(in srgb,var(--accent-cyan) 8%,transparent);}

  /* ── Macro assignment sheet ── */
  #m-macro-sheet{position:fixed;inset:0;z-index:848;display:none;align-items:flex-end;}
  #m-macro-sheet.open{display:flex;}
  #m-macro-backdrop{position:absolute;inset:0;background:color-mix(in srgb,var(--bg-page) 55%,transparent);}
  #m-macro-panel{position:relative;width:100%;max-height:62vh;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg-panel-6);border-radius:16px 16px 0 0;border-top:1px solid var(--border-bright);padding:14px 12px calc(14px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);}
  #m-macro-sheet.open #m-macro-panel{transform:translateY(0);}
  #m-macro-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  #m-macro-title{flex:1;font-size:12px;letter-spacing:2px;color:var(--accent-soft);}
  #m-macro-close{background:none;border:1px solid var(--border-main);color:var(--text-dim);padding:5px 12px;border-radius:3px;cursor:pointer;font-size:13px;min-height:34px;}
  .m-macro-opt{padding:13px 14px;background:var(--bg-input);border:1px solid var(--border-soft);border-radius:4px;cursor:pointer;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
  .m-macro-opt:active{border-color:var(--accent-cyan);background:color-mix(in srgb,var(--accent-cyan) 8%,transparent);}
  .m-macro-opt.sel{border-color:var(--accent-cyan);}
  .m-macro-check{font-size:12px;width:16px;color:var(--accent-cyan);flex-shrink:0;}
  .m-macro-lbl{font-size:12px;color:var(--text-main);letter-spacing:.5px;}
  .m-macro-opt.sel .m-macro-lbl{color:var(--accent-cyan);}

  /* ── Quick card config sheet ── */
  #m-quick-row-header{display:flex;align-items:center;margin-bottom:6px;}
  #m-quick-row-label{font-size:9px;letter-spacing:2px;color:var(--text-dim);flex:1;}
  #m-quick-cfg-btn{background:none;border:none;color:var(--text-dim);font-size:10px;letter-spacing:.5px;padding:4px 6px;cursor:pointer;opacity:.7;}
  #m-quick-cfg-btn:active{color:var(--accent-cyan);opacity:1;}
  #m-quick-cfg-sheet{position:fixed;inset:0;z-index:848;display:none;align-items:flex-end;}
  #m-quick-cfg-sheet.open{display:flex;}
  #m-quick-cfg-backdrop{position:absolute;inset:0;background:color-mix(in srgb,var(--bg-page) 55%,transparent);}
  #m-quick-cfg-panel{position:relative;width:100%;max-height:68vh;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg-panel-6);border-radius:16px 16px 0 0;border-top:1px solid var(--border-bright);padding:14px 12px calc(14px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);}
  #m-quick-cfg-sheet.open #m-quick-cfg-panel{transform:translateY(0);}
  #m-quick-cfg-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  #m-quick-cfg-title{flex:1;font-size:12px;letter-spacing:2px;color:var(--accent-soft);}
  #m-quick-cfg-close{background:none;border:1px solid var(--border-main);color:var(--text-dim);padding:5px 12px;border-radius:3px;cursor:pointer;font-size:13px;min-height:34px;}
  .m-cfg-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border-soft);}
  .m-cfg-row:last-of-type{border-bottom:none;}
  .m-cfg-slot-num{font-size:11px;color:var(--text-dim);width:20px;text-align:center;flex-shrink:0;}
  .m-cfg-select{flex:1;background:var(--bg-input);border:1px solid var(--border-main);color:var(--text-main);font-family:var(--font-ui);font-size:12px;padding:10px;border-radius:4px;-webkit-appearance:none;appearance:none;min-height:44px;}
  .m-cfg-select:focus{outline:1px solid var(--accent-cyan);outline-offset:-1px;}
}
@media (min-width:641px){
  #m-shell{display:none!important;}
}

/* ── Wave / type buttons ── */
.wbtns{display:flex;gap:5px;margin:6px 0;}
.wbtn{background:var(--bg-panel-7);border:1px solid var(--border-main);color:var(--text-dim);font-size:var(--fs-md);padding:4px 8px;cursor:pointer;border-radius:2px;font-family:inherit;}
.wbtn:hover{border-color:color-mix(in srgb,var(--accent-cyan) 32%, transparent);color:var(--accent-cyan);}
.wbtn.on{background:var(--bg-button-active);border-color:var(--accent);color:var(--accent);box-shadow:0 0 6px color-mix(in srgb,var(--accent) 28%, transparent);}

/* ── Patch points ── */
.pp-row{display:flex;align-items:center;gap:10px;margin:10px 0;font-size:var(--fs-sm);color:var(--text-muted);}
.pp{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid rgba(0,0,0,.4);transition:transform .15s,box-shadow .15s;flex-shrink:0;}
.pp:hover{transform:scale(1.5);}
.pp.ao{background:#cc00ff;box-shadow:0 0 6px #cc00ff,0 0 16px #cc00ff66;}
.pp.co{background:#00aaff;box-shadow:0 0 6px #00aaff,0 0 16px #00aaff66;}
.pp.ai{background:#00ff66;box-shadow:0 0 6px #00ff66,0 0 16px #00ff6666;}
.pp.ci{background:#ffee00;box-shadow:0 0 6px #ffee00,0 0 16px #ffee0066;}
.pp.gi{background:#ffee00;box-shadow:0 0 6px #ffee00,0 0 16px #ffee0066;}
.pp.pending{animation:ppulse .4s infinite alternate;}
@keyframes ppulse{from{transform:scale(1);}to{transform:scale(1.7);}}
.pp.linked{filter:brightness(1.4);}
.pp.ghost-snap{box-shadow:0 0 0 3px rgba(255,255,255,.6),0 0 10px rgba(255,255,255,.25);transform:scale(1.6);}
/* Available inputs lit up while a cable is being dragged */
.pp.pp-available{animation:pp-avail 1.1s ease-in-out infinite alternate;}
@keyframes pp-avail{from{transform:scale(1);}to{transform:scale(1.25);opacity:.75;}}
/* Type-compatible inputs (e.g. audio-in when dragging from audio-out) */
.pp.pp-compatible{animation:pp-compat .75s ease-in-out infinite alternate;filter:brightness(1.3);}
@keyframes pp-compat{from{transform:scale(1.1);}to{transform:scale(1.5);filter:brightness(1.6);}}

/* ── Canvas ── */
canvas{display:block;border-radius:3px;}
.cv-canvas{border:1px solid var(--border-soft);background:var(--bg-panel-4);}

/* ── Seq ── */
.seq-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin:4px 0;}
.seq-step{background:var(--bg-panel-3);border:1px solid color-mix(in srgb,var(--border-main) 75%, transparent);border-radius:2px;padding:3px;}
.seq-step.lit{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 12%, var(--bg-panel-3));box-shadow:0 0 6px color-mix(in srgb,var(--accent) 28%, transparent);}
.step-tog{width:100%;height:8px;background:color-mix(in srgb,var(--bg-panel-hover) 82%, transparent);border:none;cursor:pointer;border-radius:1px;margin-bottom:2px;}
.step-tog.on{background:var(--accent);box-shadow:0 0 4px var(--accent);}

/* ── Transport / buttons ── */
.btn{background:var(--bg-panel);border:1px solid var(--border-strong);color:var(--text-soft);padding:6px 10px;cursor:pointer;font-size:var(--fs-md);border-radius:2px;font-family:inherit;letter-spacing:1px;transition:border-color .18s ease,color .18s ease,background .18s ease,box-shadow .18s ease;touch-action:manipulation;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.on{background:var(--bg-button-active);border-color:var(--accent);color:var(--accent);box-shadow:0 0 8px color-mix(in srgb,var(--accent) 28%, transparent);}
.btn.rec-live{background:color-mix(in srgb,var(--accent-danger) 18%, transparent);border-color:#ff0000;color:var(--accent-danger);animation:recblink 1s infinite;}
@keyframes recblink{50%{opacity:.5;}}
.transport{display:flex;align-items:center;gap:8px;margin:8px 0;flex-wrap:wrap;}

/* ── Oct selector ── */
.oct-row{display:flex;gap:4px;margin:6px 0;}
.oct-btn{background:var(--bg-panel-7);border:1px solid var(--border-main);color:var(--text-dim);font-size:var(--fs-sm);padding:3px 6px;cursor:pointer;border-radius:2px;font-family:inherit;}
.oct-btn.on{background:var(--bg-button-active-alt);border-color:var(--accent-cyan);color:var(--accent-cyan);}

/* ── Divider ── */
hr{border:none;border-top:1px solid var(--border-soft);margin:14px 0;}

/* ── Fullscreen Visualizer ── */
#viz-overlay{position:fixed;inset:0;z-index:9000;background:#000;display:none;}
#viz-overlay.open{display:block;}
#viz-canvas{position:absolute;inset:0;display:block;}
#viz-name{position:absolute;top:22px;left:26px;font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.16);letter-spacing:2px;pointer-events:none;}
#viz-mode-lbl{position:absolute;top:22px;right:130px;font-family:var(--font-mono);font-size:10px;color:rgba(0,255,255,0.28);letter-spacing:3px;pointer-events:none;}
#viz-close-btn{position:absolute;top:14px;right:20px;background:none;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.35);padding:5px 14px;cursor:pointer;font-family:var(--font-mono);font-size:10px;letter-spacing:2px;border-radius:2px;}
#viz-close-btn:hover{border-color:rgba(0,255,255,0.4);color:rgba(0,255,255,0.7);}
#viz-mode-row{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:center;cursor:pointer;}
.viz-pip{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.12);transition:background .2s;}
.viz-pip.on{background:rgba(0,255,255,0.6);}
#viz-hint{position:absolute;bottom:22px;right:26px;font-family:var(--font-mono);font-size:9px;color:rgba(255,255,255,0.1);letter-spacing:1px;pointer-events:none;}

/* ── Toolbar ── */
#toolbar{display:flex;gap:6px;padding:10px 16px;background:var(--bg-toolbar);border-top:1px solid var(--border-bright);align-items:center;flex-wrap:wrap;position:sticky;bottom:0;backdrop-filter:blur(12px);}
#toolbar .btn{font-size:var(--fs-lg);padding:5px 12px;}
#status{color:var(--text-dim);font-size:var(--fs-md);margin-left:auto;letter-spacing:2px;}
#site-footer{padding:14px 16px 28px;text-align:center;background:linear-gradient(180deg,color-mix(in srgb,var(--bg-toolbar) 72%, transparent),transparent);}
.footer-link{display:inline-flex;align-items:center;gap:8px;color:var(--text-soft);font-family:var(--font-ui);font-size:var(--fs-sm);letter-spacing:.4px;text-decoration:none;padding:8px 14px;border:1px solid var(--border-soft);border-radius:999px;background:color-mix(in srgb,var(--bg-panel) 82%, transparent);box-shadow:0 0 12px color-mix(in srgb,var(--accent) 6%, transparent);transition:border-color .18s ease,color .18s ease,box-shadow .18s ease,transform .18s ease;}
.footer-link:hover{color:var(--accent);border-color:var(--border-bright);box-shadow:0 0 16px color-mix(in srgb,var(--accent) 18%, transparent);transform:translateY(-1px);}
.footer-link span{color:var(--text-dim);}

/* ── SVG cables ── */
#cables{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;}

/* ── Tooltip ── */
#tip{position:fixed;background:var(--bg-flow);color:var(--accent-cyan);border:1px solid color-mix(in srgb,var(--accent-cyan) 26%, transparent);padding:6px 10px;font-size:var(--fs-md);border-radius:3px;pointer-events:none;z-index:500;display:none;max-width:320px;line-height:1.6;box-shadow:0 0 16px color-mix(in srgb,var(--accent-cyan) 13%, transparent);white-space:pre-line;}
#tip .tip-hint{display:block;color:color-mix(in srgb,var(--text-strong) 28%, transparent);font-size:var(--fs-xs);letter-spacing:1px;margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid color-mix(in srgb,var(--text-strong) 8%, transparent);}

/* ── Preset select ── */
.tb-sep{flex-basis:100%;height:1px;background:color-mix(in srgb,var(--accent) 7%, transparent);margin:2px -6px;}
.tb-lbl{font-size:var(--fs-sm);color:var(--text-faint);letter-spacing:2px;align-self:center;padding-left:4px;}
#morph-bars-label,#scene-status{color:var(--text-dim);}
.preset-sel{background:var(--bg-panel);border:1px solid var(--border-strong);color:var(--text-main);padding:4px 6px;font-size:var(--fs-md);border-radius:2px;font-family:var(--font-ui);cursor:pointer;max-width:150px;}
.preset-sel:focus{border-color:var(--accent);outline:none;}

/* ── MIDI indicator ── */
#midi-ind{font-size:var(--fs-sm);padding:3px 8px;border:1px solid var(--border-main);color:var(--text-dim);letter-spacing:1px;border-radius:2px;align-self:center;white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis;}
#midi-ind.on{border-color:color-mix(in srgb,var(--accent-cyan) 32%, transparent);color:var(--accent-cyan);text-shadow:0 0 6px color-mix(in srgb,var(--accent-cyan) 35%, transparent);}

/* ── Sampler ── */
.sampler-wave{border:1px solid var(--border-soft);background:var(--bg-panel-4);border-radius:2px;display:block;cursor:pointer;}
.sampler-fname{font-size:var(--fs-xs);color:var(--text-dim);letter-spacing:1px;margin:2px 0;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px;}

/* ── Loop Station ── */
#loopstation{padding:8px 16px;background:var(--bg-toolbar);border-top:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);}
.ls-title{font-size:var(--fs-sm);letter-spacing:3px;color:var(--accent);text-shadow:0 0 8px color-mix(in srgb,var(--accent) 32%, transparent);margin-bottom:6px;}
.ls-tracks{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ls-track{background:var(--bg-track);border:1px solid var(--border-soft);border-radius:4px;padding:8px;display:flex;align-items:center;gap:8px;min-width:0;}
.ls-track.armed{border-color:#ff0000;box-shadow:0 0 8px #ff000044;}
.ls-track.recording{border-color:#ff0000;box-shadow:0 0 12px #ff000066;animation:recblink 1s infinite;}
.ls-track.has-loop{border-color:color-mix(in srgb,var(--accent-cyan) 26%, transparent);}
.ls-track-num{font-size:var(--fs-md);color:var(--text-faint);letter-spacing:2px;width:14px;flex-shrink:0;}
.ls-wave{flex:1;height:36px;border:1px solid color-mix(in srgb,var(--text-strong) 8%, transparent);border-radius:2px;background:var(--bg-wave);}
.ls-btns{display:flex;gap:3px;flex-direction:column;}
.ls-btns-row{display:flex;gap:3px;}
.ls-btn{background:var(--bg-panel);border:1px solid var(--border-main);color:var(--text-dim);padding:2px 6px;cursor:pointer;font-size:var(--fs-sm);border-radius:2px;font-family:var(--font-ui);letter-spacing:.7px;white-space:nowrap;}
.ls-btn:hover{border-color:var(--accent);color:var(--accent);}
.ls-btn.rec{border-color:#ff0000;color:var(--accent-danger);}
.ls-btn.rec:hover,.ls-btn.rec.on{background:#ff000022;border-color:#ff0000;color:var(--accent-danger-2);box-shadow:0 0 6px #ff000044;}
.ls-btn.play.on{background:var(--bg-button-active-alt);border-color:var(--accent-cyan);color:var(--accent-cyan);box-shadow:0 0 6px color-mix(in srgb,var(--accent-cyan) 28%, transparent);}
.ls-btn.dub.on{background:#ffff0022;border-color:#ffff00;color:#ffff00;}
.ls-lbl{font-size:var(--fs-xs);color:var(--text-dim);letter-spacing:2px;width:14px;flex-shrink:0;text-align:center;}

/* ── Signal Flow Panel ── */
#flow-panel{position:fixed;top:70px;right:0;width:250px;background:var(--bg-flow);border:1px solid var(--border-bright);border-right:none;border-radius:4px 0 0 4px;z-index:200;transform:translateX(100%);transition:transform .3s;box-shadow:-4px 0 16px color-mix(in srgb,var(--accent) 4%, transparent);}
#flow-panel.open{transform:translateX(0);}
#flow-hdr{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--bg-panel-5);border-bottom:1px solid var(--border-soft);font-size:var(--fs-sm);letter-spacing:3px;color:var(--accent);}
#flow-body{padding:8px;max-height:360px;overflow-y:auto;overflow-x:auto;}

/* ── Signal Probe (Alt+click any output jack) ── */
.nm-probe{position:fixed;z-index:600;background:var(--bg-panel-5);border:1px solid var(--border-bright);border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,.65);width:180px;user-select:none;}
.nm-probe-hdr{display:flex;justify-content:space-between;align-items:center;padding:3px 6px;background:var(--bg-panel-6);border-radius:4px 4px 0 0;cursor:grab;font-size:9px;letter-spacing:2px;}
.nm-probe-hdr:active{cursor:grabbing;}
.nm-probe canvas{display:block;border-radius:0 0 4px 4px;}
.flow-chain{display:flex;align-items:center;gap:3px;margin:3px 0;flex-wrap:wrap;}
.flow-node{background:var(--bg-panel-3);border:1px solid var(--border-main);border-radius:2px;padding:2px 5px;font-size:var(--fs-xs);white-space:nowrap;}
.flow-arr{color:var(--text-dim);font-size:var(--fs-sm);animation:farrow 2s infinite;}
@keyframes farrow{0%,100%{opacity:.2;}50%{opacity:1;}}
@keyframes cable-flow{from{stroke-dashoffset:18;}to{stroke-dashoffset:0;}}

/* ── Tutorial Panel ── */
#tut-panel{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(calc(100% + 80px));width:460px;max-width:96vw;max-height:calc(100vh - 90px);display:flex;flex-direction:column;background:var(--bg-flow);border:1px solid var(--border-cyan-soft);border-radius:4px;z-index:250;box-shadow:0 0 30px color-mix(in srgb,var(--accent-cyan) 8%, transparent);transition:transform .35s;}
#tut-panel.open{transform:translateX(-50%) translateY(0);}
#tut-hdr{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg-panel-5);border-bottom:1px solid color-mix(in srgb,var(--accent-cyan) 14%, transparent);font-size:var(--fs-sm);letter-spacing:3px;color:var(--accent-cyan);}
#tut-body{padding:12px;overflow-y:auto;flex:1 1 auto;min-height:0;}
.tut-actions{display:flex;flex-direction:column;gap:6px;margin:10px 0 6px;}
.tut-patch-btn{display:flex;align-items:center;gap:8px;background:var(--bg-panel-3);border:1px solid var(--border-cyan-soft);color:var(--accent-cyan);padding:8px 12px;border-radius:4px;cursor:pointer;font-family:var(--font-ui);font-size:var(--fs-sm);letter-spacing:.6px;transition:all .2s;}
.tut-patch-btn:hover{border-color:var(--accent-cyan);background:var(--bg-panel-hover);box-shadow:0 0 12px color-mix(in srgb,var(--accent-cyan) 14%, transparent);}
.tut-patch-btn.done{border-color:#00ff6644;color:#00ff66;opacity:.7;}
.tut-patch-btn.done::after{content:' ✓';color:#00ff66;}
.tut-patch-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.tut-patch-arrow{color:var(--text-dim);font-size:14px;}
.tut-pp-highlight{animation:tut-pp-pulse .6s ease-in-out infinite alternate !important;transform:scale(1.8) !important;z-index:100;position:relative;}
@keyframes tut-pp-pulse{from{box-shadow:0 0 8px currentColor,0 0 20px currentColor;}to{box-shadow:0 0 14px currentColor,0 0 30px currentColor,0 0 50px currentColor;}}
.tut-pick{display:block;width:100%;text-align:left;background:var(--bg-panel-3);border:1px solid color-mix(in srgb,var(--accent-cyan) 10%, transparent);color:var(--text-muted);padding:8px 10px;margin:4px 0;cursor:pointer;font-size:var(--fs-sm);border-radius:2px;font-family:var(--font-ui);letter-spacing:.4px;transition:all .2s;}
.tut-pick:hover{border-color:color-mix(in srgb,var(--accent-cyan) 34%, transparent);color:var(--accent-cyan);background:var(--bg-panel-hover);}
#tut-step-title{font-size:var(--fs-lg);color:var(--accent-cyan);letter-spacing:2px;margin-bottom:8px;}
#tut-step-text{font-size:var(--fs-sm);color:var(--text-soft);line-height:1.9;letter-spacing:.4px;margin-bottom:12px;}
#tut-prog{font-size:var(--fs-xs);color:var(--text-dim);letter-spacing:2px;margin-left:auto;}
.tut-highlight{border-color:var(--accent-cyan) !important;box-shadow:0 0 18px color-mix(in srgb,var(--accent-cyan) 20%, transparent),inset 0 0 8px color-mix(in srgb,var(--accent-cyan) 4%, transparent) !important;z-index:10;position:relative;}

/* ── Notes ── */
.notes-area{flex:1;min-height:30px;max-height:60px;resize:vertical;background:var(--bg-panel-6);border:1px solid color-mix(in srgb,var(--accent) 8%, transparent);color:var(--text-soft);font-family:var(--font-ui);font-size:var(--fs-sm);padding:4px 8px;border-radius:2px;outline:none;letter-spacing:.15px;line-height:1.45;}
.notes-area:focus{border-color:color-mix(in srgb,var(--accent) 22%, transparent);color:var(--text-main);}
/* ── Scenes ── */
.scene-slot.filled{border-color:color-mix(in srgb,var(--accent) 42%, transparent);color:var(--accent);box-shadow:0 0 6px color-mix(in srgb,var(--accent) 28%, transparent);}
.scene-slot.filled:hover{border-color:var(--accent);color:var(--accent);}
/* ── Scene Morph ── */
@keyframes morphpulse{0%,100%{opacity:1}50%{opacity:.35}}
#morph-btn.morphing{animation:morphpulse 1s ease-in-out infinite;border-color:color-mix(in srgb,var(--accent) 66%, transparent);color:var(--accent);}
@keyframes hintpulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 10px 2px color-mix(in srgb,var(--accent-cyan) 60%,transparent);border-color:var(--accent-cyan)!important;color:var(--accent-cyan)!important;}}
.hint-pulse{animation:hintpulse 1.4s ease-in-out infinite!important;}
#morph-bars{display:none;gap:2px;align-items:center;}
.morph-bar-btn{min-width:22px;}
/* ── 16-step grid extension ── */
.seq-extra{display:none;}
.seq-extra.show{display:contents;}

/* ── Pad Sampler ── */
.pad-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:4px 0;}
.pad{background:var(--bg-pad);border:1px solid color-mix(in srgb,var(--border-main) 85%, transparent);border-radius:3px;cursor:pointer;padding:4px 2px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:border-color .08s,background .05s;user-select:none;position:relative;}
.pad:hover{border-color:color-mix(in srgb,var(--accent) 26%, transparent);}
.pad.loaded{border-color:color-mix(in srgb,var(--accent) 34%, transparent);}
.pad.pad-active{background:var(--bg-pad-active);border-color:var(--accent);box-shadow:0 0 10px color-mix(in srgb,var(--accent) 28%, transparent);}
.pad-key{font-size:8px;color:#383860;letter-spacing:1px;line-height:1;}
.pad-name{font-size:7px;color:var(--text-faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:52px;text-align:center;line-height:1.2;}
.pad.loaded .pad-key{color:#ff00ff88;}
.pad.loaded .pad-name{color:var(--text-soft);}
/* ── Mic Input ── */
#mic-vu{border:1px solid var(--border-soft);background:var(--bg-panel-4);border-radius:2px;display:block;}
/* ── Stutter ── */
.stutter-rate{display:flex;gap:2px;margin:3px 0;}
/* ── Patch teaching toasts ── */
.patch-toast{position:fixed;bottom:58px;left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--bg-track);border:1px solid var(--border-main);color:var(--text-soft);padding:7px 14px;border-radius:3px;
  font-size:var(--fs-sm);max-width:460px;text-align:center;z-index:9999;opacity:0;pointer-events:none;
  transition:opacity 0.2s ease,transform 0.2s ease;letter-spacing:.3px;line-height:1.5;}
.patch-toast.visible{opacity:1;transform:translateX(-50%) translateY(0);}
.patch-toast.toast-info{border-color:#0088ff55;color:#88ccff;}
.patch-toast.toast-tip{border-color:#ffcc0055;color:#ffcc88;}
.patch-toast.toast-warn{border-color:#ff660055;color:#ffaa66;}
.tut-ask{pointer-events:all;padding:8px 14px;}
.tut-ask-yes,.tut-ask-no{background:none;border:1px solid currentColor;color:inherit;font-family:var(--font-ui);font-size:var(--fs-sm);letter-spacing:.4px;padding:3px 9px;border-radius:2px;cursor:pointer;margin-left:9px;}
.tut-ask-yes{border-color:var(--accent-cyan);color:var(--accent-cyan);}
.tut-ask-no{opacity:.5;}

/* ── Mobile tutorial overlay ──
   z-index 835: above workspace (auto/0), below all sheets (840+).
   Card sits above tabbar+perfstrip (~115px total). SKIP ALL lives inside
   the card — no floating element that can overlap app UI. */
#nm2-tutorial-overlay{position:fixed;inset:0;z-index:835;pointer-events:none;}
.nm2-tut-mask{position:absolute;inset:0;pointer-events:none;}
.nm2-tut-card{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 115px);left:12px;right:12px;background:var(--bg-panel-6);border:1.5px solid var(--accent-cyan);border-radius:12px;padding:14px 16px 12px;z-index:836;pointer-events:all;transition:box-shadow 150ms;}
.nm2-tut-step{font-size:9px;letter-spacing:.12em;color:var(--text-dim);margin:0 0 7px;text-transform:uppercase;}
.nm2-tut-tip-text{font-size:14px;color:var(--text-main);line-height:1.55;margin:0 0 12px;}
.nm2-tut-btn-row{display:flex;justify-content:space-between;align-items:center;}
.nm2-tut-skip{background:none;border:none;color:var(--text-dim);font-family:var(--font-ui);font-size:11px;letter-spacing:.06em;cursor:pointer;padding:5px 0;min-height:32px;}
.nm2-tut-next{background:none;border:1.5px solid var(--accent-cyan);color:var(--accent-cyan);padding:6px 18px;border-radius:6px;cursor:pointer;font-family:var(--font-ui);font-size:13px;letter-spacing:.06em;min-height:36px;}
.nm2-tut-complete{position:fixed;inset:0;z-index:995;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.78);color:var(--text-main);font-size:15px;line-height:1.6;text-align:center;padding:32px 24px;opacity:0;transition:opacity 200ms;pointer-events:none;}
</style>

        <feMerge><feMergeNode in="b3"/><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
