// ═══════════════════════════════════════════════════════════════════════════════
// MIC LOOPER
// ═══════════════════════════════════════════════════════════════════════════════
function makeMicLooper() {
  const gainIn   = ctx.createGain(); gainIn.gain.value  = 1.0;
  const gainOut  = ctx.createGain(); gainOut.gain.value = 0.8;
  const outlet   = ctx.createGain(); outlet.gain.value  = 1.0;
  const analyser = ctx.createAnalyser(); analyser.fftSize = 256;
  gainIn.connect(analyser);   // mic monitoring
  gainOut.connect(analyser);  // playback monitoring
  gainOut.connect(outlet);

  const m = {
    gainIn, gainOut, outlet, analyser,
    stream: null, src: null, active: false,
    buffer: null, playingSrc: null,
    playing: false, recording: false, looping: true,
    rec: null, recChunks: [], _recDest: null,
    levelInVal: 1.0, levelOutVal: 0.8,
    onLoopReady: null,
  };

  m.arm = async () => {
    if (m.active) {
      if (m.recording) m.stopRec();
      m.stop();
      if (m.src) { m.src.disconnect(); m.src = null; }
      if (m.stream && !(mods.mic && mods.mic.stream === m.stream)) {
        m.stream.getTracks().forEach(t => t.stop());
      }
      m.stream = null; m.active = false; return false;
    }
    try {
      if (mods.mic && mods.mic.active && mods.mic.stream) {
        m.stream = mods.mic.stream;
      } else {
        m.stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      }
      m.src = ctx.createMediaStreamSource(m.stream);
      m.src.connect(gainIn);
      m.active = true; return true;
    } catch(e) { console.warn('MicLooper: access denied', e); return false; }
  };

  m.startRec = () => {
    if (!m.active || m.recording) return false;
    m.recChunks = [];
    const dest = ctx.createMediaStreamDestination();
    gainIn.connect(dest);
    m._recDest = dest;
    const mtype = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm';
    m.rec = new MediaRecorder(dest.stream, { mimeType: mtype });
    m.rec.ondataavailable = e => { if (e.data.size > 0) m.recChunks.push(e.data); };
    m.rec.onstop = async () => {
      try { gainIn.disconnect(dest); } catch(e) {}
      const blob = new Blob(m.recChunks, { type: mtype });
      try {
        m.buffer = await ctx.decodeAudioData(await blob.arrayBuffer());
        m.recording = false;
        if (m.looping) m.play();
        if (m.onLoopReady) m.onLoopReady();
      } catch(e) { console.warn('MicLooper decode error', e); m.recording = false; }
    };
    m.rec.start();
    m.recording = true;
    return true;
  };

  m.stopRec = () => {
    if (!m.rec || m.rec.state !== 'recording') return;
    m.rec.stop();
  };

  m.play = () => {
    if (!m.buffer) return;
    m.stop();
    const src = ctx.createBufferSource();
    src.buffer = m.buffer; src.loop = m.looping;
    src.connect(gainOut); src.start();
    m.playingSrc = src; m.playing = true;
    src.onended = () => { if (m.playingSrc === src) { m.playing = false; m.playingSrc = null; } };
  };

  m.stop = () => {
    if (m.playingSrc) { try { m.playingSrc.stop(); } catch(e) {} m.playingSrc = null; }
    m.playing = false;
  };

  m.clear = () => { m.stop(); m.buffer = null; };

  m.setLevelIn  = v => { m.levelInVal  = v; gainIn.gain.setTargetAtTime(v, ctx.currentTime, 0.02); };
  m.setLevelOut = v => { m.levelOutVal = v; gainOut.gain.setTargetAtTime(v, ctx.currentTime, 0.02); };

  mods.miclooper = m; return m;
}

function buildMicLooperPanel() {
  const d = document.createElement('div'); d.style.minWidth = '110px';

  // VU meter (shows mic input + playback level)
  const vu = document.createElement('canvas');
  vu.width = 94; vu.height = 12;
  vu.style.cssText = 'display:block;margin-bottom:3px;border:1px solid #ff00ff22;background:#04040e;border-radius:2px;';
  const vCtx = vu.getContext('2d');
  const abuf = new Float32Array(256);
  function drawVU() {
    requestAnimationFrame(drawVU);
    vCtx.fillStyle = '#04040e'; vCtx.fillRect(0, 0, 94, 12);
    if (!mods.miclooper.active && !mods.miclooper.playing) return;
    mods.miclooper.analyser.getFloatTimeDomainData(abuf);
    let rms = 0; for (const v of abuf) rms += v * v; rms = Math.sqrt(rms / abuf.length);
    const w = Math.min(94, rms * 380);
    const g = vCtx.createLinearGradient(0, 0, 94, 0);
    g.addColorStop(0, '#00ff88'); g.addColorStop(0.6, '#ffff00'); g.addColorStop(1, '#ff4444');
    vCtx.fillStyle = g; vCtx.fillRect(0, 1, w, 10);
  }
  drawVU();

  // Waveform display (filled in once loop is recorded)
  const wave = document.createElement('canvas');
  wave.width = 94; wave.height = 30;
  wave.style.cssText = 'display:block;margin-bottom:4px;border:1px solid #ff00ff22;background:#04040e;border-radius:2px;';
  const wCtx = wave.getContext('2d');
  function drawWave() {
    wCtx.fillStyle = '#04040e'; wCtx.fillRect(0, 0, 94, 30);
    if (!mods.miclooper.buffer) {
      wCtx.fillStyle = '#333'; wCtx.font = '6px Courier New';
      wCtx.textAlign = 'center'; wCtx.fillText('no loop', 47, 17);
      return;
    }
    const data = mods.miclooper.buffer.getChannelData(0);
    const step = Math.max(1, Math.ceil(data.length / 94));
    wCtx.strokeStyle = '#ff00ff88'; wCtx.lineWidth = 1; wCtx.beginPath();
    for (let x = 0; x < 94; x++) {
      let min = 1, max = -1;
      for (let j = 0; j < step; j++) {
        const s = data[x * step + j] || 0;
        if (s < min) min = s; if (s > max) max = s;
      }
      const y1 = (1 - max) / 2 * 30, y2 = (1 - min) / 2 * 30;
      if (x === 0) wCtx.moveTo(x, Math.max(y1, 1));
      else { wCtx.lineTo(x, Math.max(y1, 1)); wCtx.lineTo(x, Math.min(y2, 29)); }
    }
    wCtx.stroke();
  }
  drawWave();

  // ARM button
  const armBtn = document.createElement('button');
  armBtn.className = 'btn'; armBtn.style.cssText = 'width:100%;margin-bottom:3px;font-size:8px;';
  armBtn.textContent = 'ARM MIC';
  armBtn.addEventListener('click', async () => {
    await mods.miclooper.arm();
    armBtn.classList.toggle('on', mods.miclooper.active);
    armBtn.textContent = mods.miclooper.active ? '⦿ LIVE' : 'ARM MIC';
    if (!mods.miclooper.active && mods.miclooper.recording) {
      recBtn.classList.remove('rec-live'); recBtn.textContent = '● REC';
    }
  });

  // Transport row: REC / PLAY / STOP
  const txRow = document.createElement('div'); txRow.style.cssText = 'display:flex;gap:2px;margin-bottom:3px;';

  const recBtn = document.createElement('button');
  recBtn.className = 'btn'; recBtn.style.cssText = 'flex:1.5;font-size:9px;';
  recBtn.textContent = '● REC';
  recBtn.addEventListener('click', () => {
    if (!ctx) { setStatus('Power on first.'); return; }
    if (!mods.miclooper.active) { setStatus('ARM MIC LOOP first.'); return; }
    if (mods.miclooper.recording) {
      mods.miclooper.stopRec();
      recBtn.classList.remove('rec-live'); recBtn.textContent = '● REC';
    } else {
      if (mods.miclooper.startRec()) {
        recBtn.classList.add('rec-live'); recBtn.textContent = '■ STOP';
        playBtn.classList.remove('on');
      }
    }
  });

  const playBtn = document.createElement('button');
  playBtn.className = 'btn'; playBtn.style.cssText = 'flex:1;font-size:9px;';
  playBtn.textContent = '▶'; playBtn.title = 'Play loop';
  playBtn.addEventListener('click', () => {
    if (!mods.miclooper.buffer) { setStatus('Record a loop first.'); return; }
    mods.miclooper.play(); playBtn.classList.add('on');
  });

  const stopBtn = document.createElement('button');
  stopBtn.className = 'btn'; stopBtn.style.cssText = 'flex:1;font-size:9px;';
  stopBtn.textContent = '■'; stopBtn.title = 'Stop loop';
  stopBtn.addEventListener('click', () => { mods.miclooper.stop(); playBtn.classList.remove('on'); });

  txRow.appendChild(recBtn); txRow.appendChild(playBtn); txRow.appendChild(stopBtn);

  // Mode row: LOOP / CLEAR
  const modeRow = document.createElement('div'); modeRow.style.cssText = 'display:flex;gap:2px;margin-bottom:3px;';

  const loopBtn = document.createElement('button');
  loopBtn.className = 'btn on'; loopBtn.style.cssText = 'flex:1;font-size:9px;';
  loopBtn.textContent = '↻ LOOP'; loopBtn.title = 'Loop / one-shot';
  loopBtn.addEventListener('click', () => {
    mods.miclooper.looping = !mods.miclooper.looping;
    loopBtn.classList.toggle('on', mods.miclooper.looping);
    if (mods.miclooper.playingSrc) mods.miclooper.playingSrc.loop = mods.miclooper.looping;
  });

  const clearBtn = document.createElement('button');
  clearBtn.className = 'btn'; clearBtn.style.cssText = 'flex:1;font-size:9px;';
  clearBtn.textContent = '✕ CLR'; clearBtn.title = 'Erase loop';
  clearBtn.addEventListener('click', () => { mods.miclooper.clear(); playBtn.classList.remove('on'); drawWave(); });

  modeRow.appendChild(loopBtn); modeRow.appendChild(clearBtn);

  // Callback: updates UI after decode completes (async)
  mods.miclooper.onLoopReady = () => {
    drawWave();
    recBtn.classList.remove('rec-live'); recBtn.textContent = '● REC';
    playBtn.classList.add('on');
  };

  // Knobs
  const knobRow = document.createElement('div'); knobRow.style.cssText = 'display:flex;gap:2px;justify-content:center;';
  knobRow.appendChild(mkKnob({id:'micloop-level', label:'IN',  min:0.1, max:4,  val:1.0, log:true, onChange:v=>mods.miclooper.setLevelIn(v)}));
  knobRow.appendChild(mkKnob({id:'micloop-vol',   label:'OUT', min:0,   max:1,  val:0.8,           onChange:v=>mods.miclooper.setLevelOut(v)}));

  d.appendChild(vu); d.appendChild(wave); d.appendChild(armBtn);
  d.appendChild(txRow); d.appendChild(modeRow); d.appendChild(knobRow);
  d.appendChild(document.createElement('hr'));
  d.appendChild(mkPP('micloop-out','ao','OUT','out'));
  return panel('miclooper', 'MIC LOOP', d);
}

// ═══════════════════════════════════════════════════════════════════════════════
// MIC INPUT
// ═══════════════════════════════════════════════════════════════════════════════
function makeMicInput() {
  const gainNode = ctx.createGain(); gainNode.gain.value = 1.0;
  const outlet   = ctx.createGain(); outlet.gain.value   = 1.0;
  const analyser = ctx.createAnalyser(); analyser.fftSize = 256;
  gainNode.connect(outlet); outlet.connect(analyser);
  const m = { gainNode, outlet, analyser, stream: null, src: null, active: false, levelVal: 1.0 };
  m.arm = async () => {
    if (m.active) {
      if (m.src) { m.src.disconnect(); m.src = null; }
      if (m.stream) { m.stream.getTracks().forEach(t => t.stop()); m.stream = null; }
      m.active = false; return false;
    }
    try {
      m.stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      m.src = ctx.createMediaStreamSource(m.stream);
      m.src.connect(gainNode);
      m.active = true; return true;
    } catch(e) { console.warn('Mic access denied', e); return false; }
  };
  m.setLevel = v => { m.levelVal = v; gainNode.gain.setTargetAtTime(v, ctx.currentTime, 0.02); };
  mods.mic = m; return m;
}

function buildMicInputPanel() {
  const d = document.createElement('div'); d.style.minWidth = '90px';

  // VU meter
  const vu = document.createElement('canvas');
  vu.id = 'mic-vu'; vu.width = 74; vu.height = 20;
  const vCtx = vu.getContext('2d');
  const buf = new Float32Array(256);
  function drawVU() {
    if (!mods.mic.active) { vCtx.fillStyle='#04040e'; vCtx.fillRect(0,0,74,20); requestAnimationFrame(drawVU); return; }
    mods.mic.analyser.getFloatTimeDomainData(buf);
    let rms=0; for(const v of buf) rms+=v*v; rms=Math.sqrt(rms/buf.length);
    const w = Math.min(74, rms * 300);
    vCtx.fillStyle='#04040e'; vCtx.fillRect(0,0,74,20);
    const g = vCtx.createLinearGradient(0,0,74,0);
    g.addColorStop(0,'#00ff88'); g.addColorStop(0.6,'#ffff00'); g.addColorStop(1,'#ff4444');
    vCtx.fillStyle=g; vCtx.fillRect(0,2,w,16);
    requestAnimationFrame(drawVU);
  }
  drawVU();

  // ARM button
  const armBtn = document.createElement('button');
  armBtn.className='btn'; armBtn.style.cssText='width:100%;margin:3px 0;';
  armBtn.textContent='ARM MIC';
  armBtn.addEventListener('click', async () => {
    const ok = await mods.mic.arm();
    armBtn.classList.toggle('on', mods.mic.active);
    armBtn.textContent = mods.mic.active ? '■ LIVE' : 'ARM MIC';
  });

  d.appendChild(vu);
  d.appendChild(armBtn);
  d.appendChild(mkKnob({id:'mic-level', label:'LEVEL', min:0.1, max:4, val:1, log:true, tip:TIPS['mic-level'], onChange:v=>mods.mic.setLevel(v)}));
  d.appendChild(document.createElement('hr'));
  d.appendChild(mkPP('mic-out','ao','OUT','out'));
  return panel('micinput','MIC IN',d);
}

// ═══════════════════════════════════════════════════════════════════════════════
// PAD SAMPLER
// ═══════════════════════════════════════════════════════════════════════════════
const PAD_KEYS   = ['Q','W','E','R','A','S','D','F'];
const PAD_CODES  = ['KeyQ','KeyW','KeyE','KeyR','KeyA','KeyS','KeyD','KeyF'];
const PAD_MIDI   = [48,49,50,51,52,53,54,55]; // C3–G3

function makePadSampler() {
  const outlet = ctx.createGain(); outlet.gain.value = 1.0;
  const pads = Array.from({length: 8}, (_, i) => {
    const gain = ctx.createGain(); gain.gain.value = 0.85;
    gain.connect(outlet);
    return { i, buffer: null, src: null, gain, fileName: '', el: null };
  });
  const m = { pads, outlet };
  m.trigger = i => {
    const p = pads[i]; if (!p.buffer) return;
    if (p.src) { try { p.src.stop(); } catch(e){} p.src = null; }
    const src = ctx.createBufferSource(); src.buffer = p.buffer;
    src.connect(p.gain); src.start(); p.src = src;
    src.onended = () => { p.src = null; p.el?.classList.remove('pad-active'); };
    p.el?.classList.add('pad-active');
  };
  m.load = async (i, file) => {
    try {
      const ab = await file.arrayBuffer();
      pads[i].buffer = await ctx.decodeAudioData(ab);
      pads[i].fileName = file.name.replace(/\.[^.]+$/, '');
      pads[i].el?.classList.add('loaded');
      const nameEl = pads[i].el?.querySelector('.pad-name');
      if (nameEl) nameEl.textContent = pads[i].fileName;
    } catch(e) { console.warn('Pad load failed', e); }
  };
  mods.padsampler = m; return m;
}

function buildPadSamplerPanel() {
  const d = document.createElement('div'); d.style.minWidth = '140px';
  const grid = document.createElement('div'); grid.className = 'pad-grid';

  mods.padsampler.pads.forEach((p, i) => {
    const pad = document.createElement('div'); pad.className = 'pad'; p.el = pad;

    const keyLbl  = document.createElement('div'); keyLbl.className  = 'pad-key';  keyLbl.textContent  = PAD_KEYS[i];
    const nameLbl = document.createElement('div'); nameLbl.className = 'pad-name'; nameLbl.textContent = '— empty —';

    pad.appendChild(keyLbl); pad.appendChild(nameLbl);
    pad.title = `Pad ${i+1} · key ${PAD_KEYS[i]} · MIDI ${PAD_MIDI[i]}`;

    // Click to trigger if loaded, or open file picker if empty
    const fi = document.createElement('input'); fi.type='file'; fi.accept='audio/*'; fi.style.display='none';
    fi.addEventListener('change', e => { if(e.target.files[0]) mods.padsampler.load(i, e.target.files[0]); });
    pad.appendChild(fi);

    pad.addEventListener('click', () => {
      if (p.buffer) mods.padsampler.trigger(i);
      else fi.click();
    });

    // Right-click to load new file on an already-loaded pad
    pad.addEventListener('contextmenu', e => { e.preventDefault(); fi.click(); });

    // Drag-drop
    pad.addEventListener('dragover',  e => { e.preventDefault(); pad.style.borderColor = '#ff00ff'; });
    pad.addEventListener('dragleave', () => { pad.style.borderColor = ''; });
    pad.addEventListener('drop', e => {
      e.preventDefault(); pad.style.borderColor = '';
      const f = e.dataTransfer.files[0]; if(f) mods.padsampler.load(i, f);
    });

    grid.appendChild(pad);
  });

  d.appendChild(grid);
  d.appendChild(document.createElement('hr'));
  d.appendChild(mkPP('padsampler-out', 'ao', 'OUT', 'out'));
  return panel('padsampler', 'PAD SMPLR', d);
}

// ═══════════════════════════════════════════════════════════════════════════════
// MASTER LIMITER
// ═══════════════════════════════════════════════════════════════════════════════
function makeLimiter() {
  function buildCurve(drive) {
    const n = 256, c = new Float32Array(n);
    const d = Math.max(0.001, drive);
    const norm = Math.tanh(d);
    for (let i = 0; i < n; i++) {
      const x = (i * 2) / (n - 1) - 1;
      c[i] = Math.tanh(x * d) / norm;
    }
    return c;
  }
  const preGain  = ctx.createGain();  preGain.gain.value  = 1.5;
  const shaper   = ctx.createWaveShaper(); shaper.oversample = '4x';
  const postGain = ctx.createGain(); postGain.gain.value = 0.85;
  shaper.curve = buildCurve(1.5);
  preGain.connect(shaper); shaper.connect(postGain);
  const m = { inlet: preGain, outlet: postGain, threshVal: 1.5, ceilVal: 0.85 };
  m.setThresh = v => { m.threshVal = v; preGain.gain.setTargetAtTime(v, ctx.currentTime, 0.01); shaper.curve = buildCurve(v); };
  m.setCeil   = v => { m.ceilVal   = v; postGain.gain.setTargetAtTime(v, ctx.currentTime, 0.01); };
  return m;
}

  limKnobs.appendChild(mkKnob({id:'lim-ceil',  label:'CEIL', min:0.3,max:1, val:0.85,          sz:'sm',tip:TIPS['lim-ceil'],  onChange:v=>mods.limiter.setCeil(v)}));

// ── Keyboard shortcuts ──────────────────────────────────────────────────────
// Ctrl+Z: undo  |  Q-R/A-F: pad sampler  |  1-4: loop REC  |  Space: stop all loops
document.addEventListener('keydown', e => {
  if (!ctx) return;
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

  // Escape — cancel pending cable
  if (e.key === 'Escape' && pendingPP) {
    ppMap[pendingPP].el.classList.remove('pending'); pendingPP = null; setStatus(''); stopGhost(); return;
  }

  // Undo
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    if (undoStack.length) { const cmd = undoStack.pop(); cmd.undo(); setStatus(`Undo: ${cmd.label}`); }
    else setStatus('Nothing to undo');
    return;
  }

  // Pad sampler — Q W E R / A S D F
  const padIdx = PAD_CODES.indexOf(e.code);
  if (padIdx !== -1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
    e.preventDefault();
    mods.padsampler?.trigger(padIdx);
    return;
  }

  if (!mods.looper) return;
  if (e.code === 'Space') {
    e.preventDefault();
    mods.looper.tracks.forEach(lp => { if (lp.playing) lp.playBtn.click(); });
  } else if (['Digit1','Digit2','Digit3','Digit4'].includes(e.code)) {
    e.preventDefault();
    mods.looper.tracks[parseInt(e.code[5]) - 1].recBtn.click();
  }
});
