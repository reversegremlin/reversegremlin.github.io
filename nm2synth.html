function encodePatch(cfg) {
  const bytes = new TextEncoder().encode(JSON.stringify(cfg));
  let bin = '';
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin);
}
function decodePatch(str) {
  const bytes = Uint8Array.from(atob(str), c => c.charCodeAt(0));
  return JSON.parse(new TextDecoder().decode(bytes));
}

function exportGraph() {
  if (!ctx) { setStatus('Power on first.'); return; }
  if (nm2Mobile?.active) { setStatus('Graph export requires desktop view — resize browser above 640px.'); return; }
  const rack = document.getElementById('rack');
  const rRect = rack.getBoundingClientRect();
  const cw = Math.round(rRect.width), ch = Math.round(rRect.height);
  const cv = document.createElement('canvas'); cv.width = cw; cv.height = ch;
  const c = cv.getContext('2d');
  c.fillStyle = '#04040e'; c.fillRect(0, 0, cw, ch);
  // Draw module panels
  rack.querySelectorAll('.module').forEach(el => {
    const r = el.getBoundingClientRect();
    const x = r.left - rRect.left, y = r.top - rRect.top, w = r.width, h = r.height;
    c.fillStyle = '#0c0c1a'; c.fillRect(x, y, w, h);
    c.strokeStyle = '#00ffff33'; c.lineWidth = 1; c.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    const lbl = el.querySelector('.mod-title');
    if (lbl) {
      c.fillStyle = '#00ffff99'; c.font = 'bold 9px monospace';
      c.textAlign = 'center';
      c.fillText(lbl.textContent.trim(), x + w / 2, y + 14);
    }
  });
  // Draw cables
  if (typeof cables !== 'undefined') {
    cables.forEach(cable => {
      const el = cable.el;
      if (!el) return;
      const path = el.getAttribute('d');
      if (!path) return;
      c.strokeStyle = cable.color || '#00ffff';
      c.lineWidth = 2; c.globalAlpha = 0.8;
      c.beginPath();
      // Parse the SVG path M x1 y1 C cx1 cy1 cx2 cy2 x2 y2
      const nums = path.replace(/[MmCc]/g,' ').trim().split(/[\s,]+/).map(Number);
      if (nums.length >= 8) {
        c.moveTo(nums[0] - rRect.left, nums[1] - rRect.top);
        c.bezierCurveTo(nums[2]-rRect.left, nums[3]-rRect.top, nums[4]-rRect.left, nums[5]-rRect.top, nums[6]-rRect.left, nums[7]-rRect.top);
      }
      c.stroke(); c.globalAlpha = 1;
    });
  }
  // Watermark
  const cfg = getConfig();
  const patchName = document.getElementById('preset-sel')?.options[document.getElementById('preset-sel')?.selectedIndex]?.text || 'nm²';
  const date = new Date().toISOString().slice(0, 10);
  c.fillStyle = '#00ffff55'; c.font = '8px monospace'; c.textAlign = 'right';
  c.fillText(`nm² · ${patchName} · ${date}`, cw - 8, ch - 6);
  cv.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `nm2-${patchName.replace(/\s+/g,'-').toLowerCase()}-${date}.png`;
    a.click(); URL.revokeObjectURL(a.href);
  });
  setStatus('Graph exported ✓');
}

// ═══════════════════════════════════════════════════════════════════════════════
// SCENE MORPH
// ═══════════════════════════════════════════════════════════════════════════════
let morphMode  = false;
let morphBarsN = 4;
let morphId    = 0;
let morphing   = false;

function morphEase(t) { return t < 0.5 ? 2*t*t : 1 - (-2*t+2)*(-2*t+2)/2; }
function morphLerp(a, b, t) { return typeof a === 'number' && typeof b === 'number' ? a + (b-a)*t : (t < 1 ? a : b); }

function applyMorphT(from, to, t) {
  const e  = morphEase(t);
  const L  = (a, b) => morphLerp(a, b, e);
  const sk = (id, v) => { if (knobRefs[id]) knobRefs[id].setVal(v); };
  if (from.vco && to.vco) {
    const c = L(from.vco.coarse, to.vco.coarse); const f = L(from.vco.fine, to.vco.fine);
    mods.vco.setCoarse(c); sk('vco-coarse', c); mods.vco.setFine(f); sk('vco-fine', f);
  }
  if (from.vco2 && to.vco2) {
    const c = L(from.vco2.coarse, to.vco2.coarse); const d = L(from.vco2.detune, to.vco2.detune);
    mods.vco2.setCoarse(c); sk('vco2-coarse', c); mods.vco2.setDetune(d); sk('vco2-detune', d);
  }
  if (from.vcf && to.vcf) {
    const cut = L(from.vcf.cutoff, to.vcf.cutoff); const res = L(from.vcf.res, to.vcf.res);
    mods.vcf.setCutoff(cut); sk('vcf-cutoff', cut); mods.vcf.setRes(res); sk('vcf-res', res);
  }
  if (from.vca && to.vca) {
    const g = L(from.vca.gain, to.vca.gain); mods.vca.setGain(g); sk('vca-gain', g);
  }
  if (from.adsr && to.adsr) {
    const A=L(from.adsr.A,to.adsr.A), D=L(from.adsr.D,to.adsr.D), S=L(from.adsr.S,to.adsr.S), R=L(from.adsr.R,to.adsr.R);
    mods.adsr.A=A; mods.adsr.D=D; mods.adsr.S=S; mods.adsr.R=R;
    sk('adsr-A',A); sk('adsr-D',D); sk('adsr-S',S); sk('adsr-R',R);
  }
  if (from.lfo && to.lfo) {
    const r=L(from.lfo.rate,to.lfo.rate), d=L(from.lfo.depth,to.lfo.depth);
    mods.lfo.setRate(r); sk('lfo-rate',r); mods.lfo.setDepth(d); sk('lfo-depth',d);
  }
  if (from.lfo2 && to.lfo2) {
    const r=L(from.lfo2.rate,to.lfo2.rate), d=L(from.lfo2.depth,to.lfo2.depth);
    mods.lfo2.setRate(r); sk('lfo2-rate',r); mods.lfo2.setDepth(d); sk('lfo2-depth',d);
  }
  if (from.reverb && to.reverb) {
    // skip setSize/setDecay (IR rebuild) — morph mix only
    const m=L(from.reverb.mix,to.reverb.mix); mods.reverb.setMix(m); sk('reverb-mix',m);
  }
  if (from.delay && to.delay) {
    const ti=L(from.delay.time,to.delay.time), fb=L(from.delay.fb,to.delay.fb), mx=L(from.delay.mix,to.delay.mix);
    mods.delay.setTime(ti); sk('delay-time',ti); mods.delay.setFeedback(fb); sk('delay-fb',fb); mods.delay.setMix(mx); sk('delay-mix',mx);
  }
  if (from.chorus && to.chorus) {
    const r=L(from.chorus.rate,to.chorus.rate), d=L(from.chorus.depth,to.chorus.depth), w=L(from.chorus.width,to.chorus.width), m=L(from.chorus.mix,to.chorus.mix);
    mods.chorus.setRate(r); sk('chorus-rate',r); mods.chorus.setDepth(d); sk('chorus-depth',d); mods.chorus.setWidth(w); sk('chorus-width',w); mods.chorus.setMix(m); sk('chorus-mix',m);
  }
  if (from.phaser && to.phaser) {
    const r=L(from.phaser.rate,to.phaser.rate), d=L(from.phaser.depth,to.phaser.depth), m=L(from.phaser.mix,to.phaser.mix);
    mods.phaser.setRate(r); sk('phaser-rate',r); mods.phaser.setDepth(d); sk('phaser-depth',d); mods.phaser.setMix(m); sk('phaser-mix',m);
  }
  if (from.tape && to.tape) {
    const dr=L(from.tape.drive,to.tape.drive), w=L(from.tape.wow,to.tape.wow), m=L(from.tape.mix,to.tape.mix);
    mods.tape.setDrive(dr); sk('tape-drive',dr); mods.tape.setWow(w); sk('tape-wow',w); mods.tape.setMix(m); sk('tape-mix',m);
  }
  if (from.panner && to.panner) {
    const r=L(from.panner.rate,to.panner.rate), d=L(from.panner.depth,to.panner.depth);
    mods.panner.setRate(r); sk('pan-rate',r); mods.panner.setDepth(d); sk('pan-depth',d);
  }
  if (from.wavefolder && to.wavefolder) {
    const f=L(from.wavefolder.fold,to.wavefolder.fold), s=L(from.wavefolder.symm,to.wavefolder.symm);
    mods.wavefolder.setFold(f); sk('fold-fold',f); mods.wavefolder.setSymm(s); sk('fold-symm',s);
  }
  if (from.att && to.att) {
    const a=L(from.att.att,to.att.att), o=L(from.att.offset,to.att.offset);
    mods.att.setAtt(a); sk('att-knob',a); mods.att.setOffset(o); sk('att-offset',o);
  }
  if (from.sidechain && to.sidechain) {
    const a=L(from.sidechain.attack,to.sidechain.attack), r=L(from.sidechain.release,to.sidechain.release), m=L(from.sidechain.amount,to.sidechain.amount);
    mods.sidechain.setAttack(a); sk('sc-attack',a); mods.sidechain.setRelease(r); sk('sc-release',r); mods.sidechain.setAmount(m); sk('sc-amount',m);
  }
  if (from.mixer && to.mixer) {
    const a=L(from.mixer.a,to.mixer.a), b=L(from.mixer.b,to.mixer.b), c=L(from.mixer.c,to.mixer.c);
    mods.mixer.setA(a); sk('mix-knob-a',a); mods.mixer.setB(b); sk('mix-knob-b',b); mods.mixer.setC(c); sk('mix-knob-c',c);
  }
  if (from.chord && to.chord) {
    const sp=L(from.chord.spread,to.chord.spread), lv=L(from.chord.level,to.chord.level);
    mods.chord.setSpread(sp); sk('chord-spread',sp); mods.chord.setLevel(lv); sk('chord-level',lv);
  }
  { const fm = from.micr0c0sm || from.microcosm, tm = to.micr0c0sm || to.microcosm;
    if (fm && tm) {
      const bl=L(fm.blend,tm.blend), gz=L(fm.grainSz,tm.grainSz),
            sc=L(fm.scatter,tm.scatter), pi=L(fm.pitch,tm.pitch), dn=L(fm.density,tm.density);
      mods.micr0c0sm.setBlend(bl); sk('mc-blend',bl); mods.micr0c0sm.setGrainSz(gz); sk('mc-size',gz);
      mods.micr0c0sm.setScatter(sc); sk('mc-scat',sc); mods.micr0c0sm.setPitch(pi); sk('mc-pitch',pi); mods.micr0c0sm.setDensity(dn); sk('mc-dnsty',dn);
    }
  }
  if (from.stutter && to.stutter) {
    const sl=L(from.stutter.slice,to.stutter.slice), rp=L(from.stutter.repeat,to.stutter.repeat), mx=L(from.stutter.mix,to.stutter.mix);
    mods.stutter.setSlice(sl); sk('stut-slice',sl); mods.stutter.setRepeat(rp); sk('stut-rpt',rp); mods.stutter.setMix(mx); sk('stut-mix',mx);
  }
  if (from.seq && to.seq) {
    const bpm = Math.round(L(from.seq.bpm, to.seq.bpm));
    mods.seq.bpm = bpm; sk('seq-bpm', bpm);
  }
  if (from.noise && to.noise) {
    const lv=L(from.noise.level,to.noise.level); mods.noise.setLevel(lv); sk('noise-level',lv);
  }
}

function startMorph(sceneIdx) {
  if (!ctx) { setStatus('Power on first.'); return; }
  if (!scenes[sceneIdx]) { setStatus(`Scene ${'ABCD'[sceneIdx]} empty — enable ● SAVE first`); return; }
  const fromCfg  = getConfig();
  const toCfg    = scenes[sceneIdx];
  const duration = morphBarsN * 4 * (60000 / (mods.seq?.bpm || 120));
  morphId++;
  const myId = morphId;
  morphing   = true;
  document.getElementById('morph-btn').classList.add('morphing');
  document.getElementById('scene-status').textContent = `MORPHING → ${'ABCD'[sceneIdx]}`;
  requestAnimationFrame(function(startTs) {
    if (morphId !== myId) return;
    function loop(now) {
      if (morphId !== myId) return;
      const t = Math.min(1, (now - startTs) / duration);
      applyMorphT(fromCfg, toCfg, t);
      if (t < 1) { requestAnimationFrame(loop); }
      else { applyConfig(toCfg); stopMorph(); setStatus(`Morphed to Scene ${'ABCD'[sceneIdx]}`); }
    }
    loop(startTs);
  });
}

function stopMorph() {
  morphId++;
  morphing  = false;
  morphMode = false;
  document.getElementById('morph-btn').classList.remove('morphing', 'on');
  document.getElementById('morph-bars').style.display = 'none';
  const st = document.getElementById('scene-status');
  if (st.textContent.startsWith('MORPHING')) st.textContent = '';
}

  alert(`nm² modsynth — QUICK START

SIGNAL FLOW (default):

  LFO → VCF cutoff (filter wobble)

SEND EFFECTS (Reverb, Delay, Chorus, Tape, Phaser, Panner):
  Their outputs are already wired to the speakers.

  To control overall volume, use the LIMITER CEIL knob in the top toolbar.

PATCHING:

MODULES:

// AUDIO UTILITIES
// ═══════════════════════════════════════════════════════════════════════════════
function audioBufferToWav(buffer) {
  const numCh = buffer.numberOfChannels, len = buffer.length, sr = buffer.sampleRate;
  const ab = new ArrayBuffer(44 + len * numCh * 2);
  const dv = new DataView(ab);
  const ws = (off, s) => { for (let i=0; i<s.length; i++) dv.setUint8(off+i, s.charCodeAt(i)); };
  ws(0,'RIFF'); dv.setUint32(4, 36 + len*numCh*2, true); ws(8,'WAVE'); ws(12,'fmt ');
  dv.setUint32(16,16,true); dv.setUint16(20,1,true); dv.setUint16(22,numCh,true);
  dv.setUint32(24,sr,true); dv.setUint32(28,sr*numCh*2,true);
  dv.setUint16(32,numCh*2,true); dv.setUint16(34,16,true); ws(36,'data');
  dv.setUint32(40, len*numCh*2, true);
  let off = 44;
  for (let i=0; i<len; i++) for (let c=0; c<numCh; c++) {
    const s = Math.max(-1, Math.min(1, buffer.getChannelData(c)[i]));
    dv.setInt16(off, s < 0 ? s*0x8000 : s*0x7FFF, true); off += 2;
  }
  return ab;
}

// STUTTER / SLICER
// ═══════════════════════════════════════════════════════════════════════════════
function makeStutter() {
  const inlet   = ctx.createGain();
  const outlet  = ctx.createGain(); outlet.gain.value = 1.0;
  const del     = ctx.createDelay(2.0); del.delayTime.value = 0.125;
  const fbGain  = ctx.createGain(); fbGain.gain.value = 0;
  const wetGain = ctx.createGain(); wetGain.gain.value = 0.5;

  // Send-effect model (like reverb/delay): outlet is wet-only, connected to masterOut
  // in wireDefault(). Dry signal flows through the source's own masterOut connection.
  inlet.connect(del); del.connect(fbGain); fbGain.connect(del);
  del.connect(wetGain); wetGain.connect(outlet);

  const m = { inlet, outlet, sliceVal:0.125, repeatVal:4, mixVal:0.5, activeVal:false };
  m.setSlice  = v => { m.sliceVal = v; del.delayTime.setTargetAtTime(v, ctx.currentTime, 0.005); };
  m.setRepeat = v => { m.repeatVal = v; if (m.activeVal) fbGain.gain.setTargetAtTime(0.5 + v/32, ctx.currentTime, 0.02); };
  m.setMix    = v => { m.mixVal=v; wetGain.gain.setTargetAtTime(v, ctx.currentTime, 0.05); };
  m.setActive = on => { m.activeVal=on; fbGain.gain.setTargetAtTime(on ? 0.5+m.repeatVal/32 : 0, ctx.currentTime, 0.005); };
  m.setMix(0.5);
  mods.stutter = m; return m;
}

function buildStutterPanel() {

  d.appendChild(mkKnob({id:'stut-rpt',   label:'REPT',  min:0,     max:15,val:4,                                         onChange:v=>mods.stutter.setRepeat(v)}));

  return panel('stutter','STUTTER',d);

// ═══════════════════════════════════════════════════════════════════════════════
// MIC LOOPER
// ═══════════════════════════════════════════════════════════════════════════════
function makeMicLooper() {
  const gainIn   = ctx.createGain(); gainIn.gain.value  = 1.0;
  const gainOut  = ctx.createGain(); gainOut.gain.value = 0.8;
  const outlet   = ctx.createGain(); outlet.gain.value  = 1.0;
  const analyser = ctx.createAnalyser(); analyser.fftSize = 256;
  gainIn.connect(analyser);   // mic monitoring
  gainOut.connect(analyser);  // playback monitoring
  gainOut.connect(outlet);

  const m = {
    gainIn, gainOut, outlet, analyser,
    stream: null, src: null, active: false,
    buffer: null, playingSrc: null,
    playing: false, recording: false, looping: true,
    rec: null, recChunks: [], _recDest: null,
    levelInVal: 1.0, levelOutVal: 0.8,
    onLoopReady: null,
  };

  m.arm = async () => {
    if (m.active) {
      if (m.recording) m.stopRec();
      m.stop();
      if (m.src) { m.src.disconnect(); m.src = null; }
      if (m.stream && !(mods.mic && mods.mic.stream === m.stream)) {
        m.stream.getTracks().forEach(t => t.stop());
      }
      m.stream = null; m.active = false; return false;
    }
    try {
      if (mods.mic && mods.mic.active && mods.mic.stream) {
        m.stream = mods.mic.stream;
      } else {
        m.stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      }
      m.src = ctx.createMediaStreamSource(m.stream);
      m.src.connect(gainIn);
      m.active = true; return true;
    } catch(e) { console.warn('MicLooper: access denied', e); return false; }
  };

  m.startRec = () => {
    if (!m.active || m.recording) return false;
    m.recChunks = [];
    const dest = ctx.createMediaStreamDestination();
    gainIn.connect(dest);
    m._recDest = dest;
    const mtype = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm';
    m.rec = new MediaRecorder(dest.stream, { mimeType: mtype });
    m.rec.ondataavailable = e => { if (e.data.size > 0) m.recChunks.push(e.data); };
    m.rec.onstop = async () => {
      try { gainIn.disconnect(dest); } catch(e) {}
      const blob = new Blob(m.recChunks, { type: mtype });
      try {
        m.buffer = await ctx.decodeAudioData(await blob.arrayBuffer());
        m.recording = false;
        if (m.looping) m.play();
        if (m.onLoopReady) m.onLoopReady();
      } catch(e) { console.warn('MicLooper decode error', e); m.recording = false; }
    };
    m.rec.start();
    m.recording = true;
    return true;
  };

  m.stopRec = () => {
    if (!m.rec || m.rec.state !== 'recording') return;
    m.rec.stop();
  };

  m.play = () => {
    if (!m.buffer) return;
    m.stop();
    const src = ctx.createBufferSource();
    src.buffer = m.buffer; src.loop = m.looping;
    src.connect(gainOut); src.start();
    m.playingSrc = src; m.playing = true;
    src.onended = () => { if (m.playingSrc === src) { m.playing = false; m.playingSrc = null; } };
  };

  m.stop = () => {
    if (m.playingSrc) { try { m.playingSrc.stop(); } catch(e) {} m.playingSrc = null; }
    m.playing = false;
  };

  m.clear = () => { m.stop(); m.buffer = null; };

  m.setLevelIn  = v => { m.levelInVal  = v; gainIn.gain.setTargetAtTime(v, ctx.currentTime, 0.02); };
  m.setLevelOut = v => { m.levelOutVal = v; gainOut.gain.setTargetAtTime(v, ctx.currentTime, 0.02); };

  mods.miclooper = m; return m;
}

function buildMicLooperPanel() {
  const d = document.createElement('div'); d.style.minWidth = '110px';

  // VU meter (shows mic input + playback level)
  const vu = document.createElement('canvas');
  vu.width = 94; vu.height = 12;
  vu.style.cssText = 'display:block;margin-bottom:3px;border:1px solid var(--border-soft);background:var(--bg-panel-4);border-radius:2px;';
  const vCtx = vu.getContext('2d');
  const abuf = new Float32Array(256);
  // Pre-allocate gradient (was created every frame); keyed fill avoids getComputedStyle in RAF
  const _mlGrad = vCtx.createLinearGradient(0, 0, 94, 0);
  _mlGrad.addColorStop(0, '#00ff88'); _mlGrad.addColorStop(0.6, '#ffff00'); _mlGrad.addColorStop(1, '#ff4444');
  const _mlVuBg = () => document.documentElement.dataset.theme === 'light' ? '#ffffff' : '#04040e';
  registerDraw(function _mlVuDraw() {
    vCtx.fillStyle = _mlVuBg(); vCtx.fillRect(0, 0, 94, 12);
    if (!mods.miclooper.active && !mods.miclooper.playing) return;
    mods.miclooper.analyser.getFloatTimeDomainData(abuf);
    let rms = 0; for (const v of abuf) rms += v * v; rms = Math.sqrt(rms / abuf.length);
    const w = Math.min(94, rms * 380);
    vCtx.fillStyle = _mlGrad; vCtx.fillRect(0, 1, w, 10);
  });

  // Waveform display (filled in once loop is recorded)
  const wave = document.createElement('canvas');
  wave.width = 94; wave.height = 30;
  wave.style.cssText = 'display:block;margin-bottom:4px;border:1px solid var(--border-soft);background:var(--bg-panel-4);border-radius:2px;';
  const wCtx = wave.getContext('2d');
  function drawWave() {
    wCtx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-panel-4').trim(); wCtx.fillRect(0, 0, 94, 30);
    if (!mods.miclooper.buffer) {
      wCtx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-dim').trim(); wCtx.font = '6px "JetBrains Mono"';
      wCtx.textAlign = 'center'; wCtx.fillText('no loop', 47, 17);
      return;
    }
    const data = mods.miclooper.buffer.getChannelData(0);
    const step = Math.max(1, Math.ceil(data.length / 94));
    wCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(); wCtx.lineWidth = 1; wCtx.globalAlpha = 0.55; wCtx.beginPath();
    for (let x = 0; x < 94; x++) {
      let min = 1, max = -1;
      for (let j = 0; j < step; j++) {
        const s = data[x * step + j] || 0;
        if (s < min) min = s; if (s > max) max = s;
      }
      const y1 = (1 - max) / 2 * 30, y2 = (1 - min) / 2 * 30;
      if (x === 0) wCtx.moveTo(x, Math.max(y1, 1));
      else { wCtx.lineTo(x, Math.max(y1, 1)); wCtx.lineTo(x, Math.min(y2, 29)); }
    }
    wCtx.stroke(); wCtx.globalAlpha = 1;
  }
  drawWave();

  // ARM button
  const armBtn = document.createElement('button');
  armBtn.className = 'btn'; armBtn.style.cssText = 'width:100%;margin-bottom:3px;font-size:8px;';
  armBtn.textContent = 'ARM MIC';
  armBtn.addEventListener('click', async () => {
    await mods.miclooper.arm();
    armBtn.classList.toggle('on', mods.miclooper.active);
    armBtn.textContent = mods.miclooper.active ? '⦿ LIVE' : 'ARM MIC';
    if (!mods.miclooper.active && mods.miclooper.recording) {
      recBtn.classList.remove('rec-live'); recBtn.textContent = '● REC';
    }
  });

  // Transport row: REC / PLAY / STOP
  const txRow = document.createElement('div'); txRow.style.cssText = 'display:flex;gap:2px;margin-bottom:3px;';

  const recBtn = document.createElement('button');
  recBtn.className = 'btn'; recBtn.style.cssText = 'flex:1.5;font-size:9px;';
  recBtn.textContent = '● REC';
  recBtn.addEventListener('click', () => {
    if (!ctx) { setStatus('Power on first.'); return; }
    if (!mods.miclooper.active) { setStatus('ARM MIC LOOP first.'); return; }
    if (mods.miclooper.recording) {
      mods.miclooper.stopRec();
      recBtn.classList.remove('rec-live'); recBtn.textContent = '● REC';
    } else {
      if (mods.miclooper.startRec()) {
        recBtn.classList.add('rec-live'); recBtn.textContent = '■ STOP';
        playBtn.classList.remove('on');
      }
    }
  });

  const playBtn = document.createElement('button');
  playBtn.className = 'btn'; playBtn.style.cssText = 'flex:1;font-size:9px;';
  playBtn.textContent = '▶'; playBtn.title = 'Play loop';
  playBtn.addEventListener('click', () => {
    if (!mods.miclooper.buffer) { setStatus('Record a loop first.'); return; }
    mods.miclooper.play(); playBtn.classList.add('on');
  });

  const stopBtn = document.createElement('button');
  stopBtn.className = 'btn'; stopBtn.style.cssText = 'flex:1;font-size:9px;';
  stopBtn.textContent = '■'; stopBtn.title = 'Stop loop';
  stopBtn.addEventListener('click', () => { mods.miclooper.stop(); playBtn.classList.remove('on'); });

  txRow.appendChild(recBtn); txRow.appendChild(playBtn); txRow.appendChild(stopBtn);

  // Mode row: LOOP / CLEAR
  const modeRow = document.createElement('div'); modeRow.style.cssText = 'display:flex;gap:2px;margin-bottom:3px;';

  const loopBtn = document.createElement('button');
  loopBtn.className = 'btn on'; loopBtn.style.cssText = 'flex:1;font-size:9px;';
  loopBtn.textContent = '↻ LOOP'; loopBtn.title = 'Loop / one-shot';
  loopBtn.addEventListener('click', () => {
    mods.miclooper.looping = !mods.miclooper.looping;
    loopBtn.classList.toggle('on', mods.miclooper.looping);
    if (mods.miclooper.playingSrc) mods.miclooper.playingSrc.loop = mods.miclooper.looping;
  });

  const clearBtn = document.createElement('button');
  clearBtn.className = 'btn'; clearBtn.style.cssText = 'flex:1;font-size:9px;';
  clearBtn.textContent = '✕ CLR'; clearBtn.title = 'Erase loop';
  clearBtn.addEventListener('click', () => { mods.miclooper.clear(); playBtn.classList.remove('on'); drawWave(); });

  modeRow.appendChild(loopBtn); modeRow.appendChild(clearBtn);

  // Callback: updates UI after decode completes (async)
  mods.miclooper.onLoopReady = () => {
    drawWave();
    recBtn.classList.remove('rec-live'); recBtn.textContent = '● REC';
    playBtn.classList.add('on');
  };

  // Knobs
  const knobRow = document.createElement('div'); knobRow.style.cssText = 'display:flex;gap:2px;justify-content:center;';
  knobRow.appendChild(mkKnob({id:'micloop-level', label:'IN',  min:0.1, max:4,  val:1.0, log:true, onChange:v=>mods.miclooper.setLevelIn(v)}));
  knobRow.appendChild(mkKnob({id:'micloop-vol',   label:'OUT', min:0,   max:1,  val:0.8,           onChange:v=>mods.miclooper.setLevelOut(v)}));

  d.appendChild(vu); d.appendChild(wave); d.appendChild(armBtn);
  d.appendChild(txRow); d.appendChild(modeRow); d.appendChild(knobRow);
  d.appendChild(document.createElement('hr'));
  d.appendChild(mkPP('micloop-out','ao','OUT','out'));
  return panel('miclooper', 'MIC LOOP', d);
}

// MIC INPUT
// ═══════════════════════════════════════════════════════════════════════════════
function makeMicInput() {
  const gainNode = ctx.createGain(); gainNode.gain.value = 1.0;
  const outlet   = ctx.createGain(); outlet.gain.value   = 1.0;
  const analyser = ctx.createAnalyser(); analyser.fftSize = 256;
  gainNode.connect(outlet); outlet.connect(analyser);
  const m = { gainNode, outlet, analyser, stream: null, src: null, active: false, levelVal: 1.0 };
  m.arm = async () => {
    if (m.active) {
      if (m.src) { m.src.disconnect(); m.src = null; }
      if (m.stream) { m.stream.getTracks().forEach(t => t.stop()); m.stream = null; }
      m.active = false; return false;
    }
    try {
      m.stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      m.src = ctx.createMediaStreamSource(m.stream);
      m.src.connect(gainNode);
      m.active = true; return true;
    } catch(e) { console.warn('Mic access denied', e); return false; }
  };
  m.setLevel = v => { m.levelVal = v; gainNode.gain.setTargetAtTime(v, ctx.currentTime, 0.02); };
  mods.mic = m; return m;
}

// PAD SAMPLER
// ═══════════════════════════════════════════════════════════════════════════════
const PAD_KEYS   = ['Q','W','E','R','A','S','D','F'];
const PAD_CODES  = ['KeyQ','KeyW','KeyE','KeyR','KeyA','KeyS','KeyD','KeyF'];
const PAD_MIDI   = [48,49,50,51,52,53,54,55]; // C3–G3

function makePadSampler() {
  const outlet = ctx.createGain(); outlet.gain.value = 1.0;
  const pads = Array.from({length: 8}, (_, i) => {
    const gain = ctx.createGain(); gain.gain.value = 0.85;
    gain.connect(outlet);
    return { i, buffer: null, src: null, gain, fileName: '', el: null };
  });
  const m = { pads, outlet };
  m.trigger = i => {
    const p = pads[i]; if (!p.buffer) return;
    if (p.src) { try { p.src.stop(); } catch(e){} p.src = null; }
    const src = ctx.createBufferSource(); src.buffer = p.buffer;
    src.connect(p.gain); src.start(); p.src = src;
    src.onended = () => { p.src = null; p.el?.classList.remove('pad-active'); };
    p.el?.classList.add('pad-active');
  };
  m.load = async (i, file) => {
    try {
      const ab = await file.arrayBuffer();
      pads[i].buffer = await ctx.decodeAudioData(ab);
      pads[i].fileName = file.name.replace(/\.[^.]+$/, '');
      pads[i].el?.classList.add('loaded');
      const nameEl = pads[i].el?.querySelector('.pad-name');
      if (nameEl) nameEl.textContent = pads[i].fileName;
    } catch(e) { console.warn('Pad load failed', e); }
  };
  mods.padsampler = m; return m;
}

function buildPadSamplerPanel() {
  const d = document.createElement('div'); d.style.minWidth = '140px';
  const grid = document.createElement('div'); grid.className = 'pad-grid';

  mods.padsampler.pads.forEach((p, i) => {
    const pad = document.createElement('div'); pad.className = 'pad'; p.el = pad;

    const keyLbl  = document.createElement('div'); keyLbl.className  = 'pad-key';  keyLbl.textContent  = PAD_KEYS[i];
    const nameLbl = document.createElement('div'); nameLbl.className = 'pad-name'; nameLbl.textContent = '— empty —';

    pad.appendChild(keyLbl); pad.appendChild(nameLbl);
    pad.title = `Pad ${i+1} · key ${PAD_KEYS[i]} · MIDI ${PAD_MIDI[i]}`;

    // Click to trigger if loaded, or open file picker if empty
    const fi = document.createElement('input'); fi.type='file'; fi.accept='audio/*'; fi.style.display='none';
    fi.addEventListener('change', e => { if(e.target.files[0]) mods.padsampler.load(i, e.target.files[0]); });
    pad.appendChild(fi);

    pad.addEventListener('click', () => {
      if (p.buffer) mods.padsampler.trigger(i);
      else fi.click();
    });

    // Right-click to load new file on an already-loaded pad
    pad.addEventListener('contextmenu', e => { e.preventDefault(); fi.click(); });

    // Drag-drop
    pad.addEventListener('dragover',  e => { e.preventDefault(); pad.style.borderColor = '#ff00ff'; });
    pad.addEventListener('dragleave', () => { pad.style.borderColor = ''; });
    pad.addEventListener('drop', e => {
      e.preventDefault(); pad.style.borderColor = '';
      const f = e.dataTransfer.files[0]; if(f) mods.padsampler.load(i, f);
    });

    grid.appendChild(pad);
  });

  d.appendChild(grid);
  d.appendChild(document.createElement('hr'));
  d.appendChild(mkPP('padsampler-out', 'ao', 'OUT', 'out'));
  return panel('padsampler', 'PAD SMPLR', d);
}

// BITCRUSHER
// ═══════════════════════════════════════════════════════════════════════════════
function makeCrusher() {
  const inlet   = ctx.createGain();
  const outlet  = ctx.createGain();
  const dryGain = ctx.createGain(); dryGain.gain.value = 0;
  const wetGain = ctx.createGain(); wetGain.gain.value = 1;
  const m = { inlet, outlet, bits: 8, rate: 1, mixVal: 1 };
  let proc = null;
  let bitsParam = null;
  let rateParam = null;
  const setupWorklet = () => {
    proc = new AudioWorkletNode(ctx, 'bitcrusher', {
      numberOfInputs: 1,
      numberOfOutputs: 1,
      channelCount: 2,
      outputChannelCount: [2],
      parameterData: { bits: 8, rate: 1 },
    });
    bitsParam = proc.parameters.get('bits');
    rateParam = proc.parameters.get('rate');
    inlet.connect(proc);
    proc.connect(wetGain);
  };
  setupWorklet();
  wetGain.connect(outlet);
  inlet.connect(dryGain);
  dryGain.connect(outlet);
  m.setBits = v => {
    const target = Math.max(1, Math.min(16, Math.round(v)));
    m.bits = target;
    bitsParam?.setValueAtTime?.(target, ctx.currentTime);
  };
  m.setRate = v => {
    const target = Math.max(1, Math.min(32, Math.round(v)));
    m.rate = target;
    rateParam?.setValueAtTime?.(target, ctx.currentTime);
  };
  m.setMix = v => {
    m.mixVal = v;
    wetGain.gain.setTargetAtTime(v, ctx.currentTime, 0.01);
    dryGain.gain.setTargetAtTime(1 - v, ctx.currentTime, 0.01);
  };
  mods.crush = m; return m;
}

// ═══════════════════════════════════════════════════════════════════════════════
// EUCLIDEAN RHYTHM GENERATOR
// ═══════════════════════════════════════════════════════════════════════════════
function makeEuclid() {
  const gate = ctx.createConstantSource(); gate.offset.value = 0; gate.start();
  const m = { gate, hits: 3, steps: 8, offset: 0, stepCount: 0, pattern: [] };
  function buildPattern() {
    const { hits, steps, offset } = m;
    const h = Math.min(hits, steps);
    const pat = [];
    for (let i = 0; i < steps; i++) {
      pat.push(Math.floor((i + 1) * h / steps) > Math.floor(i * h / steps));
    }
    const rot = ((offset % steps) + steps) % steps;
    m.pattern = pat.slice(rot).concat(pat.slice(0, rot));
    if (typeof drawEuclidPattern === 'function') drawEuclidPattern();
  }
  m.buildPattern = buildPattern;
  m.setHits   = v => { m.hits   = Math.round(v); buildPattern(); };
  m.setSteps  = v => { m.steps  = Math.round(v); buildPattern(); };
  m.setOffset = v => { m.offset = Math.round(v); buildPattern(); };
  m.tick = () => {
    const idx = m.stepCount % m.steps;
    m.stepCount++;
    if (!m.pattern[idx]) return;
    const dur = (60 / (mods.seq?.bpm || 120) / 2) * 0.35;
    gate.offset.setValueAtTime(1, ctx.currentTime);
    gate.offset.setValueAtTime(0, ctx.currentTime + dur);
    if (typeof drawEuclidPattern === 'function') drawEuclidPattern(idx);
  };
  buildPattern();
  mods.euclid = m; return m;
}

// PHASE 14 — THE BODY: LOGIC · FORMANT · RESONATOR · MORPH · SPECTRAL
// ═══════════════════════════════════════════════════════════════════════════════

// ── LOGIC ──────────────────────────────────────────────────────────────────
function makeLogic() {
  const node = new AudioWorkletNode(ctx, 'gate-logic', {
    numberOfInputs: 2, numberOfOutputs: 2, outputChannelCount: [1, 1]
  });
  const inA = ctx.createGain(); inA.connect(node, 0, 0);
  const inB = ctx.createGain(); inB.connect(node, 0, 1);
  const out1 = ctx.createGain(); node.connect(out1, 0);
  const out2 = ctx.createGain(); node.connect(out2, 1);
  const m = mods.logic = { node, inA, inB, out1, out2, mode: 0, threshVal: 0.5 };
  m.setMode   = v => { m.mode = v;       node.port.postMessage({ mode: v }); };
  m.setThresh = v => { m.threshVal = v;  node.port.postMessage({ thresh: v }); };
}

// ── FORMANT VOWEL DATA ──────────────────────────────────────────────────────
const FORMANT_VOWELS = [
  { f1: 850, f2: 1610 }, // A
  { f1: 610, f2: 1900 }, // E
  { f1: 270, f2: 2290 }, // I
  { f1: 450, f2: 800  }, // O
  { f1: 250, f2: 595  }, // U
];

function makeFormant() {
  const inlet    = ctx.createGain();
  const f1       = ctx.createBiquadFilter(); f1.type = 'bandpass'; f1.Q.value = 8;
  const f2       = ctx.createBiquadFilter(); f2.type = 'bandpass'; f2.Q.value = 10;
  const wetMix   = ctx.createGain();
  const wetGain  = ctx.createGain(); wetGain.gain.value = 1;
  const dryGain  = ctx.createGain(); dryGain.gain.value = 0;
  const outlet   = ctx.createGain();
  inlet.connect(f1); inlet.connect(f2);
  f1.connect(wetMix); f2.connect(wetMix);
  wetMix.connect(wetGain); wetGain.connect(outlet);
  inlet.connect(dryGain); dryGain.connect(outlet);

  // CV polling via AnalyserNode + RAF
  const cvIn       = ctx.createGain();
  const cvAnalyser = ctx.createAnalyser(); cvAnalyser.fftSize = 256;
  cvIn.connect(cvAnalyser);
  const _cvBuf = new Float32Array(cvAnalyser.fftSize);

  const m = mods.formant = { inlet, f1, f2, wetGain, dryGain, outlet, cvIn, vowelVal: 1, qVal: 8, mixVal: 1 };

  m.setVowel = (v, instant) => {
    m.vowelVal = Math.max(0, Math.min(4, v));
    const lo = Math.floor(m.vowelVal), hi = Math.min(4, lo + 1), t = m.vowelVal - lo;
    const vA = FORMANT_VOWELS[lo], vB = FORMANT_VOWELS[hi];
    const nf1 = vA.f1 + (vB.f1 - vA.f1) * t;
    const nf2 = vA.f2 + (vB.f2 - vA.f2) * t;
    if (instant) { f1.frequency.value = nf1; f2.frequency.value = nf2; }
    else { f1.frequency.setTargetAtTime(nf1, ctx.currentTime, 0.015); f2.frequency.setTargetAtTime(nf2, ctx.currentTime, 0.015); }
  };
  m.setQ = v => {
    m.qVal = v;
    f1.Q.setTargetAtTime(v * 0.8, ctx.currentTime, 0.05);
    f2.Q.setTargetAtTime(v,       ctx.currentTime, 0.05);
  };
  m.setMix = v => {
    m.mixVal = v;
    wetGain.gain.setTargetAtTime(v,     ctx.currentTime, 0.05);
    dryGain.gain.setTargetAtTime(1 - v, ctx.currentTime, 0.05);
  };

  // CV poll at ~15fps (every 4th frame) — control signals don't need 60fps
  registerDraw(function _formantPollCV() {
    if (_masterFrameCount % 4 !== 0) return;
    cvAnalyser.getFloatTimeDomainData(_cvBuf);
    let sum = 0; for (const x of _cvBuf) sum += x;
    const avg = sum / _cvBuf.length;
    if (Math.abs(avg) > 0.005) m.setVowel(Math.max(0, Math.min(4, avg * 4)));
  });

  m.setVowel(1, true); // instant init — no audio context needed
}

// ── RESONATOR (Karplus-Strong) ──────────────────────────────────────────────
function makeResonator() {
  const sumGain    = ctx.createGain();
  const dampFilter = ctx.createBiquadFilter();
  dampFilter.type = 'lowpass'; dampFilter.frequency.value = 6000; dampFilter.Q.value = 0.7;
  const delay      = ctx.createDelay(0.1);
  delay.delayTime.value = 1 / 220; // direct assignment — no audio context needed at init
  const dcBlock    = ctx.createBiquadFilter();
  dcBlock.type = 'highpass'; dcBlock.frequency.value = 35; dcBlock.Q.value = 0.0001;
  const loopDrive  = ctx.createWaveShaper();
  loopDrive.oversample = '2x';
  const loopGain   = ctx.createGain(); loopGain.gain.value = 0.9;
  const feedback   = ctx.createGain(); feedback.gain.value = 0.95;
  const inlet      = ctx.createGain(); // resonator audio in
  const outlet     = ctx.createGain();

  const buildLoopCurve = amount => {
    const n = 256, curve = new Float32Array(n);
    const norm = Math.tanh(amount);
    for (let i = 0; i < n; i++) {
      const x = (i * 2) / (n - 1) - 1;
      curve[i] = Math.tanh(x * amount) / norm;
    }
    return curve;
  };
  loopDrive.curve = buildLoopCurve(1.6);

  // sumGain → dampFilter → delay → outlet
  //                          ↓
  //              dcBlock → soft clip → feedback → sumGain
  sumGain.connect(dampFilter); dampFilter.connect(delay);
  delay.connect(dcBlock); dcBlock.connect(loopDrive); loopDrive.connect(loopGain);
  loopGain.connect(feedback); feedback.connect(sumGain);
  loopDrive.connect(outlet);
  inlet.connect(sumGain); // resonator mode: audio in adds to excitation

  const m = mods.res = {
    sumGain, dampFilter, delay, dcBlock, loopDrive, loopGain, feedback, inlet, outlet,
    freqVal: 220, baseFreqVal: 220, decayVal: 0.95, brightVal: 0.5, excite: 'pluck', track: false
  };

  m.setFreq = (v, updateBase = true) => {
    m.freqVal = Math.max(30, Math.min(2000, v));
    if (updateBase) m.baseFreqVal = m.freqVal;
    delay.delayTime.setTargetAtTime(1 / m.freqVal, ctx.currentTime, 0.001);
  };
  m.setDecay = v => {
    m.decayVal = v;
    feedback.gain.setTargetAtTime(v, ctx.currentTime, 0.05);
  };
  m.setBright = v => {
    m.brightVal = v;
    dampFilter.frequency.setTargetAtTime(500 * Math.pow(40, v), ctx.currentTime, 0.05);
  };
  m.pluck = () => {
    const dur = m.excite === 'mallet' ? 0.014 : 0.008;
    const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    if (m.excite === 'mallet') {
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 600;
      src.connect(lp); lp.connect(sumGain);
    } else {
      src.connect(sumGain);
    }
    src.start(); src.stop(ctx.currentTime + dur + 0.002);
  };
  // Pitch CV polling (res-ci): 0–1 CV → 30–2kHz log range
  const cvIn       = ctx.createGain();
  const cvAnalyser = ctx.createAnalyser(); cvAnalyser.fftSize = 256;
  cvIn.connect(cvAnalyser);
  const _resCVBuf = new Float32Array(cvAnalyser.fftSize);
  m.cvIn = cvIn;
  // CV poll at ~15fps — control signals don't need 60fps
  registerDraw(function _resPollCV() {
    if (_masterFrameCount % 4 !== 0) return;
    cvAnalyser.getFloatTimeDomainData(_resCVBuf);
    let sum = 0; for (const x of _resCVBuf) sum += x;
    const avg = sum / _resCVBuf.length;
    if (Math.abs(avg) > 0.005 && !m.track) {
      m.setFreq(Math.max(30, Math.min(2000, 30 * Math.pow(2000 / 30, avg))));
    }
  });

  m.trackNote = semi => {
    if (!m.track) return;
    const hz = m.baseFreqVal * Math.pow(2, semi / 12);
    m.setFreq(hz, false);
    sk('res-freq', Math.max(30, Math.min(2000, hz)));
    m.pluck(); // auto-excite on each sequenced/MIDI note
  };
}

// ── MORPH — multi-waypoint macro knob ──────────────────────────────────────

// Apply an audio-side parameter change by knob ID (no undo, no visual flicker)
function applyKnobAudio(id, v) {
  if (knobRefs[id]?._onChange) knobRefs[id]._onChange(v);
}

function makeMorph() {
  const cvIn       = ctx.createGain();
  const cvAnalyser = ctx.createAnalyser(); cvAnalyser.fftSize = 256;
  cvIn.connect(cvAnalyser);
  const _cvBuf = new Float32Array(cvAnalyser.fftSize);

  const m = mods.morph = {
    cvIn, pos: 0, paramIds: new Set(), waypoints: [], learnMode: false
  };

  m.applyMorph = pos => {
    const pts = m.waypoints;
    if (pts.length < 2) return;
    m.pos = Math.max(0, Math.min(1, pos));
    const t  = m.pos * (pts.length - 1);
    const lo = Math.floor(t), hi = Math.min(pts.length - 1, lo + 1);
    const f  = t - lo;
    for (const id of m.paramIds) {
      const vA = pts[lo].vals[id] ?? 0;
      const vB = pts[hi].vals[id] ?? 0;
      const v  = vA + (vB - vA) * f;
      sk(id, v);
      applyKnobAudio(id, v);
    }
  };

  m.saveWaypoint = slot => {
    const vals = {};
    for (const id of m.paramIds) {
      const ref = knobRefs[id];
      if (ref?.getVal) vals[id] = ref.getVal();
    }
    const existing = m.waypoints.findIndex(w => w.slot === slot);
    if (existing >= 0) m.waypoints[existing].vals = vals;
    else { m.waypoints.push({ slot, vals }); m.waypoints.sort((a, b) => a.slot - b.slot); }
    m._updateSlotButtons?.();
  };

  // CV poll at ~15fps — morph position doesn't need 60fps updates
  registerDraw(function _morphPollCV() {
    if (_masterFrameCount % 4 !== 0) return;
    cvAnalyser.getFloatTimeDomainData(_cvBuf);
    let sum = 0; for (const x of _cvBuf) sum += x;
    const avg = sum / _cvBuf.length;
    if (Math.abs(avg) > 0.005) {
      m.applyMorph(Math.max(0, Math.min(1, avg)));
      sk('morph-pos', m.pos);
    }
  });
}

// ── SPECTRAL — FFT freeze / smear / blur ───────────────────────────────────
function makeSpectral() {
  const inlet  = ctx.createGain();
  const node   = new AudioWorkletNode(ctx, 'spectral', {
    numberOfInputs: 1, numberOfOutputs: 1, outputChannelCount: [1]
  });
  const outlet = ctx.createGain();
  inlet.connect(node); node.connect(outlet);
  const p = node.parameters;
  const m = mods.spectral = {
    inlet, node, outlet,
    mode: 0, mixVal: 1, smearVal: 0, pitchVal: 1
  };
  m.frozen   = false;
  m.setMode  = v => { m.mode = v;      node.port.postMessage({ mode: v }); };
  m.doFreeze = () => { m.frozen = true;  node.port.postMessage({ doFreeze: true }); };
  m.unfreeze = () => { m.frozen = false; node.port.postMessage({ unfreeze: true }); };
  m.setMix   = v => { m.mixVal = v;   p.get('mix').setTargetAtTime(v, ctx.currentTime, 0.05); };
  m.setSmear = v => { m.smearVal = v; p.get('smear').setTargetAtTime(v, ctx.currentTime, 0.05); };
  m.setPitch = v => { m.pitchVal = v; p.get('pitch').setTargetAtTime(v, ctx.currentTime, 0.05); };
}

// Bilinear interpolation: BL=(0,0)=MELANCHOLY BR=(1,0)=CALM TL=(0,1)=TENSE TR=(1,1)=EUPHORIC
function biAff(x, y, [BL, BR, TL, TR]) {
  return BL*(1-x)*(1-y) + BR*x*(1-y) + TL*(1-x)*y + TR*x*y;
}

function textToAffect(text) {
  const words = text.toLowerCase().split(/\s+/);
  const hits = words.map(w => AFFECT_WORDS[w]).filter(Boolean);
  if (!hits.length) return null;
  return [hits.reduce((s,v)=>s+v[0],0)/hits.length, hits.reduce((s,v)=>s+v[1],0)/hits.length];
}

function applyAffect(x, y) {
  const m = mods.affect;
  if (!m.active) return;
  const str = m.strength;
  const interp = (poles) => {
    const full   = biAff(x, y, poles);
    const center = biAff(0.5, 0.5, poles);
    return center + (full - center) * str;
  };
  // Continuous params
  if (mods.vcf)    { const v=interp(AFFECT_POLES['vcf-cutoff']);   mods.vcf.setCutoff(v);   sk('vcf-cutoff',v); }
  if (mods.vcf)    { const v=interp(AFFECT_POLES['vcf-res']);      mods.vcf.setRes(v);      sk('vcf-res',v); }
  if (mods.adsr)   { mods.adsr.A=interp(AFFECT_POLES['adsr-A']); sk('adsr-A',mods.adsr.A);
                     mods.adsr.D=interp(AFFECT_POLES['adsr-D']); sk('adsr-D',mods.adsr.D);
                     mods.adsr.S=interp(AFFECT_POLES['adsr-S']); sk('adsr-S',mods.adsr.S);
                     mods.adsr.R=interp(AFFECT_POLES['adsr-R']); sk('adsr-R',mods.adsr.R); drawEnv(); }
  if (mods.lfo)    { const r=interp(AFFECT_POLES['lfo-rate']);  mods.lfo.setRate(r);  sk('lfo-rate',r);
                     const d=interp(AFFECT_POLES['lfo-depth']); mods.lfo.setDepth(d); sk('lfo-depth',d); }
  if (mods.reverb) { mods.reverb.setSize(interp(AFFECT_POLES['reverb-size'])); sk('reverb-size',mods.reverb.sizeVal);
                     mods.reverb.setMix(interp(AFFECT_POLES['reverb-mix']));   sk('reverb-mix',mods.reverb.mixVal); }
  if (mods.delay)  { mods.delay.setMix(interp(AFFECT_POLES['delay-mix']));  sk('delay-mix',mods.delay.mixVal); }
  if (mods.tape)   { mods.tape.setDrive(interp(AFFECT_POLES['tape-drive'])); sk('tape-drive',mods.tape.driveVal);
                     mods.tape.setMix(interp(AFFECT_POLES['tape-mix']));     sk('tape-mix',mods.tape.mixVal); }
  if (mods.phaser) { mods.phaser.setMix(interp(AFFECT_POLES['phaser-mix'])); sk('phaser-mix',mods.phaser.mixVal); }
  if (mods.chorus) { mods.chorus.setMix(interp(AFFECT_POLES['chorus-mix'])); sk('chorus-mix',mods.chorus.mixVal); }
  // Discrete: use dominant quadrant with 0.08-unit hysteresis
  const qx = x > 0.5 ? 1 : 0, qy = y > 0.5 ? 1 : 0;
  const quad = `${qx}${qy}`;
  const prevQ = m.lastQuadrant;
  const dist = Math.abs(x - 0.5) + Math.abs(y - 0.5);
  if (quad !== prevQ && dist > 0.08) {
    m.lastQuadrant = quad;
    const waves    = {  '00':'sawtooth', '10':'sine',   '01':'sawtooth', '11':'square'  };
    const chords   = {  '00':'min7',     '10':'sus2',   '01':'min',      '11':'maj7'    };
    if (mods.vco)   { mods.vco.setType(waves[quad]);  sk('vco-wave',waves[quad]); }
    if (mods.chord) { mods.chord.setChord(chords[quad]); sk('chord-type-sel',chords[quad]); }
  }
}

function startAffectLoop() {
  const m = mods.affect;
  registerDraw(function _affectLoop() {
    if (m.wanderMode && m.active) {
      m.wanderDX += (Math.random() - 0.5) * m.driftSpeed * 0.004;
      m.wanderDY += (Math.random() - 0.5) * m.driftSpeed * 0.004;
      m.wanderDX *= 0.92; m.wanderDY *= 0.92;
      m.targetX = Math.max(0, Math.min(1, m.targetX + m.wanderDX));
      m.targetY = Math.max(0, Math.min(1, m.targetY + m.wanderDY));
    }
    const px = m.x, py = m.y;
    m.x += (m.targetX - m.x) * 0.12;
    m.y += (m.targetY - m.y) * 0.12;
    if (m.active && (Math.abs(m.x-px) > 0.001 || Math.abs(m.y-py) > 0.001)) {
      applyAffect(m.x, m.y);
    }
    if (typeof drawAffectCanvas === 'function') drawAffectCanvas();
  });
}

// MASTER LIMITER
// ═══════════════════════════════════════════════════════════════════════════════
function makeLimiter() {
  function buildCurve(drive) {
    const n = 256, c = new Float32Array(n);
    const d = Math.max(0.001, drive);
    const norm = Math.tanh(d);
    for (let i = 0; i < n; i++) {
      const x = (i * 2) / (n - 1) - 1;
      c[i] = Math.tanh(x * d) / norm;
    }
    return c;
  }
  const preGain  = ctx.createGain();  preGain.gain.value  = 1.5;
  const shaper   = ctx.createWaveShaper(); shaper.oversample = '4x';
  const postGain = ctx.createGain(); postGain.gain.value = 0.65;
  shaper.curve = buildCurve(1.5);
  preGain.connect(shaper); shaper.connect(postGain);
  const m = { inlet: preGain, outlet: postGain, _shaper: shaper, threshVal: 1.5, ceilVal: 0.65 };
  m.setThresh = v => { m.threshVal = v; preGain.gain.setTargetAtTime(v, ctx.currentTime, 0.01); shaper.curve = buildCurve(v); };
  m.setCeil   = v => { m.ceilVal   = v; postGain.gain.setTargetAtTime(v, ctx.currentTime, 0.01); };
  return m;
}

function makeXYPad() {
  const xSrc = ctx.createConstantSource(); xSrc.offset.value = 0; xSrc.start();
  const ySrc = ctx.createConstantSource(); ySrc.offset.value = 0; ySrc.start();
  const xOut = ctx.createGain(); xOut.gain.value = 1;
  const yOut = ctx.createGain(); yOut.gain.value = 1;
  xSrc.connect(xOut); ySrc.connect(yOut);
  const m = { xSrc, ySrc, xOut, yOut, x: 0.5, y: 0.5 };
  m.setX = v => { m.x = v; xSrc.offset.setTargetAtTime((v*2)-1, ctx.currentTime, 0.01); };
  m.setY = v => { m.y = v; ySrc.offset.setTargetAtTime((v*2)-1, ctx.currentTime, 0.01); };
  mods.xypad = m; return m;
}

function makeRingMod() {
  const inlet    = ctx.createGain(); inlet.gain.value = 1;
  const modIn    = ctx.createGain(); modIn.gain.value = 1;
  const ringGain = ctx.createGain(); ringGain.gain.value = 0;
  const outlet   = ctx.createGain();
  inlet.connect(ringGain);
  modIn.connect(ringGain.gain); // audio-rate bipolar multiplication = ring mod
  ringGain.connect(outlet);
  mods.ringmod = { inlet, modIn, outlet };
}

function makeFMOp() {
  // Carrier: PolyBLEP (anti-aliased; matters when wave type is sawtooth/square)
  const carrier = new AudioWorkletNode(ctx, 'poly-blep-osc', {
    numberOfInputs: 0, numberOfOutputs: 1, outputChannelCount: [1],
  });
  carrier.frequency = carrier.parameters.get('frequency');
  carrier.frequency.value = 220;
  // Modulator: sine OscillatorNode (pure sine — no aliasing, output not heard directly)
  const modOsc  = ctx.createOscillator(); modOsc.type = 'sine'; modOsc.frequency.value = 440;
  const modIdx  = ctx.createGain(); modIdx.gain.value = 100;
  const cvIn    = ctx.createGain();
  const outlet  = ctx.createGain();
  modOsc.connect(modIdx); modIdx.connect(carrier.frequency);
  cvIn.connect(carrier.frequency);
  carrier.connect(outlet);
  modOsc.start();
  const m = { carrier, modOsc, modIdx, cvIn, outlet, baseFreq:220, ratioVal:2, indexVal:100, waveType:'sine' };
  m.setFreq  = v => { m.baseFreq=v; carrier.frequency.setTargetAtTime(v, ctx.currentTime, 0.01); modOsc.frequency.setTargetAtTime(v*m.ratioVal, ctx.currentTime, 0.01); };
  m.setRatio = v => { m.ratioVal=v; modOsc.frequency.setTargetAtTime(m.baseFreq*v, ctx.currentTime, 0.01); };
  m.setIndex = v => { m.indexVal=v; modIdx.gain.setTargetAtTime(v, ctx.currentTime, 0.01); };
  m.setWave  = v => { m.waveType=v; carrier.port.postMessage({ type: v }); };
  mods.fmop = m; return m;
}

function makeFlanger() {
  const inlet    = ctx.createGain();
  const dryGain  = ctx.createGain(); dryGain.gain.value = 0;
  const wetGain  = ctx.createGain(); wetGain.gain.value = 0.7;
  const outlet   = ctx.createGain();
  const del      = ctx.createDelay(0.02); del.delayTime.value = 0.005;
  const feedback = ctx.createGain(); feedback.gain.value = 0.5;
  const lfo      = ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.4;
  const lfoG     = ctx.createGain(); lfoG.gain.value = 0.004;
  lfo.connect(lfoG); lfoG.connect(del.delayTime); lfo.start();
  inlet.connect(dryGain); dryGain.connect(outlet);
  inlet.connect(del);
  del.connect(feedback); feedback.connect(del);
  del.connect(wetGain); wetGain.connect(outlet);
  const m = { inlet, outlet, rateVal:0.4, depthVal:0.7, fbVal:0.5, mixVal:0.7 };
  m.setRate  = v => { m.rateVal=v; lfo.frequency.setTargetAtTime(v, ctx.currentTime, 0.05); };
  m.setDepth = v => { m.depthVal=v; lfoG.gain.setTargetAtTime(v*0.006, ctx.currentTime, 0.05); };
  m.setFb    = v => { m.fbVal=v; feedback.gain.setTargetAtTime(Math.min(0.95,v), ctx.currentTime, 0.05); };
  m.setMix   = v => { m.mixVal=v; wetGain.gain.setTargetAtTime(v, ctx.currentTime, 0.05); };
  mods.flanger = m; return m;
}

function makeTuring() {
  const register = Array.from({length:16}, ()=>Math.random()>0.5?1:0);
  const cvSrc   = ctx.createConstantSource(); cvSrc.offset.value = 0; cvSrc.start();
  const cvOut   = ctx.createGain(); cvSrc.connect(cvOut);
  const gateSrc = ctx.createConstantSource(); gateSrc.offset.value = 0; gateSrc.start();
  const gateOut = ctx.createGain(); gateSrc.connect(gateOut);
  const PENTA = [0,2,4,7,9];
  const m = { register, cvOut, gateOut, stepsVal:8, chanceVal:0.5, rateVal:2, _updateDisplay:null };
  m.tick = () => {
    const entering = register[m.stepsVal-1];
    const mutated  = Math.random() < m.chanceVal ? 1-entering : entering;
    for(let i=m.stepsVal-1;i>0;i--) register[i]=register[i-1];
    register[0]=mutated;
    let val=0;
    for(let i=0;i<m.stepsVal;i++) val=(val*2)+register[i];
    const idx = val % (PENTA.length*2);
    const oct = Math.floor(idx/PENTA.length);
    const semi = PENTA[idx%PENTA.length] + oct*12;
    cvSrc.offset.setTargetAtTime(semi/12, ctx.currentTime, 0.005);
    gateSrc.offset.setValueAtTime(1, ctx.currentTime);
    gateSrc.offset.setValueAtTime(0, ctx.currentTime+0.025);
    if(m._updateDisplay) m._updateDisplay();
  };
  m.setSteps  = v => { m.stepsVal  = Math.max(2,Math.min(16,Math.round(v))); };
  m.setChance = v => { m.chanceVal = v; };
  m.setRate   = v => { m.rateVal   = Math.max(0.1, v); };
  let _lastTick=0;
  registerDraw(function _turingTick(){ if(_masterFrameTs-_lastTick>=1000/m.rateVal){_lastTick=_masterFrameTs;m.tick();} });
  mods.turing = m; return m;
}

function makePolyClock() {
  const _mkGate = () => {
    const src=ctx.createConstantSource(); src.offset.value=0; src.start();
    const out=ctx.createGain(); src.connect(out); return {src,out};
  };
  const gA=_mkGate(), gB=_mkGate(), gC=_mkGate();
  const m = { gateA:gA.out, gateB:gB.out, gateC:gC.out, tempoVal:1 };
  let lastA=0, lastB=0, lastC=0;
  const fire=(src,now)=>{src.offset.setValueAtTime(1,now);src.offset.setValueAtTime(0,now+0.018);};
  registerDraw(function _pclockTick(){
    const now=ctx.currentTime;
    if(now-lastA>=3/m.tempoVal){fire(gA.src,now);lastA=now;}
    if(now-lastB>=4/m.tempoVal){fire(gB.src,now);lastB=now;}
    if(now-lastC>=5/m.tempoVal){fire(gC.src,now);lastC=now;}
  });
  m.setTempo = v => { m.tempoVal=Math.max(0.05,v); };
  mods.pclock = m; return m;
}

function makeDrunk() {
  const cvSrc   = ctx.createConstantSource(); cvSrc.offset.value=0; cvSrc.start();
  const cvOut   = ctx.createGain(); cvSrc.connect(cvOut);
  const gateSrc = ctx.createConstantSource(); gateSrc.offset.value=0; gateSrc.start();
  const gateOut = ctx.createGain(); gateSrc.connect(gateOut);
  const m = { cvOut, gateOut, rateVal:1, stepVal:3, scaleName:'penta', root:0, currentSemi:12 };
  m.step = () => {
    const scale = QUANT_SCALES[m.scaleName]||QUANT_SCALES.penta;
    const dir   = Math.random()>0.5?1:-1;
    const jump  = Math.ceil(Math.random()*m.stepVal);
    m.currentSemi = Math.max(0,Math.min(36,m.currentSemi+dir*jump));
    const snapped = snapToScale(m.currentSemi, scale, m.root);
    cvSrc.offset.setTargetAtTime(snapped/12, ctx.currentTime, 0.005);
    gateSrc.offset.setValueAtTime(1, ctx.currentTime);
    gateSrc.offset.setValueAtTime(0, ctx.currentTime+0.025);
  };
  m.setRate  = v => { m.rateVal=Math.max(0.05,v); };
  m.setStep  = v => { m.stepVal=Math.max(1,Math.round(v)); };
  m.setScale = v => { m.scaleName=v; };
  m.setRoot  = v => { m.root=v; };
  let _lastTick=0;
  registerDraw(function _drunkTick(){ if(_masterFrameTs-_lastTick>=1000/m.rateVal){_lastTick=_masterFrameTs;m.step();} });
  mods.drunk = m; return m;
}

function makeTheremin() {
  const cvSrc  = ctx.createConstantSource(); cvSrc.offset.value=0; cvSrc.start();
  const cvOut  = ctx.createGain(); cvSrc.connect(cvOut);
  const velSrc = ctx.createConstantSource(); velSrc.offset.value=0; velSrc.start();
  const velOut = ctx.createGain(); velSrc.connect(velOut);
  const m = { cvOut, velOut, cvSrc, velSrc, pitchVal:0, volVal:0 };
  m.setPitch = v => { m.pitchVal=v; cvSrc.offset.setTargetAtTime(v, ctx.currentTime, 0.02); };
  m.setVol   = v => { m.volVal=v;   velSrc.offset.setTargetAtTime(v, ctx.currentTime, 0.02); };
  mods.theremin = m; return m;
}

let _euclidDrawFn = null;
function drawEuclidPattern(activeIdx) {
  if (_euclidDrawFn) _euclidDrawFn(activeIdx);
}
function buildEuclidPanel() {
  const d = document.createElement('div');
  // Pattern display canvas
  const cv = document.createElement('canvas');
  cv.width = 148; cv.height = 32;
  cv.style.cssText = 'display:block;margin:4px auto;border:1px solid #00ff8844;border-radius:2px;';
  d.appendChild(cv);
  let flashIdx = -1;
  _euclidDrawFn = (activeIdx) => {
    if (activeIdx !== undefined) { flashIdx = activeIdx; setTimeout(()=>{ flashIdx=-1; }, 80); }
    const c = cv.getContext('2d');
    c.fillStyle = '#04040e'; c.fillRect(0,0,cv.width,cv.height);
    const pat = mods.euclid.pattern;
    const n = pat.length;
    const dotR = Math.min(8, (cv.width - 8) / n / 2 - 1);
    const cx0 = cv.width/2, cy0 = cv.height/2;
    const radius = Math.min(cx0, cy0) - dotR - 2;
    for (let i = 0; i < n; i++) {
      const ang = (i / n) * Math.PI * 2 - Math.PI / 2;
      const x = cx0 + Math.cos(ang) * radius;
      const y = cy0 + Math.sin(ang) * radius;
      const active = pat[i];
      const isFlash = i === flashIdx;
      c.beginPath(); c.arc(x, y, dotR, 0, Math.PI*2);
      c.fillStyle = isFlash ? '#ffffff' : active ? '#00ff88' : '#1a3a2a';
      c.shadowBlur = isFlash ? 12 : active ? 6 : 0;
      c.shadowColor = '#00ff88';
      c.fill(); c.shadowBlur = 0;
    }
  };
  d.appendChild(mkPP('euclid-go', 'co', 'GATE', 'out'));
  d.appendChild(mkKnob({id:'euclid-hits',   label:'HITS',   min:1,  max:16, val:3, sz:'sm',
    onChange: v => mods.euclid.setHits(v)}));
  d.appendChild(mkKnob({id:'euclid-steps',  label:'STEPS',  min:2,  max:16, val:8, sz:'sm',
    onChange: v => mods.euclid.setSteps(v)}));
  d.appendChild(mkKnob({id:'euclid-offset', label:'SHIFT',  min:0,  max:15, val:0, sz:'sm',
    onChange: v => mods.euclid.setOffset(v)}));
  drawEuclidPattern();
  return panel('euclid', 'EUCLID', d);
}

      mods.spectral.doFreeze();
      frzBtn.classList.add('on');

    tip: 'Dry/wet blend. Freeze at 1.0 = only the frozen spectrum, no dry signal. At 0.5 = frozen spectrum blended with live audio — the classic "cloud behind the melody" technique.',

// AFFECT panel — canvas + text input + buttons + knobs
let drawAffectCanvas = null;
function buildAffectPanel() {
  const m = mods.affect;
  const W = 180, H = 180;
  const d = document.createElement('div'); d.style.minWidth = `${W+8}px`;

  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  cv.style.cssText = `border:1px solid var(--border-main);box-shadow:0 0 8px color-mix(in srgb,var(--shadow-panel) 70%, transparent);cursor:crosshair;display:block;touch-action:none;`;
  d.appendChild(cv);
  const c = cv.getContext('2d');

  const trail = [];
  drawAffectCanvas = () => {
    const on = m.active;
    cv.style.borderColor = on ? getComputedStyle(document.documentElement).getPropertyValue('--accent-cyan').trim() : getComputedStyle(document.documentElement).getPropertyValue('--border-main').trim();
    c.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-panel-4').trim(); c.fillRect(0,0,W,H);
    // grid
    c.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-faint').trim(); c.lineWidth = 0.5;
    [W/3, 2*W/3].forEach(x => { c.beginPath(); c.moveTo(x,0); c.lineTo(x,H); c.stroke(); });
    [H/3, 2*H/3].forEach(y => { c.beginPath(); c.moveTo(0,y); c.lineTo(W,y); c.stroke(); });
    // labels
    c.font = '7px "JetBrains Mono"'; c.letterSpacing = '1px'; c.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-dim').trim();
    c.fillText('MELANCHOLY', 3, H-4);
    c.fillText('CALM', W-36, H-4);
    c.fillText('TENSE', 3, 10);
    c.fillText('EUPHORIC', W-58, 10);
    // trail
    trail.push([m.x, m.y]);
    if (trail.length > 24) trail.shift();
    trail.forEach(([tx,ty], i) => {
      const alpha = (i / trail.length) * 0.12;
      c.beginPath();
      c.arc(tx*W, (1-ty)*H, 3, 0, Math.PI*2);
      c.fillStyle = `rgba(0,255,255,${alpha})`;
      c.fill();
    });
    // puck
    const px = m.x * W, py = (1 - m.y) * H;
    c.beginPath(); c.arc(px, py, 8, 0, Math.PI*2);
    c.fillStyle = on ? '#00ffff' : '#336666';
    c.shadowBlur = on ? 16 : 4; c.shadowColor = '#00ffff';
    c.fill(); c.shadowBlur = 0;
  };

  // Drag to move puck
  let dragging = false;
  const setPuck = (e) => {
    const r = cv.getBoundingClientRect();
    m.targetX = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    m.targetY = Math.max(0, Math.min(1, 1 - (e.clientY - r.top) / r.height));
    m.wanderDX = 0; m.wanderDY = 0;
    if (m.active) applyAffect(m.targetX, m.targetY);
  };
  cv.addEventListener('pointerdown', e => { dragging=true; cv.setPointerCapture(e.pointerId); setPuck(e); });
  cv.addEventListener('pointermove', e => { if (dragging) setPuck(e); });
  cv.addEventListener('pointerup',     () => { dragging=false; });
  cv.addEventListener('pointercancel', () => { dragging=false; });

  // Mood dropdown
  const sel = document.createElement('select');
  sel.style.cssText = 'width:100%;box-sizing:border-box;background:var(--bg-panel);border:1px solid var(--border-main);color:var(--text-main);padding:3px 5px;font-size:9px;font-family:var(--font-ui);margin-top:4px;letter-spacing:.3px;';
  const blankOpt = document.createElement('option');
  blankOpt.value = ''; blankOpt.textContent = '— choose a mood —';
  sel.appendChild(blankOpt);
  // Sort words alphabetically and group by quadrant label
  const quadrant = ([x, y]) => y > 0.5 ? (x > 0.5 ? 'EUPHORIC' : 'TENSE') : (x > 0.5 ? 'CALM' : 'MELANCHOLY');
  const grouped = {};
  Object.entries(AFFECT_WORDS).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([word, xy]) => {
    const q = quadrant(xy);
    if (!grouped[q]) grouped[q] = [];
    grouped[q].push(word);
  });
  ['MELANCHOLY','CALM','TENSE','EUPHORIC'].forEach(q => {
    const grp = document.createElement('optgroup');
    grp.label = q;
    (grouped[q] || []).forEach(word => {
      const opt = document.createElement('option');
      opt.value = word; opt.textContent = word;
      grp.appendChild(opt);
    });
    sel.appendChild(grp);
  });
  sel.addEventListener('change', () => {
    if (!sel.value) return;
    const res = textToAffect(sel.value);
    if (res) { m.targetX = res[0]; m.targetY = res[1]; m.wanderDX = 0; m.wanderDY = 0; }
  });
  d.appendChild(sel);

  // Buttons row
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:4px;margin-top:4px;';
  const onBtn = document.createElement('button');
  onBtn.className = 'btn'; onBtn.id = 'affect-on-btn'; onBtn.textContent = 'ON';
  const _affectKnobIds = ['vcf-cutoff','vcf-res','adsr-A','adsr-D','adsr-S','adsr-R',
    'lfo-rate','lfo-depth','reverb-size','reverb-mix','delay-mix',
    'tape-drive','tape-mix','phaser-mix','chorus-mix'];
  onBtn.addEventListener('click', () => {
    m.active = !m.active;
    onBtn.classList.toggle('on', m.active);
    if (m.active) {
      // Snapshot current values so we can restore them on turn-off
      m._snapshot = {};
      _affectKnobIds.forEach(id => { if (knobRefs[id]) m._snapshot[id] = knobRefs[id].getVal(); });
      m._snapshot._vcoType   = mods.vco?.type;
      m._snapshot._chordName = mods.chord?.chordName;
      applyAffect(m.x, m.y);
    } else {
      // Restore pre-AFFECT parameter values
      if (m._snapshot) {
        _affectKnobIds.forEach(id => { if (knobRefs[id] && m._snapshot[id] != null) knobRefs[id].applyInput(m._snapshot[id]); });
        if (m._snapshot._vcoType   && mods.vco)   { mods.vco.setType(m._snapshot._vcoType);       sk('vco-wave',      m._snapshot._vcoType); }
        if (m._snapshot._chordName && mods.chord)  { mods.chord.setChord(m._snapshot._chordName);  sk('chord-type-sel',m._snapshot._chordName); }
        m._snapshot = null;
        m.lastQuadrant = null;
      }
      if (m.wanderMode) { m.wanderMode = false; wanderBtn.classList.remove('on'); driftWrap.style.display = 'none'; }
    }
  });
  const wanderBtn = document.createElement('button');
  wanderBtn.className = 'btn'; wanderBtn.id = 'affect-wander-btn'; wanderBtn.textContent = 'WANDER';
  wanderBtn.addEventListener('click', () => {
    m.wanderMode = !m.wanderMode;
    wanderBtn.classList.toggle('on', m.wanderMode);
    driftWrap.style.display = m.wanderMode ? '' : 'none';
  });
  btnRow.appendChild(onBtn); btnRow.appendChild(wanderBtn);
  d.appendChild(btnRow);

  // Knobs
  const knobRow = document.createElement('div');
  knobRow.style.cssText = 'display:flex;gap:4px;margin-top:4px;';
  knobRow.appendChild(mkKnob({id:'affect-strength', label:'STRNGTH', min:0, max:1, val:0.5, sz:'sm',
    onChange: v => { m.strength = v; if(m.active) applyAffect(m.x, m.y); }}));
  const driftWrap = document.createElement('div');
  driftWrap.style.display = 'none';
  driftWrap.appendChild(mkKnob({id:'affect-drift', label:'DRIFT', min:0.1, max:2, val:0.3, sz:'sm',
    onChange: v => { m.driftSpeed = v; }}));
  knobRow.appendChild(driftWrap);
  d.appendChild(knobRow);

  return panel('affect', 'AFFECT', d);
}

function buildXYPadPanel() {
  const m = mods.xypad;
  const W = 160, H = 160;
  const d = document.createElement('div'); d.style.minWidth = `${W+8}px`;
  const cv = document.createElement('canvas'); cv.width=W; cv.height=H;
  cv.style.cssText = `border:1px solid color-mix(in srgb,var(--accent-cyan) 30%,transparent);box-shadow:0 0 12px color-mix(in srgb,var(--accent-cyan) 8%,transparent);cursor:crosshair;display:block;touch-action:none;`;
  const c = cv.getContext('2d');
  function drawXY() {
    c.fillStyle = '#04040e'; c.fillRect(0,0,W,H);
    c.strokeStyle='rgba(0,255,255,0.08)'; c.lineWidth=0.5;
    for(let i=1;i<4;i++){const x=i*W/4;c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}
    for(let i=1;i<4;i++){const y=i*H/4;c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}
    c.strokeStyle='rgba(0,255,255,0.18)'; c.lineWidth=0.8;
    c.beginPath();c.moveTo(W/2,0);c.lineTo(W/2,H);c.stroke();
    c.beginPath();c.moveTo(0,H/2);c.lineTo(W,H/2);c.stroke();
    const px=m.x*W, py=(1-m.y)*H;
    c.strokeStyle='rgba(0,255,255,0.2)'; c.lineWidth=0.5;
    c.beginPath();c.moveTo(px,0);c.lineTo(px,H);c.stroke();
    c.beginPath();c.moveTo(0,py);c.lineTo(W,py);c.stroke();
    c.beginPath(); c.arc(px,py,7,0,Math.PI*2);
    c.fillStyle='#00ffff'; c.shadowBlur=14; c.shadowColor='#00ffff'; c.fill(); c.shadowBlur=0;
    c.fillStyle='rgba(0,255,255,0.55)'; c.font='7px "JetBrains Mono"';
    c.fillText(`X:${(m.x*2-1).toFixed(2)}`,3,H-4);
    c.fillText(`Y:${(m.y*2-1).toFixed(2)}`,3,14);
  }
  let _dragging=false;
  const _setPos=(e)=>{
    const r=cv.getBoundingClientRect();
    m.setX(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)));
    m.setY(Math.max(0,Math.min(1,1-(e.clientY-r.top)/r.height)));
  };
  cv.addEventListener('pointerdown',e=>{_dragging=true;cv.setPointerCapture(e.pointerId);_setPos(e);});
  cv.addEventListener('pointermove',e=>{if(_dragging)_setPos(e);});
  cv.addEventListener('pointerup',()=>_dragging=false);
  d.appendChild(cv);
  const ppRow=document.createElement('div'); ppRow.style.cssText='display:flex;justify-content:space-between;margin-top:3px;';
  ppRow.appendChild(mkPP('xypad-xo','co','X OUT','out'));
  ppRow.appendChild(mkPP('xypad-yo','co','Y OUT','out'));
  d.appendChild(ppRow);
  registerDraw(drawXY);
  return panel('xypad','XY PAD',d);
}

function buildTuringPanel() {
  const m = mods.turing;
  const d = document.createElement('div'); d.style.minWidth='180px';
  const cv=document.createElement('canvas'); cv.width=170; cv.height=22;
  cv.style.cssText='display:block;margin:2px 0;border:1px solid rgba(0,255,255,0.15);';
  const c=cv.getContext('2d');
  m._updateDisplay = () => {
    c.fillStyle='#04040e'; c.fillRect(0,0,170,22);
    const n=m.stepsVal, bw=Math.floor(170/n);
    for(let i=0;i<n;i++){
      if(m.register[i]){
        c.shadowBlur=6; c.shadowColor='#00ffff';
        c.fillStyle='#00ffff';
      } else {
        c.shadowBlur=0;
        c.fillStyle='rgba(0,255,255,0.1)';
      }
      c.fillRect(i*bw+1,2,bw-2,18);
    }
    c.shadowBlur=0;
  };
  m._updateDisplay();
  d.appendChild(cv);
  const r1=document.createElement('div');r1.style.cssText='display:flex;gap:2px;';
  r1.appendChild(mkKnob({id:'turing-steps', label:'STEPS', min:2,   max:16, val:8,  tip:TIPS['mod-turing'], onChange:v=>m.setSteps(v)}));
  r1.appendChild(mkKnob({id:'turing-chance',label:'CHANCE',min:0,   max:1,  val:0.5,                       onChange:v=>m.setChance(v)}));
  r1.appendChild(mkKnob({id:'turing-rate',  label:'RATE',  min:0.25,max:16, val:2,  log:true,              onChange:v=>m.setRate(v)}));
  d.appendChild(r1);
  d.appendChild(document.createElement('hr'));
  d.appendChild(mkPP('turing-cv','co','CV OUT','out'));
  d.appendChild(mkPP('turing-go','co','GATE OUT','out'));
  return panel('turing','TURING',d);
}

function buildThereminPanel() {
  const m = mods.theremin;
  const W=60, H=180;
  const d = document.createElement('div'); d.style.minWidth=`${W+8}px`;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  cv.style.cssText=`border:1px solid rgba(255,0,255,0.25);cursor:crosshair;display:block;touch-action:none;`;
  const c=cv.getContext('2d');
  let _therActive=false, _pitchY=0.5, _volX=0.5;
  function drawTheremin() {
    c.fillStyle='#04040e'; c.fillRect(0,0,W,H);
    const grad=c.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'rgba(255,0,255,0.18)'); grad.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=grad; c.fillRect(0,0,W,H);
    // octave markers
    c.strokeStyle='rgba(255,0,255,0.15)'; c.lineWidth=0.5; c.font='6px "JetBrains Mono"';
    c.fillStyle='rgba(255,0,255,0.35)';
    [0,12,24].forEach(semi=>{
      const y=H*(1-semi/24);
      c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();
      c.fillText(semi===0?'C1':semi===12?'C2':'C3',2,y-1);
    });
    if(_therActive){
      const py=H*(1-_pitchY);
      c.strokeStyle='#ff00ff'; c.lineWidth=2; c.shadowBlur=12; c.shadowColor='#ff00ff';
      c.beginPath();c.moveTo(0,py);c.lineTo(W,py);c.stroke(); c.shadowBlur=0;
      c.fillStyle=`rgba(255,0,255,${_volX*0.6+0.1})`;
      c.fillRect(0,py-1,W*_volX,3);
    }
  }
  const _setFromEvt=(e)=>{
    const r=cv.getBoundingClientRect();
    _pitchY=Math.max(0,Math.min(1,1-(e.clientY-r.top)/r.height));
    _volX  =Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
    m.setPitch(_pitchY*2-1);
    m.setVol(_volX*2-1);
  };
  cv.addEventListener('pointerdown',e=>{_therActive=true;cv.setPointerCapture(e.pointerId);_setFromEvt(e);});
  cv.addEventListener('pointermove',e=>{if(_therActive)_setFromEvt(e);});
  cv.addEventListener('pointerup',()=>_therActive=false);
  registerDraw(drawTheremin);
  d.appendChild(cv);
  d.appendChild(mkPP('theremin-cv','co','PITCH CV','out'));
  d.appendChild(mkPP('theremin-vel','co','VOL CV','out'));
  return panel('theremin','THEREMIN',d);
}

function buildTeslaPanel() {
  const W=180, H=180;
  const d=document.createElement('div'); d.style.minWidth=`${W+8}px`;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  cv.style.cssText=`border:1px solid rgba(255,170,0,0.2);box-shadow:0 0 10px rgba(255,170,0,0.06);display:block;`;
  const c=cv.getContext('2d');
  const ampAn=ctx.createAnalyser(); ampAn.fftSize=256;
  analyserNode.connect(ampAn);
  const timeBuf=new Float32Array(ampAn.fftSize);
  function _branch(x,y,angle,length,depth,amp){
    if(depth<0||length<1) return;
    const ex=x+Math.cos(angle)*length;
    const ey=y+Math.sin(angle)*length;
    const alpha=Math.min(1,(depth/7)*amp*2.5);
    c.beginPath();c.moveTo(x,y);c.lineTo(ex,ey);
    c.strokeStyle=`rgba(${180+Math.floor(amp*75)},${Math.floor(120+amp*100)},0,${alpha})`;
    c.lineWidth=Math.max(0.3,depth*0.25);
    c.stroke();
    if(Math.random()<0.65+amp*0.25){
      const dev=((Math.random()-0.5)*1.3)*(1+amp*0.5);
      _branch(ex,ey,angle+dev,length*(0.5+Math.random()*0.25),depth-1,amp);
    }
    if(depth>2&&Math.random()<0.28+amp*0.35){
      const dev2=((Math.random()-0.5)*2.2)*(1+amp*0.5);
      _branch(ex,ey,angle+dev2,length*(0.3+Math.random()*0.2),depth-2,amp);
    }
  }
  registerDraw(function _teslaLoop(){
    ampAn.getFloatTimeDomainData(timeBuf);
    let rms=0; for(const s of timeBuf) rms+=s*s; rms=Math.sqrt(rms/timeBuf.length);
    const amp=Math.min(1,rms*10);
    c.fillStyle='rgba(4,4,14,0.88)'; c.fillRect(0,0,W,H);
    if(amp<0.004) return;
    const numBolts=Math.max(1,Math.floor(1+amp*3));
    for(let i=0;i<numBolts;i++){
      const startAngle=-Math.PI/2+((Math.random()-0.5)*0.6);
      _branch(W/2,H,startAngle,25+amp*45,5+Math.floor(amp*3),amp);
    }
  });
  d.appendChild(cv);
  const lbl=document.createElement('div');
  lbl.style.cssText='text-align:center;font-size:7px;color:rgba(255,170,0,0.35);margin-top:3px;letter-spacing:2px;';
  lbl.textContent='AMPLITUDE';
  d.appendChild(lbl);
  return panel('tesla','TESLA',d);
}

// SPECTRUM + LISSAJOUS visualization loops
// ═══════════════════════════════════════════════════════════════════════════════
function startSpectrum() {
  const cv = document.getElementById('spectrum-cv'); if (!cv) return;
  const c = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const specAnalyser = ctx.createAnalyser();
  specAnalyser.fftSize = 2048; specAnalyser.smoothingTimeConstant = 0.75;
  analyserNode.connect(specAnalyser);
  const freqBuf = new Float32Array(specAnalyser.frequencyBinCount);
  const grad = c.createLinearGradient(0,H,0,0);
  grad.addColorStop(0, '#00ffff'); grad.addColorStop(0.5,'#8800ff'); grad.addColorStop(1,'#ff00ff');
  const nyq = ctx.sampleRate / 2;
  const logMin = Math.log10(20), logMax = Math.log10(nyq);
  const barW = Math.ceil(W / 80);
  registerDraw(function _specDraw() {
    specAnalyser.getFloatFrequencyData(freqBuf);
    c.fillStyle = '#04040e'; c.fillRect(0,0,W,H);
    const bins = freqBuf.length;
    for (let i = 0; i < 80; i++) {
      const f0 = Math.pow(10, logMin + (i/80)*(logMax-logMin));
      const f1 = Math.pow(10, logMin + ((i+1)/80)*(logMax-logMin));
      const b0 = Math.round(f0/nyq * bins), b1 = Math.round(f1/nyq * bins);
      let maxDb = -160;
      for (let b=Math.max(0,b0); b<Math.min(bins,b1); b++) maxDb = Math.max(maxDb, freqBuf[b]);
      const norm = Math.max(0, (maxDb + 100) / 80);
      const barH = norm * H;
      c.fillStyle = grad;
      c.fillRect(i * W/80, H - barH, barW-1, barH);
    }
    // freq labels
    c.fillStyle = '#ffffff22'; c.font = '6px monospace';
    [[100,'100'],[1000,'1k'],[10000,'10k']].forEach(([f,lbl]) => {
      const x = (Math.log10(f)-logMin)/(logMax-logMin)*W;
      c.fillText(lbl, x-4, H-2);
    });
  });
}

function startLissajous() {
  const cv = document.getElementById('lissajous-cv'); if (!cv) return;
  const c  = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  // Two analyser nodes for X and Y inputs
  const axNode = ctx.createAnalyser(); axNode.fftSize = 1024;
  const ayNode = ctx.createAnalyser(); ayNode.fftSize = 1024;
  const xSilent = ctx.createGain(); xSilent.gain.value = 0;
  const ySilent = ctx.createGain(); ySilent.gain.value = 0;
  axNode.connect(xSilent); xSilent.connect(ctx.destination);
  ayNode.connect(ySilent); ySilent.connect(ctx.destination);
  mods.lissajous = { xNode: axNode, yNode: ayNode };
  // Route master output to X; Y gets signal only when patched to lissaj-yi
  analyserNode.connect(axNode);
  const xBuf = new Float32Array(axNode.frequencyBinCount);
  const yBuf = new Float32Array(ayNode.frequencyBinCount);
  const yFallback = new Float32Array(ayNode.frequencyBinCount); // pre-alloc — no per-frame GC
  const HISTORY = 512;
  registerDraw(function _lissajousDraw() {
    axNode.getFloatTimeDomainData(xBuf);
    ayNode.getFloatTimeDomainData(yBuf);
    // If Y has no signal (nothing patched), use a phase-shifted copy of X.
    // 1/4-buffer offset ≈ 90° at the dominant period — creates natural Lissajous figures.
    let yData = yBuf;
    let ySum = 0;
    for (let i = 0; i < 16; i++) ySum += Math.abs(yBuf[i * 32]);
    if (ySum < 1e-3) {
      const shift = Math.floor(xBuf.length / 4);
      for (let i = 0; i < yFallback.length; i++) yFallback[i] = xBuf[(i + shift) % xBuf.length];
      yData = yFallback;
    }
    // Phosphor fade
    c.fillStyle = 'rgba(4,4,14,0.25)'; c.fillRect(0,0,W,H);
    c.strokeStyle = '#ff00ff'; c.lineWidth = 1.2;
    c.beginPath();
    const n = Math.min(xBuf.length, yData.length, HISTORY);
    for (let i=0; i<n; i++) {
      const px = (xBuf[i]+1)*0.5*W;
      const py = (1-(yData[i]+1)*0.5)*H;
      i===0 ? c.moveTo(px,py) : c.lineTo(px,py);
    }
    c.stroke();
  });
}

// MOBILE SHELL  (nm2Mobile)
// ═══════════════════════════════════════════════════════════════════════════════
const nm2Mobile = {
  query: null,
  active: false,
  shell: null,
  currentTab: 'play',
  savedRackChildren: [],
  _statusTimer: null,
  _activityInterval: null,
  _meterRAF: null,
  _performRAF: null,
  _macroId: 'wander',
  _quickCardConfig: null, // array of 4 module type strings, persisted to localStorage
  patchName: 'INIT PATCH',

  // Module → Sound tab group mapping (panel type strings)
  GROUPS: {
    voice:      ['seq','vco','vcf','adsr','vca'],
    modulation: ['lfo','lfo2','sandh','att','slew','chaos','clkdiv','euclid','logic','morph','sidechain','turing','pclock','drunk','xypad','theremin'],
    sources:    ['vco2','noise','mixer','ladder','chord','arp','quant','res','formant','fmop','ringmod'],
