    { title:'LFO Modulation', hl:['lfo','vcf'],
      text:'LFO is already patched to VCF cutoff. Turn LFO DEPTH up — the filter opens and closes automatically. Change RATE: 0.2 Hz = slow lazy sweep, 5 Hz = tremolo-like flutter. This is how to create constant breathing movement in ambient work.' },
    { title:'Shape the Envelope', hl:['adsr'],
      text:'Set ADSR ATTACK to 0.4s, RELEASE to 2s. Notes now swell in and fade out softly. Long attack + long release = phrases that blur and overlap. Drop BPM to 70 and feel how the sequencer becomes more meditative. This slow envelope is the signature of expressive slow ambient synthesis.' },
    { title:'Add Reverb', hl:['vca','reverb'],
      text:'Patch VCA OUT → Reverb IN. That\'s all you need — the Reverb output is already wired to the speakers (all send effects like Reverb, Delay, Chorus, Tape, and Phaser work this way: patch IN to activate, the wet signal reaches your speakers automatically). Set Reverb SIZE to 6, DECAY to 0.85, MIX to 0.65. Your drone now lives in an enormous hall. Congratulations — ambient drone complete.' },
  ]},
  { name:'2 — Slow Ambient Pad', steps:[
    { title:'Two Oscillators', hl:['vco','vco2','mixer','vcf'],
      text:'Remove the VCO→VCF cable (click it). Patch VCO OUT → Mixer A IN, VCO2 OUT → Mixer B IN, Mixer OUT → VCF IN. Set VCO2 DETUNE to +7 cents. Two oscillators barely out of tune with each other create a beating, warm, analog chorus — this is the fundamental richness of hardware synthesis.' },
    { title:'Slow Attack + Long Release', hl:['adsr','seq'],
      text:'Set ADSR ATTACK to 1.5s, RELEASE to 4.5s. Drop BPM to 58. Notes now emerge from silence like breath and decay long after the sequencer moves on. Adjacent notes overlap and blend. This blurring of notes into each other is the defining sound of slow ambient synthesis.' },
    { title:'Dual LFO Movement', hl:['lfo','lfo2','vcf'],
      text:'LFO is already sweeping VCF cutoff. Now patch LFO2 OUT → VCF RES CV. Set LFO2 RATE to 0.2 Hz, DEPTH to 4. The filter\'s resonant peak now rises and falls slowly — when resonance climbs, the sound brightens and "sings"; when it drops, it becomes muffled and intimate. Two LFOs at different rates produce complex, non-repeating movement — the sound never loops exactly. This is living texture.' },
    { title:'Cathedral Reverb', hl:['reverb','micr0c0sm'],
      text:'Patch VCA OUT → Reverb IN (remember: the Reverb output is already wired to the speakers — just patching IN is enough). Set SIZE to 7.5, DECAY to 0.9, MIX to 0.75. For an extra layer of depth: insert the MICROCOSM between VCA and Reverb (VCA OUT → MICROCOSM IN → MICROCOSM OUT → REVERB IN). Set MICROCOSM to SHIM mode, BLEND 0.6. The granular shimmer feeds into the reverb and becomes part of the space itself — this is the complete ambient architecture.' },
    { title:'Pentatonic Sequence', hl:['seq'],
      text:'Edit sequencer pitches to 0, 2, 4, 7, 9, 0, 4, 7 (all consonant pentatonic intervals). Toggle step 6 and 7 off for space. At slow BPM with long envelopes, even simple patterns sound compositional. Silence between notes is as important as the notes themselves.' },
  ]},
  { name:'3 — Generative S&H Filter', steps:[
    { title:'What is Sample & Hold?', hl:['lfo','sandh'],
      text:'Sample & Hold grabs the CV value at its input at each trigger pulse and freezes it until the next trigger. Connect LFO OUT → S&H IN. Set LFO RATE to 7 Hz (fast — so the value at each trigger is unpredictable). Set the S&H TRIGGER button to ÷4.' },
    { title:'Route S&H to Filter', hl:['sandh','vcf'],
      text:'Patch S&H OUT → VCF CV. Every 4 sequencer steps, the filter jumps to wherever the fast LFO happened to be at that moment. Result: rhythmically-locked random filter steps. The filter changes in time with the music but you can\'t predict the exact values. This is the heart of generative music.' },
    { title:'Tune the Randomness', hl:['lfo','sandh','vcf'],
      text:'LFO rate controls unpredictability: fast (10+ Hz) = very random, slow (1 Hz) = gradual correlated change. LFO DEPTH controls the range of filter movement. The TRIGGER selector (STEP/÷2/÷4/÷8) sets how often the filter jumps. Explore all combinations — you\'re programming a generative system.' },
    { title:'Insert an Attenuverter', hl:['sandh','att','vcf'],
      text:'Route: S&H OUT → ATT IN, ATT OUT → VCF CV. The ATT knob now scales how much S&H reaches the filter (0 = none, +1 = full, -1 = inverted). This is the attenuverter\'s purpose: precise control over modulation depth without touching the source. Essential glue module.' },
    { title:'Tempo-Locked Echo', hl:['delay'],
      text:'Patch VCA OUT → Delay IN (the Delay output is already wired to the speakers — no output patching needed). Click BPM SYNC on the Delay. The echo repeats at a dotted-8th interval — rhythmically locking to your tempo. Combined with generative filter steps, every loop sounds different but feels intentional. This is the Buchla tradition.' },
  ]},
  { name:'4 — Percussive Noise Hit', steps:[
    { title:'Noise Source', hl:['noise','mixer'],
      text:'Click the NOISE module label — read the tooltip. Switch to PINK noise (warmer, rolls off highs — natural like rain or breath). Patch NOISE OUT → Mixer C IN. Set Mixer C to 0.6. Pink noise is the basis of snares, hi-hats, cymbals, wind, and countless electronic percussion sounds.' },
    { title:'Percussive Envelope', hl:['adsr'],
      text:'Set ADSR: ATTACK = 0.001 (instant), DECAY = 0.08, SUSTAIN = 0, RELEASE = 0.04. The envelope fires and dies immediately — a sharp click. This is the classic drum envelope shape: fast attack, zero sustain. Every sequencer step produces a brief transient hit.' },
    { title:'Bandpass the Noise', hl:['vcf','mixer'],
      text:'Patch Mixer OUT → VCF IN (remove existing VCF IN cable first). Set VCF to BANDPASS, CUTOFF to ~2500 Hz, RES to ~9. Bandpass + noise = pitched resonant drum. Lower cutoff = deep bass drum body. Higher cutoff = metallic hi-hat shimmer. RES creates the ring of a hand drum.' },
    { title:'Carve a Rhythm', hl:['seq'],
      text:'While the sequencer plays, toggle steps on and off live. Try keeping steps 1, 3, 5, 7 (even beats) or 1, 2, 5, 6 (syncopated). The space between hits is the groove. Toggle while playing — this is live performance on a step sequencer. Notice how different patterns feel.' },
    { title:'Layer Tone + Noise', hl:['vco','noise','mixer'],
      text:'Patch VCO OUT → Mixer A IN too. VCO provides pitched body, noise provides air and texture — exactly how a real drum machine works. Use Mixer A and C levels to blend. Low VCO + high noise = breathy snare. High VCO + low noise = resonant tom. This layering is sound design.' },
  ]},
  { name:'5 — Scales, Chords & Living Melody', steps:[
    { title:'Why Chords Change Everything', hl:['chord','mixer','vcf'],
      text:'Everything you\'ve built so far plays one note at a time — monophonic synthesis. Real ambient music and lush electronic pads are built on chords: three or more voices sounding simultaneously. The CHORD module contains 3 internal oscillators that track the sequencer pitch and add musical intervals above it. Patch CHORD OUT → Mixer B IN (or directly into VCF IN alongside VCO1). The chord will automatically follow every sequencer step without any extra patching. Notice the CHORD module also responds to MIDI notes — play a few on a keyboard if you have one.' },
    { title:'Choose Your Chord Type', hl:['chord'],
      text:'Select MIN (minor triad). Listen — the sound darkens and becomes more emotional. Switch to MAJ — brighter, resolved, happier. Try SUS2: notice how it feels ambiguous, neither happy nor sad, just floating? Sus chords have no third (the note that defines major/minor), so they don\'t commit to a mood. Sus chords are used constantly in ambient music because that unresolved quality creates beautiful tension. Try MAJ7 — the major seventh interval adds a dreamy, jazz-inflected quality. MIN7 is the choice for melancholic chord pads.' },
    { title:'Spread: From Digital to Analog', hl:['chord'],
      text:'Turn the CHORD SPREAD knob from 0 all the way to 15. At 0 the three voices are perfectly in tune — clean but electronic. As you increase SPREAD, the voices detune slightly against each other (up to 30 cents). Listen to how the chord thickens and gains a warm, beating quality — the waveforms phase against each other, creating a natural chorus effect. This is exactly what makes hardware analog synths sound "warm" compared to digital: no two oscillators are perfectly in tune. Set SPREAD to 8–12 for the ideal balance between warmth and intonation.' },
    { title:'Lock to a Scale', hl:['quant','seq'],
      text:'Now activate the QUANTIZER. Click LOCK — the button lights up. Select PENT (pentatonic) and ROOT = A. Press play on the sequencer. Every note in the pattern is now snapped to the A pentatonic scale. Change some sequencer step pitches wildly — they all land on musical notes. Switch the scale to MINOR while it\'s playing. The same rhythm, completely different harmonic character. This is the quantizer\'s superpower: you can explore scales by just clicking buttons while the music plays. Lydian has a dreamy floating quality. Dorian is the scale of electronic music (jazz-inflected, cinematic, most ambient).' },
    { title:'Generative Melody with RAND Mode', hl:['quant','seq'],
      text:'Click RAND on the QUANTIZER (LOCK also lights). Now every sequencer step is replaced with a RANDOM note from the selected scale — the sequencer pattern no longer matters. Listen: a different melody plays every loop, but it always stays in key. The note display shows each note as it fires. This is generative melody: you set the rules (scale + tempo), the system generates the music. Drop BPM to 60. Set ADSR ATTACK to 0.5s, RELEASE to 3s. The random notes overlap and blur into each other. Change the scale from PENT to DORIAN. You\'re now generating melodies in the style of algorithmic composition.' },
    { title:'The Full Harmony Architecture', hl:['vco','chord','quant','mixer','vcf','reverb'],
      text:'Bring everything together. Keep QUANTIZER on RAND + DORIAN + A. VCO1 plays the lead melody (monophonic, single voice). CHORD plays the harmony (three voices, tracking the same pitch). Both go through Mixer → VCF → VCA. Now add reverb: patch <b>VCA OUT → REVERB IN</b> (Reverb output is already wired to the speakers, so just patching IN is enough). Set CHORD to MIN7, SPREAD 10. Set reverb SIZE to 7, DECAY to 0.9. BPM to 65, ATTACK to 1s, RELEASE to 4s. LFO slowly sweeping the filter. Now you have: random in-key melody + harmonic chord voicing + slow filter movement + long reverb. This is a complete ambient pad. Every loop sounds composed, nothing repeats exactly. This is the architecture of contemporary ambient music.' },
  ]},
  { name:'6 — Microcosm: Granular Ambient', steps:[
    { title:'What is the Microcosm?', hl:['micr0c0sm'],
      text:'The MICROCOSM module is a granular processor — it records a rolling 4-second loop of whatever audio enters it, then plays back overlapping fragments of that recording called grains. Each grain is a tiny Hann-windowed slice of sound, 20–500ms long. Dozens overlap simultaneously, blurring the source into a shimmering cloud. It\'s inspired by the Hologram Electronics Microcosm pedal, used by ambient artists to turn any sound into an infinite atmospheric texture. You\'ll use it to transform the synth\'s output into something that sounds much larger than it is.' },
    { title:'Route the Signal Chain', hl:['vca','micr0c0sm'],
      text:'The default patch sends VCA OUT directly to the speakers. We\'re going to insert the Microcosm between VCA and Reverb. First: click the VCA OUT patch point (orange). Now click MICROCOSM IN (yellow) — a cable connects them. MICROCOSM is an inline processor (not a send effect), so you also need to patch its output: click MICROCOSM OUT (orange), then click REVERB IN or VCF IN. The simplest approach: leave the existing VCA→speakers wire and add VCA OUT → MICROCOSM IN too — the module runs in parallel. You\'ll hear the dry sound plus the granular cloud simultaneously.' },
    { title:'Your First Grain Cloud', hl:['micr0c0sm'],
      text:'The sequencer should be playing. On the MICROCOSM: make sure GRAN mode is selected (button lit). Set BLEND to 0.65. Set SIZE to around 0.15 (15% across the knob). Set SCAT to 0.4. Set DNSTY to about 15 grains/sec. Set PITCH to 1.0 (center). You should hear the synth\'s notes plus a soft, blurry cloud of sound following them with a slight delay. That cloud is dozens of tiny fragments of recent audio overlapping — the granular texture. It sounds like the notes are leaving a vapor trail.' },
    { title:'Sculpt with SIZE and SCAT', hl:['micr0c0sm'],
      text:'SIZE controls grain length: turn it left toward 0.02s — the cloud gets grainy, buzzy, granulated. Turn it right toward 0.5s — the cloud becomes smooth, smeared, almost reverb-like. SCAT controls how far back into the recording buffer grains are read: low SCAT = grains from the present moment (coherent, tight). High SCAT = grains from up to 2 seconds ago (fragmented, time-blurred). Try maximum SCAT with medium SIZE. Notes from two seconds ago are bleeding into right now. This is the essence of granular synthesis: time becomes malleable.' },
    { title:'The HOLD Button — Freeze Time', hl:['micr0c0sm'],
      text:'This is the most dramatic feature. While a note or chord is sustained, press ◈ HOLD. The recording buffer freezes at that instant — the Microcosm is now looping grains over that frozen moment indefinitely, with no new audio writing in. The sequencer can stop; silence can fall; but the granular cloud of that held moment sustains forever. Press HOLD again to unfreeze and let new audio back in. In live performance, HOLD lets you capture and sustain a beautiful moment while the rest of the patch evolves around it. It\'s one of the most expressive gestures in modern ambient performance.' },
    { title:'Shimmer Mode + Reverb', hl:['micr0c0sm','reverb'],
      text:'Switch MICROCOSM to SHIM mode. SHIM is granular but every grain plays back one octave higher — the Microcosm adds a shimmering upper halo one octave above the source. Set BLEND to 0.75, SIZE to 0.2, SCAT to 0.5, PITCH to 1.0. Now chain it into reverb: patch MICROCOSM OUT → REVERB IN (Reverb is a send effect — its output is already wired to the speakers, so just patching IN is enough). Set Reverb SIZE to 7, DECAY to 0.9, MIX to 0.75. The shimmer grains bloom upward into the reverb tail, creating an almost orchestral wash of texture. This combination — granular shimmer into long reverb — is the signature sound of contemporary ambient music.' },
    { title:'Build the Full Ambient Track', hl:['vco','vco2','mixer','adsr','lfo','lfo2','micr0c0sm','reverb','seq'],
      text:'Put everything together for a complete ambient composition. Set BPM to 52. Set ADSR: ATTACK = 2s, DECAY = 0.3s, SUSTAIN = 0.8, RELEASE = 5s. Patch VCO OUT → Mixer A IN, VCO2 OUT → Mixer B IN, Mixer OUT → VCF IN. Set VCO2 DETUNE to +5 cents. Set LFO RATE to 0.15 Hz, DEPTH to 400 (slow filter sweep). Patch LFO2 OUT → VCF RES CV at RATE 0.08 Hz, DEPTH 4 (very slow resonance swell — the filter breathes). Sequencer pitches: 0, 0, 7, 12, 7, 0, 5, 0. Keep steps 1, 2, 3, 5 on, rest off. MICROCOSM in SHIM mode → REVERB IN (output reaches speakers automatically). Press HOLD when a chord blooms to its peak. Let it run without touching anything. The patch breathes on its own — two LFOs, a granular halo, a cathedral reverb, notes emerging and dissolving. This is ambient music as a living system.' },
  ]},
  { name:'7 — Stereo Width & Warmth', steps:[
    { title:'Why Mono Feels Flat', hl:['vca','chorus'],
      text:'Everything built so far plays in mono — a single point of sound. Real music fills a stereo field: sounds come from left, right, center, near, far. Ambient music especially relies on spatial width for its immersive quality. Ambient music is spatial — it surrounds you. Expressive live ambient sets feel enormous because every sound occupies its own position in the stereo field. The good news: three modules (CHORUS, PANNER, PHASER) each add stereo dimension through different mechanisms. We\'ll use all three.' },
    { title:'Chorus: Width from a Single Voice', hl:['chorus'],
      text:'Patch VCA OUT → CHORUS IN, CHORUS OUT → Reverb IN (or leave it — Chorus output already reaches the speakers). Set CHORUS RATE to 0.8 Hz, DEPTH to 0.3, WIDTH to 0.9, MIX to 0.5. Listen — the formerly mono signal now sits wide in the stereo field. The two chorus voices are slightly detuned against each other and panned opposite; their phase drift creates a natural, beating warmth. This is exactly how vintage string synthesizers (Solina, Korg PE-1000) achieved their famous lush width. Turn WIDTH down to 0 — mono again. Turn it back up — instant width. This knob is your stereo on/off switch.' },
    { title:'Tape: From Digital to Analog', hl:['tape'],
      text:'First, remove the VCA→CHORUS cable from the last step (click on it). Now patch VCA OUT → TAPE IN, TAPE OUT → CHORUS IN (chain them). Set TAPE DRIVE to 3, WOW to 0.25, MIX to 0.6. The tanh waveshaper adds even harmonics that digital oscillators naturally lack — the sound becomes warmer, slightly rounded, less perfectly defined. The WOW adds micro-pitch flutter like a real tape machine. Turn DRIVE up to 6 — hear it start to clip and saturate. The oscillator\'s waveform is being pushed beyond its linear range and folding back, adding harmonic complexity. This is why analog hardware "sounds better" — it\'s saturating constantly, adding richness at every stage.' },
    { title:'Phaser: The Breathing Pad', hl:['phaser'],
      text:'Remove the TAPE→CHORUS cable (click it). Now add PHASER between them: TAPE OUT → PHASER IN, PHASER OUT → CHORUS IN. Set PHASER RATE to 0.15 Hz, DEPTH to 0.6, MIX to 0.65. The four all-pass filters sweep slowly across the frequency spectrum, creating traveling notches — dips in the frequency response that move upward and fold back. The result is a slow, swooshing quality, like the sound is breathing in and out. Classic ambient composers built entire albums from this effect. Slow phasers make static chords feel alive. This is "movement without modulation" — the sound changes without any knob moving.' },
    { title:'Auto-Panner: Spatial Motion', hl:['panner'],
      text:'Insert the PANNER anywhere in your chain — try after CHORUS. Set RATE to 0.07 Hz (very slow) and DEPTH to 0.5. At this rate, the sweep takes over 14 seconds for a full cycle — not audible as panning, just felt as a gradual drift from left to right and back. Close your eyes and listen. The sound moves through space. This is the subconscious dimension of stereo: the brain uses spatial position to separate sounds, so a moving sound feels different from a static one even when the difference is subtle. At 0.5 Hz the sweep becomes more obvious — try it on a pad that needs rhythmic variation without a hard beat.' },
    { title:'The Full Character Chain', hl:['vca','tape','chorus','phaser','reverb'],
      text:'The complete ambient character chain: VCA OUT → TAPE IN → TAPE OUT → PHASER IN → PHASER OUT → CHORUS IN → CHORUS OUT → REVERB IN (Reverb output already reaches the speakers). Set Tape DRIVE 2.5, WOW 0.2, MIX 0.55. Phaser RATE 0.1 Hz, DEPTH 0.5, MIX 0.6. Chorus RATE 0.7, DEPTH 0.25, WIDTH 0.85, MIX 0.55. Reverb SIZE 6, DECAY 0.88, MIX 0.7. Now set ADSR ATTACK to 1.5s, RELEASE to 4s, BPM to 60. Turn QUANTIZER to RAND + DORIAN. The signal passes through: warmth (tape) → breathing (phaser) → width (chorus) → space (reverb). This is a finished ambient sound — it could go directly on a record.' },
  ]},
  { name:'8 — Rhythm, Arpeggios & Living Sequences', steps:[
    { title:'Get Sound Flowing', hl:['vco','seq'],
      text:'Before we add rhythm tricks, let\'s make sure you have sound. <br><br><b>Do this now:</b><br>1. If you see the nm² logo splash screen, <b>click it</b> to power on the synth.<br>2. The <b>SEQUENCER</b> (highlighted) should already be playing — you\'ll see a step light moving across the grid. If it\'s stopped, click <b>▶ PLAY</b>.<br>3. You should hear notes. If not, check that your browser volume is up.<br><br>The sequencer sends pitch values to the VCO and triggers the ADSR envelope — this is the basic sound engine. Right now it plays all 8 steps in order, identically, every loop. Let\'s fix that.' },
    { title:'Add Randomness with Probability', hl:['seq'],
      text:'A sequence that plays the same way every time sounds robotic. The <b>P%</b> knobs add human-like variation.<br><br><b>Do this now:</b><br>1. Look at the SEQUENCER steps — each step has three controls: an <b>on/off toggle</b> (top), a <b>pitch knob</b> (middle), and a small <b>P%</b> knob (bottom).<br>2. Find <b>step 3</b>. Turn its P% knob down to about <b>70%</b>. This means step 3 now only fires 70% of the time.<br>3. Set <b>step 5</b> P% to about <b>70%</b> too.<br>4. Set <b>step 7</b> P% to <b>40%</b> — this step becomes rare, dramatic punctuation.<br><br>Listen for a few loops. The sequence sounds slightly different each time — some notes appear, some don\'t. This is how generative music works: same pattern, probabilistic variation.' },
    { title:'Change the Pattern Direction', hl:['seq'],
      text:'The <b>DIR</b> buttons below the step grid change how the sequencer moves through notes.<br><br><b>Do this now:</b><br>1. Find the four <b>DIR</b> buttons: <b>FWD</b>, <b>REV</b>, <b>P-P</b>, <b>RND</b>.<br>2. Click <b>P-P</b> (ping-pong). The sequence now goes 1→2→3→4→5→6→7→8→7→6→5...→2→1 and back — a 14-step feel from 8 notes!<br>3. Try <b>RND</b> — completely random step selection. Every loop is unique.<br>4. Go back to <b>P-P</b> for now. It\'s the sweet spot between predictable and surprising.<br><br>Combined with the probability knobs from the last step, your 8-note sequence now feels like an evolving composition rather than a loop.' },
    { title:'Slow Down and Add Space', hl:['seq','adsr'],
      text:'Fast sequences feel busy. Slow ones feel ambient. Let\'s create breathing room.<br><br><b>Do this now:</b><br>1. In the SEQUENCER, find the <b>BPM</b> knob. Turn it down to about <b>72 BPM</b>.<br>2. Find the <b>ADSR</b> module (highlighted). Set <b>ATTACK</b> to about <b>0.8s</b> (notes fade in gently).<br>3. Set ADSR <b>RELEASE</b> to about <b>3s</b> (notes ring out long after the step fires).<br><br>Now notes overlap and blend into each other. With P-P direction, adjacent notes in both directions create a shimmering cloud. We\'ll add reverb and effects in a later step to complete the atmosphere.' },
    { title:'Start the Arpeggiator', hl:['arp'],
      text:'The <b>ARPEGGIO</b> module turns a chord shape into a flowing melody. It drives the VCO pitch and triggers the ADSR automatically — no cables needed.<br><br><b>Do this now:</b><br>1. Find the <b>ARPEGGIO</b> module (highlighted).<br>2. Set <b>CHORD</b> to <b>MIN7</b> (minor 7th — melancholic and lush).<br>3. Set <b>DIR</b> to <b>U/D</b> (up then down — a flowing wave shape).<br>4. Set <b>RATE</b> to <b>×2</b> (8th notes — twice the base tempo).<br>5. Set <b>OCT</b> to <b>2</b> (spread across two octaves).<br>6. Click <b>▶ ARP</b> to start it.<br><br>You should hear the minor 7th chord spread across two octaves in an ascending-descending pattern. The arpeggiator and sequencer can run simultaneously — they layer without clashing.' },
    { title:'Add Sidechain Pumping', hl:['sidechain','clkdiv','vca'],
      text:'The <b>SIDECHAIN</b> module makes the sound "pump" rhythmically — the signature technique of modern electronic music.<br><br><b>Do this now:</b><br>1. Find the <b>SIDECHAIN</b> module (highlighted). Set its <b>ATTACK</b> to <b>0.005</b>, <b>RELEASE</b> to <b>0.15</b>, <b>AMT</b> to <b>2</b>.<br>2. Use the buttons below to make two cable connections — or hover over them to see which patch points light up, then drag the cables yourself.<br><br><b>How it works:</b> The first cable sends a rhythmic pulse from the <b>CLK ÷4</b> (clock divider) into the sidechain — it fires once every 4 sequencer steps, giving us a steady beat. The second cable routes the sidechain\'s envelope to control the VCA\'s volume, replacing the ADSR. The result: your pad swells and fades every 4 beats — a slow, ambient pump.',
      patch:[{from:'clk-div4', to:'sc-in'}, {from:'sc-out', to:'vca-env'}] },
    { title:'Route Through Effects', hl:['tape','phaser','chorus','reverb'],
      text:'Let\'s build the full ambient character chain by routing VCA output through four effects in series. Each adds a layer of richness.<br><br><b>Do this now:</b><br>1. Use the CONNECT buttons below to wire up the effects chain. Hover each button to see the patch points light up on the modules.<br>2. After connecting, set these values:<br>   • <b>TAPE:</b> DRIVE 2.5, WOW 0.2, MIX 0.55<br>   • <b>PHASER:</b> RATE 0.1, DEPTH 0.5, MIX 0.6<br>   • <b>CHORUS:</b> RATE 0.7, DEPTH 0.25, WIDTH 0.85, MIX 0.55<br>   • <b>REVERB:</b> SIZE 6, DECAY 0.88, MIX 0.7<br><br>The signal passes through: warmth (tape) → breathing (phaser) → width (chorus) → space (reverb).',
      patch:[{from:'vca-out', to:'tape-in'}, {from:'tape-out', to:'phaser-in'}, {from:'phaser-out', to:'chorus-in'}, {from:'chorus-out', to:'reverb-in'}] },
    { title:'Set the Quantizer', hl:['quant'],
      text:'The <b>QUANTIZER</b> forces all notes into a musical scale — so nothing sounds dissonant, even with random sequences.<br><br><b>Do this now:</b><br>1. Find the <b>QUANTIZER</b> module (highlighted).<br>2. Set <b>MODE</b> to <b>RAND</b> — this adds random variation to the pitch before quantizing.<br>3. Set <b>SCALE</b> to <b>MINOR</b>.<br>4. Set <b>ROOT</b> to <b>A</b>.<br><br>Now every note the sequencer and arpeggiator produce will land on A minor scale tones. The random mode adds subtle pitch drift that the scale catches — the notes wander but always sound harmonically correct.' },
    { title:'The Complete Composition', hl:['seq','arp','sidechain','quant','reverb'],
      text:'Take a moment to listen to what you\'ve built. You now have:<br><br>• <b>Two independent voices</b> — the probabilistic sequencer (slow, evolving) and the arpeggiator (fast, melodic)<br>• <b>Harmonic quantization</b> — everything locked to A minor<br>• <b>Sidechain pumping</b> — rhythmic breathing<br>• <b>Four effects in series</b> — tape warmth, phaser sweep, chorus width, reverb space<br><br>This is a complete piece of ambient electronic music running in a single browser tab. Try adjusting the sequencer <b>BPM</b>, or switching the arpeggiator <b>CHORD</b> to MAJ7, or nudging the probability knobs. Every small change ripples through the entire system.<br><br>When you\'re happy with the sound, click <b>⊹ SAVE AS</b> in the toolbar to save it as a preset.' },
  ]},
  { name:'9 — Record a Full Track', steps:[
    { title:'Thinking Like a Composer', hl:[],
      text:'Every great ambient track has an arc: it begins somewhere, builds toward something, reaches a peak, and resolves. A great ambient live set follows this shape instinctively — a drone becomes a melody, textures accumulate, granular processing transforms everything into abstraction, and then it strips back. We\'ll build this arc in four layers. Each layer is added and removed through the Scenes system (A B C D buttons in the toolbar). Scene A = sparse intro. Scene B = chord pad added. Scene C = arpeggiated melody + full effects chain. Scene D = granular climax. This tutorial guides you through setting up and transitioning between them.' },
    { title:'Layer 1: The Drone Foundation', hl:['vco','adsr','reverb'],
      text:'Start with a single tone that establishes the harmonic center. Set VCO to sine wave, octave 3. ADSR: ATTACK 2.5s, DECAY 0.5s, SUSTAIN 0.9, RELEASE 5s. Start the sequencer at BPM 65 with only step 1 active (pitch 0). Patch VCA OUT → REVERB IN (the dry signal and reverb wet signal both reach the speakers automatically). Set REVERB SIZE 7, DECAY 0.94, MIX 0.75. The tone should emerge slowly and decay for 5 seconds after the step fires. This is the foundation — a breath of sound. Once it feels right, save this as Scene A: click ● SAVE in the toolbar, then click A. You can always recall this starting point.' },
    { title:'Layer 2: The Chord Pad', hl:['chord','chorus','tape'],
      text:'Add harmonic richness by enabling the Chord module. Set CHORD to MIN7 (melancholic, floating). SPREAD to 8 cents (voices gently beating against each other). Patch CHORD OUT → TAPE IN → TAPE OUT → CHORUS IN → CHORUS OUT → REVERB IN. Set TAPE DRIVE 2.5, WOW 0.2, MIX 0.6. CHORUS RATE 0.6, DEPTH 0.25, WIDTH 0.9, MIX 0.55. Enable steps 1, 3, 5 in the sequencer — the chord fires on those beats, always min7 voicing. The drone and chord now blend through the reverb tail. Save this as Scene B. Now you can cut between A and B for arrangement: long intro (A), then chord enters (B).' },
    { title:'Layer 3: The Melodic Arc', hl:['arp','quant','wavefolder','phaser'],
      text:'Enable the QUANTIZER in RAND + DORIAN mode (root A). Start the ARPEGGIATOR: chord MIN7, direction U/D, rate ×2 (8th notes), octaves 2. The arp changes the VCO pitch and triggers the ADSR automatically — no output cable needed. Now route the main signal through effects: patch VCA OUT → WVFLDR IN (FOLD 2.5, SYMM 0.1), WVFLDR OUT → PHASER IN (RATE 0.12, DEPTH 0.55, MIX 0.6), PHASER OUT → CHORUS IN, CHORUS OUT → REVERB IN. The notes now pass through wavefolder harmonics, a slow phaser sweep, and into the reverb alongside the chord pad. Add sequencer step probability: drop steps 2, 4, 6 to 70%. Set ADSR ATTACK 0.4s, RELEASE 2.5s. Save this as Scene C. Transition A→B→C over the first two minutes.' },
    { title:'Layer 4: The Granular Climax', hl:['micr0c0sm'],
      text:'The climax transforms everything into abstract texture. Patch VCA OUT → MICROCOSM IN → MICROCOSM OUT → REVERB IN. Set mode to SHIM (shimmer: granular one octave up, creates an ethereal shimmer above the notes). Set BLEND 0.8, SIZE 0.15, SCAT 0.4, PITCH 2.0, DNSTY 18. Press HOLD — this freezes the current moment into the granular buffer. The sound now loops as granular clouds infinitely, even if the sequencer is stopped. Increase REVERB SIZE to 8, DECAY 0.97, MIX 0.85. The track has dissolved into pure texture. Save this as Scene D. This is the ambient climax: recognizable melody → granular abstraction → frozen shimmer.' },
    { title:'Scene Morphing: Living Transitions', hl:[],
      text:'Instead of snapping between scenes instantly, use ⟿ MORPH in the toolbar. Click it — it lights up and a BARS selector appears (1 / 2 / 4 / 8 / 16). At 65 BPM, 4 bars = about 14 seconds; 8 bars = 28 seconds. Arm MORPH and click Scene C. Every continuous parameter glides simultaneously: VCF cutoff opens, ADSR shapes shift, reverb mix crossfades, LFO rate quickens. Discrete things (waveform type, chord type, cables) snap at the very end. While the MORPH button pulses, click it to freeze in place at the current blended state — if the midpoint sounds better than the destination, lock it there. Click a new scene while morphing to chain transitions from the current state. This is the full live arrangement workflow: your four scenes become a 2-minute arc of continuous evolution.' },
    { title:'Transitions and the Fade', hl:[],
      text:'A track without shape is just a loop. The arc: recall A (drone) → arm MORPH 8 bars → click B (chord enters slowly) → arm MORPH 8 bars → click C (arpeggio rises) → arm MORPH 16 bars → click D (granular dissolution). The whole set takes 10+ minutes and nothing happens abruptly. To end: in Scene D, slowly turn down VCA gain over 20–30 seconds — the reverb tail outlasts the signal, fading to silence naturally. To record: click ⏺ REC in the toolbar, perform your arc, click REC again. Your composition downloads as a .webm audio file. The entire set just happened in one browser tab.' },
  ]},
  { name:'10 — Scene Morphing Live', steps:[
    { title:'What is Scene Morphing?', hl:[],
      text:'Scenes (A B C D) are snapshots of the entire synthesizer. Normally, clicking a scene slot recalls it instantly — every knob jumps to its saved value, cables snap, and the sound changes abruptly. Scene Morphing replaces that jump with a smooth glide: every knob interpolates simultaneously over a duration you choose, easing in and out so nothing sounds mechanical. The morph respects your BPM: 4 bars at 90 BPM = 10.7 seconds; 8 bars at 60 BPM = 32 seconds. Set up two scenes first: load "Ambient Drone" from ⊹ PATCHES, press PLAY, click ● SAVE then A. That\'s Scene A.' },
    { title:'Build a Contrast Scene', hl:[],
      text:'Without saving, change the synthesizer significantly — this becomes Scene B. Open the VCF CUTOFF all the way up (bright and airy). Set ADSR ATTACK to 0.05 (snappy). Change the LFO RATE to 0.8 Hz (faster modulation). Turn the reverb MIX down to 0.35. Now click ● SAVE then B. You have two distinct states: A (dark, slow, washy) and B (bright, punchy, drier). These are your morph endpoints. Recall Scene A now by clicking A (instant, no MORPH arm) to confirm A sounds right.' },
    { title:'Your First Morph', hl:[],
      text:'Click the ⟿ MORPH button in the toolbar — it lights up and a BARS row appears: 1, 2, 4, 8, 16. Select 4. Now click Scene B. The morph begins: watch the VCF CUTOFF knob rotate in real time. The filter opens over 4 bars, the reverb mix drops, the ADSR sharpens. Everything moves simultaneously. The MORPH button pulses while the morph runs. Let it complete — when it reaches B, the MORPH button goes dark. Now arm MORPH again, select 8 bars, click A. The reverse transition takes twice as long, easing back to the drone. This is the basic performance loop: arm → click scene → listen → arm → click scene.' },
    { title:'Chaining and Freezing', hl:[],
      text:'Click MORPH (arm it), click B to begin a morph. While it\'s running — MORPH button pulsing — click the MORPH button again. The morph stops exactly where it is, freezing the synthesizer at the current blended state. If that halfway point sounds interesting, stay there and play. From this frozen state, arm MORPH and click A or B again — the new morph starts from the current position, not from either saved scene. This chaining is the key live skill: you\'re always morphing from wherever you are. Click a scene while morphing to redirect: old morph discards, new morph starts from the current interpolated values.' },
    { title:'Four-Scene Live Arc', hl:[],
      text:'Load "Full Ambient Track" from ⊹ PATCHES. Save it as A. Make three progressively more intense versions: B = chord pad added, more reverb, slower attack. C = wavefolder on, arpeggiator running, quantizer RAND mode. D = Microcosm SHIM maxed, reverb huge, press HOLD on Microcosm to freeze the granular cloud. Now perform the arc: arm MORPH 8 bars → click B (scene opens over ~26 seconds at 72 BPM) → arm MORPH 8 bars → click C → arm MORPH 16 bars → click D. The entire 3-minute performance is four button presses, each gliding smoothly into the next. This is ambient live performance.' },
  ]},
  { name:'11 — Live Looping & Pad Performance', steps:[
    { title:'Load Your Pads', hl:['padsampler'],
      text:'The PAD SMPLR module holds 8 independent sample slots. Drag audio files (kicks, snares, melodies, field recordings) onto each pad, or click an empty pad to open a file picker. Right-click a loaded pad to swap its sample. Pads are triggered by keys Q-W-E-R (pads 1-4) and A-S-D-F (pads 5-8), or by MIDI notes 48-55. Click any loaded pad directly to preview it. Load something rhythmic into pad Q and something melodic into W.' },
    { title:'Trigger Live and Loop It', hl:['padsampler','loopstation'],
      text:'Press Q to fire pad 1. Now set up a loop: press key 1 (or click REC on Loop Track 1) — the button blinks red and recording begins. Play pads Q and W live while it records. Press 1 again (or click REC again) to stop recording. The loop auto-plays immediately. The loop is isolated from the main synth output — it captures the master mix. Layer a second loop: arm Track 2 with key 2 and add a different performance on top.' },
    { title:'Stutter: Rhythmic Glitch', hl:['padsampler','stutter','reverb'],
      text:'The STUTTER module captures recent audio and loops it rhythmically — like an SP-404 scatter effect. Its output is permanently wired to the master mix; no output patching needed. To activate it: patch something into STUTTER IN (the yellow patch point). Try PAD OUT → STUTTER IN. Now trigger pads Q and W in rhythm — the stutter captures those moments and loops them. SLICE controls fragment length (0.03s = granular flutter, 2s = full phrase loop). REPT controls how many times each fragment repeats before releasing. MIX blends dry vs. wet. For the synth signal: patch VCA OUT → STUTTER IN. The filter-shaped synth sound gets trapped and repeated — dramatic for drops and buildups.' },
    { title:'Reverse and Export Loops', hl:['loopstation'],
      text:'Once a loop is recorded, click REV on that track — the buffer reverses in place and restarts immediately. Reversed loops work especially well with melodic content: the attack becomes a swell. Click WAV to download the loop as a 16-bit WAV file. You can bring exported loops back into the Pad Sampler on another pad — the loop station becomes a stem recorder.' },
    { title:'Add Mic and Process Live', hl:['micinput','micr0c0sm'],
      text:'Click ARM MIC on the MIC IN module and grant browser microphone access. Patch MIC OUT → MICROCOSM IN → MICROCOSM OUT → Reverb IN. Set Microcosm to SHIM mode, BLEND 0.7, SIZE 0.12. Speak or sing into your mic — your voice becomes a granular shimmer through the reverb. Press HOLD on Microcosm to freeze your voice into a sustained cloud. Layer this over the looping pads for full live ambient composition. Press Space to stop all loops and return to a clean state.' },
  ]},
  { name:'12 — Layout, Multi-Module & Rack Design', steps:[
    { title:'Reordering the Rack', hl:[],
      text:'Every module panel can be dragged into any position along the rack. Grab a module\'s label bar (the glowing text at the top, e.g. "VCO" or "DELAY") and drag left or right — the module slides into its new slot in real time. Release and the new order is saved. This matters because you can cluster related modules together: keep your VCO, VCF, and VCA side by side for easy patching; push effects to the far right. Patches remember the rack order you saved, so when you reload a preset it will restore your preferred layout.' },
    { title:'Collapsing Modules', hl:[],
      text:'Double-click any module label to collapse it to just its header. The module still works — audio keeps flowing through it — but it takes up almost no horizontal space. Double-click again to expand. This is essential when working with many modules: collapse everything you\'re not actively tweaking. The cable endpoints stay visible above collapsed modules so you can still repatch without expanding. A collapsed module label turns slightly dim to make it easy to spot at a glance.' },
    { title:'Adding a Second Instance', hl:[],
      text:'Click the ⊕ MODULE button in the toolbar. A grid of duplicatable module types appears: VCO, LFO, VCF, ADSR, VCA, MIXER, DELAY, REVERB, CHORUS, TAPE SAT, PHASER, WVFLDR, ATTENUVTR. Click any type to add a second instance. It appears at the right end of the rack labeled "VCO #2" (or whichever type you chose). It has its own knobs and patch points, completely independent of the original. Try adding a second VCF and patching the first VCF\'s OUT into the second VCF\'s IN for a two-pole resonant stack.' },
    { title:'Right-Click Context Menu', hl:[],
      text:'Right-click any module label to open a context menu with three options. Duplicate creates another copy of that module type — faster than opening the picker. Bypass toggles the module in and out of the signal chain visually (grays out the panel as a marker). Delete permanently removes extra instances (instance #1 of any type can never be deleted, only bypassed). Deleted modules also remove all cables connected to them. Use right-click → Duplicate to quickly build a dual-oscillator setup or a parallel effects chain without leaving the rack.' },
    { title:'Twin Filter Example', hl:['vcf'],
      text:'Load "Twin Filter (Multi-Module)" from ⊹ PATCHES. This patch adds a second VCF (highpass at 4.5kHz) running in parallel with the main lowpass VCF. The default chain sends VCO → VCF (LP) → VCA (warm, body-forward). The extra cable routes VCO → VCF #2 (HP) → REVERB directly, adding airy high-frequency texture on top of the reverb tail. Sweep VCF\'s cutoff down — the lows disappear while the shimmer stays. Sweep VCF #2\'s cutoff — control how much high end enters the reverb. Two filters, two independent tone shapes, one patch.' },
    { title:'Saving Multi-Module Layouts', hl:[],
      text:'Module instances and rack order are saved with every preset and scene. When you save via SAVE AS or ● SAVE → scene slot, the extra modules are captured: which types exist, their instance IDs, and all knob values. When the preset loads, any existing extra modules are cleared first, then the preset\'s extra modules are recreated in order. Cables that reference extra patch points (like vcf-2-out or delay-2-in) are restored too, since those patch points are rebuilt before cables are reconnected. A preset saved with a dual-filter layout will always reload in exactly that state.' },
  ]},
  { name:'13 — The Speaking Synthesizer', steps:[
    { title:'What is a Formant?', hl:['formant'],
      text:'Human vowels — A, E, I, O, U — aren\'t pure tones. They\'re the result of two resonant peaks in the vocal tract called <b>formants</b>. F1 is the low peak (tongue height), F2 is the high peak (tongue position). Move them and the vowel changes. The <b>FORMANT</b> module has two parallel bandpass filters tuned to these exact vowel resonances. Patch VCA OUT → FORMANT IN, FORMANT OUT → REVERB IN (the reverb output already reaches the speakers). Press PLAY on the sequencer. You should hear the synth speaking — every note is shaped through a vowel-colored filter.' },
    { title:'Sweep Through the Vowels', hl:['formant'],
      text:'Turn the FORMANT <b>VOWEL</b> knob slowly from left (A) to right (U). Listen as the sound speaks: <i>A → E → I → O → U</i>. At A (low vowel) the sound is open and warm, shaped like an "ahh". At E the peak rises — "ey". At I it narrows and brightens — "ee". At O the second formant drops back — "oh". At U both formants are very low — a round, dark "oo". Set the Q knob to 10 — this sharpens the resonant peaks so the vowel character becomes more pronounced. This is your main expressive control: the vowel position IS the timbre.' },
    { title:'Automate the Vowel with LFO', hl:['formant','lfo'],
      text:'Patch LFO OUT → ATT IN, then ATT OUT → FORMANT CV IN. Set ATT OFFSET to 0.5 so the bipolar LFO is shifted into the Formant\'s 0–1 CV range. Set LFO RATE to 0.08 Hz (very slow — one full sweep every 12+ seconds) and DEPTH around 0.4–0.5. Now the vowel sweeps automatically, the synthesizer <i>breathing</i> through A→E→I→O→U and back on its own. Adjust ATT and DEPTH together to control how far the vowel wanders. Try LFO waveform TRIANGLE for the smoothest sweep, or SINE for a slightly more natural "mouth opening". This is the most expressive way to create evolving vocal texture without playing anything.' },
    { title:'Sing It: Sequence the Vowels', hl:['formant','seq'],
      text:'Now let\'s make it feel like the synth is actually singing. Set ADSR ATTACK to 0.3s, RELEASE to 2.5s. Slow the sequencer to 72 BPM. Remove the LFO→FORMANT CV cable (click it) to take back manual control. Slowly turn the VOWEL knob while the sequence plays — each move repositions the mouth shape. Try landing on a new vowel for each bar: "aah" for 4 beats, then creep toward "ee", hold "ee" for 4 beats, then open to "oh". You are now doing real-time vowel performance. This is how electronic vocalists phrase without a voice: the movement IS the expression.' },
    { title:'Add Sequencer Tracking', hl:['formant','seq','chaos'],
      text:'For more organic motion, patch CHAOS OUT → FORMANT CV IN. Set CHAOS RATE to 0.05, CHAOS AMOUNT to 0.4. The vowel now wanders slowly in unpredictable arcs — never the same loop twice, never snapping. Combine this with a slow LFO on VCF cutoff. You have a speaking texture that breathes AND drifts harmonically. Turn FORMANT MIX to 0.7 to let some of the raw oscillator through alongside the formant color. This blending — part raw, part voiced — is how real vocal synthesis works.' },
    { title:'The Vowel Choir Patch', hl:['formant','reverb','chord'],
      text:'Load <b>"Vowel Choir"</b> from ⊹ PATCHES to hear the finished tutorial sound: slow sequencer, CHORD in MIN7 through the FORMANT, LFO sweeping the vowel over 18 seconds, long reverb tail. With three chord voices passing through the vowel filter together, it sounds like a small synthetic choir breathing through one shared mouth. Start with VOWEL at A (fully left) and slowly drift it rightward during a performance — the choir wakes up, finds its voice, and opens. This is the Formant\'s power: it doesn\'t process pitch, only timbre. But that timbral dimension is what makes sound feel <i>alive</i>.' },
  ]},
  { name:'14 — The Glass Bell Forest', steps:[
    { title:'What is a Resonator?', hl:['res'],
      text:'The <b>RESONATOR</b> module is a Karplus-Strong physical model: a tiny burst of noise feeds into a feedback loop with a delay line tuned to a specific frequency. The loop recirculates, losing high frequencies each pass, and the result sounds exactly like a plucked string or struck bell decaying in natural space. It\'s not a synthesizer in the traditional sense — it\'s a physics simulation. Set RESONATOR <b>FREQ</b> to 220 Hz, <b>DECAY</b> to 0.96 (long sustain), <b>BRIGHT</b> to 0.55. Click the <b>PLUCK</b> button. You should hear a clean, bell-like tone that decays over a few seconds. That is a string vibrating.' },
    { title:'Tune It and Play It', hl:['res','seq'],
      text:'Enable <b>TRACK</b> on the RESONATOR. Now every note from the sequencer (or MIDI keyboard) also sets the resonator\'s frequency and triggers a pluck automatically — no cables needed. Press PLAY. You\'ll hear the synthesizer\'s normal sound PLUS the resonator bell tracking each pitch. Set DECAY to 0.98 and let the tones accumulate — each new note plucks a new string while previous notes still ring. At slow BPM with many overlapping decays, you have a <b>forest of glass bells</b>. Turn the sequencer BPM to 62 and ADSR RELEASE to 4s to feel the full harmonic blur.' },
    { title:'Character: Pluck vs. Mallet', hl:['res'],
      text:'The <b>EXCITE</b> switch changes how the resonator is struck. <b>PLUCK</b> = a sharp noise impulse, like a guitar pick. The attack is instantaneous and the decay rings clean. <b>MALLET</b> = a softer, slightly longer noise burst, like a xylophone or marimba mallet. It has a rounder attack and blends more smoothly into reverb. Try switching while the sequence plays — notice how the quality of each "ding" changes. BRIGHT controls how quickly the high frequencies damp: low BRIGHT (0.1) = a warm muffled thud; high BRIGHT (0.9) = metallic shimmer that lasts forever. Find the exact decay character of your imaginary instrument.' },
    { title:'Route into Reverb', hl:['res','reverb'],
      text:'The RESONATOR OUT is a dry, direct signal. Now patch <b>RES OUT → REVERB IN</b> (reverb output reaches the speakers automatically). Set REVERB SIZE to 8, DECAY to 0.96, MIX to 0.8. The brief bell tones now bloom into an enormous room — each pluck becomes an event in a cathedral. At this decay level, notes from 10 seconds ago still shimmer in the reverb. Lower BPM to 55. The sequencer is barely ticking, each note a rare visitation. This is where Karplus-Strong synthesis becomes <i>spatial ambient music</i> instead of just a bell sound.' },
    { title:'CV Pitch Control', hl:['res','lfo','sandh'],
      text:'Disable TRACK for a moment. Patch LFO2 OUT → RES CV IN. Set LFO2 RATE to 0.15 Hz, DEPTH to 1.0, waveform TRIANGLE. The resonator frequency now glides up and down independently of the sequencer — a slow continuous pitch drift, like a wine glass being rubbed. Re-enable TRACK: the pitch snaps to each sequencer note then drifts from there until the next hit. For more drama, patch S&H OUT → RES CV IN instead: the resonator frequency jumps to a random new value every few steps, making each bell a different pitch in the cloud. This is melodic density without a melody.' },
    { title:'The Glass Bell Garden', hl:['res','reverb','reverb','seq'],
      text:'Load <b>"Glass Bell Garden"</b> from ⊹ PATCHES to hear the complete picture: slow 60 BPM, RESONATOR TRACK on, DECAY 0.97, BRIGHT 0.6, Mallet excite — each sequencer note plucks a resonator bell tuned to that pitch, simultaneous chord pads swell underneath, long reverb. The entire patch is built around one acoustic idea: physical resonance in a large space. The bells don\'t fade — they accumulate. Play it forward, then sit back and listen for 3 minutes without touching anything. Let the harmonic buildup find its own equilibrium. This is generative ambient composition.' },
  ]},
  { name:'15 — Crystalline Freeze', steps:[
    { title:'What is Spectral Processing?', hl:['spectral'],
      text:'The <b>SPECTRAL</b> module uses a 1024-point Fast Fourier Transform running continuously on your audio. Instead of processing time-domain samples, it works in the <i>frequency domain</i> — it sees the full harmonic spectrum of the sound moment by moment. This opens up effects that are impossible in normal audio processing: freezing a sound in place, smearing its spectrum across time, or shifting pitch without changing time. Patch VCA OUT → SPECTRAL IN, SPECTRAL OUT → REVERB IN. Set mode to <b>OFF</b> for now (bypass). Press PLAY.' },
    { title:'SMEAR: Time Dissolves', hl:['spectral'],
      text:'Switch SPECTRAL mode to <b>SMR</b> (Smear). Turn the <b>SMEAR</b> knob to 0.7. The module is now cross-fading between consecutive FFT frames — instead of the spectrum changing instantly with each new audio frame, it blends over several frames. Notes begin to lose their sharp attacks. The sound smears forward in time, like chalk drawn across paper. Turn SMEAR to 0.95 — the sound becomes a soft continuous cloud, all note boundaries dissolved. This is not reverb (no room simulation) and not delay (no echo) — it\'s pure <i>temporal smearing</i>. A sequence of notes becomes a single evolving texture.' },
    { title:'BLUR: Spectral Averaging', hl:['spectral'],
      text:'Switch to <b>BLR</b> (Blur) mode. This averages neighboring frequency bins together — the spectral resolution decreases, sharp resonances broaden, the sound becomes more diffuse. Low SMEAR + BLR = a gentle haze over the signal. High SMEAR + BLR = the harmonic content melts into a smooth plateau. Try BLR with the sequencer\'s distinct pitches playing: the pitch information fades, harmonic partials merge, and the signal becomes tonal noise — recognizable as "music" but no longer as "notes". This is how to blur a melody into texture.' },
    { title:'FREEZE: The Perfect Moment', hl:['spectral'],
      text:'Switch mode to <b>FRZ</b>. The module is now in Freeze standby — it will capture the current spectrum when you press ❄. While a full, sustained chord is ringing (or while the sequencer is playing), press <b>❄ FREEZE</b>. The sound crystallizes: the exact harmonic snapshot at that moment loops in the overlap-add synthesizer indefinitely. Stop the sequencer — the frozen spectrum sustains perfectly. It\'s not a sample loop; it\'s a reconstruction of the spectral frame. Try adjusting the <b>PITCH</b> knob: the frozen spectrum shifts up or down in pitch while its duration stays constant. This is phase vocoder pitch shifting.' },
    { title:'Layer Frozen + Live', hl:['spectral','reverb'],
      text:'Here\'s the live performance technique: start with a beautiful chord, freeze it with ❄, then continue playing over the frozen layer. The frozen spectrum acts as a drone — always harmonically correct because it captured YOUR chord. Add REVERB SIZE 9, DECAY 0.97, MIX 0.85. The frozen cloud expands inside the reverb into something enormous. Now slowly turn SMEAR up from 0 to 0.6 while frozen: the static spectrum gains motion, blurring across its own frame, becoming shimmer rather than stillness. MIX controls how much of the processed signal you hear — at 0.5 you hear the dry signal alongside the freeze, useful for keeping rhythmic articulation.' },
    { title:'Frozen Horizon', hl:['spectral','reverb'],
      text:'Load <b>"Frozen Horizon"</b> from ⊹ PATCHES. It loads in SMEAR mode with high smear (0.85) — the sequence\'s notes are already dissolving before you hear them as discrete pitches. Freeze a moment with ❄, add the PITCH shift to +0.08 (a subtle upward drift), and let the reverb fill the space. Nothing moves. Nothing attacks. The sound simply <i>exists</i>, permanently mid-bloom. This is the spectral aesthetic: where granular synthesis fragments time, spectral processing <i>suspends</i> it. Play with the PITCH knob while frozen — sweeping slowly is like watching ice melt at one frame per second.' },
  ]},
  { name:'16 — Rhythm Logic: Boolean Beats', steps:[
    { title:'What is Gate Logic?', hl:['logic'],
      text:'In modular synthesis, gates are on/off pulses: a high voltage means "yes" (note on, step fired, threshold crossed), a low voltage means "no". The <b>LOGIC</b> module takes <i>two gate signals</i> and applies a Boolean operation between them. <b>AND</b>: output fires only when BOTH inputs are high simultaneously. <b>OR</b>: output fires when EITHER input is high. <b>XOR</b>: output fires when <i>exactly one</i> input is high (not both, not neither). <b>NOT</b>: inverts input A (fires when A is low). These aren\'t just logic experiments — they create polyrhythmic patterns from two simple clock divisions that would take hours to program by hand.' },
    { title:'Build the Two Clocks', hl:['logic','clkdiv','euclid'],
      text:'We\'re going to feed two rhythmic patterns into LOGIC. For the first clock: patch <b>CLK ÷4 → LOGIC A IN</b>. This fires once every 4 sequencer steps — a steady quarter-note pulse. For the second clock: patch <b>EUCLID OUT → LOGIC B IN</b>. Set the EUCLIDEAN sequencer to <b>3 hits, 8 steps, offset 0</b> — this gives you the classic "3 in 8" Euclidean pattern (often written as E(3,8)), which places hits at steps 1, 4, 7. Now both clocks are flowing into the LOGIC inputs. Nothing sounds different yet — the LOGIC output needs to route somewhere.',
      patch:[{from:'clk-div4', to:'logic-a'}, {from:'euclid-go', to:'logic-b'}] },
    { title:'Route Logic Output to VCF', hl:['logic','vcf'],
      text:'Patch <b>LOGIC OUT → VCF CV</b>. Set VCF CUTOFF to 400 Hz, RES to 6. Now when the LOGIC gate fires, it slams the VCF open — a percussive filter punch. Set LOGIC mode to <b>AND</b>. The filter only opens when BOTH the ÷4 pulse AND the Euclidean pattern fire at the same step — a much sparser rhythm. Switch to <b>OR</b> — every time either pattern fires. XOR — only when they don\'t coincide (gaps in OR become gates, AND becomes silence). Listen carefully: each mode produces a completely different groove from the same two clocks. This is <i>Boolean composition</i>.',
      patch:[{from:'logic-out', to:'vcf-cv'}] },
    { title:'The Inverted Output', hl:['logic'],
      text:'The LOGIC INV output is the Boolean complement of OUT — whenever OUT fires, INV is silent, and vice versa. Patch <b>LOGIC INV → VCF RES CV</b>. Now: when the logic condition triggers (OUT fires → filter opens), the resonance simultaneously drops. When the condition is false (OUT silent → INV fires → RES CV rises), the filter stays at base frequency but with a high resonant peak. The filter is snarling and whining in the gaps between the punches. This is <b>complementary modulation</b>: one CV source controlling two parameters in opposite phase — an advanced technique that usually requires a dedicated inverter module.' },
    { title:'THRESH: From Gates to CV', hl:['logic'],
      text:'The <b>THRESH</b> knob changes what the LOGIC module considers "high". At 0.5, any signal above 50% of its peak fires the logic gate. But audio signals are not clean on/off pulses — they\'re continuous waveforms. Try patching an LFO directly into LOGIC A IN (not a clock) and turning THRESH to 0.3. The LFO now produces gates every time it crosses 30% — the gate fires twice per cycle (once rising, once falling). With a TRIANGLE LFO at 0.15 Hz and THRESH at 0.7, you get one very slow gate per full period. THRESH turns any audio or CV source into a gate stream with adjustable sensitivity.' },
    { title:'Logic Garden', hl:['logic','euclid','vcf','att'],
      text:'Load <b>"Logic Garden"</b> from ⊹ PATCHES. It shows EUCLID E(5,8) and CLK ÷2 feeding LOGIC in XOR mode. The result is a 5-note polyrhythm interlocked with a 4-note pulse, sharing neither downbeat: a 40-step non-repeating groove from two simple patterns. LOGIC OUT goes through an ATT (attenuverter at 0.6) into VCF CV so the filter punch is controlled but punchy. INV drives a slow sidechain-style envelope on VCF RES — the quiet moments breathe with resonance while the loud moments stay clean. This is how one Boolean gate creates a living rhythmic texture.' },
  ]},
  { name:'17 — The Infinite Arc: MORPH', steps:[
    { title:'What is MORPH?', hl:['morph'],
      text:'The <b>MORPH</b> module is a 3D knob matrix: it tracks any set of knobs you choose, saves up to 8 <i>waypoints</i> (snapshots of all tracked values), and interpolates smoothly between them as you move the large MORPH knob. Turn it to 0 → waypoint 1. Turn it to the middle → halfway between waypoints 1 and 2. Turn it to max → the last saved waypoint. Unlike Scenes (which morph the entire synthesizer), MORPH can be scoped to only the parameters you care about, and you can automate it via a CV cable or LFO. This is the performance controller for <i>macro-scale sonic evolution</i>.' },
    { title:'Enable LEARN and Touch Your Knobs', hl:['morph'],
      text:'Click <b>LEARN</b> on the MORPH module. It lights up orange. Now touch (turn) any knob — try VCF CUTOFF, then REVERB MIX, then ADSR RELEASE. The MORPH panel shows "N params tracked" counting up. Every knob you move while LEARN is on gets added to the MORPH tracking list. Touch 4–6 knobs that shape the overall texture: VCF CUTOFF, VCF RES, REVERB MIX, ADSR ATTACK, LFO DEPTH. Click LEARN again to exit learn mode. These parameters are now MORPH\'s vocabulary — it can blend between any state of these specific knobs.' },
    { title:'Save Waypoints', hl:['morph'],
      text:'Set the synth to a <b>starting state</b>: VCF CUTOFF very low (dark), REVERB MIX 0.4 (dry), ADSR ATTACK 0.05 (sharp), LFO DEPTH low. Click <b>W1</b> to save this as waypoint 1. Now change to a <b>second state</b>: VCF CUTOFF 3500 Hz (open), REVERB MIX 0.8 (wet), ADSR ATTACK 1.5s (slow), LFO DEPTH high. Click <b>W2</b>. Make one more state — something unexpected: VCF CUTOFF 900 Hz, high RES, REVERB MIX 0.65, very long ATTACK. Click <b>W3</b>. You now have 3 waypoints: dark/sharp → open/slow → resonant/washy. The MORPH knob spans all three continuously.' },
    { title:'Perform with MORPH', hl:['morph','seq'],
      text:'Press PLAY. Slowly turn the <b>MORPH knob</b> from fully left to fully right. You\'re moving through your entire composition arc with one hand. The filter opens, the reverb blooms, the attack softens — all simultaneously, continuously. Unlike a scene morph (which runs on a timer), you control the exact rate of transition. Turn it fast for an abrupt sweep. Turn it infinitesimally slowly for a 5-minute evolution. This is hands-on macro performance: one knob maps to an entire dimension of your sound. Pull it back left — you return to exactly where you started. This repeatability is the key: the arc is consistent, but the timing is always live.' },
    { title:'Automate MORPH with CV', hl:['morph','lfo','chaos'],
      text:'Patch <b>LFO2 OUT → MORPH CV IN</b>. Set LFO2 to TRIANGLE, RATE 0.02 Hz (one full cycle per minute), DEPTH 1.0. Now the MORPH knob moves on its own — the synthesizer automatically traverses your waypoints over a 50-second arc, then reverses, endlessly. For less predictable motion, patch <b>CHAOS OUT → MORPH CV IN</b>. Set CHAOS RATE 0.03, CHAOS AMOUNT 0.5. The morph position now wanders in unpredictable drifts — sometimes rushing toward the bright end, sometimes stalling in the dark, sometimes reversing mid-arc. Remove the CV cable at any time to take manual control back. The MORPH knob shows the current position.' },
    { title:'Morphing Journey', hl:['morph','lfo','chaos','reverb'],
      text:'Load <b>"Morphing Journey"</b> from ⊹ PATCHES. It comes pre-loaded with 4 waypoints spanning a dramatic arc: sparse drone → open filter bloom → resonant mid-peak → reverb-soaked dissolution. CHAOS is patched to MORPH CV, RATE 0.025. The synthesizer breathes through its own evolution — dark to bright to resonant to washed out and back — without a single cable move or human intervention. This is <b>autonomous ambient composition</b>: you set the vocabulary (waypoints + tracked params), the MORPH system traverses it, and the music writes itself. Change one waypoint, and the entire journey shifts. This is what modular synthesis feels like when the machine becomes a collaborator.' },
  ]},
  { name:'18 — Generative Machines', steps:[
    { title:'The Turing Machine', hl:['turing'],
      text:'The <b>TURING MACHINE</b> is a probabilistic shift register — a 16-bit memory that loops, mutates, and slowly evolves. Each clock tick, the register shifts: the last bit wraps around to the front, but the <b>CHANCE</b> knob gives it a probability of flipping. At CHANCE=0, the pattern freezes into a perfect loop. At CHANCE=1, it\'s pure noise — every tick is random. The magic lives between: at CHANCE≈0.15, the pattern changes only one bit at a time. After a few minutes you realize the melody is completely different from where it started — yet you never heard it change. This is <b>slowly evolving loops</b>: musical memory with just enough amnesia to stay interesting.' },
    { title:'STEPS and RATE', hl:['turing'],
      text:'The <b>STEPS</b> knob (2–16) sets how many bits of the register map to the CV output. Short windows (STEPS=4) cycle through a tiny 4-bit pattern — you\'ll hear repeated short phrases. Long windows (STEPS=16) cycle through a 16-bit sequence — the pattern is so long it feels non-repeating. <b>RATE</b> sets how fast the register ticks (0.25–16 Hz). At 1 Hz the Turing Machine fires once per second. At 0.25 Hz it fires every 4 seconds — very slow, one note at a time. The bit-grid display on the panel shows the current register state: lit cyan = 1, dim = 0. Watch it mutate as CHANCE slowly changes the pattern over time.' },
    { title:'The Drunk Walk', hl:['drunk'],
      text:'The <b>DRUNK WALK</b> takes a completely different approach to generative melody. Instead of a shift register, it\'s a <i>random walk</i>: on each tick it takes one random step up or down in pitch, then snaps to the nearest note in your chosen scale. <b>STEP</b> limits the maximum jump size in semitones — small STEP (1–2) produces a winding, stepwise melody; large STEP (5–7) gives angular leaps. <b>RATE</b> sets how often it steps. Choose a scale with the row of buttons: <b>PENT</b> is pentatonic (never clashes), <b>MIN</b> is Aeolian minor (emotional, cinematic), <b>DOR</b> is Dorian (jazz-inflected), <b>LYD</b> is Lydian (dreamy, floating). Set RATE=0.35, STEP=2, PENT and press play — you get a meditative, always-moving melody that will never repeat.' },
    { title:'Routing: CV to the Resonator', hl:['turing','res','noise'],
      text:'The Turing Machine\'s <b>CV OUT</b> maps the register to a pentatonic pitch CV. Patch <b>TURING CV → RESONATOR PITCH CV</b>. The resonator uses this to set its resonant frequency — each Turing tick re-tunes the resonator to a new pitch. Now patch <b>NOISE OUT → RESONATOR IN</b> to excite it: white noise hits the resonator on every tick, producing a plucked resonator note at whatever pitch Turing chose. Connect <b>RESONATOR OUT → REVERB IN</b> to bloom each note into space. You\'ve just built a generative Karplus-Strong melody — no sequencer, no patterns, just the Turing Machine wandering through pitch space while the resonator sings each step.',
      patch:[{from:'turing-cv',to:'res-ci'},{from:'noise-out',to:'res-ai'},{from:'res-ao',to:'reverb-in'}] },
    { title:'Adding the Drunk Walk\'s Gate', hl:['drunk','sc-out','vca'],
      text:'Now add the Drunk Walk as a <i>second autonomous dimension</i>. Patch <b>DRUNK GATE → SIDECHAIN IN</b>, then <b>SIDECHAIN OUT → VCA ENV</b>. The Drunk Walk fires a gate on each of its random steps; the sidechain converts these irregular gate pulses into a smooth envelope that rises and falls with each Drunk tick. This envelope adds to the VCA\'s gain — the main VCO drone gently swells each time the Drunk Walk steps. Two machines, two dimensions: Turing controls <i>where</i> the resonator sings, Drunk controls <i>when</i> the drone breathes. They evolve independently, interweaving in the reverb.',
      patch:[{from:'drunk-go',to:'sc-in'},{from:'sc-out',to:'vca-env'}] },
    { title:'Two Wanderers', hl:['turing','drunk','res','reverb'],
      text:'Load <b>"Two Wanderers"</b> from ⊹ PATCHES. You\'ll hear a triangle-wave drone with very slow attack and long release — a persistent ambient presence. The Turing Machine (CHANCE=0.15, RATE=0.8) slowly shifts through pentatonic resonator tones; each tick re-tunes the resonator and white noise plucks it, creating brief bell-like notes that bloom into the reverb. The Drunk Walk (RATE=0.35, STEP=2) fires its gates at irregular intervals, adding subtle sidechain amplitude swells to the drone. Nothing is sequenced. No loop. Only two probabilistic machines wandering independently through pitch and time — an ambient piece that writes and rewrites itself, never quite the same, never quite different enough to notice.' },
  ]},
  { name:'19 — Metallic Synthesis', steps:[
    { title:'FM Synthesis Fundamentals', hl:['fmop'],
      text:'The <b>FM OPERATOR</b> is a 2-oscillator FM (frequency modulation) synthesizer. A <i>modulator</i> oscillator vibrates at a high frequency and is routed directly into the <i>carrier</i> oscillator\'s frequency control — at audio rate. Instead of a subtle tremolo, this audio-rate frequency modulation creates entirely new timbres: sidebands appear above and below the carrier frequency, spreading energy across the spectrum. The <b>RATIO</b> knob sets the modulator-to-carrier frequency ratio. The <b>INDEX</b> knob sets modulation depth — how far the carrier frequency swings with each modulator cycle. Low INDEX = subtle shimmer. High INDEX = dramatic spectral spreading.' },
    { title:'RATIO is Timbre', hl:['fmop'],
      text:'The RATIO between carrier and modulator determines whether the sidebands are <i>harmonic</i> (musically related) or <i>inharmonic</i> (metallic, percussive). Integer ratios produce harmonic sounds: <b>RATIO 1:1</b> = electric piano body (all partials in series). <b>RATIO 2:1</b> = bright bell with clear octave-spaced partials. <b>RATIO 3:1</b> = clarinet-like odd harmonics. Non-integer ratios produce inharmonic sounds: <b>RATIO 7:1</b> = gong-like metallic clusters. <b>RATIO 0.5:1</b> = sub-harmonic richness. The classic "iron bell" patch uses RATIO 7:1 or 11:1 with high INDEX — the carrier and sidebands spread into a dense inharmonic cluster, exactly what you\'d expect from a struck metal bar.' },
    { title:'Ring Modulation — Amplitude Multiplication', hl:['ringmod'],
      text:'The <b>RING MOD</b> performs simple arithmetic: it multiplies two audio signals together (A × B). The output contains <i>sum and difference sidebands</i> — if A is 220 Hz and B is 660 Hz, the ring mod outputs 440 Hz (sum) and 440 Hz... wait, no: 220+660=880 Hz and 660-220=440 Hz. The original frequencies disappear entirely — you hear only the sum and difference. This creates a characteristic metallic, bell-like "hollow" quality because none of the original notes survive. Patch two oscillators at a musical interval and you get unexpected metallic combinations. Patch FM audio into ring mod and the already-complex FM spectrum gets multiplied again — dense, shimmering, deeply inharmonic.' },
    { title:'FM into Ring Mod', hl:['fmop','ringmod'],
      text:'Now combine them. Patch <b>FM OP OUT → RING MOD A IN</b>. Patch <b>VCO OUT → RING MOD B IN</b>. The FM operator\'s complex sideband spectrum gets ring-modulated against the simpler VCO — the result is a sum/difference of every FM sideband against the VCO fundamental. With FM RATIO=7 and VCO at the same base pitch, the ring mod output is a dense cluster of inharmonic partials that sounds like a struck bell in a large stone room. Patch <b>RING MOD OUT → REVERB IN</b> and <b>FM OUT → REVERB IN</b> (to blend some direct FM body with the ring mod texture). Set ADSR to fast attack, long decay, very low sustain — each sequencer note becomes a sharp metallic strike that rings for seconds.',
      patch:[{from:'vca-out',to:'ringmod-ai'},{from:'fmop-ao',to:'ringmod-bi'},{from:'ringmod-ao',to:'reverb-in'},{from:'fmop-ao',to:'reverb-in'}] },
    { title:'Iron Bell', hl:['fmop','ringmod','reverb'],
      text:'Load <b>"Iron Bell"</b> from ⊹ PATCHES. The FM Operator runs at RATIO=7, INDEX=220 — a strongly inharmonic 7:1 ratio that creates gong-like metallic partials. The VCA output (with fast-attack bell envelope: A=0.004s, D=1.8s, S=0.08) is ring-modulated against the FM carrier. Each sequencer note produces a brief metallic strike — the ring mod strips out the original frequencies, leaving only the spread sidebands, which bloom into the large reverb. Listen for how each note in the sparse 8-step sequence sounds slightly different: the FM sidebands and ring mod products interact differently at each pitch interval, making the "iron bell" react to melody in ways a simple oscillator never could. Adjust FM RATIO between 5 and 11 while it plays — each integer ratio is a completely different metal object.' },
  ]},
  { name:'20 — XY Performance & Rhythm', steps:[
    { title:'The XY Pad — 2D Live Control', hl:['xypad'],
      text:'The <b>XY PAD</b> is a 160×160 canvas that outputs two simultaneous CV signals: <b>X OUT</b> (horizontal position, −1 to +1) and <b>Y OUT</b> (vertical position, −1 to +1). Drag or click anywhere on the pad to set both values at once. Unlike a knob, which controls one parameter, the XY Pad controls two independent dimensions simultaneously — it\'s a <i>performance surface</i> rather than a preset control. The puck snaps to wherever you click. Dragging from center-left to upper-right creates a diagonal sweep that changes two things at once in a single continuous gesture. Use it to express dynamics that would take two hands on two knobs.' },
    { title:'Polyrhythm Clock — 3:4:5', hl:['pclock'],
      text:'The <b>POLY CLK</b> module outputs three simultaneous gate streams at ratios 3:4:5. At TEMPO=1, Gate A fires every 3 seconds, Gate B every 4 seconds, Gate C every 5 seconds. They are all running independently — but because their periods are integer multiples, they will <i>eventually</i> realign. The LCM(3,4,5) = 60 beats, so every 60 tempo-beats all three gates fire simultaneously. At slow TEMPO (0.4), that\'s a 150-second arc before the pattern repeats exactly — longer than most ambient tracks. The <i>polyrhythm* between the three streams creates an interlocking, ever-shifting rhythmic texture that feels organic and live because it never settles into a simple repeated groove.' },
    { title:'Flanger — Jet Sweep', hl:['flanger'],
      text:'The <b>FLANGER</b> uses a short, continuously varying delay (1–20ms) to create a characteristic "jet-plane sweep" sound. The <b>RATE</b> knob controls how fast the delay time sweeps; <b>DEPTH</b> controls how far it sweeps; <b>FBACK</b> feeds the output back into the input, adding resonance peaks and intensifying the sweep. At low RATE and high FBACK, the flanger sounds like a slow, metallic phase-shift — a shimmering filter comb. At high RATE and low FBACK, it\'s a fast, watery chorus. At medium RATE with high FBACK and DEPTH, you get the classic jet-engine sweep: a rising and falling filter characteristic that peaks at resonant harmonics. The FLANGER is a send effect — patch audio into FLANGER IN, and its wet output automatically mixes through the main output.' },
    { title:'Routing: Polyrhythm to Sidechain, XY to Morph', hl:['pclock','flanger','xypad','morph'],
      text:'Build the patch in stages. First: patch <b>PCLOCK G3 → SIDECHAIN IN</b> and <b>SIDECHAIN OUT → VCA ENV</b>. The 3-beat gate fires rhythmic amplitude swells — the main VCO drone gently pulses on the polyrhythm. Second: patch <b>VCA OUT → FLANGER IN</b>. The processed VCA signal enters the flanger; the flanged wet signal blends into the main output, adding a sweep texture that evolves with the flanger\'s own LFO. Third: patch <b>XY PAD X OUT → MORPH CV IN</b>. Set up two MORPH waypoints (dark/closed vs bright/open with heavy flanger), then use the XY pad to sweep between them live — moving your finger right takes the entire patch from closed and subtle to open and flanged.',
      patch:[{from:'pclock-g3',to:'sc-in'},{from:'sc-out',to:'vca-env'},{from:'vca-out',to:'flanger-ai'},{from:'xypad-xo',to:'morph-ci'}] },
    { title:'Polyrhythm Garden', hl:['pclock','flanger','xypad','morph'],
      text:'Load <b>"Polyrhythm Garden"</b> from ⊹ PATCHES. The patch starts in the dark waypoint — VCF cutoff at 300 Hz, flanger at low mix. Three sidechain cables route PCLOCK G3 pulses through the sidechain to the VCA: every 7.5 seconds (at TEMPO=0.4), the sidechain swells the VCA volume briefly, then decays over 3 seconds. Because G4 and G5 fire at 10s and 12.5s intervals, three independent swells drift across the texture, never aligning until 150 seconds have passed. Try dragging the XY Pad slowly to the right while listening — the MORPH CV gradually opens the filter (300→4000 Hz), raises resonance (4→12), deepens the reverb, and increases flanger mix — the patch transforms from a dark ambient drone into a bright, sweeping flanged bloom with one 2D gesture. This is what live modular performance feels like: one hand, one surface, infinite expression.' },
  ]},
];

let tutIdx = -1, tutStepIdx = 0;

function tutShowPicker() {
  const body = document.getElementById('tut-body');
  body.innerHTML = '<div style="color:var(--text-dim);font-size:7px;letter-spacing:2px;margin-bottom:8px;">SELECT A TUTORIAL:</div>';
  TUTORIALS.forEach((t, i) => {
    const b = document.createElement('button'); b.className = 'tut-pick';
    b.textContent = t.name;
    b.addEventListener('click', () => tutOpen(i));
    body.appendChild(b);
  });
}

function tutOpen(idx) { tutIdx = idx; tutStepIdx = 0; tutRenderStep(); }

function tutRenderStep() {
  const t = TUTORIALS[tutIdx], s = t.steps[tutStepIdx];
  const body = document.getElementById('tut-body');
  body.innerHTML = `
    <div style="font-size:7px;color:var(--text-dim);letter-spacing:2px;margin-bottom:4px;">${t.name}</div>
    <div id="tut-step-title">${s.title}</div>
    <div id="tut-step-text">${s.text}</div>
    <div id="tut-actions" class="tut-actions"></div>
    <div style="display:flex;gap:6px;align-items:center;margin-top:8px;">
      <button class="btn" id="tut-prev">◀ PREV</button>
      <button class="btn" id="tut-nxt">${tutStepIdx===t.steps.length-1?'DONE ✓':'NEXT ▶'}</button>
      <button class="btn" id="tut-list">↩ LIST</button>
      <span id="tut-prog">${tutStepIdx+1} / ${t.steps.length}</span>
    </div>`;
  // Render guided patch buttons
  const actionsEl = document.getElementById('tut-actions');
  if (s.patch && s.patch.length) {
    s.patch.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'tut-patch-btn';
      const fromName = getPatchDisplayName(p.from) || p.from;
      const toName = getPatchDisplayName(p.to) || p.to;
      const fromColor = PP_COLOR[ppMap[p.from]?.cls] || '#cc00ff';
      const toColor = PP_COLOR[ppMap[p.to]?.cls] || '#00ff66';
      btn.innerHTML = `<span class="tut-patch-dot" style="background:${fromColor}"></span> ${fromName} <span class="tut-patch-arrow">→</span> <span class="tut-patch-dot" style="background:${toColor}"></span> ${toName}`;
      // Check if cable already exists
      const exists = cables.some(c => c.fromId === p.from && c.toId === p.to);
      if (exists) btn.classList.add('done');
      btn.addEventListener('click', () => {
        if (!btn.classList.contains('done')) {
          addCable(p.from, p.to);
          btn.classList.add('done');
        }
        // Scroll the destination module into view
        ppMap[p.to]?.el.closest('.module')?.scrollIntoView({behavior:'smooth', block:'nearest'});
      });
      btn.addEventListener('mouseenter', () => {
        ppMap[p.from]?.el.classList.add('tut-pp-highlight');
        ppMap[p.to]?.el.classList.add('tut-pp-highlight');
      });
      btn.addEventListener('mouseleave', () => {
        ppMap[p.from]?.el.classList.remove('tut-pp-highlight');
        ppMap[p.to]?.el.classList.remove('tut-pp-highlight');
      });
      actionsEl.appendChild(btn);
    });
  }
  const prevBtn = document.getElementById('tut-prev');
  prevBtn.disabled = tutStepIdx === 0;
  prevBtn.addEventListener('click', () => { tutStepIdx--; tutRenderStep(); });
  document.getElementById('tut-nxt').addEventListener('click', () => {
    if (tutStepIdx === t.steps.length - 1) tutClose();
    else { tutStepIdx++; tutRenderStep(); }
  });
  document.getElementById('tut-list').addEventListener('click', () => { tutClearHl(); tutShowPicker(); });
  tutClearHl();
  (s.hl || []).forEach(id => { const el = document.getElementById(`mod-${id}`) || document.getElementById(id); el?.classList.add('tut-highlight'); });
  // Also scroll first highlighted module into view
  if (s.hl && s.hl.length) {
    const firstEl = document.getElementById(`mod-${s.hl[0]}`) || document.getElementById(s.hl[0]);
    firstEl?.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

function tutClearHl() {
  document.querySelectorAll('.tut-highlight').forEach(el => el.classList.remove('tut-highlight'));
  document.querySelectorAll('.tut-pp-highlight').forEach(el => el.classList.remove('tut-pp-highlight'));
}
function tutClose() { tutClearHl(); document.getElementById('tut-panel').classList.remove('open'); }

  const btn=document.getElementById('rec-btn');
  if(isRec){stopRec();btn.textContent='⏺ REC';btn.classList.remove('rec-live');}
