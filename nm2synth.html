// MOBILE TUTORIAL  (nm2Tutorial)
// ═══════════════════════════════════════════════════════════════════════════════
const nm2Tutorial = {
  _step: 0,
  _firstStep: 0,   // index of first step actually shown (pre-satisfied steps are skipped)
  _enteredAt: 0,   // timestamp when current step was entered (guards against instant advances)
  _steps: [
    {
      id: 'a1',
      task: 'Power on',
      spotlightFn: () => document.getElementById('start'),
      tooltip: 'Tap anywhere to power on. nm² is a modular synthesizer — it makes sound through connected modules.',
      advanceOn: () => typeof ctx !== 'undefined' && ctx?.state === 'running',
    },
    {
      id: 'a2',
      task: 'Press PLAY',
      spotlightFn: () => document.getElementById('m-play-btn'),
      tooltip: 'Tap ▶ to start the sequencer. You should hear the default patch right away.',
      advanceOn: () => mods?.seq?.playing === true,
    },
    {
      id: 'a3',
      task: 'Touch the pad',
      spotlightFn: () => document.querySelector('#m-play-hero canvas'),
      tooltip: 'This is the AFFECT pad — tap ON below it to activate, then drag to remap filter, reverb, LFO and envelope across four emotional zones.',
      advanceDrag: { selector: '#m-play-hero canvas', minPx: 8 },
    },
    {
      id: 'b1',
      task: 'Explore the tabs',
      spotlightFn: () => document.getElementById('m-tabbar'),
      tooltip: 'Five tabs: PLAY performs, SOUND edits modules, PATCH routes signals, PERFORM runs the sequencer, LIBRARY manages presets.',
      advanceOn: () => {
        const on = document.querySelector('#m-tabbar .m-tab.on');
        return !!on && on.dataset.tab !== 'play';
      },
    },
    {
      id: 'b2',
      task: 'Open a module',
      spotlightFn: () => {
        // Spotlight first Sound card if on Sound tab; otherwise point at the Sound tab button
        const soundTab = document.getElementById('m-tab-sound');
        if (soundTab && soundTab.classList.contains('active')) {
          return soundTab.querySelector('.m-card');
        }
        return document.querySelector('.m-tab[data-tab="sound"]');
      },
      tooltip: 'Go to SOUND and tap any module card to open its controls. Long-press a knob for fine-tune mode.',
      advanceOn: () => document.getElementById('m-editor-sheet')?.classList.contains('open'),
    },
  ],
  _overlay: null,
  _interval: null,
  _stepCleanups: [],    // cleared on each step transition
  _overlayCleanups: [], // cleared only when overlay is destroyed

  shouldShow() {
    return window.matchMedia('(max-width:640px)').matches
        && !localStorage.getItem('nm2-mobile-tutorial-done');
  },

  start() {
    this._clearStep();
    if (this._overlay) this._destroyOverlay();
    this._buildOverlay();
    // Fast-forward past any lead-in steps whose condition is already satisfied.
    // init() auto-starts ctx AND the sequencer, so A1 and A2 are always pre-done
    // on a normal launch. We skip them so the user sees "STEP 1" not "STEP 3".
    let startStep = 0;
    while (
      startStep < this._steps.length &&
      this._steps[startStep].advanceOn &&
      this._steps[startStep].advanceOn()
    ) { startStep++; }
    this._firstStep = startStep;
    this.goTo(startStep);
  },

  goTo(n) {
    this._clearStep();
    this._step = n;
    if (n >= this._steps.length) { this.complete(); return; }
    const step = this._steps[n];
    this._enteredAt = Date.now();

    if (step.onEnter) step.onEnter();

    // Spotlight the target element
    this._updateSpotlight();

    // Step label e.g. "STEP 2 OF 5 — PRESS PLAY"
    const stepEl = this._overlay?.querySelector('.nm2-tut-step');
    if (stepEl) {
      const rel = n - (this._firstStep || 0) + 1;
      const tot = this._steps.length - (this._firstStep || 0);
      stepEl.textContent = `STEP ${rel} OF ${tot} — ${step.task.toUpperCase()}`;
    }

    // Tooltip text (animate in)
    const tipEl = this._overlay?.querySelector('.nm2-tut-tip-text');
    if (tipEl) {
      tipEl.style.cssText = 'transition:none;opacity:0;transform:translateY(8px);font-size:14px;color:var(--text-main);line-height:1.55;margin:0 0 12px;';
      tipEl.textContent = step.tooltip;
      requestAnimationFrame(() => {
        tipEl.style.cssText = 'transition:opacity 200ms,transform 200ms;opacity:1;transform:translateY(0);font-size:14px;color:var(--text-main);line-height:1.55;margin:0 0 12px;';
      });
    }

    // NEXT/SKIP label
    const nextBtn = this._overlay?.querySelector('.nm2-tut-next');
    if (nextBtn) nextBtn.textContent = n === this._steps.length - 1 ? 'DONE' : 'SKIP STEP →';

    // Poll-based advance
    if (step.advanceOn) {
      this._interval = setInterval(() => {
        if (step.advanceOn()) this._taskDone();
      }, 200);
    }

    // Drag-based advance (A3: require actual drag motion, not accidental tap)
    if (step.advanceDrag) {
      const el = document.querySelector(step.advanceDrag.selector);
      if (el) {
        let startX = 0, startY = 0, armed = false;
        const minPx = step.advanceDrag.minPx;
        const onDown = (e) => { armed = true; startX = e.clientX; startY = e.clientY; };
        const onMove = (e) => {
          if (!armed) return;
          const dx = e.clientX - startX, dy = e.clientY - startY;
          if (Math.sqrt(dx*dx + dy*dy) >= minPx) this._taskDone();
        };
        const onUp = () => { armed = false; };
        el.addEventListener('pointerdown', onDown);
        el.addEventListener('pointermove', onMove);
        el.addEventListener('pointerup', onUp);
        this._stepCleanups.push(
          () => el.removeEventListener('pointerdown', onDown),
          () => el.removeEventListener('pointermove', onMove),
          () => el.removeEventListener('pointerup', onUp),
        );
      }
    }
  },

  // Called when the user completes a step's task — brief flash then advance
  _taskDone() {
    if (this._taskDone._busy) return;
    this._taskDone._busy = true;
    const card = this._overlay?.querySelector('.nm2-tut-card');
    if (card) card.style.boxShadow = '0 0 0 2px #00ffff, 0 0 18px #00ffff88';
    setTimeout(() => {
      if (card) card.style.boxShadow = '';
      this._taskDone._busy = false;
      this.goTo(this._step + 1);
    }, 220);
  },

  _updateSpotlight() {
    const step = this._steps[this._step];
    if (!step) return;
    const el = step.spotlightFn ? step.spotlightFn() : null;
    this._spotlight(el);
  },

  _clearStep() {
    if (this._interval) { clearInterval(this._interval); this._interval = null; }
    this._stepCleanups.forEach(fn => fn());
    this._stepCleanups = [];
    this._taskDone._busy = false;
  },

  skipAll() {
    this._clearStep();
    localStorage.setItem('nm2-mobile-tutorial-done', '1');
    this._destroyOverlay();
    document.getElementById('tut-panel')?.classList.remove('open');
  },

  complete() {
    this._clearStep();
    localStorage.setItem('nm2-mobile-tutorial-done', '1');
    this._destroyOverlay();
    const card = document.createElement('div');
    card.className = 'nm2-tut-complete';
    card.textContent = "You're in. Explore the PATCH tab to route signals, or just play.";
    document.body.appendChild(card);
    requestAnimationFrame(() => { card.style.opacity = '1'; });
    setTimeout(() => {
      card.style.opacity = '0';
      setTimeout(() => card.remove(), 200);
    }, 1800);
  },

  _spotlight(el) {
    const svg = this._overlay?.querySelector('.nm2-tut-mask');
    if (!svg) return;
    const W = window.innerWidth, H = window.innerHeight;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.setAttribute('width', W);
    svg.setAttribute('height', H);
    if (!el) {
      svg.innerHTML = `<rect x="0" y="0" width="${W}" height="${H}" fill="rgba(0,0,0,0.65)"/>`;
      return;
    }
    const r = el.getBoundingClientRect();
    // Hidden or zero-size elements get full dim
    if (!r.width || !r.height) {
      svg.innerHTML = `<rect x="0" y="0" width="${W}" height="${H}" fill="rgba(0,0,0,0.65)"/>`;
      return;
    }
    const pad = 4, rx = 6;
    const x = (r.left - pad).toFixed(1), y = (r.top - pad).toFixed(1);
    const w = (r.width + pad * 2).toFixed(1), h = (r.height + pad * 2).toFixed(1);
    svg.innerHTML = `
      <defs><mask id="nm2thole">
        <rect x="0" y="0" width="${W}" height="${H}" fill="white"/>
        <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}" fill="black"/>
      </mask></defs>
      <rect x="0" y="0" width="${W}" height="${H}" fill="rgba(0,0,0,0.65)" mask="url(#nm2thole)"/>
      <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.85"/>`;
  },

  _buildOverlay() {
    if (this._overlay) return;
    const ov = document.createElement('div');
    ov.id = 'nm2-tutorial-overlay';

    // SVG backdrop (dim + cutout)
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'nm2-tut-mask');
    ov.appendChild(svg);

    // Tooltip card — SKIP ALL and NEXT are both inside; no floating elements
    const card = document.createElement('div');
    card.className = 'nm2-tut-card';
    const stepEl = document.createElement('p');
    stepEl.className = 'nm2-tut-step';
    const tipText = document.createElement('p');
    tipText.className = 'nm2-tut-tip-text';
    const btnRow = document.createElement('div');
    btnRow.className = 'nm2-tut-btn-row';
    const skipBtn = document.createElement('button');
    skipBtn.className = 'nm2-tut-skip';
    skipBtn.textContent = 'SKIP ALL';
    skipBtn.addEventListener('click', () => this.skipAll());
    const nextBtn = document.createElement('button');
    nextBtn.className = 'nm2-tut-next';
    nextBtn.addEventListener('click', () => this.goTo(this._step + 1));
    btnRow.append(skipBtn, nextBtn);
    card.append(stepEl, tipText, btnRow);
    ov.appendChild(card);
    document.body.appendChild(ov);
    this._overlay = ov;

    // Spotlight repositions on resize — overlay-lifetime, survives step transitions
    const respot = () => this._updateSpotlight();
    window.addEventListener('resize', respot);
    this._overlayCleanups.push(() => window.removeEventListener('resize', respot));
  },

  _destroyOverlay() {
    this._overlayCleanups.forEach(fn => fn());
    this._overlayCleanups = [];
    this._overlay?.remove();
    this._overlay = null;
  },
};

// ── View Controls: Stage Mode + Rack Zoom ─────────────────────────────────
{
  const STAGE_CFG_KEY = 'nm2-stage-cfg';
  let _stageOn = false;
  let _stageArrangeOn = false;
  let _stageOrigOrder = []; // rack module IDs in DOM order before entering stage
  let _stageVisSet = null;        // Set of visible module element IDs while in stage
  let _stageCableFilterFn = null; // draw-loop fn that hides cables to hidden modules

  function _loadStageCfg() {
    try { return JSON.parse(localStorage.getItem(STAGE_CFG_KEY) || 'null'); } catch { return null; }
  }
  function _saveStageCfg(ids) { localStorage.setItem(STAGE_CFG_KEY, JSON.stringify(ids)); _updateStagePins(); }

  // Reflect saved stage config on module-label pin badges
  function _updateStagePins() {
    const rack = document.getElementById('rack');
    if (!rack) return;
    const saved = _loadStageCfg();
    const stagedSet = saved ? new Set(saved) : null; // null = no explicit config
    rack.querySelectorAll(':scope > .module').forEach(modEl => {
      const pin = modEl.querySelector('.nm-stage-pin');
      if (!pin) return;
      const inStage = !stagedSet || stagedSet.has(modEl.id);
      pin.classList.toggle('nm-sp-on', inStage);
      pin.title = inStage ? 'In Stage — click to exclude' : 'Excluded from Stage — click to include';
      pin.textContent = inStage ? '⊡' : '◻';
    });
  }

  // Expose so init().then() can call after rack is populated
  window._nmUpdateStagePins = _updateStagePins;

  // Toggle a single module in/out of the saved stage config
  window._nmToggleStagePin = function(modId) {
    const rack = document.getElementById('rack');
    const allMods = [...rack.querySelectorAll(':scope > .module')].map(m => m.id);
    const saved = _loadStageCfg() || allMods; // default: all modules
    const set = new Set(saved);
    if (set.has(modId)) { set.delete(modId); } else { set.add(modId); }
    // Preserve order: keep saved order, append newly added
    const newOrder = [...saved.filter(id => set.has(id)), ...[...set].filter(id => !saved.includes(id))];
    _saveStageCfg(newOrder);
  };

  // Runs each frame while in stage: hides cable paths whose endpoints touch a hidden module
  function _applyStageCableFilter() {
    if (!_stageVisSet) return;
    cables.forEach(c => {
      const fMod = ppMap[c.fromId]?.el?.closest('.module');
      const tMod = ppMap[c.toId]?.el?.closest('.module');
      c.el.style.display = (_stageVisSet.has(fMod?.id) && _stageVisSet.has(tMod?.id)) ? '' : 'none';
    });
  }

  // ── Stage picker ─────────────────────────────────────────────────────────
  function _openStagePicker() {
    if (document.getElementById('nm-stage-picker')) return;
    const rack = document.getElementById('rack');
    const allMods = [...rack.querySelectorAll(':scope > .module')];
    const saved = _loadStageCfg();

    // Auto-detect modules involved in active cables
    const connectedMods = new Set();
    cables.forEach(c => {
      const fMod = ppMap[c.fromId]?.el?.closest('.module');
      const tMod = ppMap[c.toId]?.el?.closest('.module');
      if (fMod) connectedMods.add(fMod.id);
      if (tMod) connectedMods.add(tMod.id);
    });
    // Sequencer auto-includes if currently playing
    if (mods.seq?.playing) connectedMods.add('mod-seq');

    // Merge: saved pinned modules + cable-detected; fall back to all if empty
    const merged = [...new Set([...(saved || []), ...connectedMods])]
      .filter(id => allMods.some(m => m.id === id));
    const checkedSet = new Set(merged.length ? merged : allMods.map(m => m.id));

    // Saved modules first (in saved order), then remaining appended
    let ordered = allMods;
    if (saved) {
      const byId = Object.fromEntries(allMods.map(m => [m.id, m]));
      ordered = [
        ...saved.filter(id => byId[id]).map(id => byId[id]),
        ...allMods.filter(m => !saved.includes(m.id))
      ];
    }
    const overlay = document.createElement('div');
    overlay.id = 'nm-stage-picker';
    overlay.innerHTML = `<div id="nm-spc-box">
  <div id="nm-spc-hdr"><span id="nm-spc-title">◈ STAGE CONFIG</span><span id="nm-spc-sub">${connectedMods.size ? 'auto-selected from active patch · ' : ''}check · drag to reorder · launch</span></div>
  <div id="nm-spc-actions">
    <button class="btn" id="nm-spc-all">ALL</button>
    <button class="btn" id="nm-spc-none">NONE</button>
    <span style="flex:1"></span>
    <button class="btn" id="nm-spc-cancel">CANCEL</button>
    <button class="btn" id="nm-spc-launch">⊡ LAUNCH STAGE</button>
  </div>
  <ul id="nm-spc-list"></ul>
</div>`;
    document.body.appendChild(overlay);
    const ul = overlay.querySelector('#nm-spc-list');
    ordered.forEach(mod => {
      const name = mod.querySelector('.module-label')?.textContent?.trim() || mod.id.replace('mod-','').toUpperCase();
      const li = document.createElement('li');
      li.dataset.modId = mod.id;
      li.draggable = true;
      const chk = checkedSet.has(mod.id);
      if (chk) li.classList.add('spc-checked');
      li.innerHTML = `<span class="nm-spc-drag" title="drag to reorder">⠿</span><input class="nm-spc-chk" type="checkbox" ${chk ? 'checked' : ''}><span class="nm-spc-name">${name}</span>`;
      li.querySelector('.nm-spc-chk').addEventListener('change', e => li.classList.toggle('spc-checked', e.target.checked));
      ul.appendChild(li);
    });
    // HTML5 drag-to-reorder
    let _dragItem = null;
    ul.addEventListener('dragstart', e => {
      _dragItem = e.target.closest('li');
      if (_dragItem) { _dragItem.classList.add('spc-dragging'); e.dataTransfer.effectAllowed = 'move'; }
    });
    ul.addEventListener('dragend', () => {
      ul.querySelectorAll('li').forEach(l => l.classList.remove('spc-dragging','spc-over-top','spc-over-bot'));
      _dragItem = null;
    });
    ul.addEventListener('dragover', e => {
      e.preventDefault();
      if (!_dragItem) return;
      const t = e.target.closest('li');
      ul.querySelectorAll('li').forEach(l => l.classList.remove('spc-over-top','spc-over-bot'));
      if (t && t !== _dragItem) t.classList.add(e.clientY > t.getBoundingClientRect().top + t.getBoundingClientRect().height/2 ? 'spc-over-bot' : 'spc-over-top');
    });
    ul.addEventListener('drop', e => {
      e.preventDefault();
      if (!_dragItem) return;
      const t = e.target.closest('li');
      ul.querySelectorAll('li').forEach(l => l.classList.remove('spc-over-top','spc-over-bot'));
      if (t && t !== _dragItem) ul.insertBefore(_dragItem, e.clientY > t.getBoundingClientRect().top + t.getBoundingClientRect().height/2 ? t.nextSibling : t);
    });
    overlay.querySelector('#nm-spc-all').addEventListener('click', () =>
      ul.querySelectorAll('.nm-spc-chk').forEach(c => { c.checked = true; c.closest('li').classList.add('spc-checked'); }));
    overlay.querySelector('#nm-spc-none').addEventListener('click', () =>
      ul.querySelectorAll('.nm-spc-chk').forEach(c => { c.checked = false; c.closest('li').classList.remove('spc-checked'); }));
    overlay.querySelector('#nm-spc-cancel').addEventListener('click', () => overlay.remove());
    overlay.querySelector('#nm-spc-launch').addEventListener('click', () => {
      const checkedIds = [...ul.querySelectorAll('li')]
        .filter(li => li.querySelector('.nm-spc-chk').checked).map(li => li.dataset.modId);
      if (!checkedIds.length) return;
      _saveStageCfg(checkedIds);
      overlay.remove();
      if (_stageOn) {
        // Already in stage: restore rack, apply new config without toggling CSS class
        const r = document.getElementById('rack');
        r.querySelectorAll(':scope > .module').forEach(m => { m.style.display = ''; });
        for (const id of _stageOrigOrder) { const el = document.getElementById(id); if (el) r.appendChild(el); }
        _stageOrigOrder = [...r.querySelectorAll(':scope > .module')].map(m => m.id);
        _stageVisSet = new Set(checkedIds);
        r.querySelectorAll(':scope > .module').forEach(m => { m.style.display = _stageVisSet.has(m.id) ? '' : 'none'; });
        for (const id of checkedIds) { const el = document.getElementById(id); if (el) r.appendChild(el); }
        _fitStage();
      } else {
        _enterStage(checkedIds);
      }
    });
    // Click backdrop to close
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  }

  // ── Stage enter/exit ──────────────────────────────────────────────────────
  // Brute-force the column count (1…N) and pick whichever packs largest into the viewport
  function _fitStage() {
    const rack = document.getElementById('rack');
    rack.style.zoom = '';
    rack.style.width = ''; // reset so offsetWidth/Height are natural
    requestAnimationFrame(() => {
      const mods = [...rack.querySelectorAll(':scope > .module')]
        .filter(m => m.style.display !== 'none');
      if (!mods.length) { requestAnimationFrame(() => markCablesDirty()); return; }

      const availW = window.innerWidth  - 16;  // rack-wrap: 8px pad × 2
      const availH = window.innerHeight - 46;  // 30px hdr + 8px pad × 2
      const GAP = 16, PAD = 18, N = mods.length;
      const ws = mods.map(m => m.offsetWidth);
      const hs = mods.map(m => m.offsetHeight);

      let bestZoom = -1, bestRackW = null;
      for (let cols = 1; cols <= N; cols++) {
        const rows = Math.ceil(N / cols);
        let lW = PAD * 2 + GAP * (cols - 1);
        let lH = PAD * 2 + GAP * (rows - 1);
        for (let c = 0; c < cols; c++) {
          let cW = 0;
          for (let r = 0; r < rows; r++) { const i = r * cols + c; if (i < N) cW = Math.max(cW, ws[i]); }
          lW += cW;
        }
        for (let r = 0; r < rows; r++) {
          let rH = 0;
          for (let c = 0; c < cols; c++) { const i = r * cols + c; if (i < N) rH = Math.max(rH, hs[i]); }
          lH += rH;
        }
        const z = Math.min(availW / lW, availH / lH, 1);
        if (z > bestZoom) { bestZoom = z; bestRackW = lW; }
      }

      if (bestRackW !== null) rack.style.width = bestRackW + 'px';
      // One more rAF to let flex re-wrap at the new width before measuring & zooming
      requestAnimationFrame(() => {
        const z = Math.min(availW / rack.scrollWidth, availH / rack.scrollHeight, 1);
        rack.style.zoom = z < 0.99 ? z : '';
        markCablesDirty();
      });
    });
  }

  function _enterStage(visibleIds) {
    const rack = document.getElementById('rack');
    _stageOrigOrder = [...rack.querySelectorAll(':scope > .module')].map(m => m.id);
    _stageVisSet = new Set(visibleIds);
    rack.querySelectorAll(':scope > .module').forEach(m => { m.style.display = _stageVisSet.has(m.id) ? '' : 'none'; });
    for (const id of visibleIds) { const el = document.getElementById(id); if (el) rack.appendChild(el); }
    _stageOn = true;
    document.body.classList.add('nm-stage');
    document.getElementById('nm-stage-btn').classList.add('on');
    // Register per-frame cable filter (hides cables that connect to hidden modules)
    if (!_stageCableFilterFn) { _stageCableFilterFn = _applyStageCableFilter; registerDraw(_stageCableFilterFn); }
    _fitStage();
  }

  function _exitStage() {
    if (!_stageOn) return;
    const rack = document.getElementById('rack');
    const stageOrder = [...rack.querySelectorAll(':scope > .module')]
      .filter(m => m.style.display !== 'none').map(m => m.id);
    if (stageOrder.length) _saveStageCfg(stageOrder);
    _stageOn = false;
    document.body.classList.remove('nm-stage');
    if (_stageArrangeOn) { _stageArrangeOn = false; editMode = false; document.body.classList.remove('edit-mode'); const ab = document.getElementById('nm-arrange-btn'); ab.classList.remove('on'); ab.textContent = '⠿ ARRANGE'; }
    rack.querySelectorAll(':scope > .module').forEach(m => { m.style.display = ''; });
    for (const id of _stageOrigOrder) { const el = document.getElementById(id); if (el) rack.appendChild(el); }
    _stageOrigOrder = [];
    _stageVisSet = null;
    // Unregister cable filter and restore all cable visibility
    if (_stageCableFilterFn) { unregisterDraw(_stageCableFilterFn); _stageCableFilterFn = null; }
    cables.forEach(c => { c.el.style.display = ''; });
    syncRackOrder();
    const rack2 = document.getElementById('rack');
    rack2.style.width = '';
    rack2.style.zoom = _zoom < 1 ? _zoom : '';
    document.getElementById('nm-stage-btn').classList.remove('on');
    markCablesDirty();
  }

  function _setArrange(on) {
    _stageArrangeOn = on;
    editMode = on; // drive the drag handler's global flag
    document.body.classList.toggle('edit-mode', on);
    const btn = document.getElementById('nm-arrange-btn');
    btn.classList.toggle('on', on);
    btn.textContent = on ? '⠿ DONE' : '⠿ ARRANGE';
    if (!on) {
      // Save new stage order after drag-rearrange
      const rack = document.getElementById('rack');
      const order = [...rack.querySelectorAll(':scope > .module')]
        .filter(m => m.style.display !== 'none').map(m => m.id);
      if (order.length) _saveStageCfg(order);
      _fitStage();
    }
  }

  document.getElementById('nm-stage-btn').addEventListener('click', () => {
    if (_stageOn) _exitStage(); else _openStagePicker();
  });
  document.getElementById('nm-stage-exit').addEventListener('click', _exitStage);
  document.getElementById('nm-arrange-btn').addEventListener('click', () => _setArrange(!_stageArrangeOn));
  document.getElementById('nm-spc-editcfg').addEventListener('click', _openStagePicker);

  document.addEventListener('keydown', e => {
    // Escape exits stage (but not if picker is open — picker handles its own close)
    if (e.key === 'Escape' && _stageOn && !document.getElementById('nm-stage-picker')) _exitStage();
  }, true);

  window.addEventListener('resize', () => { if (_stageOn) _fitStage(); });

  // ── Zoom (normal rack view) ────────────────────────────────────────────────
  let _zoom = Math.min(1, Math.max(0.5, parseFloat(localStorage.getItem('nm2-rack-zoom') || '1')));

  function applyRackZoom(v) {
    _zoom = Math.min(1, Math.max(0.5, v));
    if (!_stageOn) document.getElementById('rack').style.zoom = _zoom < 1 ? _zoom : '';
    const pct = Math.round(_zoom * 100);
    document.getElementById('nm-zoom-val').textContent = pct + '%';
    document.getElementById('nm-zoom-slider').value = pct;
    localStorage.setItem('nm2-rack-zoom', _zoom);
    if (!_stageOn) markCablesDirty();
  }

  document.getElementById('nm-zoom-out').addEventListener('click', () => applyRackZoom(_zoom - 0.05));
  document.getElementById('nm-zoom-in').addEventListener('click', () => applyRackZoom(_zoom + 0.05));
  document.getElementById('nm-zoom-slider').addEventListener('input', e => applyRackZoom(+e.target.value / 100));

  if (_zoom < 1) {
    document.getElementById('rack').style.zoom = _zoom;
    document.getElementById('nm-zoom-val').textContent = Math.round(_zoom * 100) + '%';
    document.getElementById('nm-zoom-slider').value = Math.round(_zoom * 100);
  }
}

document.getElementById('start').addEventListener('click',()=>{
  document.getElementById('start').style.display='none';
  init().then(()=>{
    nm2Mobile.init();
    if (typeof window._nmUpdateStagePins === 'function') window._nmUpdateStagePins();
    if (!window.location.hash.startsWith('#patch=') && nm2Tutorial.shouldShow()) nm2Tutorial.start();
  });
});

// ── Keyboard shortcuts ──────────────────────────────────────────────────────
// Ctrl+Z: undo  |  Shift+R: random patch  |  Q-R/A-F: pad sampler  |  1-4: loop REC  |  Space: stop all loops
document.addEventListener('keydown', e => {
  if (!ctx) return;
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

  // Escape — cancel pending cable
  if (e.key === 'Escape' && pendingPP) {
    cancelPatch(); return;
  }

  // Undo
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    if (undoStack.length) { const cmd = undoStack.pop(); cmd.undo(); setStatus(`Undo: ${cmd.label}`); }
    else setStatus('Nothing to undo');
    return;
  }

  // Shift+R — random patch
  if (e.code === 'KeyR' && e.shiftKey && !e.ctrlKey && !e.metaKey && !e.altKey) {
    e.preventDefault();
    randomPatch();
    return;
  }

  // Pad sampler — Q W E R / A S D F
  const padIdx = PAD_CODES.indexOf(e.code);
  if (padIdx !== -1 && !e.shiftKey && !e.ctrlKey && !e.metaKey && !e.altKey) {
    e.preventDefault();
    mods.padsampler?.trigger(padIdx);
    return;
  }

  if (!mods.looper) return;
  if (e.code === 'Space') {
    e.preventDefault();
    mods.looper.tracks.forEach(lp => { if (lp.playing) lp.playBtn.click(); });
  } else if (['Digit1','Digit2','Digit3','Digit4'].includes(e.code)) {
    e.preventDefault();
    mods.looper.tracks[parseInt(e.code[5]) - 1].recBtn.click();
  }
});

// ═══════════════════════════════════════════════════════════════════════════════
// FULLSCREEN VISUALIZER
// ═══════════════════════════════════════════════════════════════════════════════
(function() {
  let _vizOpen = false, _vizMode = 0, _vizAN = null, _vizPhase = 0;
  const MODES = ['WAVEFORM','LISSAJOUS','RADIAL','AURORA'];

  function _openViz() {
    if (_vizOpen) return;
    _vizOpen = true;
    document.getElementById('viz-overlay').classList.add('open');
    document.getElementById('viz-btn').classList.add('on');
    document.getElementById('m-viz-btn')?.classList.add('on');
    _resizeViz();
    _runViz();
  }
  function _closeViz() {
    _vizOpen = false;
    document.getElementById('viz-overlay').classList.remove('open');
    document.getElementById('viz-btn').classList.remove('on');
    document.getElementById('m-viz-btn')?.classList.remove('on');
  }
  function _cycleMode(delta=1) {
    _vizMode = (_vizMode + delta + MODES.length) % MODES.length;
    document.getElementById('viz-mode-lbl').textContent = MODES[_vizMode];
    document.querySelectorAll('.viz-pip').forEach((p,i)=>p.classList.toggle('on',i===_vizMode));
    // clear canvas on mode switch for clean transition
    const cv=document.getElementById('viz-canvas');
    const c=cv.getContext('2d');
    c.fillStyle='#000'; c.fillRect(0,0,cv.width,cv.height);
  }
  function _resizeViz() {
    const cv=document.getElementById('viz-canvas');
    cv.width=window.innerWidth; cv.height=window.innerHeight;
  }
  function _ensureAN() {
    if (_vizAN) return;
    _vizAN = {
      wave: ctx.createAnalyser(),
      spec: ctx.createAnalyser(),
    };
    _vizAN.wave.fftSize = 4096; _vizAN.wave.smoothingTimeConstant = 0.6;
    _vizAN.spec.fftSize = 2048; _vizAN.spec.smoothingTimeConstant = 0.82;
    analyserNode.connect(_vizAN.wave);
    analyserNode.connect(_vizAN.spec);
    const s1=ctx.createGain(); s1.gain.value=0; _vizAN.wave.connect(s1); s1.connect(ctx.destination);
    const s2=ctx.createGain(); s2.gain.value=0; _vizAN.spec.connect(s2); s2.connect(ctx.destination);
    _vizAN.waveBuf  = new Float32Array(_vizAN.wave.fftSize);
    _vizAN.freqBuf  = new Float32Array(_vizAN.spec.frequencyBinCount);
  }

  function _runViz() {
    const cv=document.getElementById('viz-canvas');
    const c=cv.getContext('2d');
    _ensureAN();
    c.fillStyle='#000'; c.fillRect(0,0,cv.width,cv.height);

    function frame() {
      if (!_vizOpen) return;
      requestAnimationFrame(frame);
      if (cv.width!==window.innerWidth||cv.height!==window.innerHeight) _resizeViz();
      const W=cv.width, H=cv.height;
      _vizAN.wave.getFloatTimeDomainData(_vizAN.waveBuf);
      _vizAN.spec.getFloatFrequencyData(_vizAN.freqBuf);
      _vizPhase++;

      switch(_vizMode) {
        case 0: _waveform(c,W,H); break;
        case 1: _lissajous(c,W,H); break;
        case 2: _radial(c,W,H); break;
        case 3: _aurora(c,W,H); break;
      }
    }
    frame();
  }

  // ── Mode 0: Phosphor Oscilloscope ─────────────────────────────────────────
  function _waveform(c,W,H) {
    c.fillStyle='rgba(0,0,0,0.18)'; c.fillRect(0,0,W,H);
    // Centre guide
    c.strokeStyle='rgba(0,255,255,0.04)'; c.lineWidth=1;
    c.beginPath(); c.moveTo(0,H/2); c.lineTo(W,H/2); c.stroke();
    const buf=_vizAN.waveBuf, n=buf.length;
    // Glow bloom: two-pass without shadowBlur (shadowBlur disables GPU compositing,
    // adding significant main-thread load at fullscreen resolution)
    // Pass 1: wide soft bloom
    c.strokeStyle='rgba(0,255,255,0.18)'; c.lineWidth=7;
    c.beginPath();
    for (let i=0;i<n;i+=2) {
      const x=(i/n)*W, y=H/2-buf[i]*H*0.44;
      i===0?c.moveTo(x,y):c.lineTo(x,y);
    }
    c.stroke();
    // Pass 2: crisp bright line
    c.strokeStyle='#00ffff'; c.lineWidth=1.8;
    c.beginPath();
    for (let i=0;i<n;i++) {
      const x=(i/n)*W, y=H/2-buf[i]*H*0.44;
      i===0?c.moveTo(x,y):c.lineTo(x,y);
    }
    c.stroke();
  }

  // ── Mode 1: Lissajous ─────────────────────────────────────────────────────
  // Pre-allocate buffers outside the draw function to avoid per-frame GC pressure
  const _lissXBuf = new Float32Array(512);
  const _lissYBuf = new Float32Array(512);
  function _lissajous(c,W,H) {
    c.fillStyle='rgba(0,0,0,0.2)'; c.fillRect(0,0,W,H);
    const xNode=mods.lissajous?.xNode, yNode=mods.lissajous?.yNode;
    if (xNode) xNode.getFloatTimeDomainData(_lissXBuf);
    else _vizAN.waveBuf.forEach((v,i)=>{ if(i<_lissXBuf.length) _lissXBuf[i]=v; });
    if (yNode) yNode.getFloatTimeDomainData(_lissYBuf);
    // Use phase-shifted X when Y has no signal (nothing patched to lissaj-yi).
    // Sample 16 evenly-spaced points for a fast silence check.
    let _ySum=0; for(let i=0;i<16;i++) _ySum+=Math.abs(_lissYBuf[i*32]);
    if (!yNode || _ySum < 1e-3) {
      const shift=Math.floor(_lissXBuf.length/4);
      for(let i=0;i<_lissYBuf.length;i++) _lissYBuf[i]=_lissXBuf[(i+shift)%_lissXBuf.length];
    }
    const cx=W/2, cy=H/2, scale=Math.min(W,H)*0.44;
    const n=Math.min(_lissXBuf.length,_lissYBuf.length);
    // Single batched path with a canvas gradient — replaces N separate stroke calls
    const grd=c.createLinearGradient(cx-scale,0,cx+scale,0);
    grd.addColorStop(0,'rgba(255,0,0,0.5)');
    grd.addColorStop(0.5,'rgba(128,0,128,0.7)');
    grd.addColorStop(1,'rgba(0,0,255,0.9)');
    c.strokeStyle=grd; c.lineWidth=1.6;
    c.beginPath();
    for (let i=0;i<n;i++) {
      const px=cx+_lissXBuf[i]*scale, py=cy-_lissYBuf[i]*scale;
      i===0?c.moveTo(px,py):c.lineTo(px,py);
    }
    c.stroke();
  }

  // ── Mode 2: Radial Spectrum ───────────────────────────────────────────────
  function _radial(c,W,H) {
    c.fillStyle='rgba(0,0,0,0.14)'; c.fillRect(0,0,W,H);
    const cx=W/2, cy=H/2;
    const baseR=Math.min(W,H)*0.14, maxH=Math.min(W,H)*0.38;
    const BARS=180, nyq=_vizAN.freqBuf.length;
    const barW=(2*Math.PI*baseR/BARS)*0.72;
    // shadowBlur was set 180× per frame here — replaced with two-pass rendering:
    // Pass 1: wider, dimmer bars for bloom effect (no shadowBlur)
    c.lineWidth=barW*2.2;
    for (let i=0;i<BARS;i++) {
      const angle=(i/BARS)*Math.PI*2-Math.PI/2;
      const binIdx=Math.floor(Math.pow(i/BARS,1.5)*nyq*0.8);
      const db=_vizAN.freqBuf[Math.min(binIdx,nyq-1)];
      const norm=Math.max(0,(db+90)/70);
      if (norm < 0.05) continue;
      const bh=norm*maxH;
      const hue=200+i/BARS*140;
      c.strokeStyle=`hsla(${hue},100%,65%,${norm*0.18})`;
      c.beginPath();
      c.moveTo(cx+Math.cos(angle)*baseR, cy+Math.sin(angle)*baseR);
      c.lineTo(cx+Math.cos(angle)*(baseR+bh), cy+Math.sin(angle)*(baseR+bh));
      c.stroke();
    }
    // Pass 2: sharp bars
    c.lineWidth=barW;
    for (let i=0;i<BARS;i++) {
      const angle=(i/BARS)*Math.PI*2-Math.PI/2;
      const binIdx=Math.floor(Math.pow(i/BARS,1.5)*nyq*0.8);
      const db=_vizAN.freqBuf[Math.min(binIdx,nyq-1)];
      const norm=Math.max(0,(db+90)/70);
      const bh=norm*maxH;
      const hue=200+i/BARS*140;
      c.strokeStyle=`hsla(${hue},100%,65%,${0.3+norm*0.7})`;
      c.beginPath();
      c.moveTo(cx+Math.cos(angle)*baseR, cy+Math.sin(angle)*baseR);
      c.lineTo(cx+Math.cos(angle)*(baseR+bh), cy+Math.sin(angle)*(baseR+bh));
      c.stroke();
    }
    // Inner ring
    c.strokeStyle='rgba(0,255,255,0.12)'; c.lineWidth=0.8;
    c.beginPath(); c.arc(cx,cy,baseR,0,Math.PI*2); c.stroke();
  }

  // ── Mode 3: Aurora ────────────────────────────────────────────────────────
  function _aurora(c,W,H) {
    c.fillStyle='rgba(0,0,0,0.11)'; c.fillRect(0,0,W,H);
    const nyq=_vizAN.freqBuf.length;
    const LAYERS=7;
    // shadowBlur was set 7× per frame at up to 58px — replaced with two-pass per layer:
    // a wide soft stroke for the glow, then a narrower bright stroke on top.
    for (let l=0;l<LAYERS;l++) {
      const t=l/(LAYERS-1);
      const band=Math.floor((0.04+t*0.45)*nyq);
      const db=_vizAN.freqBuf[Math.min(band,nyq-1)];
      const amp=Math.max(0,(db+85)/65);
      const baseY=H*(0.18+t*0.64);
      const wA=amp*H*0.22;
      const speed=0.007+t*0.009;
      const freq=0.0025+t*0.003;
      const hue=150+t*195; // emerald→magenta arc
      const alpha=0.025+amp*0.3;
      const baseW=H*0.07*(0.5+amp*0.7);
      const ph=_vizPhase*speed;
      // Build the path once and draw twice
      c.beginPath();
      for (let x=0;x<=W;x+=5) {
        const y=baseY
          +Math.sin(x*freq+ph+l*0.9)*wA
          +Math.sin(x*freq*1.8+ph*1.4+l*0.5)*wA*0.35
          +Math.cos(x*freq*0.5+ph*0.7)*wA*0.2;
        x===0?c.moveTo(x,y):c.lineTo(x,y);
      }
      // Bloom pass: wide, low alpha
      c.strokeStyle=`hsla(${hue},100%,62%,${alpha*0.4})`;
      c.lineWidth=baseW*2.8;
      c.stroke();
      // Bright pass: narrow, full alpha
      c.strokeStyle=`hsla(${hue},100%,62%,${alpha})`;
      c.lineWidth=baseW;
      c.stroke();
    }
  }

  // ── Wire up after DOM ready ────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('viz-btn').addEventListener('click', () => {
      _vizOpen ? _closeViz() : _openViz();
    });
    document.getElementById('viz-close-btn').addEventListener('click', e => {
      e.stopPropagation(); _closeViz();
    });
    document.getElementById('viz-canvas').addEventListener('click', () => _cycleMode());
    document.getElementById('viz-mode-row').addEventListener('click', () => _cycleMode());
    document.querySelectorAll('.viz-pip').forEach((p,i) => {
      p.addEventListener('click', e => {
        e.stopPropagation();
        _vizMode = i;
        document.getElementById('viz-mode-lbl').textContent = MODES[_vizMode];
        document.querySelectorAll('.viz-pip').forEach((q,j)=>q.classList.toggle('on',j===_vizMode));
        const cv=document.getElementById('viz-canvas');
        cv.getContext('2d').fillStyle='#000';
        cv.getContext('2d').fillRect(0,0,cv.width,cv.height);
      });
    });
    window.addEventListener('resize', () => { if(_vizOpen) _resizeViz(); });
    window.addEventListener('keydown', e => {
      if (e.key==='Escape' && _vizOpen) { _closeViz(); return; }
      if ((e.key==='v'||e.key==='V') && !e.target.closest('input,select,textarea,[contenteditable]')) {
        _vizOpen ? _closeViz() : _openViz();
      }
    });
  });
})();

// Expose internals for testing
Object.defineProperties(window, {
  ctx: { get: () => ctx },
  mods: { get: () => mods },
  cables: { get: () => cables },
  audioConns: { get: () => audioConns }
});
</script>
