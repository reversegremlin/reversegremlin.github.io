  const grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;width:100%;max-width:860px;';
  FACTORY_PRESETS.forEach((p,i) => {
    const card = document.createElement('div');
    card.style.cssText = 'background:var(--bg-panel-3);border:1px solid var(--border-bright);border-radius:4px;padding:12px 14px;cursor:pointer;transition:border-color .15s,box-shadow .15s;';
    card.addEventListener('mouseenter',()=>{ card.style.borderColor='var(--accent)'; card.style.boxShadow='0 0 12px color-mix(in srgb,var(--accent) 28%, transparent)'; });
    card.addEventListener('mouseleave',()=>{ card.style.borderColor='var(--border-bright)'; card.style.boxShadow='none'; });
    card.innerHTML = `<div style="color:var(--accent);font-size:13px;letter-spacing:3px;margin-bottom:6px;">${String(i+1).padStart(2,'0')} ${p.name}</div><div style="color:var(--text-dim);font-size:11px;line-height:1.6;">${p.desc}</div>`;
    card.addEventListener('click', () => {
      if(!ctx){ setStatus('Power on first.'); overlay.remove(); return; }
      _sessionSuppress=true; applyConfig(p.cfg); if (p.scenes) applySceneSet(p.scenes); if (p.trackScript !== undefined) setTrackScript(p.trackScript); setTimeout(()=>{ _sessionSuppress=false; logEvent('preset_load',{name:p.name}); },150);
      applyPatchHints(p.hints);
      // Auto-start the sequencer so the preset is immediately audible
      if (!mods.seq.playing) {
        mods.seq.playing = true; mods.seq.start();
        const pb = document.getElementById('seq-play-btn');
        if (pb) { pb.textContent = '■ STOP'; pb.classList.add('on'); }
      }
      // Auto-fetch and load sample if preset specifies one
      if (p.cfg.sampler?.sampleUrl) {
        setStatus(`Loading sample…`);
        fetch(p.cfg.sampler.sampleUrl)
          .then(r => { if(!r.ok) throw new Error(r.status); return r.arrayBuffer(); })
          .then(ab => ctx.decodeAudioData(ab))
          .then(buf => {
            mods.sampler.buffer = buf;
            mods.sampler.fileName = p.cfg.sampler.sampleUrl.split('/').pop();
            mods.sampler.looping  = p.cfg.sampler.loop  ?? true;
            mods.sampler.speedVal = p.cfg.sampler.speed ?? 1;
            mods.sampler.pitchVal = p.cfg.sampler.pitch ?? 0;
            mods.sampler._onLoad && mods.sampler._onLoad();
            mods.sampler.play();
            setStatus(`Patch loaded: ${p.name}`);
          })
          .catch(e => { console.warn('Sample auto-load failed:', e); setStatus(`Patch loaded: ${p.name} — load sample manually`); });
      } else {
        setStatus(`Patch loaded: ${p.name}${p.scenes ? ' + scenes' : ''}`);
      }
      overlay.remove();
    });
    grid.appendChild(card);
  });
  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn';
  closeBtn.textContent = '✕ CLOSE';
  closeBtn.style.cssText = 'margin-top:8px;padding:10px 28px;font-size:14px;';
  closeBtn.addEventListener('click',()=>overlay.remove());
  overlay.appendChild(title); overlay.appendChild(sub); overlay.appendChild(grid); overlay.appendChild(closeBtn);
  document.body.appendChild(overlay);
}

// ═══════════════════════════════════════════════════════════════════════════════
// RANDOMIZE PATCH
// ═══════════════════════════════════════════════════════════════════════════════
function randomPatch() {
  if(!ctx){ setStatus('Power on first.'); return; }
  const sk = (id, v) => { if(knobRefs[id]) knobRefs[id].setVal(v); };
  const rnd = (a,b) => a + Math.random()*(b-a);
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];

  // VCF — musically useful ranges
  const cut = rnd(200,8000);  mods.vcf.setCutoff(cut); sk('vcf-cutoff',cut);
  const res = rnd(0.5,8);     mods.vcf.setRes(res);    sk('vcf-res',res);
  const vcfType=pick(['lowpass','lowpass','lowpass','highpass','bandpass']); mods.vcf.setType(vcfType); sk('vcf-type',vcfType);

  // LFO 1 & 2 — different rates for movement complexity
  const rates = [0.1,0.2,0.3,0.5,1,2,3,5,8];
  const r1=pick(rates)*rnd(0.7,1.4);  mods.lfo.setRate(r1); sk('lfo-rate',r1);
  const d1=rnd(50,1000);              mods.lfo.setDepth(d1); sk('lfo-depth',d1);
  const lfoType=pick(['sine','sine','triangle','square']); mods.lfo.setType(lfoType); sk('lfo-wave',lfoType);
  const r2=pick(rates)*rnd(0.7,1.4);  mods.lfo2.setRate(r2); sk('lfo2-rate',r2);
  const d2=rnd(20,600);               mods.lfo2.setDepth(d2); sk('lfo2-depth',d2);
  const lfo2Type=pick(['sine','sine','triangle','square']); mods.lfo2.setType(lfo2Type); sk('lfo2-wave',lfo2Type);

  // ADSR — biased toward short attack, variable release
  const A=0.001+Math.random()*Math.random()*2; mods.adsr.A=A; sk('adsr-A',A);
  const D=rnd(0.05,0.6);                        mods.adsr.D=D; sk('adsr-D',D);
  const S=rnd(0.2,0.9);                         mods.adsr.S=S; sk('adsr-S',S);
  const R=0.05+Math.random()*Math.random()*4;   mods.adsr.R=R; sk('adsr-R',R);
  drawEnv();

  // VCA
  const g=rnd(0.5,1.0); mods.vca.setGain(g); sk('vca-gain',g);

  // Delay
  const dt=rnd(0.04,1.2); mods.delay.setTime(dt); sk('delay-time',dt);
  const fb=rnd(0,0.7);    mods.delay.setFeedback(fb); sk('delay-fb',fb);
  const dm=rnd(0,0.55);   mods.delay.setMix(dm); sk('delay-mix',dm);

  // Reverb
  const rs=rnd(0.5,7);   mods.reverb.setSize(rs); sk('reverb-size',rs);
  const rd=rnd(0.2,0.9); mods.reverb.setDecay(rd); sk('reverb-decay',rd);
  const rm=rnd(0.1,0.7); mods.reverb.setMix(rm); sk('reverb-mix',rm);

  // VCO waveforms
  const vcoType=pick(['sawtooth','sawtooth','square','triangle','sine']); mods.vco.setType(vcoType); sk('vco-wave',vcoType);
  const vco2Type=pick(['sawtooth','sawtooth','square','triangle','sine']); mods.vco2.setType(vco2Type); sk('vco2-wave',vco2Type);
  const det=rnd(-30,30); mods.vco2.setDetune(det); sk('vco2-detune',det);

  // Attenuverter
  const att=rnd(-2,2); mods.att.setAtt(att); sk('att-knob',att);
  const off=rnd(-0.5,0.5); mods.att.setOffset(off); sk('att-offset',off);

  // Chorus
  const chrRate=rnd(0.2,3); mods.chorus.setRate(chrRate); sk('chorus-rate',chrRate);
  const chrDep=rnd(0.1,0.7); mods.chorus.setDepth(chrDep); sk('chorus-depth',chrDep);
  const chrWid=rnd(0.5,1);   mods.chorus.setWidth(chrWid); sk('chorus-width',chrWid);
  const chrMix=rnd(0.2,0.7); mods.chorus.setMix(chrMix);   sk('chorus-mix',chrMix);

  // Tape
  const tDrive=rnd(1,6); mods.tape.setDrive(tDrive); sk('tape-drive',tDrive);
  const tWow=rnd(0,0.6); mods.tape.setWow(tWow);     sk('tape-wow',tWow);
  const tMix=rnd(0.2,0.8); mods.tape.setMix(tMix);   sk('tape-mix',tMix);

  // Wavefolder
  const wfFold=rnd(1,5); mods.wavefolder.setFold(wfFold); sk('fold-fold',wfFold);
  const wfSymm=rnd(-0.3,0.3); mods.wavefolder.setSymm(wfSymm); sk('fold-symm',wfSymm);

  // Phaser
  const phRate=rnd(0.05,2); mods.phaser.setRate(phRate); sk('phaser-rate',phRate);
  const phDep=rnd(0.2,0.8); mods.phaser.setDepth(phDep); sk('phaser-depth',phDep);
  const phMix=rnd(0.3,0.8); mods.phaser.setMix(phMix);   sk('phaser-mix',phMix);

  // Panner
  const panRate=rnd(0.03,0.8); mods.panner.setRate(panRate); sk('pan-rate',panRate);
  const panDep=rnd(0.3,0.9);   mods.panner.setDepth(panDep); sk('pan-depth',panDep);

  // Chord
  const chordTypes = ['maj','min','min','sus2','sus4','maj7','min7'];
  const chordPick = pick(chordTypes); mods.chord.setChord(chordPick); sk('chord-type-sel', chordPick);
  const cSpread = rnd(0, 20); mods.chord.setSpread(cSpread); sk('chord-spread', cSpread);
  const cLevel  = rnd(0.3, 0.8); mods.chord.setLevel(cLevel); sk('chord-level', cLevel);

  // Microcosm
  const mcBlend = rnd(0.4, 0.9);  mods.micr0c0sm.setBlend(mcBlend);   sk('mc-blend', mcBlend);
  const mcSize  = rnd(0.03, 0.35); mods.micr0c0sm.setGrainSz(mcSize); sk('mc-size', mcSize);
  const mcScat  = rnd(0, 0.8);     mods.micr0c0sm.setScatter(mcScat); sk('mc-scat', mcScat);
  const mcPitch = pick([0.5, 0.75, 1.0, 1.0, 1.0, 1.5, 2.0]); mods.micr0c0sm.setPitch(mcPitch); sk('mc-pitch', mcPitch);
  const mcDns   = rnd(4, 30);      mods.micr0c0sm.setDensity(mcDns); sk('mc-dnsty', mcDns);
  const mcMode=pick(['granular','granular','shimmer','glitch']); mods.micr0c0sm.setMode(mcMode); sk('mc-mode-sel',mcMode);

  // Sequencer steps — pentatonic scale, 60-80% active, random probability
  const penta=[0,2,4,7,9,12,14,16,-5,-3,-12,-7,-5];
  mods.seq.steps.forEach((s,i)=>{
    s.on = Math.random()>0.3;
    s.pitch = pick(penta);
    s.prob = Math.random()>0.3 ? 1.0 : rnd(0.5,0.9);
    const tog=document.querySelector(`#ss${i} .step-tog`);
    if(tog) tog.classList.toggle('on',s.on);
    const pr=knobRefs[`seq-prob-${i}`]; if(pr) pr.setVal(s.prob);
  });

  // Arpeggiator
  const arpChord=pick(['maj','min','sus2','min7','maj7']); mods.arp.setChord(arpChord); sk('arp-chord-sel',arpChord);
  const arpDir=pick(['up','up','ud','rnd']); mods.arp.setDir(arpDir); sk('arp-dir-sel',arpDir);
  const arpRate=pick([1,2,2,4]); mods.arp.setRateMul(arpRate); sk('arp-rate-sel',arpRate);
  const arpOct=pick([1,1,2]); mods.arp.setOctaves(arpOct); sk('arp-oct-sel',arpOct);
  const arpRoot=Math.round(rnd(-7,7)); mods.arp.setRoot(arpRoot); sk('arp-root',arpRoot);

  // Sidechain
  const scAtk=rnd(0.005,0.3); mods.sidechain.setAttack(scAtk); sk('sc-attack',scAtk);
  const scRel=rnd(0.05,1.0);  mods.sidechain.setRelease(scRel); sk('sc-release',scRel);
  const scAmt=rnd(0.5,3.0);   mods.sidechain.setAmount(scAmt);  sk('sc-amount',scAmt);

  // Randomize cables — clear user cables, re-add defaults + crazy extras
  [...cables].forEach(c => delCable(c));
  // Redraw the 4 hardwired defaults visually
  setTimeout(()=>{
    addCable('vco-out','vcf-in','#ff6600');
    addCable('vcf-out','vca-in','#ff00ff');
    addCable('adsr-out','vca-env','#ffff00');
    addCable('lfo-out','vcf-cv','#00ffff');
    // Pick 3–6 extra cables from a musically interesting pool
    const extraPool = [
      ['vca-out','reverb-in','#00ffff'],
      ['vca-out','delay-in','#88aaff'],
      ['vca-out','chorus-in','#ff4488'],
      ['vca-out','tape-in','#ffff00'],
      ['vca-out','phaser-in','#00ff88'],
      ['vco2-out','mix-b-in','#ff6600'],
      ['noise-out','mix-c-in','#88aaff'],
      ['chord-out','mix-b-in','#ff00ff'],
      ['lfo2-out','vco2-cv','#ff4488'],
      ['lfo2-out','att-in','#00ffff'],
      ['att-out','vcf-cv','#00ff88'],
      ['sandh-out','vcf-cv','#ff00ff'],
      ['clk-div4','sandh-in','#88aaff'],
      ['sc-out','vca-env','#ff6600'],
      ['vca-out','fold-in','#00ff88'],
      ['fold-out','reverb-in','#00ffff'],
      ['vca-out','micr0c0sm-in','#ff00ff'],
      ['micr0c0sm-out','reverb-in','#00ffff'],
      ['mix-out','reverb-in','#ff4488'],
      ['lfo2-out','vcf-cv','#ff00ff'],
    ];
    const shuffled = [...extraPool].sort(()=>Math.random()-0.5);
    const count = 3 + Math.floor(Math.random()*4);
    shuffled.slice(0, count).forEach(([f,t,c]) => addCable(f,t,c));
    updateCables();
  }, 80);

  setStatus('Patch randomized — explore!');
}

// SIGNAL FLOW VISUALIZER
// ═══════════════════════════════════════════════════════════════════════════════

// ─────────────────────────────────────────────────────────────────────────────
// SIGNAL FLOW GRAPH  (Phase 5 — SVG routed graph replacing linear chain list)
//
// Renders a left-to-right layered graph of connected modules.
// Default hardwired connections are shown as dashed edges; user cables as solid.
// Nodes are coloured by role: source (cyan), processing (purple), sink (orange).
// ─────────────────────────────────────────────────────────────────────────────

// Map patch-point ID → short module label used as graph node identity.
// Multi-instance IDs (vcf-2-out) are derived programmatically below.
const _PP_MOD = {
  'vco-out':'VCO','vco-sub':'VCO','vco-cv':'VCO',
  'vcf-in':'VCF','vcf-cv':'VCF','vcf-res-cv':'VCF','vcf-out':'VCF',
  'ladder-ai':'LADR','ladder-ao':'LADR','ladder-cv':'LADR','ladder-res-cv':'LADR',
  'vca-in':'VCA','vca-env':'VCA','vca-out':'VCA',
  'adsr-out':'ADSR',
  'lfo-out':'LFO','lfo2-out':'LFO2',
  'noise-out':'NOISE',
  'mix-a-in':'MIX','mix-b-in':'MIX','mix-c-in':'MIX','mix-out':'MIX',
  'delay-in':'DLY','delay-out':'DLY',
  'reverb-in':'RVRB','reverb-out':'RVRB',
  'chorus-in':'CHR','chorus-out':'CHR',
  'tape-in':'TAPE','tape-out':'TAPE',
  'phaser-in':'PHZ','phaser-out':'PHZ',
  'fold-in':'FOLD','fold-out':'FOLD',
  'micr0c0sm-in':'μ0CSM','micr0c0sm-out':'μ0CSM',
  'seq-cv-out':'SEQ','seq-gate-out':'SEQ','seq-vel-out':'SEQ',
  'sandh-in':'S&H','sandh-out':'S&H',
  'att-in':'ATT','att-out':'ATT',
  'slew-ci':'SLEW','slew-co':'SLEW',
  'chaos-out':'CHAOS','panner-in':'PAN','panner-out':'PAN',
  'chord-out':'CHORD',
  'ringmod-ai':'RING','ringmod-mod-ai':'RING','ringmod-ao':'RING',
  'fmop-ai':'FMOP','fmop-cv-ai':'FMOP','fmop-ao':'FMOP',
  'flanger-ai':'FLNG','flanger-ao':'FLNG',
  'turing-out':'TURING','drunk-out':'DRUNK',
  'pclk-out':'PCLK','pclk-gate-out':'PCLK',
  'theremin-out':'THER',
  'xypad-x':'XYPAD','xypad-y':'XYPAD',
  'sampler-out':'SMPLR','padsampler-out':'PADS',
  'micloop-out':'MLOOP','stutter-ai':'STTR','stutter-ao':'STTR',
  'sidechain-ai':'SCHN','sidechain-trigger-ai':'SCHN',
  'bitcrush-in':'CRUSH','bitcrush-out':'CRUSH',
  'spec-in':'SPEC','spec-out':'SPEC',
  'tesla-ai':'TESLA',
  '⟳OUT':'OUT',
};
function _ppMod(id) {
  if (_PP_MOD[id]) return _PP_MOD[id];
  // Multi-instance: type-N-suffix where N is numeric (e.g. vcf-2-out → VCF-2)
  const p = id.split('-');
  if (p.length >= 3 && /^\d+$/.test(p[1])) return (p[0] + '-' + p[1]).toUpperCase();
  return p[0].toUpperCase();
}

// Known default cable pairs — these are drawn by drawDefaultCables() and shown
// as dashed in the flow graph regardless of which array they come from.
const _DEFAULT_PAIRS = new Set([
  'vco-out→vcf-in', 'vcf-out→vca-in', 'adsr-out→vca-env', 'lfo-out→vcf-cv',
]);

function buildFlowDiagram() {
  const body = document.getElementById('flow-body');
  if (!body) return;
  body.innerHTML = '';

  // ── Build module-level edge list ──────────────────────────────────────────
  // VCA→OUT has no visual cable (wireDefault() wires it directly), so it's
  // a synthetic default entry. All other defaults come through cables[].
  const allRaw = [
    {from:'vca-out', to:'⟳OUT', color:'#cc00ff', def:true},
    ...cables.map(c => ({
      from: c.fromId, to: c.toId, color: c.color,
      def: _DEFAULT_PAIRS.has(c.fromId + '→' + c.toId),
    })),
  ];

  // Convert pp-IDs → module names; deduplicate; drop self-loops
  const edgeMap = new Map(); // key → edge (user cables override defaults)
  for (const e of allRaw) {
    const mf = _ppMod(e.from), mt = _ppMod(e.to);
    if (mf === mt) continue;
    const key = mf + '→' + mt;
    if (!edgeMap.has(key) || !e.def) edgeMap.set(key, {from:mf, to:mt, color:e.color, def:e.def});
  }
  const modEdges = [...edgeMap.values()];

  // ── Collect nodes ─────────────────────────────────────────────────────────
  const allNodes = [...new Set(modEdges.flatMap(e=>[e.from,e.to]))];
  if (!allNodes.length) {
    body.innerHTML = '<div style="color:#1e1e3a;font-size:7px;font-style:italic;padding:2px;">No connections.</div>';
    return;
  }

  // ── Topological level assignment (longest-path BFS) ───────────────────────
  const adj   = new Map(allNodes.map(n=>[n,[]]));
  const indeg = new Map(allNodes.map(n=>[n,0]));
  for (const e of modEdges) {
    adj.get(e.from).push(e.to);
    indeg.set(e.to, indeg.get(e.to)+1);
  }
  const origIndeg = new Map(indeg); // save for role colouring
  const lvl = new Map(allNodes.map(n=>[n,0]));
  const q = allNodes.filter(n=>indeg.get(n)===0); let qi=0;
  while (qi < q.length) {
    const n = q[qi++];
    for (const m of adj.get(n)) {
      lvl.set(m, Math.max(lvl.get(m), lvl.get(n)+1));
      indeg.set(m, indeg.get(m)-1);
      if (indeg.get(m)===0) q.push(m);
    }
  }

  // ── Column layout ─────────────────────────────────────────────────────────
  const byLvl = [];
  for (const n of allNodes) {
    const l = lvl.get(n); if (!byLvl[l]) byLvl[l]=[];
    byLvl[l].push(n);
  }
  const numCols = byLvl.length;
  const bodyW   = body.clientWidth || 226;
  const NW = 40, NH = 18, ROW_H = 26, PAD_Y = 8;
  const COL_W = Math.max(NW + 10, Math.floor(bodyW / numCols));
  const maxRows = Math.max(...byLvl.map(c=>c.length));
  const svgW = numCols * COL_W, svgH = maxRows * ROW_H + PAD_Y * 2;

  const pos = new Map();
  byLvl.forEach((col, ci) => {
    const colTop = (svgH - col.length * ROW_H) / 2 + ROW_H / 2;
    col.forEach((n, ri) => pos.set(n, {cx: ci*COL_W + COL_W/2, cy: colTop + ri*ROW_H}));
  });

  // ── SVG ───────────────────────────────────────────────────────────────────
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', svgW); svg.setAttribute('height', svgH);
  svg.style.cssText = 'display:block;overflow:visible;';

  // Edges (drawn behind nodes)
  for (const e of modEdges) {
    const a = pos.get(e.from), b = pos.get(e.to);
    if (!a || !b) continue;
    const x1=a.cx+NW/2, y1=a.cy, x2=b.cx-NW/2, y2=b.cy, dx=(x2-x1)*0.45;
    const path = document.createElementNS(NS, 'path');
    path.setAttribute('d', `M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke', e.color + (e.def ? '28' : '90'));
    path.setAttribute('stroke-width', e.def ? '1' : '1.5');
    if (e.def) path.setAttribute('stroke-dasharray','3 2');
    svg.appendChild(path);
    // Arrowhead dot at destination
    const dot = document.createElementNS(NS,'circle');
    dot.setAttribute('cx',x2); dot.setAttribute('cy',y2); dot.setAttribute('r','2');
    dot.setAttribute('fill', e.color + (e.def ? '28' : '90'));
    svg.appendChild(dot);
  }

  // Nodes
  for (const n of allNodes) {
    const p = pos.get(n); if (!p) continue;
    // Role-based colour: source=cyan, sink=orange, processing=dim purple
    const isSource = origIndeg.get(n) === 0;
    const isSink   = !adj.get(n)?.length || n === 'OUT';
    const col = isSink ? '#ff7700' : isSource ? '#00aaff' : '#aa66dd';
    const x = p.cx-NW/2, y = p.cy-NH/2;
    const g = document.createElementNS(NS,'g');
    const rect = document.createElementNS(NS,'rect');
    rect.setAttribute('x',x); rect.setAttribute('y',y);
    rect.setAttribute('width',NW); rect.setAttribute('height',NH);
    rect.setAttribute('rx','2'); rect.setAttribute('ry','2');
    rect.setAttribute('fill', col+'12'); rect.setAttribute('stroke', col+'55');
    rect.setAttribute('stroke-width','1');
    const text = document.createElementNS(NS,'text');
    text.setAttribute('x',p.cx); text.setAttribute('y',p.cy+4);
    text.setAttribute('text-anchor','middle');
    text.setAttribute('font-size','7'); text.setAttribute('fill', col+'ee');
    text.setAttribute('font-family','monospace');
    text.textContent = n.length > 6 ? n.substring(0,6) : n;
    g.appendChild(rect); g.appendChild(text);
    svg.appendChild(g);
  }

  // Legend strip (10px tall, below graph)
  const leg = document.createElementNS(NS,'text');
  leg.setAttribute('x',0); leg.setAttribute('y',svgH+10);
  leg.setAttribute('font-size','6'); leg.setAttribute('fill','#ffffff20');
  leg.setAttribute('font-family','monospace');
  leg.textContent = '╌ default  ─ cable  ◆ source  ◇ process  ◈ output';
  svg.setAttribute('height', svgH+14);
  svg.appendChild(leg);

  body.appendChild(svg);
}

const TUTORIALS = [
  { name:'1 — Filter Sweep Drone', steps:[
    { title:'Start the Engine', hl:['vco','vcf','vca','seq'],
      text:'The default patch is already wired: VCO → VCF → VCA → speakers, ADSR → VCA, LFO → VCF. Hit PLAY if needed. You\'ll hear a repeating pattern. This is subtractive synthesis at its simplest — one oscillator, shaped by a filter, given an envelope. Tip: to adjust overall volume, use the LIMITER CEIL knob in the top toolbar — it\'s your master volume control. And good news: send effects (Reverb, Delay, Chorus, Tape, Phaser) are already connected to the speakers, so you only need to patch something INTO their IN to hear the effect.' },
    { title:'Sweep the Filter', hl:['vcf'],
      text:'Turn the VCF CUTOFF knob slowly from far left (dark, muffled) to far right (bright, buzzy). This is the core move of electronic music. Low cutoff = warm bass. High cutoff = sharp lead. The filter is your most expressive tool — every live performance uses this sweep.' },
    { title:'Add Resonance', hl:['vcf'],
