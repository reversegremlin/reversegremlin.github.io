function buildLoopStation() {
  const el = document.getElementById('loopstation');
  if (!el) return;

  const header = document.createElement('div'); header.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:6px;';
  const title = document.createElement('div'); title.className = 'ls-title'; title.style.margin='0'; title.textContent = '⟳ LOOP STATION';
  const midiPadsBtn = document.createElement('button'); midiPadsBtn.className = 'ls-btn'; midiPadsBtn.textContent = 'MIDI PADS';
  midiPadsBtn.title = 'MIDI Pad mode: notes 36-39 = REC/STOP tracks 1-4 · notes 40-43 = PLAY/STOP tracks 1-4';
  const midiHint = document.createElement('span'); midiHint.style.cssText='font-size:7px;color:#333;letter-spacing:1px;font-family:"Courier New",monospace;';
  midiHint.textContent = 'pads 36-39 REC · 40-43 PLAY';
  header.appendChild(title); header.appendChild(midiPadsBtn); header.appendChild(midiHint);
  const tracksEl = document.createElement('div'); tracksEl.className = 'ls-tracks';
  el.appendChild(header); el.appendChild(tracksEl);

  const N = 4;
  const loops = Array.from({length: N}, (_, i) => ({
    i, buffer: null, playing: false, recording: false, dubbing: false,
    src: null, dubDest: null, rec: null, recChunks: [],
    gainNode: ctx.createGain(), el: null, waveEl: null, playBtn: null, recBtn: null, dubBtn: null
  }));

  // All loop gainNodes → masterOut
  loops.forEach(lp => lp.gainNode.connect(masterOut));

  // Expose for MIDI control
  mods.looper = { tracks: loops, midiMode: false };
  midiPadsBtn.addEventListener('click', () => {
    mods.looper.midiMode = !mods.looper.midiMode;
    midiPadsBtn.classList.toggle('on', mods.looper.midiMode);
    midiHint.style.color = mods.looper.midiMode ? '#ff00ff88' : '#333';
  });

  function drawLoopWave(lp) {
    const cv = lp.waveEl; if (!cv) return;
    const wc = cv.getContext('2d');
    wc.clearRect(0, 0, cv.width, cv.height);
    if (!lp.buffer) {
      wc.strokeStyle = '#ffffff11'; wc.lineWidth = 1;
      wc.beginPath(); wc.moveTo(0, 18); wc.lineTo(cv.width, 18); wc.stroke();
      return;
    }
    const data = lp.buffer.getChannelData(0);
    const step = Math.max(1, Math.ceil(data.length / cv.width));
    wc.strokeStyle = lp.playing ? '#00ffff' : '#ff00ff88';
    wc.lineWidth = 1;
    wc.shadowBlur = 3; wc.shadowColor = wc.strokeStyle;
    wc.beginPath();
    for (let x = 0; x < cv.width; x++) {
      let max = 0;
      for (let j = 0; j < step; j++) { const v = data[Math.min(x*step+j, data.length-1)]; max = Math.max(max, Math.abs(v)); }
      const h = max * 14;
      wc.moveTo(x, 18-h); wc.lineTo(x, 18+h);
    }
    wc.stroke();
  }

  function startLoop(lp) {
    if (lp.src) { try { lp.src.stop(); } catch(e){} }
    lp.src = ctx.createBufferSource();
    lp.src.buffer = lp.buffer;
    lp.src.loop = true;
    lp.src.connect(lp.gainNode);
    lp.src.start();
    lp.playing = true;
    lp.el.classList.add('has-loop');
    lp.playBtn.textContent = '■'; lp.playBtn.classList.add('on');
    drawLoopWave(lp);
  }

  function stopLoop(lp) {
    if (lp.src) { try { lp.src.stop(); } catch(e){} lp.src = null; }
    lp.playing = false;
    lp.playBtn.textContent = '▶'; lp.playBtn.classList.remove('on');
    drawLoopWave(lp);
  }

  async function finishRecording(lp) {
    return new Promise(resolve => {
      lp.rec.onstop = async () => {
        const blob = new Blob(lp.recChunks, {type:'audio/webm'});
        lp.recChunks = [];
        try {
          const ab = await blob.arrayBuffer();
          if (lp.dubbing && lp.buffer) {
            // Mix new recording onto existing buffer
            const newBuf = await ctx.decodeAudioData(ab);
            const len = Math.max(lp.buffer.length, newBuf.length);
            const mixed = ctx.createBuffer(1, len, ctx.sampleRate);
            const out = mixed.getChannelData(0);
            const a = lp.buffer.getChannelData(0);
            const b = newBuf.getChannelData(0);
            for (let i = 0; i < len; i++) out[i] = (i < a.length ? a[i] : 0) + (i < b.length ? b[i]*0.8 : 0);
            lp.buffer = mixed;
          } else {
            lp.buffer = await ctx.decodeAudioData(ab);
          }
        } catch(e) { console.warn('Loop decode failed', e); }
        resolve();
      };
      lp.rec.stop();
    });
  }

  loops.forEach(lp => {
    const track = document.createElement('div'); track.className = 'ls-track'; lp.el = track;

    const num = document.createElement('div'); num.className = 'ls-track-num'; num.textContent = lp.i+1;

    const wave = document.createElement('canvas'); wave.className = 'ls-wave'; wave.height = 36;
    lp.waveEl = wave;
    // Set width after DOM insertion; use ResizeObserver workaround
    requestAnimationFrame(() => { wave.width = wave.clientWidth || 120; drawLoopWave(lp); });

    const btns = document.createElement('div'); btns.className = 'ls-btns';
    const row1 = document.createElement('div'); row1.className = 'ls-btns-row';
    const row2 = document.createElement('div'); row2.className = 'ls-btns-row';

    const recBtn = document.createElement('button'); recBtn.className = 'ls-btn rec'; recBtn.textContent = '● REC'; recBtn.title=`MIDI pad ${36+lp.i}`; lp.recBtn = recBtn;
    const playBtn = document.createElement('button'); playBtn.className = 'ls-btn play'; playBtn.textContent = '▶'; playBtn.title=`MIDI pad ${40+lp.i}`; lp.playBtn = playBtn;
    const dubBtn = document.createElement('button'); dubBtn.className = 'ls-btn dub'; dubBtn.textContent = 'DUB'; lp.dubBtn = dubBtn;
    const clrBtn = document.createElement('button'); clrBtn.className = 'ls-btn'; clrBtn.textContent = 'CLR';

    // Level knob (small)
    const lvlWrap = mkKnob({label:'LVL',min:0,max:1.5,val:0.85,sz:'sm',
      onChange: v => lp.gainNode.gain.setTargetAtTime(v, ctx.currentTime, 0.02)});

    const revBtn = document.createElement('button'); revBtn.className = 'ls-btn'; revBtn.textContent = 'REV';
    revBtn.title = 'Reverse loop buffer in place';
    revBtn.addEventListener('click', () => {
      if (!lp.buffer) return;
      const rev = ctx.createBuffer(lp.buffer.numberOfChannels, lp.buffer.length, lp.buffer.sampleRate);
      for (let c = 0; c < lp.buffer.numberOfChannels; c++) {
        rev.copyToChannel(Float32Array.from(lp.buffer.getChannelData(c)).reverse(), c);
      }
      lp.buffer = rev;
      if (lp.playing) startLoop(lp);
      drawLoopWave(lp);
    });

    const expBtn = document.createElement('button'); expBtn.className = 'ls-btn'; expBtn.textContent = 'WAV';
    expBtn.title = 'Export loop as WAV file';
    expBtn.addEventListener('click', async () => {
      if (!lp.buffer) return;
      const wav = audioBufferToWav(lp.buffer);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([wav], {type:'audio/wav'}));
      a.download = `loop-${lp.i+1}-${Date.now()}.wav`; a.click();
    });

    row1.appendChild(recBtn); row1.appendChild(playBtn);
    row2.appendChild(dubBtn); row2.appendChild(clrBtn); row2.appendChild(revBtn); row2.appendChild(expBtn);
    btns.appendChild(row1); btns.appendChild(row2);
    track.appendChild(num); track.appendChild(wave); track.appendChild(btns); track.appendChild(lvlWrap);
    tracksEl.appendChild(track);

    // REC: arm → recording → finish → auto-play
    recBtn.addEventListener('click', async () => {
      if (lp.recording) {
        // Stop recording
        lp.recording = false;
        track.classList.remove('recording', 'armed');
        recBtn.textContent = '● REC'; recBtn.classList.remove('on');
        await finishRecording(lp);
        lp.dubbing = false; lp.dubBtn.classList.remove('on');
        startLoop(lp);
      } else {
        // Start recording
        lp.recording = true; lp.recChunks = [];
        track.classList.add('recording');
        recBtn.textContent = '■ STOP'; recBtn.classList.add('on');

        const dest = ctx.createMediaStreamDestination();
        masterOut.connect(dest);
        lp.rec = new MediaRecorder(dest.stream, {mimeType: 'audio/webm;codecs=opus'});
        lp.rec.ondataavailable = e => { if(e.data.size > 0) lp.recChunks.push(e.data); };
        lp.rec.start(100);
        if (lp.playing) stopLoop(lp); // stop old loop while recording new
      }
    });

    playBtn.addEventListener('click', () => {
      if (!lp.buffer) return;
      lp.playing ? stopLoop(lp) : startLoop(lp);
    });

    dubBtn.addEventListener('click', () => {
      if (!lp.buffer) return;
      lp.dubbing = !lp.dubbing;
      dubBtn.classList.toggle('on', lp.dubbing);
    });

    clrBtn.addEventListener('click', () => {
      stopLoop(lp);
      lp.buffer = null;
      track.classList.remove('has-loop');
      drawLoopWave(lp);
    });

    drawLoopWave(lp);
  });
}

function startScope() {
  const cv=document.getElementById('scope-cv');
  if(!cv) return;
  const c=cv.getContext('2d');
  const buf=new Float32Array(analyserNode.frequencyBinCount);
  function draw() {
    requestAnimationFrame(draw);
    analyserNode.getFloatTimeDomainData(buf);
    const W=cv.width,H=cv.height;
    c.fillStyle='#04040e'; c.fillRect(0,0,W,H);
    // grid
    c.strokeStyle='rgba(255,0,255,.07)'; c.lineWidth=.5;
    for(let x=0;x<W;x+=W/8){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}
    for(let y=0;y<H;y+=H/4){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}
    // waveform
    c.strokeStyle='#ff00ff'; c.lineWidth=1.5;
    c.shadowColor='#ff00ff'; c.shadowBlur=6;
    c.beginPath();
    for(let i=0;i<buf.length;i++){
      const x=i*(W/buf.length), y=(1-buf[i])*H/2;
      i===0?c.moveTo(x,y):c.lineTo(x,y);
    }
    c.stroke(); c.shadowBlur=0;
  }
  draw();
}

function startLFOPreview(canvasId, getMod) {
  const cv=document.getElementById(canvasId);
  if(!cv) return;
  const c=cv.getContext('2d');
  let ph=0;
  function draw() {
    requestAnimationFrame(draw);
    const W=cv.width,H=cv.height;
    c.fillStyle='#04040e'; c.fillRect(0,0,W,H);
    c.strokeStyle='#00ffff'; c.lineWidth=1.2;
    c.shadowColor='#00ffff'; c.shadowBlur=4;
    c.beginPath();
    const m=getMod();
    for(let x=0;x<W;x++){
      const t=(x/W)*4*Math.PI+ph;
      let y;
      switch(m?.type){
        case 'triangle': y=Math.asin(Math.sin(t))*2/Math.PI; break;
        case 'square':   y=Math.sin(t)>=0?1:-1; break;
        default:         y=Math.sin(t);
      }
      const py=(1-y)*H/2;
      x===0?c.moveTo(x,py):c.lineTo(x,py);
    }
    c.stroke(); c.shadowBlur=0;
    ph+=0.04;
  }
  draw();
}

function drawEnv() {
  const cv=document.getElementById('adsr-cv');
  if(!cv) return;
  const c=cv.getContext('2d');
  const W=cv.width,H=cv.height;
  const {A,D,S,R}=mods.adsr;
  c.fillStyle='#04040e'; c.fillRect(0,0,W,H);
  const hold=.2, total=A+D+hold+R;
  const tx=v=>4+(v/total)*(W-8);
  c.strokeStyle='#ffff00'; c.lineWidth=1.3;
  c.shadowColor='#ffff00'; c.shadowBlur=4;
  c.beginPath();
  c.moveTo(4,H-4);
  c.lineTo(tx(A),4);
  c.lineTo(tx(A+D), 4+(1-S)*(H-8));
  c.lineTo(tx(A+D+hold), 4+(1-S)*(H-8));
  c.lineTo(tx(A+D+hold+R),H-4);
  c.stroke(); c.shadowBlur=0;
}

function startVCFPreview() {
  function draw() {
    requestAnimationFrame(draw);
    const cv=document.getElementById('vcf-cv');
    if(!cv||!mods.vcf) return;
    const c=cv.getContext('2d'), W=cv.width, H=cv.height;
    c.fillStyle='#04040e'; c.fillRect(0,0,W,H);
    const freqs=new Float32Array(W);
    for(let i=0;i<W;i++) freqs[i]=20*Math.pow(1000,i/W);
    const mag=new Float32Array(W), ph=new Float32Array(W);
    mods.vcf.filt.getFrequencyResponse(freqs,mag,ph);
    c.strokeStyle='#00ff88'; c.lineWidth=1.3;
    c.shadowColor='#00ff88'; c.shadowBlur=4;
    c.beginPath();
    for(let i=0;i<W;i++){
      const db=20*Math.log10(Math.max(mag[i],1e-6));
      const y=H/2-(db/40)*H;
      i===0?c.moveTo(i,Math.min(H,Math.max(0,y))):c.lineTo(i,Math.min(H,Math.max(0,y)));
    }
    c.stroke(); c.shadowBlur=0;
  }
  draw();
}

    instanceCounters[type] = 1; // reset counters so restored instances get original IDs
  });
  // Disconnect all visual cables

  // Apply module values (audio)
  if(cfg.vco){ mods.vco.setType(cfg.vco.type); sk('vco-wave',cfg.vco.type); mods.vco.setOct(cfg.vco.oct); sk('vco-oct',cfg.vco.oct); mods.vco.setCoarse(cfg.vco.coarse); sk('vco-coarse',cfg.vco.coarse); mods.vco.setFine(cfg.vco.fine??0); sk('vco-fine',cfg.vco.fine??0); }

  // Restore extra module instances
  if (cfg.extraModules && cfg.extraModules.length) {
    cfg.extraModules.forEach(({ type, instanceId, vals }) => {
      const fns = _moduleFns(type);
      if (!fns.make) return;
      // Set counter so next instantiation gets the original instanceId

      instantiateModule(type);
      // Restore knob values
      if (vals) Object.entries(vals).forEach(([k, v]) => sk(k, v));
    });
  }
  // Restore cables — always re-add the 4 default chain cables first, then preset extras
  // (delCable above disconnects them from the audio graph too, so they must be re-established)
  setTimeout(()=>{
    const DEF = [['vco-out','vcf-in','#ff6600'],['vcf-out','vca-in','#ff00ff'],['adsr-out','vca-env','#ffff00'],['lfo-out','vcf-cv','#00ffff']];
    DEF.forEach(([f,t,c])=>addCable(f,t,c));
    if(cfg.cables) { ignoreUndo=true; cfg.cables.forEach(c=>addCable(c.fromId,c.toId,c.color)); ignoreUndo=false; }
    // Restore rack order after cables (modules may have been added above)
    if (cfg.rackOrder && cfg.rackOrder.length) applyRackOrder(cfg.rackOrder);
    updateCables();
  }, 80);
  setStatus('Patch loaded ✓');
}

// WEB MIDI
// ═══════════════════════════════════════════════════════════════════════════════
function initMIDI() {
  if (!navigator.requestMIDIAccess) { setStatus('Web MIDI not supported — try Chrome or Edge.'); return; }
  navigator.requestMIDIAccess({sysex:false}).then(access => {
    function connect() {
      const inputs = Array.from(access.inputs.values());
      if (midiIn) midiIn.onmidimessage = null;
      const ind = document.getElementById('midi-ind');
      if (inputs.length) {
        midiIn = inputs[0];
        midiIn.onmidimessage = handleMIDI;
        ind.textContent = midiIn.name.substring(0,18);
        ind.classList.add('on');
        setStatus('MIDI: ' + midiIn.name);
      } else {
        midiIn = null;
        ind.textContent = 'NO MIDI';
        ind.classList.remove('on');
      }
    }
    connect();
    access.onstatechange = connect;
  }).catch(() => setStatus('MIDI access denied — check browser permissions.'));
}

let midiClockEnabled = false, midiPulseCount = 0;

function handleMIDI(ev) {
  if (!ctx) return;
  const [st, d1, d2] = ev.data;
  // System realtime — handle before channel-stripping
  if (st === 0xF8) { // timing clock
    if (midiClockEnabled && mods.seq?.playing) {
      midiPulseCount++;
      if (midiPulseCount >= 12) { midiPulseCount = 0; mods.seq.fireTick(); }
    }
    return;
  }
  if (st === 0xFA || st === 0xFB) { // start / continue
    if (midiClockEnabled && mods.seq && !mods.seq.playing) {
      mods.seq.playing = true; midiPulseCount = 0;
      document.querySelector('#seq [data-play]')?.classList.add('on');
    }
    return;
  }
  if (st === 0xFC) { // stop
    if (midiClockEnabled && mods.seq) { mods.seq.playing = false; mods.adsr?.off(); }
    return;
  }
  const type = st & 0xF0;
  if (type === 0x90 && d2 > 0) {
    // Pad sampler — always active on notes 48-55
    if (d1 >= 48 && d1 <= 55) { mods.padsampler?.trigger(d1 - 48); return; }
    // MIDI looper pad control (notes 36-43 when MIDI PADS mode is active)
    if (mods.looper?.midiMode) {
      if (d1 >= 36 && d1 <= 39) { mods.looper.tracks[d1 - 36]?.recBtn.click(); return; }
      if (d1 >= 40 && d1 <= 43) { mods.looper.tracks[d1 - 40]?.playBtn.click(); return; }
    }
    let pitch = d1 - 69;
    if (mods.quant?.active) pitch = mods.quant.quantizeSemi(pitch);
    mods.vco?.setPitchCV(pitch);
    mods.vco2?.setPitchCV(pitch);
    mods.chord?.trigger(pitch);
    mods.adsr?.on(d2 / 127);
  } else if (type === 0x80 || (type === 0x90 && d2 === 0)) {
    mods.adsr?.off();
  } else if (type === 0xB0) {
    const v = d2 / 127;
    const sk = (id, val) => { if(knobRefs[id]) knobRefs[id].setVal(val); };
    if (d1===1||d1===74) { const c=20*Math.pow(1000,v); mods.vcf?.setCutoff(c); sk('vcf-cutoff',c); }
    if (d1===71)         { const r=0.1+v*24.9; mods.vcf?.setRes(r); sk('vcf-res',r); }
    if (d1===73)         { if(mods.adsr){ mods.adsr.A=0.001+v*3.999; drawEnv(); sk('adsr-A',mods.adsr.A); } }
    if (d1===72)         { if(mods.adsr){ mods.adsr.R=0.01+v*5.99;  drawEnv(); sk('adsr-R',mods.adsr.R); } }
    if (d1===7)          { if(masterOut) masterOut.gain.setTargetAtTime(0.1+v*1.4, ctx.currentTime, 0.01); }
    if (d1===64)         { v>=0.5 ? mods.adsr?.on() : mods.adsr?.off(); }
  }
}

// PRESET LIBRARY
// ═══════════════════════════════════════════════════════════════════════════════
function getPresets() { try { return JSON.parse(localStorage.getItem(PRESET_KEY))||[]; } catch { return []; } }
function savePresets(arr) { localStorage.setItem(PRESET_KEY, JSON.stringify(arr)); }

function refreshPresetDropdown() {
  const sel = document.getElementById('preset-sel');
  if(!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">— select preset —</option>';
  getPresets().forEach(p => {
    const o = document.createElement('option');
    o.value = p.name; o.textContent = p.name;
    sel.appendChild(o);
  });
  if(cur) sel.value = cur;
}

function savePreset() {
  const name = prompt('Preset name:', 'My Patch');
  if(!name || !name.trim()) return;
  const n = name.trim();
  const arr = getPresets();
  const idx = arr.findIndex(p => p.name === n);
  const notes = document.getElementById('notes-area')?.value || '';
  const entry = { name:n, config:getConfig(), notes };
  if(idx>=0) arr[idx]=entry; else arr.push(entry);
  savePresets(arr);
  refreshPresetDropdown();
  document.getElementById('preset-sel').value = n;
  setStatus(`Preset "${n}" saved ✓`);
}

function loadPreset() {
  const name = document.getElementById('preset-sel').value;
  if(!name) { setStatus('Select a preset first.'); return; }
  const p = getPresets().find(p=>p.name===name);
  if(p) { applyConfig(p.config); const el=document.getElementById('notes-area'); if(el) el.value=p.notes||''; setStatus(`Preset "${name}" loaded ✓`); }
}

function deletePreset() {
  const name = document.getElementById('preset-sel').value;
  if(!name) { setStatus('Select a preset to delete.'); return; }
  if(!confirm(`Delete preset "${name}"?`)) return;
  savePresets(getPresets().filter(p=>p.name!==name));
  refreshPresetDropdown();
  setStatus(`Preset "${name}" deleted`);
}

function exportPresets() {
  const arr = getPresets();
  if(!arr.length) { setStatus('No presets saved yet.'); return; }
  const blob = new Blob([JSON.stringify(arr,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `nm2-modsynth-presets-${Date.now()}.json`;
  a.click();
  setStatus(`${arr.length} preset(s) exported ✓`);
}

function openFactoryPicker() {
  let overlay = document.getElementById('factory-overlay');
  if(overlay){ overlay.remove(); return; }
  overlay = document.createElement('div');
  overlay.id = 'factory-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:#02020aee;z-index:800;overflow-y:auto;padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px;';
  const title = document.createElement('div');
  title.style.cssText = 'color:#ff00ff;font-size:13px;letter-spacing:6px;text-shadow:0 0 20px #ff00ff;margin-bottom:8px;';
  title.textContent = 'nm² patch library';
  const sub = document.createElement('div');
  sub.style.cssText = 'color:#555;font-size:8px;letter-spacing:3px;margin-bottom:16px;';
  sub.textContent = 'CLICK ANY PATCH TO LOAD — CURRENT STATE WILL BE REPLACED';
  const grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;width:100%;max-width:860px;';
  FACTORY_PRESETS.forEach((p,i) => {
    const card = document.createElement('div');
    card.style.cssText = 'background:#0a0a1a;border:1px solid #ff00ff33;border-radius:4px;padding:12px 14px;cursor:pointer;transition:border-color .15s,box-shadow .15s;';
    card.addEventListener('mouseenter',()=>{ card.style.borderColor='#ff00ff'; card.style.boxShadow='0 0 12px #ff00ff44'; });
    card.addEventListener('mouseleave',()=>{ card.style.borderColor='#ff00ff33'; card.style.boxShadow='none'; });
    card.innerHTML = `<div style="color:#ff00ff;font-size:9px;letter-spacing:3px;margin-bottom:6px;">${String(i+1).padStart(2,'0')} ${p.name}</div><div style="color:#666;font-size:8px;line-height:1.5;">${p.desc}</div>`;
    card.addEventListener('click', () => {
      if(!ctx){ setStatus('Power on first.'); overlay.remove(); return; }
      applyConfig(p.cfg);
      // Auto-fetch and load sample if preset specifies one
      if (p.cfg.sampler?.sampleUrl) {
        setStatus(`Loading sample…`);
        fetch(p.cfg.sampler.sampleUrl)
          .then(r => { if(!r.ok) throw new Error(r.status); return r.arrayBuffer(); })
          .then(ab => ctx.decodeAudioData(ab))
          .then(buf => {
            mods.sampler.buffer = buf;
            mods.sampler.fileName = p.cfg.sampler.sampleUrl.split('/').pop();
            mods.sampler.looping  = p.cfg.sampler.loop  ?? true;
            mods.sampler.speedVal = p.cfg.sampler.speed ?? 1;
            mods.sampler.pitchVal = p.cfg.sampler.pitch ?? 0;
            mods.sampler._onLoad && mods.sampler._onLoad();
            mods.sampler.play();
            setStatus(`Patch loaded: ${p.name}`);
          })
          .catch(e => { console.warn('Sample auto-load failed:', e); setStatus(`Patch loaded: ${p.name} — load sample manually`); });
      } else {
        setStatus(`Patch loaded: ${p.name}`);
      }
      overlay.remove();
    });
    grid.appendChild(card);
  });
  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn';
  closeBtn.textContent = '✕ CLOSE';
  closeBtn.style.cssText = 'margin-top:8px;padding:8px 24px;font-size:10px;';
  closeBtn.addEventListener('click',()=>overlay.remove());
  overlay.appendChild(title); overlay.appendChild(sub); overlay.appendChild(grid); overlay.appendChild(closeBtn);
  document.body.appendChild(overlay);
}

function randomPatch() {
  if(!ctx){ setStatus('Power on first.'); return; }
  const sk = (id, v) => { if(knobRefs[id]) knobRefs[id].setVal(v); };
  const rnd = (a,b) => a + Math.random()*(b-a);
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];

  // VCF — musically useful ranges
  const cut = rnd(200,8000);  mods.vcf.setCutoff(cut); sk('vcf-cutoff',cut);
  const res = rnd(0.5,8);     mods.vcf.setRes(res);    sk('vcf-res',res);
  const vcfType=pick(['lowpass','lowpass','lowpass','highpass','bandpass']); mods.vcf.setType(vcfType); sk('vcf-type',vcfType);

  // LFO 1 & 2 — different rates for movement complexity
  const rates = [0.1,0.2,0.3,0.5,1,2,3,5,8];
  const r1=pick(rates)*rnd(0.7,1.4);  mods.lfo.setRate(r1); sk('lfo-rate',r1);
  const d1=rnd(50,1000);              mods.lfo.setDepth(d1); sk('lfo-depth',d1);
  const lfoType=pick(['sine','sine','triangle','square']); mods.lfo.setType(lfoType); sk('lfo-wave',lfoType);
  const r2=pick(rates)*rnd(0.7,1.4);  mods.lfo2.setRate(r2); sk('lfo2-rate',r2);
  const d2=rnd(20,600);               mods.lfo2.setDepth(d2); sk('lfo2-depth',d2);
  const lfo2Type=pick(['sine','sine','triangle','square']); mods.lfo2.setType(lfo2Type); sk('lfo2-wave',lfo2Type);

  // ADSR — biased toward short attack, variable release
  const A=0.001+Math.random()*Math.random()*2; mods.adsr.A=A; sk('adsr-A',A);
  const D=rnd(0.05,0.6);                        mods.adsr.D=D; sk('adsr-D',D);
  const S=rnd(0.2,0.9);                         mods.adsr.S=S; sk('adsr-S',S);
  const R=0.05+Math.random()*Math.random()*4;   mods.adsr.R=R; sk('adsr-R',R);
  drawEnv();

  // VCA
  const g=rnd(0.5,1.0); mods.vca.setGain(g); sk('vca-gain',g);

  // Delay
  const dt=rnd(0.04,1.2); mods.delay.setTime(dt); sk('delay-time',dt);
  const fb=rnd(0,0.7);    mods.delay.setFeedback(fb); sk('delay-fb',fb);
  const dm=rnd(0,0.55);   mods.delay.setMix(dm); sk('delay-mix',dm);

  // Reverb
  const rs=rnd(0.5,7);   mods.reverb.setSize(rs); sk('reverb-size',rs);
  const rd=rnd(0.2,0.9); mods.reverb.setDecay(rd); sk('reverb-decay',rd);
  const rm=rnd(0.1,0.7); mods.reverb.setMix(rm); sk('reverb-mix',rm);

  // VCO waveforms
  const vcoType=pick(['sawtooth','sawtooth','square','triangle','sine']); mods.vco.setType(vcoType); sk('vco-wave',vcoType);
  const vco2Type=pick(['sawtooth','sawtooth','square','triangle','sine']); mods.vco2.setType(vco2Type); sk('vco2-wave',vco2Type);
  const det=rnd(-30,30); mods.vco2.setDetune(det); sk('vco2-detune',det);

  // Attenuverter
  const att=rnd(-2,2); mods.att.setAtt(att); sk('att-knob',att);
  const off=rnd(-0.5,0.5); mods.att.setOffset(off); sk('att-offset',off);

  // Chorus
  const chrRate=rnd(0.2,3); mods.chorus.setRate(chrRate); sk('chorus-rate',chrRate);
  const chrDep=rnd(0.1,0.7); mods.chorus.setDepth(chrDep); sk('chorus-depth',chrDep);
  const chrWid=rnd(0.5,1);   mods.chorus.setWidth(chrWid); sk('chorus-width',chrWid);
  const chrMix=rnd(0.2,0.7); mods.chorus.setMix(chrMix);   sk('chorus-mix',chrMix);

  // Tape
  const tDrive=rnd(1,6); mods.tape.setDrive(tDrive); sk('tape-drive',tDrive);
  const tWow=rnd(0,0.6); mods.tape.setWow(tWow);     sk('tape-wow',tWow);
  const tMix=rnd(0.2,0.8); mods.tape.setMix(tMix);   sk('tape-mix',tMix);

  // Wavefolder
  const wfFold=rnd(1,5); mods.wavefolder.setFold(wfFold); sk('fold-fold',wfFold);
  const wfSymm=rnd(-0.3,0.3); mods.wavefolder.setSymm(wfSymm); sk('fold-symm',wfSymm);

  // Phaser
  const phRate=rnd(0.05,2); mods.phaser.setRate(phRate); sk('phaser-rate',phRate);
  const phDep=rnd(0.2,0.8); mods.phaser.setDepth(phDep); sk('phaser-depth',phDep);
  const phMix=rnd(0.3,0.8); mods.phaser.setMix(phMix);   sk('phaser-mix',phMix);

  // Panner
  const panRate=rnd(0.03,0.8); mods.panner.setRate(panRate); sk('pan-rate',panRate);
  const panDep=rnd(0.3,0.9);   mods.panner.setDepth(panDep); sk('pan-depth',panDep);

  // Chord
  const chordTypes = ['maj','min','min','sus2','sus4','maj7','min7'];
  const chordPick = pick(chordTypes); mods.chord.setChord(chordPick); sk('chord-type-sel', chordPick);
  const cSpread = rnd(0, 20); mods.chord.setSpread(cSpread); sk('chord-spread', cSpread);
  const cLevel  = rnd(0.3, 0.8); mods.chord.setLevel(cLevel); sk('chord-level', cLevel);

  // Microcosm
  const mcBlend = rnd(0.4, 0.9);  mods.microcosm.setBlend(mcBlend);   sk('mc-blend', mcBlend);
  const mcSize  = rnd(0.03, 0.35); mods.microcosm.setGrainSz(mcSize); sk('mc-size', mcSize);
  const mcScat  = rnd(0, 0.8);     mods.microcosm.setScatter(mcScat); sk('mc-scat', mcScat);
  const mcPitch = pick([0.5, 0.75, 1.0, 1.0, 1.0, 1.5, 2.0]); mods.microcosm.setPitch(mcPitch); sk('mc-pitch', mcPitch);
  const mcDns   = rnd(4, 30);      mods.microcosm.setDensity(mcDns); sk('mc-dnsty', mcDns);
  const mcMode=pick(['granular','granular','shimmer','glitch']); mods.microcosm.setMode(mcMode); sk('mc-mode-sel',mcMode);

  // Sequencer steps — pentatonic scale, 60-80% active, random probability
  const penta=[0,2,4,7,9,12,14,16,-5,-3,-12,-7,-5];
  mods.seq.steps.forEach((s,i)=>{
    s.on = Math.random()>0.3;
    s.pitch = pick(penta);
    s.prob = Math.random()>0.3 ? 1.0 : rnd(0.5,0.9);
    const tog=document.querySelector(`#ss${i} .step-tog`);
    if(tog) tog.classList.toggle('on',s.on);
    const pr=knobRefs[`seq-prob-${i}`]; if(pr) pr.setVal(s.prob);
  });

  // Arpeggiator
  const arpChord=pick(['maj','min','sus2','min7','maj7']); mods.arp.setChord(arpChord); sk('arp-chord-sel',arpChord);
  const arpDir=pick(['up','up','ud','rnd']); mods.arp.setDir(arpDir); sk('arp-dir-sel',arpDir);
  const arpRate=pick([1,2,2,4]); mods.arp.setRateMul(arpRate); sk('arp-rate-sel',arpRate);
  const arpOct=pick([1,1,2]); mods.arp.setOctaves(arpOct); sk('arp-oct-sel',arpOct);
  const arpRoot=Math.round(rnd(-7,7)); mods.arp.setRoot(arpRoot); sk('arp-root',arpRoot);

  // Sidechain
  const scAtk=rnd(0.005,0.3); mods.sidechain.setAttack(scAtk); sk('sc-attack',scAtk);
  const scRel=rnd(0.05,1.0);  mods.sidechain.setRelease(scRel); sk('sc-release',scRel);
  const scAmt=rnd(0.5,3.0);   mods.sidechain.setAmount(scAmt);  sk('sc-amount',scAmt);

  // Randomize cables — clear user cables, re-add defaults + crazy extras
  [...cables].forEach(c => delCable(c));
  // Redraw the 4 hardwired defaults visually
  setTimeout(()=>{
    addCable('vco-out','vcf-in','#ff6600');
    addCable('vcf-out','vca-in','#ff00ff');
    addCable('adsr-out','vca-env','#ffff00');
    addCable('lfo-out','vcf-cv','#00ffff');
    // Pick 3–6 extra cables from a musically interesting pool
    const extraPool = [
      ['vca-out','reverb-in','#00ffff'],
      ['vca-out','delay-in','#88aaff'],
      ['vca-out','chorus-in','#ff4488'],
      ['vca-out','tape-in','#ffff00'],
      ['vca-out','phaser-in','#00ff88'],
      ['vco2-out','mix-b-in','#ff6600'],
      ['noise-out','mix-c-in','#88aaff'],
      ['chord-out','mix-b-in','#ff00ff'],
      ['lfo2-out','vco2-cv','#ff4488'],
      ['lfo2-out','att-in','#00ffff'],
      ['att-out','vcf-cv','#00ff88'],
      ['sandh-out','vcf-cv','#ff00ff'],
      ['clk-div4','sandh-in','#88aaff'],
      ['sc-out','vca-env','#ff6600'],
      ['vca-out','fold-in','#00ff88'],
      ['fold-out','reverb-in','#00ffff'],
      ['vca-out','microcosm-in','#ff00ff'],
      ['microcosm-out','reverb-in','#00ffff'],
      ['mix-out','reverb-in','#ff4488'],
      ['lfo2-out','vcf-cv','#ff00ff'],
    ];
    const shuffled = [...extraPool].sort(()=>Math.random()-0.5);
    const count = 3 + Math.floor(Math.random()*4);
    shuffled.slice(0, count).forEach(([f,t,c]) => addCable(f,t,c));
    updateCables();
  }, 80);

  setStatus('Patch randomized — explore!');
}

function buildFlowDiagram() {
  const body = document.getElementById('flow-body');
  if (!body) return;
  body.innerHTML = '';

  // Always-on defaults
  const defs = document.createElement('div');
  defs.style.cssText = 'color:#1e1e3a;font-size:7px;line-height:2.2;padding-bottom:6px;margin-bottom:6px;border-bottom:1px solid #ffffff08;';
  defs.innerHTML = '<div style="color:#2a2a4a;letter-spacing:2px;margin-bottom:2px;">DEFAULT</div>' +
    ['VCO → VCF → VCA → OUT','ADSR → VCA ENV','LFO → VCF CUT'].map(s=>`<div>${s}</div>`).join('');
  body.appendChild(defs);

  if (cables.length === 0) {
    const em = document.createElement('div');
    em.style.cssText = 'color:#1a1a32;font-size:7px;font-style:italic;';
    em.textContent = '— no extra cables —';
    body.appendChild(em);
    return;
  }

  // Build lookup: toId → cable (each input has at most one cable)
  const allToIds = new Set(cables.map(c => c.toId));
  const rendered = new Set();

  // Chain starts = cables whose fromId is not anyone else's toId
  cables.filter(c => !allToIds.has(c.fromId)).forEach(startCable => {
    const chain = []; let cur = startCable;
    while (cur && !rendered.has(cur.toId)) {
      rendered.add(cur.toId); chain.push(cur);
      cur = cables.find(c => c.fromId === cur.toId && !rendered.has(c.toId));
    }
    renderFlowChain(body, chain);
  });
  // Remaining (mid-chain starts, e.g. LFO → VCF CV)
  cables.filter(c => !rendered.has(c.toId)).forEach(c => renderFlowChain(body, [c]));
}

function renderFlowChain(container, chain) {
  if (!chain.length) return;
  const row = document.createElement('div'); row.className = 'flow-chain';
  const col = chain[0].color;
  const mkNode = id => {
    const n = document.createElement('span'); n.className = 'flow-node';
    n.style.cssText = `border-color:${col}44;color:${col};`;
    n.textContent = FLOW_NAMES[id] || id; return n;
  };
  const mkArr = () => {
    const a = document.createElement('span'); a.className = 'flow-arr';
    a.style.color = col + '77'; a.textContent = '→'; return a;
  };
  row.appendChild(mkNode(chain[0].fromId));
  chain.forEach(c => { row.appendChild(mkArr()); row.appendChild(mkNode(c.toId)); });
  container.appendChild(row);
}

    { title:'Shape the Envelope', hl:['adsr'],
      text:'Set ADSR ATTACK to 0.4s, RELEASE to 2s. Notes now swell in and fade out softly. Long attack + long release = phrases that blur and overlap. Drop BPM to 70 and feel how the sequencer becomes more meditative. This slow envelope is the signature of expressive slow ambient synthesis.' },
    { title:'Add Reverb', hl:['vca','reverb'],
      text:'Patch VCA OUT → Reverb IN, Reverb OUT anywhere (for now back to VCF IN to complete the circuit, or disconnect VCA from master first). Set Reverb SIZE to 6, DECAY to 0.85, MIX to 0.65. Your drone now lives in an enormous hall. Congratulations — ambient drone complete.' },
  ]},
  { name:'2 — Slow Ambient Pad', steps:[
    { title:'Two Oscillators', hl:['vco','vco2','mixer','vcf'],
      text:'Remove the VCO→VCF cable (click it). Patch VCO OUT → Mixer A IN, VCO2 OUT → Mixer B IN, Mixer OUT → VCF IN. Set VCO2 DETUNE to +7 cents. Two oscillators barely out of tune with each other create a beating, warm, analog chorus — this is the fundamental richness of hardware synthesis.' },
    { title:'Slow Attack + Long Release', hl:['adsr','seq'],
      text:'Set ADSR ATTACK to 1.5s, RELEASE to 4.5s. Drop BPM to 58. Notes now emerge from silence like breath and decay long after the sequencer moves on. Adjacent notes overlap and blend. This blurring of notes into each other is the defining sound of slow ambient synthesis.' },
    { title:'Dual LFO Movement', hl:['lfo','lfo2','vca'],
      text:'LFO is already sweeping VCF cutoff. Now patch LFO2 OUT → VCA ENV. Set LFO2 RATE to 0.2 Hz, DEPTH to 600. Volume now heaves slowly in and out. Two LFOs at different rates produce complex, non-repeating movement — the sound never loops exactly. This is living texture.' },
    { title:'Cathedral Reverb', hl:['reverb','microcosm'],
      text:'Patch VCA OUT → Reverb IN, Reverb OUT to master. Set SIZE to 7.5, DECAY to 0.9, MIX to 0.75. For an extra layer of depth: insert the MICROCOSM between VCA and Reverb (VCA OUT → MICROCOSM IN → MICROCOSM OUT → REVERB IN). Set MICROCOSM to SHIM mode, BLEND 0.6. The granular shimmer feeds into the reverb and becomes part of the space itself — this is the complete ambient architecture.' },
    { title:'Pentatonic Sequence', hl:['seq'],
      text:'Edit sequencer pitches to 0, 2, 4, 7, 9, 0, 4, 7 (all consonant pentatonic intervals). Toggle step 6 and 7 off for space. At slow BPM with long envelopes, even simple patterns sound compositional. Silence between notes is as important as the notes themselves.' },
  ]},
  { name:'3 — Generative S&H Filter', steps:[
    { title:'What is Sample & Hold?', hl:['lfo','sandh'],
      text:'Sample & Hold grabs the CV value at its input at each trigger pulse and freezes it until the next trigger. Connect LFO OUT → S&H IN. Set LFO RATE to 7 Hz (fast — so the value at each trigger is unpredictable). Set the S&H TRIGGER button to ÷4.' },
    { title:'Route S&H to Filter', hl:['sandh','vcf'],
      text:'Patch S&H OUT → VCF CV. Every 4 sequencer steps, the filter jumps to wherever the fast LFO happened to be at that moment. Result: rhythmically-locked random filter steps. The filter changes in time with the music but you can\'t predict the exact values. This is the heart of generative music.' },
    { title:'Tune the Randomness', hl:['lfo','sandh','vcf'],
      text:'LFO rate controls unpredictability: fast (10+ Hz) = very random, slow (1 Hz) = gradual correlated change. LFO DEPTH controls the range of filter movement. The TRIGGER selector (STEP/÷2/÷4/÷8) sets how often the filter jumps. Explore all combinations — you\'re programming a generative system.' },
    { title:'Insert an Attenuverter', hl:['sandh','att','vcf'],
      text:'Route: S&H OUT → ATT IN, ATT OUT → VCF CV. The ATT knob now scales how much S&H reaches the filter (0 = none, +1 = full, -1 = inverted). This is the attenuverter\'s purpose: precise control over modulation depth without touching the source. Essential glue module.' },
    { title:'Tempo-Locked Echo', hl:['delay'],
      text:'Patch VCA OUT → Delay IN, Delay OUT to master. Click BPM SYNC on the Delay. The echo repeats at a dotted-8th interval — rhythmically locking to your tempo. Combined with generative filter steps, every loop sounds different but feels intentional. This is the Buchla tradition.' },
  ]},
  { name:'4 — Percussive Noise Hit', steps:[
    { title:'Noise Source', hl:['noise','mixer'],
      text:'Click the NOISE module label — read the tooltip. Switch to PINK noise (warmer, rolls off highs — natural like rain or breath). Patch NOISE OUT → Mixer C IN. Set Mixer C to 0.6. Pink noise is the basis of snares, hi-hats, cymbals, wind, and countless electronic percussion sounds.' },
    { title:'Percussive Envelope', hl:['adsr'],
      text:'Set ADSR: ATTACK = 0.001 (instant), DECAY = 0.08, SUSTAIN = 0, RELEASE = 0.04. The envelope fires and dies immediately — a sharp click. This is the classic drum envelope shape: fast attack, zero sustain. Every sequencer step produces a brief transient hit.' },
    { title:'Bandpass the Noise', hl:['vcf','mixer'],
      text:'Patch Mixer OUT → VCF IN (remove existing VCF IN cable first). Set VCF to BANDPASS, CUTOFF to ~2500 Hz, RES to ~9. Bandpass + noise = pitched resonant drum. Lower cutoff = deep bass drum body. Higher cutoff = metallic hi-hat shimmer. RES creates the ring of a hand drum.' },
    { title:'Carve a Rhythm', hl:['seq'],
      text:'While the sequencer plays, toggle steps on and off live. Try keeping steps 1, 3, 5, 7 (even beats) or 1, 2, 5, 6 (syncopated). The space between hits is the groove. Toggle while playing — this is live performance on a step sequencer. Notice how different patterns feel.' },
    { title:'Layer Tone + Noise', hl:['vco','noise','mixer'],
      text:'Patch VCO OUT → Mixer A IN too. VCO provides pitched body, noise provides air and texture — exactly how a real drum machine works. Use Mixer A and C levels to blend. Low VCO + high noise = breathy snare. High VCO + low noise = resonant tom. This layering is sound design.' },
  ]},
  { name:'5 — Scales, Chords & Living Melody', steps:[
    { title:'Why Chords Change Everything', hl:['chord','mixer','vcf'],
      text:'Everything you\'ve built so far plays one note at a time — monophonic synthesis. Real ambient music and lush electronic pads are built on chords: three or more voices sounding simultaneously. The CHORD module contains 3 internal oscillators that track the sequencer pitch and add musical intervals above it. Patch CHORD OUT → Mixer B IN (or directly into VCF IN alongside VCO1). The chord will automatically follow every sequencer step without any extra patching. Notice the CHORD module also responds to MIDI notes — play a few on a keyboard if you have one.' },
    { title:'Choose Your Chord Type', hl:['chord'],
      text:'Select MIN (minor triad). Listen — the sound darkens and becomes more emotional. Switch to MAJ — brighter, resolved, happier. Try SUS2: notice how it feels ambiguous, neither happy nor sad, just floating? Sus chords have no third (the note that defines major/minor), so they don\'t commit to a mood. Sus chords are used constantly in ambient music because that unresolved quality creates beautiful tension. Try MAJ7 — the major seventh interval adds a dreamy, jazz-inflected quality. MIN7 is the choice for melancholic chord pads.' },
    { title:'Spread: From Digital to Analog', hl:['chord'],
      text:'Turn the CHORD SPREAD knob from 0 all the way to 15. At 0 the three voices are perfectly in tune — clean but electronic. As you increase SPREAD, the voices detune slightly against each other (up to 30 cents). Listen to how the chord thickens and gains a warm, beating quality — the waveforms phase against each other, creating a natural chorus effect. This is exactly what makes hardware analog synths sound "warm" compared to digital: no two oscillators are perfectly in tune. Set SPREAD to 8–12 for the ideal balance between warmth and intonation.' },
    { title:'Lock to a Scale', hl:['quant','seq'],
      text:'Now activate the QUANTIZER. Click LOCK — the button lights up. Select PENT (pentatonic) and ROOT = A. Press play on the sequencer. Every note in the pattern is now snapped to the A pentatonic scale. Change some sequencer step pitches wildly — they all land on musical notes. Switch the scale to MINOR while it\'s playing. The same rhythm, completely different harmonic character. This is the quantizer\'s superpower: you can explore scales by just clicking buttons while the music plays. Lydian has a dreamy floating quality. Dorian is the scale of electronic music (jazz-inflected, cinematic, most ambient).' },
    { title:'Generative Melody with RAND Mode', hl:['quant','seq'],
      text:'Click RAND on the QUANTIZER (LOCK also lights). Now every sequencer step is replaced with a RANDOM note from the selected scale — the sequencer pattern no longer matters. Listen: a different melody plays every loop, but it always stays in key. The note display shows each note as it fires. This is generative melody: you set the rules (scale + tempo), the system generates the music. Drop BPM to 60. Set ADSR ATTACK to 0.5s, RELEASE to 3s. The random notes overlap and blur into each other. Change the scale from PENT to DORIAN. You\'re now generating melodies in the style of algorithmic composition.' },
    { title:'The Full Harmony Architecture', hl:['vco','chord','quant','mixer','vcf','reverb'],
      text:'Bring everything together. Keep QUANTIZER on RAND + DORIAN + A. VCO1 plays the lead melody (monophonic, single voice). CHORD plays the harmony (three voices, tracking the same pitch). Both go through Mixer → VCF → VCA → Reverb. Set CHORD to MIN7, SPREAD 10. Set reverb SIZE to 7, DECAY to 0.9. BPM to 65, ATTACK to 1s, RELEASE to 4s. LFO slowly sweeping the filter. Now you have: random in-key melody + harmonic chord voicing + slow filter movement + long reverb. This is a complete ambient pad. Every loop sounds composed, nothing repeats exactly. This is the architecture of contemporary ambient music.' },
  ]},
  { name:'6 — Microcosm: Granular Ambient', steps:[
    { title:'What is the Microcosm?', hl:['microcosm'],
      text:'The MICROCOSM module is a granular processor — it records a rolling 4-second loop of whatever audio enters it, then plays back overlapping fragments of that recording called grains. Each grain is a tiny Hann-windowed slice of sound, 20–500ms long. Dozens overlap simultaneously, blurring the source into a shimmering cloud. It\'s inspired by the Hologram Electronics Microcosm pedal, used by ambient artists to turn any sound into an infinite atmospheric texture. You\'ll use it to transform the synth\'s output into something that sounds much larger than it is.' },
    { title:'Route the Signal Chain', hl:['vca','microcosm'],
      text:'The default patch sends VCA OUT directly to the master output. We\'re going to insert the Microcosm between VCA and the output. First: click the VCA OUT patch point (orange). Now click MICROCOSM IN (yellow) — a cable connects them. Next: click MICROCOSM OUT (orange), then click the VCF IN or any already-connected input to reroute output through the Microcosm. The simplest approach: leave the existing VCA→master wire and add MICROCOSM IN from VCA OUT too — the module runs in parallel. You\'ll hear the dry sound plus the granular cloud simultaneously.' },
    { title:'Your First Grain Cloud', hl:['microcosm'],
      text:'The sequencer should be playing. On the MICROCOSM: make sure GRAN mode is selected (button lit). Set BLEND to 0.65. Set SIZE to around 0.15 (15% across the knob). Set SCAT to 0.4. Set DNSTY to about 15 grains/sec. Set PITCH to 1.0 (center). You should hear the synth\'s notes plus a soft, blurry cloud of sound following them with a slight delay. That cloud is dozens of tiny fragments of recent audio overlapping — the granular texture. It sounds like the notes are leaving a vapor trail.' },
    { title:'Sculpt with SIZE and SCAT', hl:['microcosm'],
      text:'SIZE controls grain length: turn it left toward 0.02s — the cloud gets grainy, buzzy, granulated. Turn it right toward 0.5s — the cloud becomes smooth, smeared, almost reverb-like. SCAT controls how far back into the recording buffer grains are read: low SCAT = grains from the present moment (coherent, tight). High SCAT = grains from up to 2 seconds ago (fragmented, time-blurred). Try maximum SCAT with medium SIZE. Notes from two seconds ago are bleeding into right now. This is the essence of granular synthesis: time becomes malleable.' },
    { title:'The HOLD Button — Freeze Time', hl:['microcosm'],
      text:'This is the most dramatic feature. While a note or chord is sustained, press ◈ HOLD. The recording buffer freezes at that instant — the Microcosm is now looping grains over that frozen moment indefinitely, with no new audio writing in. The sequencer can stop; silence can fall; but the granular cloud of that held moment sustains forever. Press HOLD again to unfreeze and let new audio back in. In live performance, HOLD lets you capture and sustain a beautiful moment while the rest of the patch evolves around it. It\'s one of the most expressive gestures in modern ambient performance.' },
    { title:'Shimmer Mode + Reverb', hl:['microcosm','reverb'],
      text:'Switch MICROCOSM to SHIM mode. SHIM is granular but every grain plays back one octave higher — the Microcosm adds a shimmering upper halo one octave above the source. Set BLEND to 0.75, SIZE to 0.2, SCAT to 0.5, PITCH to 1.0. Now chain it into reverb: patch MICROCOSM OUT → REVERB IN, REVERB OUT to master. Set Reverb SIZE to 7, DECAY to 0.9, MIX to 0.75. The shimmer grains bloom upward into the reverb tail, creating an almost orchestral wash of texture. This combination — granular shimmer into long reverb — is the signature sound of contemporary ambient music.' },
    { title:'Build the Full Ambient Track', hl:['vco','vco2','mixer','adsr','lfo','lfo2','microcosm','reverb','seq'],
      text:'Put everything together for a complete ambient composition. Set BPM to 52. Set ADSR: ATTACK = 2s, DECAY = 0.3s, SUSTAIN = 0.8, RELEASE = 5s. Patch VCO OUT → Mixer A IN, VCO2 OUT → Mixer B IN, Mixer OUT → VCF IN. Set VCO2 DETUNE to +5 cents. Set LFO RATE to 0.15 Hz, DEPTH to 400 (slow filter sweep). Patch LFO2 OUT → VCA ENV at RATE 0.08 Hz, DEPTH 500 (very slow volume swell). Sequencer pitches: 0, 0, 7, 12, 7, 0, 5, 0. Keep steps 1, 2, 3, 5 on, rest off. MICROCOSM in SHIM mode → REVERB → master. Press HOLD when a chord blooms to its peak. Let it run without touching anything. The patch breathes on its own — two LFOs, a granular halo, a cathedral reverb, notes emerging and dissolving. This is ambient music as a living system.' },
  ]},
  { name:'7 — Stereo Width & Warmth', steps:[
    { title:'Why Mono Feels Flat', hl:['vca','chorus'],
      text:'Everything built so far plays in mono — a single point of sound. Real music fills a stereo field: sounds come from left, right, center, near, far. Ambient music especially relies on spatial width for its immersive quality. Ambient music is spatial — it surrounds you. Expressive live ambient sets feel enormous because every sound occupies its own position in the stereo field. The good news: three modules (CHORUS, PANNER, PHASER) each add stereo dimension through different mechanisms. We\'ll use all three.' },
    { title:'Chorus: Width from a Single Voice', hl:['chorus'],
      text:'Patch VCA OUT → CHORUS IN, CHORUS OUT → Reverb IN (or master). Set CHORUS RATE to 0.8 Hz, DEPTH to 0.3, WIDTH to 0.9, MIX to 0.5. Listen — the formerly mono signal now sits wide in the stereo field. The two chorus voices are slightly detuned against each other and panned opposite; their phase drift creates a natural, beating warmth. This is exactly how vintage string synthesizers (Solina, Korg PE-1000) achieved their famous lush width. Turn WIDTH down to 0 — mono again. Turn it back up — instant width. This knob is your stereo on/off switch.' },
    { title:'Tape: From Digital to Analog', hl:['tape'],
      text:'Patch VCA OUT → TAPE IN, TAPE OUT → CHORUS IN (chain them). Set TAPE DRIVE to 3, WOW to 0.25, MIX to 0.6. The tanh waveshaper adds even harmonics that digital oscillators naturally lack — the sound becomes warmer, slightly rounded, less perfectly defined. The WOW adds micro-pitch flutter like a real tape machine. Turn DRIVE up to 6 — hear it start to clip and saturate. The oscillator\'s waveform is being pushed beyond its linear range and folding back, adding harmonic complexity. This is why analog hardware "sounds better" — it\'s saturating constantly, adding richness at every stage.' },
    { title:'Phaser: The Breathing Pad', hl:['phaser'],
      text:'Add PHASER to the chain: TAPE OUT → PHASER IN → CHORUS IN. Set PHASER RATE to 0.15 Hz, DEPTH to 0.6, MIX to 0.65. The four all-pass filters sweep slowly across the frequency spectrum, creating traveling notches — dips in the frequency response that move upward and fold back. The result is a slow, swooshing quality, like the sound is breathing in and out. Classic ambient composers built entire albums from this effect. Slow phasers make static chords feel alive. This is "movement without modulation" — the sound changes without any knob moving.' },
    { title:'Auto-Panner: Spatial Motion', hl:['panner'],
      text:'Insert the PANNER anywhere in your chain — try after CHORUS. Set RATE to 0.07 Hz (very slow) and DEPTH to 0.5. At this rate, the sweep takes over 14 seconds for a full cycle — not audible as panning, just felt as a gradual drift from left to right and back. Close your eyes and listen. The sound moves through space. This is the subconscious dimension of stereo: the brain uses spatial position to separate sounds, so a moving sound feels different from a static one even when the difference is subtle. At 0.5 Hz the sweep becomes more obvious — try it on a pad that needs rhythmic variation without a hard beat.' },
    { title:'The Full Character Chain', hl:['vca','tape','chorus','phaser','reverb'],
      text:'The complete ambient character chain: VCA OUT → TAPE IN → TAPE OUT → PHASER IN → PHASER OUT → CHORUS IN → CHORUS OUT → REVERB IN → REVERB OUT → master. Set Tape DRIVE 2.5, WOW 0.2, MIX 0.55. Phaser RATE 0.1 Hz, DEPTH 0.5, MIX 0.6. Chorus RATE 0.7, DEPTH 0.25, WIDTH 0.85, MIX 0.55. Reverb SIZE 6, DECAY 0.88, MIX 0.7. Now set ADSR ATTACK to 1.5s, RELEASE to 4s, BPM to 60. Turn QUANTIZER to RAND + DORIAN. The signal passes through: warmth (tape) → breathing (phaser) → width (chorus) → space (reverb). This is a finished ambient sound — it could go directly on a record.' },
  ]},
  { name:'8 — Rhythm, Arpeggios & Living Sequences', steps:[
    { title:'Why Sequences Feel Mechanical', hl:['seq'],
      text:'A sequence that repeats identically every 8 steps feels programmed and robotic. Real music — even electronic music — has variation: some notes dropped, some added, phrases that feel like they\'re moving somewhere rather than looping. The sequencer now has two tools to fix this: per-step Probability and Pattern Direction. The P% knob on each step sets the chance that step fires. The DIR buttons change how the sequencer moves through the pattern. These two changes transform a loop into a composition.' },
    { title:'Per-Step Probability', hl:['seq'],
      text:'Look at each sequencer step — there are now three controls: the on/off toggle, the pitch knob, and a small P% knob. P% = 100% means the step always fires (the default). Set a few steps to 70%: they now fire roughly 70% of the time, creating variation without destroying the pattern. Set one or two steps to 40%: they become rare, dramatic punctuation. The result: the same sequence sounds slightly different every loop, as if a musician is making spontaneous choices. Generative systems rely heavily on probabilistic firing — the pattern is the same, the variation is what makes it feel alive.' },
    { title:'Pattern Direction', hl:['seq'],
      text:'The DIR buttons below the grid change how the sequencer moves. FWD (default): steps 1→8 left to right. REV: steps 8→1 right to left — the same pattern backwards, which often sounds surprisingly musical. P-P (ping-pong): steps go 1→8→7→6...→2→1 and back, giving a 14-step feel from 8 notes. RND: picks a random step each tick — completely generative, never repeats. Try P-P at a slow BPM with REVERB SIZE 5 and ADSR RELEASE 3s: adjacent notes in both directions overlap into a shimmering cloud. This is how 8 notes become an endless-seeming composition.' },
    { title:'The Arpeggiator: Chords in Motion', hl:['arp'],
      text:'The ARPEGGIO module takes a chord shape and steps through its intervals rhythmically — turning harmony into melody. Set CHORD to MIN7, DIRECTION to U/D (up then down), RATE to ×2 (8th notes), OCTAVES to 2. Click ▶ ARP. You\'ll hear the min7 chord spread across two octaves in a flowing ascending-descending pattern. The arpeggio drives VCO pitch and triggers the ADSR, exactly like the sequencer does — but it\'s never the same as the sequence, so they layer without clashing. Stop the sequencer and let the arpeggiator run alone: even a simple C major arpeggio through a long reverb tail (SIZE 6, DECAY 0.9, MIX 0.8) becomes something beautiful.' },
    { title:'Sidechain: The Pumping Pad', hl:['sidechain','vca'],
      text:'The SIDECHAIN module is an envelope follower: it converts the amplitude of any audio input into a CV signal. Patch VCA OUT → SC IN. Then patch SC ENV → VCA ENV. Now the VCA\'s volume tracks the amplitude of its own output — which creates a feedback that causes the sound to pump rhythmically as it interacts with the ADSR. For the classic sidechain pumping feel: Patch CLK ÷4 → through ADSR (short attack 0.001, short release 0.1) → into SC IN instead. The SC ENV output follows the clock pulses. Patch SC ENV → VCA ENV (or Attenuverter → VCA ENV for scaled depth). Set SC ATTACK to 0.005, RELEASE to 0.15, AMT to 2. The pad now pumps — breathing in time with the clock. This is the defining production technique of modern electronic music.' },
    { title:'The Complete Rhythmic Composition', hl:['seq','arp','sidechain','quantzr','reverb'],
      text:'Combine everything for a complete composition: Set QUANTIZER to RAND + MINOR at root A. Set SEQ direction to P-P, drop 3-4 step probabilities to 65%. Set ARP to MIN7, U/D, ×4 rate, 2 octaves — start both SEQ and ARP running simultaneously. The sequencer plays slow, probabilistic notes; the arpeggiator fills the gaps with fast melodic movement. Route both through the character chain (TAPE → PHASER → CHORUS → REVERB). Set ADSR ATTACK 0.8s, RELEASE 3s. Add sidechain pumping from CLK ÷4. Set BPM to 72. This is a complete piece of electronic ambient music — two independent voices (sequencer + arpeggio), probabilistic variation, harmonic quantization, and spatial effects — in a single browser tab.' },
  ]},
  { name:'9 — Record a Full Track', steps:[
    { title:'Thinking Like a Composer', hl:[],
      text:'Every great ambient track has an arc: it begins somewhere, builds toward something, reaches a peak, and resolves. A great ambient live set follows this shape instinctively — a drone becomes a melody, textures accumulate, granular processing transforms everything into abstraction, and then it strips back. We\'ll build this arc in four layers. Each layer is added and removed through the Scenes system (A B C D buttons in the toolbar). Scene A = sparse intro. Scene B = chord pad added. Scene C = arpeggiated melody + full effects chain. Scene D = granular climax. This tutorial guides you through setting up and transitioning between them.' },
    { title:'Layer 1: The Drone Foundation', hl:['vco','adsr','reverb'],
      text:'Start with a single tone that establishes the harmonic center. Set VCO to sine wave, octave 3. ADSR: ATTACK 2.5s, DECAY 0.5s, SUSTAIN 0.9, RELEASE 5s. Start the sequencer at BPM 65 with only step 1 active (pitch 0). Route VCO → VCF → VCA → REVERB → master. Set REVERB SIZE 7, DECAY 0.94, MIX 0.75. The tone should emerge slowly and decay for 5 seconds after the step fires. This is the foundation — a breath of sound. Once it feels right, save this as Scene A: click ● SAVE in the toolbar, then click A. You can always recall this starting point.' },
    { title:'Layer 2: The Chord Pad', hl:['chord','chorus','tape'],
      text:'Add harmonic richness by enabling the Chord module. Set CHORD to MIN7 (melancholic, floating). SPREAD to 8 cents (voices gently beating against each other). Patch CHORD OUT → TAPE IN → TAPE OUT → CHORUS IN → CHORUS OUT → REVERB IN. Set TAPE DRIVE 2.5, WOW 0.2, MIX 0.6. CHORUS RATE 0.6, DEPTH 0.25, WIDTH 0.9, MIX 0.55. Enable steps 1, 3, 5 in the sequencer — the chord fires on those beats, always min7 voicing. The drone and chord now blend through the reverb tail. Save this as Scene B. Now you can cut between A and B for arrangement: long intro (A), then chord enters (B).' },
    { title:'Layer 3: The Melodic Arc', hl:['arp','quantzr','wavefolder','phaser'],
      text:'Enable the QUANTIZER in RAND + DORIAN mode (root A). Start the ARPEGGIATOR: chord MIN7, direction U/D, rate ×2 (8th notes), octaves 2. Route the arpeggio through WVFLDR (FOLD 2.5, SYMM 0.1) → PHASER (RATE 0.12, DEPTH 0.55, MIX 0.6) → CHORUS → REVERB. The arpeggio plays wavefolder-enriched notes through the phaser\'s slow sweep, landing in the reverb alongside the chord pad. Add sequencer step probability: drop steps 2, 4, 6 to 70% — the rhythm now feels like an improvisation. Set ADSR ATTACK 0.4s, RELEASE 2.5s. Save this as Scene C. Transition A→B→C over the first two minutes.' },
    { title:'Layer 4: The Granular Climax', hl:['microcosm'],
      text:'The climax transforms everything into abstract texture. Patch VCA OUT → MICROCOSM IN → MICROCOSM OUT → REVERB IN. Set mode to SHIM (shimmer: granular one octave up, creates an ethereal shimmer above the notes). Set BLEND 0.8, SIZE 0.15, SCAT 0.4, PITCH 2.0, DNSTY 18. Press HOLD — this freezes the current moment into the granular buffer. The sound now loops as granular clouds infinitely, even if the sequencer is stopped. Increase REVERB SIZE to 8, DECAY 0.97, MIX 0.85. The track has dissolved into pure texture. Save this as Scene D. This is the ambient climax: recognizable melody → granular abstraction → frozen shimmer.' },
    { title:'Scene Morphing: Living Transitions', hl:[],
      text:'Instead of snapping between scenes instantly, use ⟿ MORPH in the toolbar. Click it — it lights up and a BARS selector appears (1 / 2 / 4 / 8 / 16). At 65 BPM, 4 bars = about 14 seconds; 8 bars = 28 seconds. Arm MORPH and click Scene C. Every continuous parameter glides simultaneously: VCF cutoff opens, ADSR shapes shift, reverb mix crossfades, LFO rate quickens. Discrete things (waveform type, chord type, cables) snap at the very end. While the MORPH button pulses, click it to freeze in place at the current blended state — if the midpoint sounds better than the destination, lock it there. Click a new scene while morphing to chain transitions from the current state. This is the full live arrangement workflow: your four scenes become a 2-minute arc of continuous evolution.' },
    { title:'Transitions and the Fade', hl:[],
      text:'A track without shape is just a loop. The arc: recall A (drone) → arm MORPH 8 bars → click B (chord enters slowly) → arm MORPH 8 bars → click C (arpeggio rises) → arm MORPH 16 bars → click D (granular dissolution). The whole set takes 10+ minutes and nothing happens abruptly. To end: in Scene D, slowly turn down VCA gain over 20–30 seconds — the reverb tail outlasts the signal, fading to silence naturally. To record: click ⏺ REC in the toolbar, perform your arc, click REC again. Your composition downloads as a .webm audio file. The entire set just happened in one browser tab.' },
  ]},
  { name:'10 — Scene Morphing Live', steps:[
    { title:'What is Scene Morphing?', hl:[],
      text:'Scenes (A B C D) are snapshots of the entire synthesizer. Normally, clicking a scene slot recalls it instantly — every knob jumps to its saved value, cables snap, and the sound changes abruptly. Scene Morphing replaces that jump with a smooth glide: every knob interpolates simultaneously over a duration you choose, easing in and out so nothing sounds mechanical. The morph respects your BPM: 4 bars at 90 BPM = 10.7 seconds; 8 bars at 60 BPM = 32 seconds. Set up two scenes first: load "Ambient Drone" from ⊹ PATCHES, press PLAY, click ● SAVE then A. That\'s Scene A.' },
    { title:'Build a Contrast Scene', hl:[],
      text:'Without saving, change the synthesizer significantly — this becomes Scene B. Open the VCF CUTOFF all the way up (bright and airy). Set ADSR ATTACK to 0.05 (snappy). Change the LFO RATE to 0.8 Hz (faster modulation). Turn the reverb MIX down to 0.35. Now click ● SAVE then B. You have two distinct states: A (dark, slow, washy) and B (bright, punchy, drier). These are your morph endpoints. Recall Scene A now by clicking A (instant, no MORPH arm) to confirm A sounds right.' },
    { title:'Your First Morph', hl:[],

let tutIdx = -1, tutStepIdx = 0;

function tutShowPicker() {
  const body = document.getElementById('tut-body');
  body.innerHTML = '<div style="color:#333;font-size:7px;letter-spacing:2px;margin-bottom:8px;">SELECT A TUTORIAL:</div>';
  TUTORIALS.forEach((t, i) => {
    const b = document.createElement('button'); b.className = 'tut-pick';
    b.textContent = t.name;
    b.addEventListener('click', () => tutOpen(i));
    body.appendChild(b);
  });
}

function tutOpen(idx) { tutIdx = idx; tutStepIdx = 0; tutRenderStep(); }

function tutRenderStep() {
  const t = TUTORIALS[tutIdx], s = t.steps[tutStepIdx];
  const body = document.getElementById('tut-body');
  body.innerHTML = `
    <div style="font-size:7px;color:#333;letter-spacing:2px;margin-bottom:4px;">${t.name}</div>
    <div id="tut-step-title">${s.title}</div>
    <div id="tut-step-text">${s.text}</div>
    <div style="display:flex;gap:6px;align-items:center;margin-top:8px;">
      <button class="btn" id="tut-prev">◀ PREV</button>
      <button class="btn" id="tut-nxt">${tutStepIdx===t.steps.length-1?'DONE ✓':'NEXT ▶'}</button>
      <button class="btn" id="tut-list">↩ LIST</button>
      <span id="tut-prog">${tutStepIdx+1} / ${t.steps.length}</span>
    </div>`;
  const prevBtn = document.getElementById('tut-prev');
  prevBtn.disabled = tutStepIdx === 0;
  prevBtn.addEventListener('click', () => { tutStepIdx--; tutRenderStep(); });
  document.getElementById('tut-nxt').addEventListener('click', () => {
    if (tutStepIdx === t.steps.length - 1) tutClose();
    else { tutStepIdx++; tutRenderStep(); }
  });
  document.getElementById('tut-list').addEventListener('click', () => { tutClearHl(); tutShowPicker(); });
  tutClearHl();
  (s.hl || []).forEach(id => document.getElementById(`mod-${id}`)?.classList.add('tut-highlight'));
}

function tutClearHl() { document.querySelectorAll('.tut-highlight').forEach(el => el.classList.remove('tut-highlight')); }
function tutClose() { tutClearHl(); document.getElementById('tut-panel').classList.remove('open'); }

(function setupContextMenu() {
  const menu = document.getElementById('ctx-menu');
  let ctxType = null, ctxId = null;

  document.getElementById('rack').addEventListener('contextmenu', e => {
    const panel = e.target.closest('.module');
    if (!panel) return;
    e.preventDefault();
    ctxType = panel.dataset.moduleType;
    ctxId   = Number(panel.dataset.instanceId);
    const isDuplicatable = DUPLICATABLE_TYPES.includes(ctxType);
    document.getElementById('ctx-duplicate').style.display = isDuplicatable ? '' : 'none';
    document.getElementById('ctx-delete').style.display    = (isDuplicatable && ctxId > 1) ? '' : 'none';
    document.getElementById('ctx-bypass').style.display    = isDuplicatable ? '' : 'none';
    menu.style.display = 'block';
    menu.style.left = e.clientX + 'px';
    menu.style.top  = e.clientY + 'px';
  });

  document.getElementById('ctx-duplicate').addEventListener('click', () => {
    if (ctxType) instantiateModule(ctxType);
    menu.style.display = 'none';
  });
  document.getElementById('ctx-bypass').addEventListener('click', () => {
    if (ctxType) bypassModule(ctxType, ctxId);
    menu.style.display = 'none';
  });
  document.getElementById('ctx-delete').addEventListener('click', () => {
    if (ctxType && ctxId > 1) removeModule(ctxType, ctxId);
    menu.style.display = 'none';
  });

  document.addEventListener('pointerdown', e => {
    if (!menu.contains(e.target)) menu.style.display = 'none';
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') menu.style.display = 'none';
  });
})();

const SCENE_KEY = 'nm2-scenes';
const scenes = [null, null, null, null];
let sceneSaveMode = false;

function loadScenes() {
  try {
    const raw = localStorage.getItem(SCENE_KEY);
    if (raw) { const arr = JSON.parse(raw); arr.forEach((s,i)=>{ if(i<4) scenes[i]=s; }); }
  } catch(e) {}
  updateSceneButtons();
}
function saveScenesToStorage() {
  try { localStorage.setItem(SCENE_KEY, JSON.stringify(scenes)); } catch(e) {}
}
function updateSceneButtons() {
  [0,1,2,3].forEach(i=>{
    const btn=document.getElementById(`scene-${i}`);
    if(btn) btn.classList.toggle('filled', scenes[i]!==null);
  });
}

document.getElementById('scene-save-mode').addEventListener('click',()=>{
  sceneSaveMode=!sceneSaveMode;
  document.getElementById('scene-save-mode').classList.toggle('on',sceneSaveMode);
  if (sceneSaveMode && morphMode) {
    morphMode = false;
    document.getElementById('morph-btn').classList.remove('on');
    document.getElementById('morph-bars').style.display = 'none';
  }
  document.getElementById('scene-status').textContent = sceneSaveMode ? 'Click A–D to save' : '';
});

[0,1,2,3].forEach(i=>{
  document.getElementById(`scene-${i}`).addEventListener('click',()=>{
    if(!ctx){ setStatus('Power on first.'); return; }
    const lbl='ABCD'[i];
    if(sceneSaveMode){
      scenes[i]=getConfig();
      saveScenesToStorage(); updateSceneButtons();
      sceneSaveMode=false;
      document.getElementById('scene-save-mode').classList.remove('on');
      document.getElementById('scene-status').textContent='';
      setStatus(`Scene ${lbl} saved`);
    } else if(morphMode || morphing){
      startMorph(i);
    } else {
      if(scenes[i]){ applyConfig(scenes[i]); setStatus(`Scene ${lbl} recalled`); }
      else { setStatus(`Scene ${lbl} empty — enable ● SAVE first`); }
    }
  });
});

// ═══════════════════════════════════════════════════════════════════════════════
// SCENE MORPH
// ═══════════════════════════════════════════════════════════════════════════════
let morphMode  = false;
let morphBarsN = 4;
let morphId    = 0;
let morphing   = false;

function morphEase(t) { return t < 0.5 ? 2*t*t : 1 - (-2*t+2)*(-2*t+2)/2; }
function morphLerp(a, b, t) { return typeof a === 'number' && typeof b === 'number' ? a + (b-a)*t : (t < 1 ? a : b); }

function applyMorphT(from, to, t) {
  const e  = morphEase(t);
  const L  = (a, b) => morphLerp(a, b, e);
  const sk = (id, v) => { if (knobRefs[id]) knobRefs[id].setVal(v); };
  if (from.vco && to.vco) {
    const c = L(from.vco.coarse, to.vco.coarse); const f = L(from.vco.fine, to.vco.fine);
    mods.vco.setCoarse(c); sk('vco-coarse', c); mods.vco.setFine(f); sk('vco-fine', f);
  }
  if (from.vco2 && to.vco2) {
    const c = L(from.vco2.coarse, to.vco2.coarse); const d = L(from.vco2.detune, to.vco2.detune);
    mods.vco2.setCoarse(c); sk('vco2-coarse', c); mods.vco2.setDetune(d); sk('vco2-detune', d);
  }
  if (from.vcf && to.vcf) {
    const cut = L(from.vcf.cutoff, to.vcf.cutoff); const res = L(from.vcf.res, to.vcf.res);
    mods.vcf.setCutoff(cut); sk('vcf-cutoff', cut); mods.vcf.setRes(res); sk('vcf-res', res);
  }
  if (from.vca && to.vca) {
    const g = L(from.vca.gain, to.vca.gain); mods.vca.setGain(g); sk('vca-gain', g);
  }
  if (from.adsr && to.adsr) {
    const A=L(from.adsr.A,to.adsr.A), D=L(from.adsr.D,to.adsr.D), S=L(from.adsr.S,to.adsr.S), R=L(from.adsr.R,to.adsr.R);
    mods.adsr.A=A; mods.adsr.D=D; mods.adsr.S=S; mods.adsr.R=R;
    sk('adsr-A',A); sk('adsr-D',D); sk('adsr-S',S); sk('adsr-R',R);
  }
  if (from.lfo && to.lfo) {
    const r=L(from.lfo.rate,to.lfo.rate), d=L(from.lfo.depth,to.lfo.depth);
    mods.lfo.setRate(r); sk('lfo-rate',r); mods.lfo.setDepth(d); sk('lfo-depth',d);
  }
  if (from.lfo2 && to.lfo2) {
    const r=L(from.lfo2.rate,to.lfo2.rate), d=L(from.lfo2.depth,to.lfo2.depth);
    mods.lfo2.setRate(r); sk('lfo2-rate',r); mods.lfo2.setDepth(d); sk('lfo2-depth',d);
  }
  if (from.reverb && to.reverb) {
    // skip setSize/setDecay (IR rebuild) — morph mix only
    const m=L(from.reverb.mix,to.reverb.mix); mods.reverb.setMix(m); sk('reverb-mix',m);
  }
  if (from.delay && to.delay) {
    const ti=L(from.delay.time,to.delay.time), fb=L(from.delay.fb,to.delay.fb), mx=L(from.delay.mix,to.delay.mix);
    mods.delay.setTime(ti); sk('delay-time',ti); mods.delay.setFeedback(fb); sk('delay-fb',fb); mods.delay.setMix(mx); sk('delay-mix',mx);
  }
  if (from.chorus && to.chorus) {
    const r=L(from.chorus.rate,to.chorus.rate), d=L(from.chorus.depth,to.chorus.depth), w=L(from.chorus.width,to.chorus.width), m=L(from.chorus.mix,to.chorus.mix);
    mods.chorus.setRate(r); sk('chorus-rate',r); mods.chorus.setDepth(d); sk('chorus-depth',d); mods.chorus.setWidth(w); sk('chorus-width',w); mods.chorus.setMix(m); sk('chorus-mix',m);
  }
  if (from.phaser && to.phaser) {
    const r=L(from.phaser.rate,to.phaser.rate), d=L(from.phaser.depth,to.phaser.depth), m=L(from.phaser.mix,to.phaser.mix);
    mods.phaser.setRate(r); sk('phaser-rate',r); mods.phaser.setDepth(d); sk('phaser-depth',d); mods.phaser.setMix(m); sk('phaser-mix',m);
  }
  if (from.tape && to.tape) {
    const dr=L(from.tape.drive,to.tape.drive), w=L(from.tape.wow,to.tape.wow), m=L(from.tape.mix,to.tape.mix);
    mods.tape.setDrive(dr); sk('tape-drive',dr); mods.tape.setWow(w); sk('tape-wow',w); mods.tape.setMix(m); sk('tape-mix',m);
  }
  if (from.panner && to.panner) {
    const r=L(from.panner.rate,to.panner.rate), d=L(from.panner.depth,to.panner.depth);
    mods.panner.setRate(r); sk('pan-rate',r); mods.panner.setDepth(d); sk('pan-depth',d);
  }
  if (from.wavefolder && to.wavefolder) {
    const f=L(from.wavefolder.fold,to.wavefolder.fold), s=L(from.wavefolder.symm,to.wavefolder.symm);
    mods.wavefolder.setFold(f); sk('fold-fold',f); mods.wavefolder.setSymm(s); sk('fold-symm',s);
  }
  if (from.att && to.att) {
    const a=L(from.att.att,to.att.att), o=L(from.att.offset,to.att.offset);
    mods.att.setAtt(a); sk('att-knob',a); mods.att.setOffset(o); sk('att-offset',o);
  }
  if (from.sidechain && to.sidechain) {
    const a=L(from.sidechain.attack,to.sidechain.attack), r=L(from.sidechain.release,to.sidechain.release), m=L(from.sidechain.amount,to.sidechain.amount);
    mods.sidechain.setAttack(a); sk('sc-attack',a); mods.sidechain.setRelease(r); sk('sc-release',r); mods.sidechain.setAmount(m); sk('sc-amount',m);
  }
  if (from.mixer && to.mixer) {
    const a=L(from.mixer.a,to.mixer.a), b=L(from.mixer.b,to.mixer.b), c=L(from.mixer.c,to.mixer.c);
    mods.mixer.setA(a); sk('mix-knob-a',a); mods.mixer.setB(b); sk('mix-knob-b',b); mods.mixer.setC(c); sk('mix-knob-c',c);
  }
  if (from.chord && to.chord) {
    const sp=L(from.chord.spread,to.chord.spread), lv=L(from.chord.level,to.chord.level);
    mods.chord.setSpread(sp); sk('chord-spread',sp); mods.chord.setLevel(lv); sk('chord-level',lv);
  }
  if (from.microcosm && to.microcosm) {
    const bl=L(from.microcosm.blend,to.microcosm.blend), gz=L(from.microcosm.grainSz,to.microcosm.grainSz),
          sc=L(from.microcosm.scatter,to.microcosm.scatter), pi=L(from.microcosm.pitch,to.microcosm.pitch), dn=L(from.microcosm.density,to.microcosm.density);
    mods.microcosm.setBlend(bl); sk('mc-blend',bl); mods.microcosm.setGrainSz(gz); sk('mc-size',gz);
    mods.microcosm.setScatter(sc); sk('mc-scat',sc); mods.microcosm.setPitch(pi); sk('mc-pitch',pi); mods.microcosm.setDensity(dn); sk('mc-dnsty',dn);
  }
  if (from.stutter && to.stutter) {
    const sl=L(from.stutter.slice,to.stutter.slice), rp=L(from.stutter.repeat,to.stutter.repeat), mx=L(from.stutter.mix,to.stutter.mix);
    mods.stutter.setSlice(sl); sk('stut-slice',sl); mods.stutter.setRepeat(rp); sk('stut-rpt',rp); mods.stutter.setMix(mx); sk('stut-mix',mx);
  }
  if (from.seq && to.seq) {
    const bpm = Math.round(L(from.seq.bpm, to.seq.bpm));
    mods.seq.bpm = bpm; sk('seq-bpm', bpm);
  }
  if (from.noise && to.noise) {
    const lv=L(from.noise.level,to.noise.level); mods.noise.setLevel(lv); sk('noise-level',lv);
  }
}

function startMorph(sceneIdx) {
  if (!ctx) { setStatus('Power on first.'); return; }
  if (!scenes[sceneIdx]) { setStatus(`Scene ${'ABCD'[sceneIdx]} empty — enable ● SAVE first`); return; }
  const fromCfg  = getConfig();
  const toCfg    = scenes[sceneIdx];
  const duration = morphBarsN * 4 * (60000 / (mods.seq?.bpm || 120));
  morphId++;
  const myId = morphId;
  morphing   = true;
  document.getElementById('morph-btn').classList.add('morphing');
  document.getElementById('scene-status').textContent = `MORPHING → ${'ABCD'[sceneIdx]}`;
  requestAnimationFrame(function(startTs) {
    if (morphId !== myId) return;
    function loop(now) {
      if (morphId !== myId) return;
      const t = Math.min(1, (now - startTs) / duration);
      applyMorphT(fromCfg, toCfg, t);
      if (t < 1) { requestAnimationFrame(loop); }
      else { applyConfig(toCfg); stopMorph(); setStatus(`Morphed to Scene ${'ABCD'[sceneIdx]}`); }
    }
    loop(startTs);
  });
}

function stopMorph() {
  morphId++;
  morphing  = false;
  morphMode = false;
  document.getElementById('morph-btn').classList.remove('morphing', 'on');
  document.getElementById('morph-bars').style.display = 'none';
  const st = document.getElementById('scene-status');
  if (st.textContent.startsWith('MORPHING')) st.textContent = '';
}

document.getElementById('morph-btn').addEventListener('click', () => {

  morphMode = !morphMode;

});

function audioBufferToWav(buffer) {
  const numCh = buffer.numberOfChannels, len = buffer.length, sr = buffer.sampleRate;
  const ab = new ArrayBuffer(44 + len * numCh * 2);
  const dv = new DataView(ab);
  const ws = (off, s) => { for (let i=0; i<s.length; i++) dv.setUint8(off+i, s.charCodeAt(i)); };
  ws(0,'RIFF'); dv.setUint32(4, 36 + len*numCh*2, true); ws(8,'WAVE'); ws(12,'fmt ');
  dv.setUint32(16,16,true); dv.setUint16(20,1,true); dv.setUint16(22,numCh,true);
  dv.setUint32(24,sr,true); dv.setUint32(28,sr*numCh*2,true);
  dv.setUint16(32,numCh*2,true); dv.setUint16(34,16,true); ws(36,'data');
  dv.setUint32(40, len*numCh*2, true);
  let off = 44;
  for (let i=0; i<len; i++) for (let c=0; c<numCh; c++) {
    const s = Math.max(-1, Math.min(1, buffer.getChannelData(c)[i]));
    dv.setInt16(off, s < 0 ? s*0x8000 : s*0x7FFF, true); off += 2;
  }
  return ab;
}

// STUTTER / SLICER
// ═══════════════════════════════════════════════════════════════════════════════
function makeStutter() {
  const inlet   = ctx.createGain();
  const outlet  = ctx.createGain(); outlet.gain.value = 1.0;
  const del     = ctx.createDelay(2.0); del.delayTime.value = 0.125;
  const fbGain  = ctx.createGain(); fbGain.gain.value = 0;
  const wetGain = ctx.createGain(); wetGain.gain.value = 0.5;

  // Send-effect model (like reverb/delay): outlet is wet-only, connected to masterOut
  // in wireDefault(). Dry signal flows through the source's own masterOut connection.
  inlet.connect(del); del.connect(fbGain); fbGain.connect(del);
  del.connect(wetGain); wetGain.connect(outlet);

  const m = { inlet, outlet, sliceVal:0.125, repeatVal:4, mixVal:0.5, activeVal:false };
  m.setSlice  = v => { m.sliceVal = v; del.delayTime.setTargetAtTime(v, ctx.currentTime, 0.005); };
  m.setRepeat = v => { m.repeatVal = v; if (m.activeVal) fbGain.gain.setTargetAtTime(0.5 + v/32, ctx.currentTime, 0.02); };
  m.setMix    = v => { m.mixVal=v; wetGain.gain.setTargetAtTime(v, ctx.currentTime, 0.05); };
  m.setActive = on => { m.activeVal=on; fbGain.gain.setTargetAtTime(on ? 0.5+m.repeatVal/32 : 0, ctx.currentTime, 0.005); };
  m.setMix(0.5);
  mods.stutter = m; return m;
}
